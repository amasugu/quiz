// localStorage shim for window.storage API (used inside Claude Artifact)
if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    async get(key) {
      const raw = localStorage.getItem(key);
      if (raw === null) throw new Error("key not found: " + key);
      return { key, value: raw };
    },
    async set(key, value) {
      localStorage.setItem(key, String(value));
      return { key, value: String(value) };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || (k && k.startsWith(prefix))) keys.push(k);
      }
      return { keys };
    }
  };
}

    { id: "2-16", chapter: "2章", section: "インフォームド・コンセント", text: "産業カウンセラーは、クライエントに初期もしくは必要な段階において十分な説明したうえでの同意を得て、カウンセリングを進めなければならない。", answer: true, explanation: "インフォームド・コンセントはカウンセリング開始の基本要件。" },
    { id: "2-17", chapter: "2章", section: "インフォームド・コンセント", text: "具体的な説明事項としては、カウンセリングの役割、時間、期間、終結、料金、守秘義務の意味・目的と限界、カウンセリングの中断・リファーなどがある。", answer: true, explanation: "インフォームド・コンセントの具体的内容として正しい。" },
    { id: "2-18", chapter: "2章", section: "インフォームド・コンセント", text: "カウンセリングの中断・リファーについては、クライエント自身の意思を尊重することを確実に伝えなければならない。", answer: true, explanation: "中断・リファーにおけるクライエントの自己決定権の尊重は必須。" },
    { id: "2-19", chapter: "2章", section: "インフォームド・コンセント", text: "カウンセリングの特質やカウンセリング関係などについて、クライエントが理解できる平易な言葉で説明して、できるだけクライエントの不安の解消に努める。", answer: true, explanation: "平易な言葉での説明と不安解消への配慮が重要。" },
    { id: "2-20", chapter: "2章", section: "インフォームド・コンセント", text: "カウンセラーとしての自己の背景（ベースとなる理論、スーパーバイザーの存在など）は大切であるので最初に説明する。", answer: false, explanation: "×：面接冒頭ではクライエントが理解できないことが多いので、適切なタイミングを見つけて行う。" },
    { id: "2-21", chapter: "2章", section: "二重関係回避", text: "カウンセリングを進めるうえで必須なのは、産業カウンセラーとクライエントとの親密性に基づく関係が深く形成されていることである。", answer: false, explanation: "×：必須なのは親密性ではなく、契約に基づく基本的な関係が成立していること。" },
    { id: "2-22", chapter: "2章", section: "二重関係回避", text: "二重関係とは、産業カウンセラーとクライエントという基本的な関係とは別の関係が存在することである。", answer: true, explanation: "二重関係の定義として正しい。" },
    { id: "2-23", chapter: "2章", section: "二重関係回避", text: "二重関係は産業カウンセラーの正確な判断と決断を阻害し、クライエントの利益を損なうことにつながる。", answer: true, explanation: "二重関係がカウンセラーの判断を歪め、クライエントの利益を損なうリスクがある。" },
    { id: "2-24", chapter: "2章", section: "二重関係回避", text: "二重関係には、性的親密性、ビジネス関係、職場の上司・同僚・部下の関係などがある。", answer: true, explanation: "二重関係の具体例として正しい。" },
    { id: "2-25", chapter: "2章", section: "二重関係回避", text: "職場の上司・同僚・部下、友人、教師と学生などの関係がある場合には、相談を受けることはかまわないが、契約にもとづくカウンセリング関係はもたないようにする。", answer: true, explanation: "既存の関係がある場合、相談は受けられるが契約に基づくカウンセリング関係は避けるべき。" },
    { id: "2-26", chapter: "2章", section: "立場と義務", text: "クライエントの抱える問題がどの程度職場組織に起因しているのかの判断には、職場の管理監督者がどのように認識しているかを知ることが不可欠である。", answer: true, explanation: "管理監督者の認識把握は職場組織起因の問題を判断するうえで不可欠。" },
    { id: "2-27", chapter: "2章", section: "立場と義務", text: "職場組織とかかわる際の産業カウンセラーは、職場の問題解決者となる。", answer: false, explanation: "×：問題を解決するのは当事者であり、産業カウンセラーは相談担当者であると同時に職場の調整者となる。" },
    { id: "2-28", chapter: "2章", section: "立場と義務", text: "面接で得られたクライエントの情報の提供を事業者から求められた場合、安全配慮義務履行のため、クライエントの同意なしに事業者へ情報を提供してかまわない。", answer: false, explanation: "×：安全配慮義務履行のためであっても、クライエントの同意は必須。" },
    { id: "2-29", chapter: "2章", section: "立場と義務", text: "クライエントの情報の提供を事業者から求められた場合、その必要性と使途に十分合理性があれば提供できるよう調整するが、クライエントの同意は必須である。", answer: true, explanation: "情報提供の合理性があっても、クライエントの同意は常に必須。" },
    { id: "2-30", chapter: "2章", section: "立場と義務", text: "倫理綱領の遵守が求められるのは有資格者なので、産業カウンセラー養成講座を受講する者は倫理綱領に書かれていることを実践する必要はない。", answer: false, explanation: "×：養成講座受講者も面接の体験学習で個人情報に触れるので、倫理綱領を理解し実践することが必要。" },
  ],
  "3章": [
    { id: "3-1", chapter: "3章", section: "産業界におけるカウンセリングの歩み", text: "職業指導運動においてパーソンズは、個人の能力・興味と職業に対する資質・適性などを統合し、合理的判断をするマッチングをカウンセラーの中心業務とした。", answer: true, explanation: "パーソンズの職業指導運動におけるマッチング理論として正しい。" },
    { id: "3-2", chapter: "3章", section: "産業界におけるカウンセリングの歩み", text: "ソーンダイクは「すべて存在するものは量的に存在する。量的に存在するものはこれを測定することができる」というスローガンを掲げた。", answer: true, explanation: "ソーンダイクの教育測定運動の理念として正しい。" },
    { id: "3-3", chapter: "3章", section: "産業界におけるカウンセリングの歩み", text: "教育測定運動は、職業指導運動と合体して特性因子理論へ発展していった。", answer: true, explanation: "教育測定運動×職業指導運動の統合で特性因子理論が発展した。" },
    { id: "3-4", chapter: "3章", section: "産業界におけるカウンセリングの歩み", text: "ビアーズの精神衛生運動は、現在のキャリアコンサルティングへの流れをつくった。", answer: false, explanation: "×：ビアーズの精神衛生運動は現在のメンタルヘルス運動への流れをつくった。キャリアコンサルティングの源流は職業指導運動。" },
    { id: "3-5", chapter: "3章", section: "産業界におけるカウンセリングの歩み", text: "戦後の日本産業界では産業相談が普及していったが、人間関係論およびカウンセリング心理学の理論に立脚している点が戦前とは異なっている。", answer: true, explanation: "戦後の産業相談は人間関係論・カウンセリング心理学に立脚している点が戦前と異なる。" },
  ],
  "4章": [
    { id: "4-1", chapter: "4章", section: "カウンセリングの定義", text: "カウンセリングとは一般に、個人がもつ問題や悩みの解決のために、専門的な理論と方法に基づいて行われる相談や支援のことを意味する。", answer: true, explanation: "カウンセリングの一般的な定義として正しい。" },
    { id: "4-2", chapter: "4章", section: "カウンセリングの定義", text: "カウンセリングには種々の立場や考え方があり、対象とするクライエントや取り上げる問題によって定義される。", answer: false, explanation: "×：カウンセリングの定義は、①人間観や哲学的背景、②カウンセリングの目標、③方法などの理論的背景の違いによる。" },
    { id: "4-3", chapter: "4章", section: "カウンセリングの定義", text: "カウンセリングの目的が「クライエントがより成長した人間として、問題を自分で解決できるようになることをめざす」であることは、多くのカウンセラーに共有されている。", answer: true, explanation: "クライエントの成長・自律を目指す点は多くのカウンセラーに共有されている。" },
    { id: "4-4", chapter: "4章", section: "カウンセリングの定義", text: "カウンセリングは、専門的には、カウンセリング心理学の知見にのみ基づいた心理学的な援助を意味する。", answer: false, explanation: "×：カウンセリング心理学のみではなく、その関連領域の科学的・臨床的な知見に基づいた心理学的な援助。" },
    { id: "4-5", chapter: "4章", section: "カウンセリングの定義", text: "カウンセリングは社会的環境と密接に関係しているので、カウンセラーは、調和のとれた人間関係、集団や組織、社会の維持や改善など、社会環境の整備に貢献することも求められる。", answer: true, explanation: "社会環境への貢献もカウンセラーの役割。" },
    { id: "4-6", chapter: "4章", section: "日常会話・相談との違い", text: "カウンセリングは、カウンセラーが自己の人生経験や価値観からクライエントに助言を与えるものである。", answer: false, explanation: "×：助言ではなく、クライエント一人ひとりを独自の存在として尊重し、問題・悩み・葛藤を深く傾聴し理解することが重視される。" },
    { id: "4-7", chapter: "4章", section: "日常会話・相談との違い", text: "クライエントに気づきを促すためには、カウンセラーに権威が必要とされる。", answer: false, explanation: "×：決めつけなどで悩みが深まることもあるため、対等で安全な関与の仕方が求められる。権威は不要。" },
    { id: "4-8", chapter: "4章", section: "日常会話・相談との違い", text: "カウンセリングでは、時間と場所の明確な設定がなされ、クライエントが全人的に受け止められ、信頼関係が構築されることが重要である。", answer: true, explanation: "構造化された設定と全人的な受容・信頼関係の構築は重要。" },
    { id: "4-9", chapter: "4章", section: "日常会話・相談との違い", text: "カウンセリングにおける専門的な提案や介入は、クライエントのニーズより、何が問題解決に役立つかというカウンセラーの判断に基づいて行われる。", answer: false, explanation: "×：専門的な提案や介入は、クライエントにとって何が最も重要かが大切であり、カウンセラーが問題解決に役立つと考えることとは必ずしも一致しない。" },
    { id: "4-10", chapter: "4章", section: "日常会話・相談との違い", text: "カウンセラーは、守秘義務や二重・多重関係禁止など、守るべき倫理を理解し、体現できることが求められる。", answer: true, explanation: "倫理の理解と実践はカウンセラーの必須要件。" },
    { id: "4-11", chapter: "4章", section: "他の専門的援助との比較", text: "ガイダンスはカウンセリングの起源であり、行動や生活態度についての教育的な指導に加え、心理的苦悩の軽減や人格の変容への支援を重視する。", answer: false, explanation: "×：ガイダンスは教育的指導を主とし、心理的苦悩の軽減や人格の変容はサイコセラピーやカウンセリングにおいて重視される。" },
    { id: "4-12", chapter: "4章", section: "他の専門的援助との比較", text: "コンサルテーションではコンサルタントの専門的な知識や経験に裏づけられた助言や提案を行う。", answer: true, explanation: "コンサルテーションは専門知識に基づく助言・提案が特徴。" },
    { id: "4-13", chapter: "4章", section: "他の専門的援助との比較", text: "ケースワークではクライエントの社会生活の向上や幸福を主な課題としている。", answer: true, explanation: "ケースワーク（社会福祉的援助）の主目的は社会生活の向上と幸福。" },
    { id: "4-14", chapter: "4章", section: "他の専門的援助との比較", text: "教育とカウンセリングとでは、文化や価値の伝達を重視する点で共通点がある。", answer: false, explanation: "×：教育とカウンセリングの共通点は、人格の成長を目的とする点。" },
    { id: "4-15", chapter: "4章", section: "他の専門的援助との比較", text: "医療の主な目的は診断と治療であり、カウンセリングの目的には人間的成長や自己実現を含んでいる点で違いがある。", answer: true, explanation: "医療＝診断・治療、カウンセリング＝人間的成長・自己実現という違い。" },
    { id: "4-16", chapter: "4章", section: "効果と限界", text: "カウンセリングの効果には、問題解決や目標達成以外にも、症状の軽減、メンタルヘルスの増進、自己効力感の増大、ストレス耐性やレジリエンスの増進などがある。", answer: true, explanation: "効果は多岐にわたる。" },
    { id: "4-17", chapter: "4章", section: "効果と限界", text: "カウンセリングは、介入技法の有効性によって効果が決まるので、クライエントのカウンセリングへの関与の程度は関係ない。", answer: false, explanation: "×：介入技法の有効性のほかに、クライエントの関与の程度・カウンセリング関係を活用する能力・カウンセラーのかかわりが効果に影響する。" },
    { id: "4-18", chapter: "4章", section: "効果と限界", text: "心理的苦悩（軽度の鬱や不安など）で臨床的な状態にあるとされたクライエントが、カウンセリングやサイコセラピー終結時に臨床的な状態にないと判定される割合は約80パーセントである。", answer: false, explanation: "×：メタ分析では好転している結果が約80%だが、臨床的な状態にないと判定される割合は正しくは約60%。" },
    { id: "4-19", chapter: "4章", section: "効果と限界", text: "カウンセリングには限界があるので、医学的診断や投薬、行政や利害関係者に申し立てや調停が必要なときは、適切な機関にリファー（委託・紹介）することは大切である。", answer: true, explanation: "カウンセリングの限界認識と適切なリファーは重要な実践。" },
    { id: "4-20", chapter: "4章", section: "効果と限界", text: "カウンセリングはクライエントの内省力や自身の行動に対する責任能力に関わらず、効果がある。", answer: false, explanation: "×：コミュニケーション能力・内省力・責任能力はカウンセリングの限界のひとつ。医療へのリファーも重要。" },
    { id: "4-21", chapter: "4章", section: "進展させる要因", text: "カウンセリングの効果は、カウンセラーによってかなり違うが、それは年齢や人生経験によるところが大きい。", answer: false, explanation: "×：カウンセラー個人の固有の特性より、カウンセリングを学び実践する中で形成されていくものという側面が大きい。" },
    { id: "4-22", chapter: "4章", section: "進展させる要因", text: "カウンセラーが、学習とトレーニング、必要に応じてスーパービジョンを受けるなどで専門的な成長を遂げていることが、カウンセリングの効果に影響を与える。", answer: true, explanation: "継続的な学習・SVによる専門的成長は効果に影響する。" },
    { id: "4-23", chapter: "4章", section: "進展させる要因", text: "パーソナリティ障害や不安定な愛着（アタッチメント）をもつクライエントは、カウンセリングによる支援が難しい指標のひとつである。", answer: true, explanation: "パーソナリティ障害・不安定な愛着はカウンセリングが困難な要因の一つ。" },
    { id: "4-24", chapter: "4章", section: "進展させる要因", text: "クライエントの内的な視点からその人を理解しようとするカウンセラーの態度は、理論的立場や流派を超えてカウンセリングに不可欠の要因とみなされている。", answer: true, explanation: "内的視点からの理解は流派を超えた共通の不可欠要因。" },
    { id: "4-25", chapter: "4章", section: "進展させる要因", text: "無条件の肯定的配慮と自己一致／純粋性については、関係要因としての検証は行われていない。", answer: false, explanation: "×：「目標の合意と協働」「作業同盟」「共感」の他、無条件の肯定的配慮や自己一致／純粋性等の種々の要因のエビデンスが検証されている。" },
  ],
  "5章": [
    { id: "5-1", chapter: "5章", section: "傾聴の意味と位置づけ", text: "傾聴とは、誠心誠意、集中して相手の語りや表現を聴くことであり、積極的に関わろうとする能動的な行為であることから、積極的傾聴ともいわれる。", answer: true, explanation: "傾聴＝積極的傾聴（能動的な行為）。" },
    { id: "5-2", chapter: "5章", section: "傾聴の意味と位置づけ", text: "カウンセリングでは、クライエントの内面的で情意的な側面を傾聴するのであって、社会経済的な状況、健康状態、家庭環境などの客観的な情報に着目する必要はない。", answer: false, explanation: "×：カウンセリングにおいても、社会経済的な状況、健康状態、家庭環境などの客観的な情報は有用である。" },
    { id: "5-3", chapter: "5章", section: "傾聴の意味と位置づけ", text: "正確に深く傾聴するためには、言語的表現だけでなく、表情、態度、声の調子、身体動作といった非言語表現の意味を汲み取る必要がある。", answer: true, explanation: "非言語表現も含めた傾聴が重要。" },
    { id: "5-4", chapter: "5章", section: "傾聴の意味と位置づけ", text: "共感的な傾聴とは、カウンセラーがクライエントの語りや表現に対して、カウンセラー自身の枠組みからその人を理解しようとすることである。", answer: false, explanation: "×：共感的な傾聴とは、評価や価値判断をいったん脇に置き、クライエントの視点からその人を理解しようとすること。" },
    { id: "5-5", chapter: "5章", section: "傾聴の意味と位置づけ", text: "傾聴は、すべてのカウンセラーが身につけておかなければならない必須のスキルであり実践の基礎として位置づけられるので、短時間のトレーニングで身につく。", answer: false, explanation: "×：トレーニングや実践の積み重ねが求められ、短時間では身につかない。" },
    { id: "5-6", chapter: "5章", section: "現代社会における傾聴の必要性", text: "個人の違いを尊重し、豊かで充実した生き方を見出すことを支えようとする現在社会の動きから、1人ひとりへの個別的な支援としてのカウンセリングが求められるようになった。", answer: true, explanation: "個別支援へのニーズの高まりは現代社会の動き。" },
    { id: "5-7", chapter: "5章", section: "現代社会における傾聴の必要性", text: "自分の訴えや声を聴いてもらえない人の苦悩や孤独が深まる現代には、他者の理解は不可欠である。", answer: true, explanation: "他者理解は現代社会における傾聴の必要性を示す。" },
    { id: "5-8", chapter: "5章", section: "現代社会における傾聴の必要性", text: "いじめ、虐待、ハラスメント、また孤独や絶望、自殺などの問題の背景に、心から耳を傾け深く理解してくれる人や場の欠如や不足が関係している。", answer: true, explanation: "現代の諸問題の背景に傾聴の欠如が関係している。" },
    { id: "5-9", chapter: "5章", section: "現代社会における傾聴の必要性", text: "人は語ることや自分を表現することが傾聴され理解されることで、発達し成長するといわれるが、一方で甘やかしになり、自分で解決する力の阻害となると懸念されている。", answer: false, explanation: "×：語ること・表現することが傾聴され理解されることは人間にとって必要不可欠であり、甘やかしではなく、むしろ自己解決できる力を育む。" },
    { id: "5-10", chapter: "5章", section: "現代社会における傾聴の必要性", text: "傾聴がなされ得る関係性に一時的に混乱や対立が生じたときにも、鎮静化させ、安全と信頼を回復し、配慮や熟慮に向かう可能性がある。", answer: true, explanation: "傾聴は混乱時にも鎮静化と信頼回復をもたらす。" },
    { id: "5-11", chapter: "5章", section: "傾聴の前提となる考え方", text: "傾聴の前提となる基本的な人間観とは、人間の独自性や個別性を理解し、尊重することである。", answer: true, explanation: "独自性・個別性の尊重が傾聴の前提となる人間観。" },
    { id: "5-12", chapter: "5章", section: "傾聴の前提となる考え方", text: "傾聴の前提となる基本的な人間観とは、人間の成長へと向かう潜在力を信頼することである。", answer: true, explanation: "成長への潜在力への信頼も傾聴の前提となる人間観。" },
    { id: "5-13", chapter: "5章", section: "傾聴の前提となる考え方", text: "カウンセラーとクライエントとは、それぞれ異なる役割や課題があり、非対称的であるので、対等な関係とはいえない。", answer: false, explanation: "×：役割や課題は異なるが、人としての優劣や上下はない。対等な人として真摯に・誠実に向き合う姿勢が大切。" },
    { id: "5-14", chapter: "5章", section: "傾聴の前提となる考え方", text: "カウンセラーは結論や結果を出すことを急がず、生起するプロセスを大切にして、「いま、ここで（here and now）」生じていることに焦点をあてて傾聴することが重要である。", answer: true, explanation: "プロセス重視・「いま、ここで」の焦点化が傾聴の要点。" },
    { id: "5-15", chapter: "5章", section: "傾聴の前提となる考え方", text: "傾聴は、問題解決の目標に向かってクライエントを導くものであり、何らかの結論を得る必要がある。", answer: false, explanation: "×：カウンセラーが自分の固定観念に気づき、そこから解放されることが求められる。結論を急ぐものではない。" },
    { id: "5-16", chapter: "5章", section: "傾聴のための基本的態度", text: "自己一致とは、カウンセラーが自由にそして深く自分自身でいられることであり、自分が体験し感じていることを、常にクライエントに自己表現できるような態度である。", answer: false, explanation: "×：感じたタイミングで伝えるのではなく、状況を把握しクライエントへの影響を考慮し、必要なときに表現できる態度。" },
    { id: "5-17", chapter: "5章", section: "傾聴のための基本的態度", text: "無条件の肯定的配慮とは、クライエントの存在そのもの、体験や表現に対して、条件付きでない温かな関心を示し、受け止めることである。", answer: true, explanation: "無条件の肯定的配慮の定義として正しい。" },
    { id: "5-18", chapter: "5章", section: "傾聴のための基本的態度", text: "共感的理解とは、クライエントの視点からクライエントが表現していることや感じていることを、正確に感じ取り、理解することである。", answer: true, explanation: "共感的理解の定義として正しい。" },
    { id: "5-19", chapter: "5章", section: "傾聴のための基本的態度", text: "無条件の肯定的配慮とは、カウンセラーが容認できなくても、クライエントのあらゆる行為や要求に対して選択や評価することなく常に受け入れることである。", answer: false, explanation: "×：危険な側面や過ちには厳しく立ち向かうことが必要な場合もある。1人の人間として尊重するがゆえ、本心からの対峙が可能になる。" },
    { id: "5-20", chapter: "5章", section: "傾聴のための基本的態度", text: "共感的理解が提供されるためには、カウンセラーはクライエントの理解に柔軟で、同時に自分を失うことのない安定した自己をもっている必要がある。", answer: true, explanation: "柔軟性と安定した自己の両方が共感的理解に必要。" },
    { id: "5-21", chapter: "5章", section: "傾聴の技法", text: "カウンセリングの場の設定やカウンセリング関係についての話し合いと合意である「場面構成」は初回のセッション冒頭でのみ行われる。", answer: false, explanation: "×：場面構成は初回冒頭だけでなく、その後もプロセスの進行に応じて、その都度柔軟に行われる。" },
    { id: "5-22", chapter: "5章", section: "傾聴の技法", text: "クライエントが安心して語り、落ち着いて自分を振り返るためには、カウンセラーからのかかわりは最小限にし、黙ってクライエントの言葉や思いをひたすら聴き続ける。", answer: false, explanation: "×：非言語的メッセージを含めた積極的な関心が向けられることが大切。" },
    { id: "5-23", chapter: "5章", section: "傾聴の技法", text: "「伝え返し」は、クライエントが語る言葉の中で重要なキーワードや独特の言い回しなどを、クライエントが発したとおりに言葉をくり返すことである。", answer: false, explanation: "×：「伝え返し」は、クライエントが語っていることを正確に理解し、その理解した内容をキーワードや言い回しを中心にして伝え返すこと。" },
    { id: "5-24", chapter: "5章", section: "傾聴の技法", text: "「オープン・クエスチョン」は主体的な語りや自己探求を促進するが、過剰に用いるとクライエントを混乱させたり不安にさせたりする場合があることに留意する。", answer: true, explanation: "オープン・クエスチョンは有用だが過剰使用に注意。" },
    { id: "5-25", chapter: "5章", section: "傾聴の技法", text: "カウンセリングにおいて、その効果に技法的な要因が占める割合は大きいとは言えないが、適切な技法の活用がカウンセリング関係の改善など副次的な効果をもたらすことが明らかになっている。", answer: true, explanation: "技法そのものより適切な活用が副次的効果をもたらす。" },
    { id: "5-26", chapter: "5章", section: "応答様式・応答対象", text: "感情的・情意的な表出が少ないクライエントには、「どんな気持ちですか」「どう感じていますか」などと積極的に質問し、感情的、情意的な面に触れていくことを促す。", answer: false, explanation: "×：安全な形で表出を勧める。かかわり行動や明確化、質問などを適切に用い、感情的な面に少しずつ触れていく。" },
    { id: "5-27", chapter: "5章", section: "応答様式・応答対象", text: "感情への応答は、カウンセリングの中心となる応答であり、「反射」と「明確化」などの応答様式を適切かつ柔軟に用いることが求められる。", answer: true, explanation: "感情への応答は中心的応答。反射・明確化を柔軟に用いる。" },
    { id: "5-28", chapter: "5章", section: "応答様式・応答対象", text: "感情の中には、強く一過的に表れることの多い情動、心理的苦悩、安定した状態に感じられる感情などさまざまあり、複雑に絡み合っていることを理解し応答する。", answer: true, explanation: "感情の多様性・複雑性を理解した応答が必要。" },
    { id: "5-29", chapter: "5章", section: "応答様式・応答対象", text: "「いま、ここで」クライエントの心身全体で表現される意味ある感情に焦点をあて、理解しようとすることが重要である。", answer: true, explanation: "「いま、ここで」の感情への焦点化が重要。" },
    { id: "5-30", chapter: "5章", section: "応答様式・応答対象", text: "「感情の明確化」の内容が、クライエントの感じていることや話したいこととズレてしまった場合は、話題を変えて話を続けることが必要である。", answer: false, explanation: "×：話題を変えてしまうのはカウンセラー主導。カウンセラーが明確化した内容を押しつけず、クライエントが何を言おうとしているのかの傾聴に戻ることが重要。" },
  ],
  "6章": [
    { id: "6-1", chapter: "6章", section: "カウンセリング・プロセスの視点", text: "カウンセリング活動は、カウンセラーとクライエントが初めて接触したときに始まり、その目的が達成されたときに終わるプロセスをたどる。", answer: true, explanation: "カウンセリング活動のプロセスの開始と終結の定義として正しい。" },
    { id: "6-2", chapter: "6章", section: "カウンセリング・プロセスの視点", text: "クライエントにとってカウンセリングとは、問題を抱えた不自由な存在から内面の変化を経て、自由な存在に自己変容していく成長過程である。", answer: true, explanation: "カウンセリングはクライエントの自己変容・成長過程。" },
    { id: "6-3", chapter: "6章", section: "カウンセリング・プロセスの視点", text: "カウンセリングは目標達成のため、体系化された計画的な進め方によって、常に先に進むべきである。", answer: false, explanation: "×：カウンセリング・プロセスは必ずしも先に進むばかりでなく、ある段階から後戻りすることもある。" },
    { id: "6-4", chapter: "6章", section: "カウンセリング・プロセスの視点", text: "クライエントの成長過程に応じたカウンセラーの的確なかかわりがクライエントへの支援となり、すべてのプロセスを通らないで終結することもある。", answer: true, explanation: "すべての段階を通らずに終結することもある。柔軟性が重要。" },
    { id: "6-5", chapter: "6章", section: "カウンセリング・プロセスの視点", text: "傾聴の態度・技法を重視する立場では、カウンセリング・プロセスを「リレーションづくり」「問題の把握」「目標の設定」「目標の達成」の４段階で考える。", answer: true, explanation: "4段階モデル：リレーションづくり→問題の把握→目標の設定→目標の達成。" },
    { id: "6-6", chapter: "6章", section: "プロセスの各段階と終結", text: "リレーションが深まりラポールが醸成されると、クライエントが安心して自己を探索し、自己を見つめ自分の問題状況について率直に語れるようになる。", answer: true, explanation: "ラポール醸成→自己探索・率直な語りへと進展。" },
    { id: "6-7", chapter: "6章", section: "プロセスの各段階と終結", text: "問題の把握の段階での「問題」とは、初期に述べられた具体的な主訴そのものである。", answer: false, explanation: "×：「問題」とは、主訴そのものというより、主訴の背景や主訴をもつところにある個人的な意味として捉える。" },
    { id: "6-8", chapter: "6章", section: "プロセスの各段階と終結", text: "問題の解決や課題の達成に向けて目標が設定され、クライエントの内面から外部へ向けられる実践のプロセスが、目標の設定の段階である。", answer: true, explanation: "目標設定段階は内面から外部への実践プロセス。" },
    { id: "6-9", chapter: "6章", section: "プロセスの各段階と終結", text: "目標の達成の段階において、カウンセラーのインパクトの強い発言は効果的なので、積極的に活用する。", answer: false, explanation: "×：インパクトの強い発言は効果的な場面もあるが、表現やクライエントの成熟度によっては傷つけるおそれがあるので、十分配慮して用いる。" },
    { id: "6-10", chapter: "6章", section: "プロセスの各段階と終結", text: "カウンセリングにおける解決では、具体的・現実的な問題解決が重要なので、カウンセラーが問題解決に至っていないと判断した場合、カウンセリングを継続すべきである。", answer: false, explanation: "×：解決は具体的・現実的な問題解決だけに限らない。カウンセラーが未解決課題があると思っても、クライエントの意思で終結することがある。" },
    { id: "6-11", chapter: "6章", section: "カウンセラーの対応の留意点", text: "クライエントとの信頼関係は特に最初の段階での構築が重要であり、傾聴の基本的態度・技法で対応し、共感的理解を伝え、話しやすい雰囲気や安心して話せる場づくりに努める。", answer: true, explanation: "初期段階での信頼関係構築と傾聴技法の活用が重要。" },
    { id: "6-12", chapter: "6章", section: "カウンセラーの対応の留意点", text: "問題の把握の段階では、カウンセラーは常に傾聴を心がけながら、クライエントが内省して早急に問題把握ができるように働きかけをする。", answer: false, explanation: "×：問題の把握を性急に進めると、クライエントは尻込みしたり戸惑いを覚えたりすることもある。クライエント自らが問題を把握するよう支援する。" },
    { id: "6-13", chapter: "6章", section: "カウンセラーの対応の留意点", text: "カウンセラーの自己開示は、クライエントの自覚を促し、クライエントの自己開示を進めるのに効果的なので、カウンセリングの全プロセスで積極的に活用する。", answer: false, explanation: "×：自己開示は信頼関係が十分できたうえで、進展に有効であり、関係性を壊さないと判断した場合に限り用いる。全プロセスで積極活用は×。" },
    { id: "6-14", chapter: "6章", section: "カウンセラーの対応の留意点", text: "目標の設定の段階では、クライエントが実行可能な現実的な目標を立て、その達成に向けモチベーションが高まるよう支援する。", answer: true, explanation: "実行可能な現実的目標の設定とモチベーション支援。" },
    { id: "6-15", chapter: "6章", section: "カウンセラーの対応の留意点", text: "カウンセラーは終結後にケースをふり返り、自己評価をまとめる。またスーパービジョンを受けるなどして、さらに能力向上を図ることが求められる。", answer: true, explanation: "終結後の振り返り・自己評価・SVによる能力向上が必要。" },
    { id: "6-16", chapter: "6章", section: "面接記録", text: "相談の過程・内容が客観的に観察できる面接記録を作成する目的のひとつは、実務・実践記録として残すことにある。", answer: true, explanation: "面接記録の目的の一つは実務・実践記録の保存。" },
    { id: "6-17", chapter: "6章", section: "面接記録", text: "危機介入や裁判の証拠資料、クライエントからの開示請求など、面接記録の開示を求められることもあるので、面接記録は名誉棄損などのおそれのある表現を避けるなど、的確かつ具体的に記載する。", answer: true, explanation: "開示請求への備えとして、名誉毀損リスクを避けた的確な記載が必要。" },
    { id: "6-18", chapter: "6章", section: "面接記録", text: "面接記録を相談室内のケース・カンファレンスの素材として作成し、相談室内の情報共有、共通理解を図るために用いることがある。", answer: true, explanation: "面接記録はケース・カンファレンスの素材としても活用される。" },
    { id: "6-19", chapter: "6章", section: "面接記録", text: "スーパービジョンを受ける際に、スーバーバイザーが求める素材として、面接の経過をまとめた事例報告や逐語的な記録を準備する場合がある。", answer: true, explanation: "SV用の素材として事例報告・逐語記録を準備する。" },
    { id: "6-20", chapter: "6章", section: "面接記録", text: "個人情報は極力カットするが、内容やプロセスについての脚色は、研究データの捏造にあたるので、行ってはならない。", answer: false, explanation: "×：面接記録を基にした事例検討では、個人情報をカットしつつ、内容やプロセスについて脚色を行うことがある。（守秘義務を守るための加工は認められる）" },
  ],
  "7章": [
    { id: "7-1", chapter: "7章", section: "体験学習の意義と過程", text: "体験には直接体験、間接体験、疑似体験の３つがある。", answer: true, explanation: "体験の3分類：直接体験・間接体験・疑似体験。" },
    { id: "7-2", chapter: "7章", section: "体験学習の意義と過程", text: "一般的に体験学習は、体験、ふり返り、一般化、応用という4つの段階を含むサイクルを用いて行われる。", answer: true, explanation: "体験学習サイクル：体験→ふり返り→一般化→応用。" },
    { id: "7-3", chapter: "7章", section: "体験学習の意義と過程", text: "面接の際は、言葉の内容に集中しなければならないので、聴覚以外の感覚は意識しないようにする。", answer: false, explanation: "×：言葉の内容だけでなく、声の調子・間・言いよどみ・表情・しぐさなど、なるべく多くの情報を受け取る。さまざまな感覚を同じ対象に向けることが必要。" },
    { id: "7-4", chapter: "7章", section: "体験学習の意義と過程", text: "日常生活においても、「相手が何を伝えようとしているのか意識する」「相手の視点に立ってみる」「自分の気持ちに注目してみる」など、面接の基本について学ぶことができる。", answer: true, explanation: "日常生活も面接トレーニングの場となる。" },
    { id: "7-5", chapter: "7章", section: "体験学習の意義と過程", text: "練習とはいえ、クライエントのプライバシーの配慮と守秘義務には厳密でなければならない。", answer: true, explanation: "練習でもプライバシー配慮・守秘義務は厳密に。" },
    { id: "7-6", chapter: "7章", section: "ライブ法とロールプレイ法", text: "ライブ法は、カウンセラー役とクライエント役との間にカウンセリング関係をつくって、カウンセリングを体験的に学習する。", answer: true, explanation: "ライブ法の定義として正しい。カウンセリング関係を実際に作る。" },
    { id: "7-7", chapter: "7章", section: "ライブ法とロールプレイ法", text: "ライブ法では、クライエント役は、あらかじめ話す内容や構成を考えたり、結論を想定したりして話す。", answer: false, explanation: "×：ライブ法では、あらかじめ話す内容や構成を考えたり結論を想定せず、その場で聴いてほしいこと・感じていることなど「いま、ここ」の気持ちを語る。" },
    { id: "7-8", chapter: "7章", section: "ライブ法とロールプレイ法", text: "ライブ法では、観察者役は、自分の気づきをカウンセラー役へフィードバックすることが唯一の役割である。", answer: false, explanation: "×：観察者役はやりとりを観察して話の流れを理解し、自分の学びに取り入れるとともに、共感できたことや気づきをカウンセラー役へフィードバックしカウンセラー役を支援する。唯一ではない。" },
    { id: "7-9", chapter: "7章", section: "ライブ法とロールプレイ法", text: "ロールプレイ法は、カウンセラー役がクライエント役の本来の人格への配慮や警戒心をもたずに対応できる。", answer: true, explanation: "ロールプレイ法の利点：本来の人格への配慮・警戒心なしで対応できる。" },
    { id: "7-10", chapter: "7章", section: "ライブ法とロールプレイ法", text: "ロールプレイ法では、クライエント役は、家族や友人、職場の同僚など実際に関係のある人物を演じることがよい。", answer: false, explanation: "×：ロールプレイ法では、家族・友人・職場の同僚など実際に関係のある者を演じることは避けるようにする。（二重関係・プライバシー問題を避けるため）" },
  ],
  "9章": [
    { id: "9-1", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンとは、カウンセラーとしての態度や技能を向上させるために、スーパーバイザーが、スーパーバイジーが担当した事例において見立てや対応の仕方について気づかない点や誤解している点について、指導・助言を行うことである。", answer: true, explanation: "スーパービジョンの定義として正しい。" },
    { id: "9-2", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンは大別すると、1対１の「個人スーパービジョン」と、数人のスーパーバイジーと1人のスーパーバイザーで行う「グループスーパービジョン」がある。", answer: true, explanation: "SVの2形態：個人SVとグループSV。" },
    { id: "9-3", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンには、スーパーバイジーがどのようなカウンセリングを行っているか見守り評価してカウンセラーとして成長を図る機能がある。", answer: true, explanation: "SVの機能のひとつ：見守り・評価・成長支援。" },
    { id: "9-4", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンには、スーパーバイジーの不足している知識・経験・技術などの課題について共に考え解決しようとする相談機能がある。", answer: true, explanation: "SVには相談機能もある：課題を共に考え解決。" },
    { id: "9-5", chapter: "9章", section: "スーパービジョン", text: "スーパーバイザーは、スーパーバイジーが面接でできていることには触れず、できていないことについて厳格に指示して取り組ませる。", answer: false, explanation: "×：スーパーバイザーは言動・情緒・態度などに対して共感・理解を示すことで深い関係のレベルで支持・分かち合い、課題について共に考え解決しようとする。厳格な指示だけではない。" },
    { id: "9-6", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンが意味あるものになるためには、まずスーパーバイジーの中でなぜスーパービジョンを受けるのかが明確にされる必要がある。", answer: true, explanation: "SV受講の目的を明確化することが意味あるSVの前提。" },
    { id: "9-7", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンにおいて、スーパーバイザーとスーパーバイジーは指導される者と指導する者であるから、厳格な師弟関係ともいうべき関係が不可欠と言える。", answer: false, explanation: "×：よりよいスーパービジョンのためには、オープンで協働的なスーパーバイザーとスーパーバイジーの関係が不可欠である。厳格な師弟関係ではない。" },
    { id: "9-8", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンを受ける際には、スーパービジョンの目的に応じて、どのような素材を準備したらよいか、スーパーバイザーと話し合うことが大事である。", answer: true, explanation: "SV素材の準備についてもSVrと話し合うことが大事。" },
    { id: "9-9", chapter: "9章", section: "スーパービジョン", text: "スーパービジョンは、スーパーバイジーの専門的なスキルやアイデンティティを高めることをねらいとしているので、スーパーバイジーが抱える個人的な問題や苦悩などは原則として取り扱わない。", answer: false, explanation: "×：スーパービジョンでは、スーパーバイジーの成長のためにスーパーバイジーが抱える個人的な問題や苦悩なども取り扱う。" },
    { id: "9-10", chapter: "9章", section: "スーパービジョン", text: "「産業カウンセラー倫理綱領」において、産業カウンセラーがスーパービジョンを受けることの必要性が強調されている。", answer: true, explanation: "倫理綱領でSVを受ける必要性が強調されている。" },
  ],
  "10章": [
    { id: "10-1", chapter: "10章", section: "カウンセリングとサイコセラピーの関係", text: "パーソンズらによって始められた職業指導の方法は学校教育以外の場にも広がり、第1次世界大戦では兵士への心理テストが実施され、また復員兵への職業復帰プログラムにおいても活用された。", answer: true, explanation: "職業指導は第1次大戦の兵士・復員兵にも活用された。" },
    { id: "10-2", chapter: "10章", section: "カウンセリングとサイコセラピーの関係", text: "産業界において労働者の職場適応のための活動としてガイダンスの方法が用いられるようになり、そこで行われる相談者の適性や能力の査定は不適応の治療に用いられるようになった。", answer: false, explanation: "×：相談者の適性や能力の査定結果は、適応上の問題に対する助言指導活動に用いられた。「不適応の治療」ではない。" },
    { id: "10-3", chapter: "10章", section: "カウンセリングとサイコセラピーの関係", text: "ウィリアムソンは、ガイダンスとして、心理テストを活用した科学的・実証的な査定による指導助言を実施することによって、大学における学生相談を中心とした新しいモデルを提案した。", answer: true, explanation: "ウィリアムソン＝特性因子理論・指示的アプローチの代表者。" },
    { id: "10-4", chapter: "10章", section: "カウンセリングとサイコセラピーの関係", text: "現代のサイコセラピーのもっとも大きな源流は、フロイトが開発した自由連想法と夢解釈による治療法としての精神分析である。", answer: true, explanation: "フロイトの精神分析が現代サイコセラピーの源流。" },
    { id: "10-5", chapter: "10章", section: "カウンセリングとサイコセラピーの関係", text: "ロジャーズは、カウンセリングとサイコセラピーにおける非指示的アプローチを提案し、そこでウィリアムソンらの方法を指示的アプローチであると批判して論争となった。", answer: true, explanation: "ロジャーズ（非指示的）vs ウィリアムソン（指示的）の論争。" },
    { id: "10-6", chapter: "10章", section: "カウンセリングとサイコセラピーの異同", text: "カウンセリングは多くの人々が遭遇する人生のさまざまな問題への対処を主な目的としている。", answer: true, explanation: "カウンセリングの主目的は人生の問題への対処。" },
    { id: "10-7", chapter: "10章", section: "カウンセリングとサイコセラピーの異同", text: "サイコセラピーは病気の治療法として生まれたが、現在では精神医療の分野では活用されていない。", answer: false, explanation: "×：サイコセラピーは現在でも精神医療分野で精神療法として活用されている。" },
    { id: "10-8", chapter: "10章", section: "カウンセリングとサイコセラピーの異同", text: "カウンセリングとサイコセラピーは、人間のさまざまな問題へ心理学的な援助を提供するという実践形態は共通点があるが、医療や福祉の分野ではサイコセラピーという言葉が用いられることが多く、教育や産業の分野ではカウンセリングと呼ばれることが多い。", answer: true, explanation: "医療・福祉＝サイコセラピー、教育・産業＝カウンセリング、と呼称の傾向がある。" },
    { id: "10-9", chapter: "10章", section: "カウンセリングとサイコセラピーの異同", text: "日本では第2次世界大戦後米国から派遣された教育使節団によってカウンセリングの実践が推奨されたことから、本格的に始められた。", answer: true, explanation: "戦後の教育使節団がきっかけで日本のカウンセリング実践が始まった。" },
    { id: "10-10", chapter: "10章", section: "カウンセリングとサイコセラピーの異同", text: "日本ではカウンセリングとサイコセラピーを明確に区別した方がよいとされている。", answer: false, explanation: "×：区別したほうがよいという考え方と、重なり合う部分が大きいので区別は難しいという考え方が混在している。" },
    { id: "10-11", chapter: "10章", section: "防衛機制", text: "ある受け入れがたい感情、欲求をより受け入れやすい関連のある対象に振り向ける防衛機制を「合理化」という。", answer: false, explanation: "×：これは「置き換え」である。合理化は別（もっともらしい理由付け）。" },
    { id: "10-12", chapter: "10章", section: "防衛機制", text: "自我にとって危険な耐えられない衝動や記憶、イメージを意識から追放したり無意識に押しとどめたりする防衛機制を「否認」という。", answer: false, explanation: "×：これは「抑圧」である。否認は事実そのものを認めないこと。" },
    { id: "10-13", chapter: "10章", section: "防衛機制", text: "本能的欲求としては禁止されているものを社会的に否定されるものではなく社会的に好ましいものに変えて発散する防衛機制を「昇華」という。", answer: true, explanation: "昇華の定義として正しい。攻撃性→スポーツなど。" },
    { id: "10-14", chapter: "10章", section: "防衛機制", text: "意識すると不安や恐怖、不快が起こるような無意識的な欲動や感情の意識化を防ぐため、それと正反対の態度を強調する防衛機制を「打ち消し」という。", answer: false, explanation: "×：これは「反動形成」である。打ち消しは過去の言動を別の行動で取り消そうとすること。" },
    { id: "10-15", chapter: "10章", section: "防衛機制", text: "自分の中の認めがたい抑圧した感情を外界または他者に属するものとし、そこから自分に向かってくるものと知覚する防衛機制を「投影」という。", answer: true, explanation: "投影の定義として正しい。自分の感情を他者に帰属させる。" },
    { id: "10-16", chapter: "10章", section: "精神力動的セラピー", text: "エリクソンは自我の心理社会的な側面の発達に着目し、人間の一生涯にわたるライフサイクルの発達の問題を探求した。", answer: true, explanation: "エリクソン＝ライフサイクル論・心理社会的発達段階。" },
    { id: "10-17", chapter: "10章", section: "精神力動的セラピー", text: "アンナ・フロイトは自我の防衛規制やその発達についての考えを発展させた自我心理学の先駆者である。", answer: true, explanation: "アンナ・フロイト＝自我心理学・防衛機制研究の先駆者。" },
    { id: "10-18", chapter: "10章", section: "精神力動的セラピー", text: "メラニー・クラインは、乳幼児の体験や幻想を妄想的―シゾイド的態勢、抑うつ的態勢とよび、対象関係論の発展に影響を与えた。", answer: true, explanation: "クライン＝対象関係論・妄想的シゾイド態勢／抑うつ態勢。" },
    { id: "10-19", chapter: "10章", section: "精神力動的セラピー", text: "分析心理学はユング心理学とも呼ばれ、人には自我のありようとは独立した普遍的なコンプレックスがあることを見出した。", answer: true, explanation: "ユング＝分析心理学・普遍的なコンプレックス（元型）。" },
    { id: "10-20", chapter: "10章", section: "精神力動的セラピー", text: "ユングが考えた「個人的無意識」とは、人類の極めて長い時間の経験の蓄積によって構成され民族等に共通する。", answer: false, explanation: "×：民族等に共通するのは「集合的無意識」。個人的無意識は個人的な記憶や経験に基づく。" },
    { id: "10-21", chapter: "10章", section: "認知行動療法の背景と理論", text: "レスポンデント条件づけが成立した後に、条件刺激だけによる条件反応の誘発をくり返して条件反応を徐々に生じなくさせる過程をレスポンデント条件づけの消去という。", answer: true, explanation: "レスポンデント条件づけの消去の定義として正しい。" },
    { id: "10-22", chapter: "10章", section: "認知行動療法の背景と理論", text: "オペラント条件づけは、反応－結果のつながりを説明する理論で、適応的な行動を強化し、不適応的な行動を弱化する働きかけが目標とされる。", answer: true, explanation: "オペラント条件づけ＝反応-結果の関連づけ。強化と弱化。" },
    { id: "10-23", chapter: "10章", section: "認知行動療法の背景と理論", text: "バンデューラによる社会的学習理論では、人間がある行動を身につけるうえで、すべて「結果」が重要な役割を果たしているとする。", answer: false, explanation: "×：社会的学習理論では「認知」が重要な役割を果たす。結果ではない。" },
    { id: "10-24", chapter: "10章", section: "認知行動療法の背景と理論", text: "論理情動行動療法を提唱したエリスは、心の問題は、出来事ではなく、その出来事の捉え方であり、その人の「性格」によって生じると主張した。", answer: false, explanation: "×：エリスは「性格」ではなく、出来事の捉え方「認知」によって生じると主張した。" },
    { id: "10-25", chapter: "10章", section: "認知行動療法の背景と理論", text: "ベックの認知理論では、表層に表れる「自動思考」、深層にある「スキーマ」、スキーマから自動思考を生じさせる「推論の誤り」の３つの認知レベルが想定されている。", answer: true, explanation: "ベックの3レベル：自動思考・スキーマ・推論の誤り。" },
    { id: "10-26", chapter: "10章", section: "認知行動療法の技法", text: "セルフモニタリングによって、クライエント自身が自分の状態を客観的に理解できるようになることが期待される。", answer: true, explanation: "セルフモニタリングは自己の客観的理解を促す。" },
    { id: "10-27", chapter: "10章", section: "認知行動療法の技法", text: "エクスポージャー法とは、回避行動を誘発する刺激に一定時間自らを曝すという技法である。", answer: false, explanation: "×：エクスポージャー法は「不安反応」を誘発する刺激に一定時間自らを晒す技法。「回避行動」ではない。" },
    { id: "10-28", chapter: "10章", section: "認知行動療法の技法", text: "第三世代の認知行動療法の技法は、より体験的で間接的であるのが特徴である。その1つのマインドフルネスは、「いまここの自らの体験に、判断をしないで、意図的に気づきを向けること」である。", answer: true, explanation: "マインドフルネスの定義として正しい。" },
    { id: "10-29", chapter: "10章", section: "認知行動療法の技法", text: "行動活性化療法は、抑うつ状態にみられる活動抑制や嫌悪体験からの回避行動を減少させ、これまでの自分の価値観を脱却するような稀有な体験が得られる行動を増やすことをめざす。", answer: false, explanation: "×：行動活性化療法は、ポジティブな体験が得られるような「自分にとっての価値に沿った行動」を増やす。価値観の脱却ではない。" },
    { id: "10-30", chapter: "10章", section: "認知行動療法の技法", text: "自己の意見や感情を社会的に認められる形で表出するために必要な主張行動を訓練する方法をソーシャル・スキル・トレーニングという。", answer: false, explanation: "×：これは「アサーション・トレーニング」。SSTはもっと広い対人スキル全般の訓練。" },
    { id: "10-31", chapter: "10章", section: "来談者中心療法と人間性心理学", text: "来談者中心療法は、ロジャーズによって創始された。当初は非指示的セラピーと呼ばれていたが、来談者中心という用語を使うようになり、晩年はエンカウンター・グループという集団的・社会的な活動にも携わった。", answer: true, explanation: "ロジャーズの変遷：非指示的→来談者中心→エンカウンター・グループ。" },
    { id: "10-32", chapter: "10章", section: "来談者中心療法と人間性心理学", text: "来談者中心療法はいち早くクライエント尊重の理念を打ち出し、共感的なカウンセリング関係を重視することでカウンセリングやサイコセラピーの発展や世界的な広がりを牽引してきた。", answer: true, explanation: "クライエント尊重と共感的関係の重視が来談者中心療法の特徴。" },
    { id: "10-33", chapter: "10章", section: "来談者中心療法と人間性心理学", text: "ロジャーズは、人間の本性は白紙であり、人間機械論的な見方をとる人間観を示した。", answer: false, explanation: "×：ロジャーズは、生命体は基本的な傾向と力をもち、自身を実現・維持・増進するという人間観を示した。白紙・機械論ではない。" },
    { id: "10-34", chapter: "10章", section: "来談者中心療法と人間性心理学", text: "「実現傾向」とは、生命体が自らをよりよく実現していこうとする力のことで、生命体がこの力をもつかどうかは個人差がある。", answer: false, explanation: "×：実現傾向は生命体が共通してもつ潜在的な力であり、適切な環境の条件下で成長を促す。個人差があるものではない。" },
    { id: "10-35", chapter: "10章", section: "来談者中心療法と人間性心理学", text: "カウンセリングやサイコセラピーで適切な関係性が提供されると実現傾向が促進される。", answer: true, explanation: "適切な関係性が実現傾向を促進する。" },
    { id: "10-36", chapter: "10章", section: "来談者中心療法の理論", text: "ロジャーズの主要理論である「自己理論」では、個人が知覚している世界を、その人自身のもつ内的準拠枠から理解していく。", answer: true, explanation: "自己理論＝内的準拠枠からの理解。" },
    { id: "10-37", chapter: "10章", section: "来談者中心療法の理論", text: "ロジャーズの主要理論である「パーソナリティ変化の必要十分条件」では、セラピストは、その関係の中で一致しており、統合している。", answer: true, explanation: "必要十分条件の一つ：セラピストの自己一致（統合）。" },
    { id: "10-38", chapter: "10章", section: "来談者中心療法の理論", text: "「パーソナリティ変化の必要十分条件」では、セラピストは、クライエントに対して無条件の肯定的配慮を体験している。", answer: true, explanation: "必要十分条件の一つ：無条件の肯定的配慮。" },
    { id: "10-39", chapter: "10章", section: "来談者中心療法の理論", text: "「パーソナリティ変化の必要十分条件」では、セラピストが、クライエントの内的照合枠を自らと同一のものとして理解しており、この経験をクライエントに伝えようと努めている。", answer: false, explanation: "×：共感的理解はクライエントとの「違いや独自性」を認識し、感情的な同情や同一視とは異なる。「自らと同一」ではない。" },
    { id: "10-40", chapter: "10章", section: "来談者中心療法の理論", text: "ロジャーズが提示した「十分に機能する人間」の姿の一つは、判断や行動の基準を信頼できる周囲の人間に委ねることができるようになることである。", answer: false, explanation: "×：十分に機能する人間は、判断や行動は「自身の感じていること」を基準とするようになる。周囲の人間に委ねるのではない。" },
    { id: "10-41", chapter: "10章", section: "来談者中心療法の方法", text: "場面構成とは、カウンセリングの場の設定や構造化のことで、カウンセリングが効果的に進むためにカウンセラーは権威的であることを主張する。", answer: false, explanation: "×：ロジャーズは、温かく応答的な態度、感情の自由な表現の許容、明確な制限の設定、圧力や強制からの解放を重視した。権威的ではない。" },
    { id: "10-42", chapter: "10章", section: "来談者中心療法の方法", text: "シンプルな受容とは、あたかもクライエントの話を聴いているかのようにあいづちを打ちながら、指示や情報提供のタイミングをはかるものである。", answer: false, explanation: "×：シンプルな受容は、クライエントの発言をそのまま、ありのままに受容することであり、うなずきやあいづち、非言語的態度で示される。指示のタイミングをはかるものではない。" },
    { id: "10-43", chapter: "10章", section: "来談者中心療法の方法", text: "表現内容のくり返しは、クライエントが語った言葉の語尾をひろい、ただ無心にくり返すことである。", answer: false, explanation: "×：表現内容のくり返しは、重要なポイントや言い回しについて、こちら側の考えや判断をいったん脇に置いてそのままを伝え返す応答。無心のくり返しではない。" },
    { id: "10-44", chapter: "10章", section: "来談者中心療法の方法", text: "感情の反射とは、クライエントの感情や態度を正確に受け取り、それらを共感的に伝え返すことである。そのためにはクライエントの感情について正確で深い共感的な理解が必要である。", answer: true, explanation: "感情の反射には正確で深い共感的理解が必要。" },
    { id: "10-45", chapter: "10章", section: "来談者中心療法の方法", text: "感情の明確化は、感じられている、まだ十分に言葉になっていないクライエントの感情へ焦点化、明確化しようとする応答のことである。", answer: true, explanation: "感情の明確化＝言葉になっていない感情への焦点化・明確化。" },
  ],
  "11章": [
    { id: "11-1", chapter: "11章", section: "交流分析", text: "交流分析では自らがどのように他者と交流しながら生きているかの自己理解を深め、他者との交流のねじれを解消し、これからの人生をどのように生きていくのかを再決断することを目指す。", answer: true, explanation: "交流分析の目的：自己理解・交流のねじれ解消・再決断。" },
    { id: "11-2", chapter: "11章", section: "交流分析", text: "交流分析ではその人の自我状態をその人の両親（P）、その人自身（A）、その人の子ども（C）それぞれとの関係性から把握していく。", answer: false, explanation: "×：自我状態は親（NP・CP）、大人（A）、子ども（FC・AC）の5つに分けて分析する。関係性からの把握ではない。" },
    { id: "11-3", chapter: "11章", section: "交流分析", text: "交差的な交流が起きているとゲームと呼ばれる互いの交流が交差的にぶつかるやりとりがおきるが、そのことに気づくことによって、自らのコミュニケーションのパターンを変えていくことを目指す。", answer: false, explanation: "×：ゲーム（双方がネガティブな感情を経験するやりとり）は、交差的な交流ではなく裏面的な交流によっておこる。" },
    { id: "11-4", chapter: "11章", section: "交流分析", text: "バーンは、人が子ども時代に両親によってつくられた枠組みに応じ無意識に自分でつくりあげている人生計画を人生脚本と呼び、人は最後はその人生脚本による結末を迎えると述べている。", answer: true, explanation: "バーンの人生脚本理論。" },
    { id: "11-5", chapter: "11章", section: "交流分析", text: "交流分析では「私はOKであり、あなたもOKである」という哲学に基づき、自律的で豊かな人生を送ることを目指す。関係性を分析する枠組みはカウンセラーの視野を広げ効果的な援助の実践に役立つと考えられる。", answer: true, explanation: "交流分析の哲学：「I'm OK, You're OK」。" },
    { id: "11-6", chapter: "11章", section: "ゲシュタルト療法", text: "ゲシュタルト療法では、断片的で不完全な生き方を、より統合的で全体的な生き方へと変容させるために「いま、ここ」での体験への覚醒を通して、自分自身を取り戻すことを目指す。", answer: true, explanation: "ゲシュタルト療法の目的：統合的な生き方・「いま、ここ」の覚醒。" },
    { id: "11-7", chapter: "11章", section: "ゲシュタルト療法", text: "ゲシュタルト療法では「気づき」の概念を重視し、内層、中間層、外層それぞれの気づきが大事と考える。ここには「頭よりも感覚」「想像よりも観察」を重視するパールズの考えが反映されている。", answer: true, explanation: "パールズの気づき重視：頭より感覚・想像より観察。" },
    { id: "11-8", chapter: "11章", section: "ゲシュタルト療法", text: "ゲシュタルト療法ではクライエントのいまの関心や欲求が向かっている対象を「図」と呼ぶ。不適応状態のときには、失敗の経験などが図として固着しており、別の見方が出来るよう「図と地」の反転を促す。", answer: true, explanation: "図と地の反転がゲシュタルト療法の特徴。" },
    { id: "11-9", chapter: "11章", section: "ゲシュタルト療法", text: "「いま、ここ」を重視するのもゲシュタルト療法の特徴であり、不適応は「いま、ここ」にあることから、その視点を過去や未来の注意へとむけていく。", answer: false, explanation: "×：「いま、ここ」という現在性を重視し、過去や未来に注意を向けるのではなく、「いま、ここ」に起こっている現象に注意を向ける。" },
    { id: "11-10", chapter: "11章", section: "ゲシュタルト療法", text: "クライエントの前に置かれる空の椅子をエンプティチェアと呼び、そこにセラピストが座り対話をしていく中で、クライエントは夢を語り自己のメッセージへの気づきを促す。", answer: false, explanation: "×：エンプティチェアには、イメージした他者などを座らせ、未完結の経験を完結させていくために用いる。セラピストが座るわけではない。" },
    { id: "11-11", chapter: "11章", section: "家族療法", text: "家族療法とは家族を対象としたカウンセリングの総称である。家族療法では個人の問題は家族間の人間関係から生じるととらえ、家族を互いに影響を与えあっている１つのシステムとしてとらえ、その全体に介入していく。", answer: true, explanation: "家族療法＝家族をシステムとしてとらえ全体に介入。" },
    { id: "11-12", chapter: "11章", section: "家族療法", text: "システム論の概念である円環的因果律は、システムの要素は相互に関連し循環していると考えるので、まずは原因を１つ特定することで循環を断ち切ろうとするものである。", answer: false, explanation: "×：円環的因果律は、要素が相互に関連し循環しているので、原因を１つに特定することは出来ないとする考え方。" },
    { id: "11-13", chapter: "11章", section: "家族療法", text: "家族療法において重要な理論に、ダブルバインド理論がある。ベイトソンは、統合失調症患者とその母親との間には、ダブルバインドが繰り返し生じている可能性を指摘した。", answer: true, explanation: "ベイトソンのダブルバインド理論。" },
    { id: "11-14", chapter: "11章", section: "家族療法", text: "家族療法の理論にはさまざまなアプローチがあるが、問題行動よりもそれを持続させていてる不適切なコミュニケーション・パターンに着目し家族内のコミュニケーションに変化を与える方法もある。", answer: true, explanation: "コミュニケーション・パターンに着目するアプローチもある。" },
    { id: "11-15", chapter: "11章", section: "家族療法", text: "家族療法の方法には、家族メンバー全員による面接を行う合同家族面接や、セラピストが家族の文化の中に溶けこみ、家族パターンやコミュニケーションなどを観察し、模倣するリフレーミングなどがある。", answer: false, explanation: "×：家族の文化に溶けこみ観察・模倣する方法は「ジョイニング」。リフレーミングではない。" },
    { id: "11-16", chapter: "11章", section: "ブリーフセラピー", text: "問題焦点型アプローチ（MRIモデル）では、クライエントが現在用いている問題に対する解決行動を、カウンセラーが強く支持する。", answer: false, explanation: "×：MRIモデルでは、現在用いられている解決行動が結果的に問題を維持・再生産していると考え、コミュニケーションパターンを変化させることで問題解決を図る。" },
    { id: "11-17", chapter: "11章", section: "ブリーフセラピー", text: "解決焦点型アプローチ（ソリューションフォーカスト・アプローチ）の哲学として、「うまくいっているなら、変えなくていい。それを続けよ」「もし一度やってうまくいったなら、もう一度それをせよ」「うまくいっていないなら、何か違うことをせよ」という3つの考えがある。", answer: true, explanation: "SFAの3つの哲学。" },
    { id: "11-18", chapter: "11章", section: "ブリーフセラピー", text: "ブリーフセラピーの方法にはリソースの活用とコンプリメントがある。コンプリメントは、クライエントの例外的な解決体験やサバイバル体験に焦点を当てて褒めたり労ったり、非言語を含めて是認のメッセージを伝える。", answer: true, explanation: "コンプリメント＝褒める・労う・是認のメッセージ。" },
    { id: "11-19", chapter: "11章", section: "ブリーフセラピー", text: "スケーリングクエスチョンは、クライエントの望ましい状態を「１０」としたときに、どうすれば「１０」の状態になれるかを考えてもらう方法である。", answer: false, explanation: "×：スケーリングクエスチョンは、現状が3なら4にするには何が役立つか等、スモールステップで考える方法。いきなり10を目指すものではない。" },
    { id: "11-20", chapter: "11章", section: "ブリーフセラピー", text: "ミラクルクエスチョンや例外的に問題が生じなかった状況を探す質問など、SFAには質問技法を用いて効果があると思われる解決行動をイメージさせるが、解決を押し付けることにならないよう、注意を払うことが必要である。", answer: true, explanation: "SFAの質問技法は押しつけにならないよう注意が必要。" },
    { id: "11-21", chapter: "11章", section: "表現芸術療法", text: "表現芸術療法は、表現的あるいは芸術的な媒体を活用するカウンセリングの総称である。通常のカウンセリングでは表されにくい非言語的で感性的、身体的なさまざまな側面の表現が可能となり、より多面的な心理支援が可能になる。", answer: true, explanation: "表現芸術療法＝非言語的・感性的・身体的表現を活用。" },
    { id: "11-22", chapter: "11章", section: "表現芸術療法", text: "アートセラピーでは、作品を完成すること自体にセラピー的な効果を認めたり、自己の内面を表現することに意義を見出したりとさまざまな立場があり、視覚芸術とその表現手段がカウンセリングのプロセスに用いられる。", answer: true, explanation: "アートセラピーには多様な立場がある。" },
    { id: "11-23", chapter: "11章", section: "表現芸術療法", text: "箱庭療法は、言語にとらわれない表現とその共有が可能であり、簡便性、触覚性、視覚性などが特徴である。セラピストが作成者に質問をしながら解釈をしていく心理療法である。", answer: false, explanation: "×：箱庭療法では、セラピストは作成者に質問をしながら解釈をしていくよりも、ともに味わい寄り添う姿勢が大切である。" },
    { id: "11-24", chapter: "11章", section: "表現芸術療法", text: "音楽の鑑賞や演奏、歌唱などを活用するカウンセリングを音楽療法という。心身の機能の維持改善、生活の質の向上、行動の変容などを目指す。", answer: true, explanation: "音楽療法の目的。" },
    { id: "11-25", chapter: "11章", section: "表現芸術療法", text: "サイコドラマは即興的な演技で行う集団カウンセリングである。1人が主人公となりカウンセラーは監督、グループの他のメンバーは脇役か観客となりさまざまな場面が演じられる。", answer: true, explanation: "サイコドラマ＝主人公・監督・脇役・観客の役割分担。" },
    { id: "11-26", chapter: "11章", section: "グループ・アプローチ", text: "個別的な支援を基本とするカウンセリングにおいても、個人と集団との関係や、集団における個人の存在のあり方などは常に留意する必要がある。", answer: true, explanation: "個人と集団の関係への留意は重要。" },
    { id: "11-27", chapter: "11章", section: "グループ・アプローチ", text: "レヴィンらが開発したTグループは、メンバーとトレーナーが数日間を共に過ごす中で生じる人間関係を題材に他者へのかかわり方に気づき、新たなかかわり方をその場で試していく。", answer: true, explanation: "レヴィンのTグループの特徴。" },
    { id: "11-28", chapter: "11章", section: "グループ・アプローチ", text: "感受性訓練は、グループの中での話し合いを通じて、メンバーの感情をいかに汲み取るかのスキルを身に付ける訓練技法として発展した。", answer: false, explanation: "×：感受性訓練は、自分の感情に気づき、他者への影響や交流の仕方などのコミュニケーションやリーダーシップのスキルを身に付ける教育訓練技法。他者の感情を汲み取るだけではない。" },
    { id: "11-29", chapter: "11章", section: "グループ・アプローチ", text: "エンカウンター・グループは、ロジャーズの来談者中心療法の理論と方法を集団におけるメンバーの心理的成長やコミュニケ―ションの改善のために適用するものである。", answer: true, explanation: "エンカウンター・グループ＝ロジャーズ理論の集団適用。" },
    { id: "11-30", chapter: "11章", section: "グループ・アプローチ", text: "エンカウンター・グループで、集中的なグループ・セッションを合宿や通いで行う方法を、ベーシック・エンカウンター・グループとも呼ぶ。また、各種エクササイズを活用しながら行うものを構成的グループ・エンカウンターという。", answer: true, explanation: "ベーシック vs 構成的グループ・エンカウンター。" },
    { id: "11-31", chapter: "11章", section: "グループ・カウンセリングの発展", text: "グループ・サイコセラピーの先駆は20世紀初頭のアメリカで、結核患者の集団での語り合いの実践したことと言われている。その後、カウンセリングやサイコセラピーのさまざまな理論と方法を背景にして発展し、現在に至っている。", answer: true, explanation: "グループ・サイコセラピーの起源：20世紀初頭の結核患者の語り合い。" },
    { id: "11-32", chapter: "11章", section: "グループ・カウンセリングの発展", text: "集団認知行動療法は、精神科の病院やクリニック、各種施設において集団療法やデイケア等のプログラムに取り入れられており、ソーシャル・スキル・トレーニングやアサーション・トレーニング等も、主に医療分野で活用されている。", answer: false, explanation: "×：SSTやアサーション・トレーニング等は、保健医療・教育・福祉・産業等の分野で広く活用されている。主に医療分野ではない。" },
    { id: "11-33", chapter: "11章", section: "グループ・カウンセリングの発展", text: "認知行動療法の第一世代として1950年代から台頭してきたマインドフルネス認知療法の主要な方法であるマインドフルネス瞑想法は、企業等の講座やセミナー等でも活用されている。", answer: false, explanation: "×：マインドフルネス認知療法は第三世代認知行動療法として注目され、2000年ごろから広まっている。第一世代・1950年代ではない。" },
    { id: "11-34", chapter: "11章", section: "グループ・カウンセリングの発展", text: "何等かの共通する問題や課題を抱える当事者のみの自主的な集まりはセルフヘルプ・グループ（自助グループとも言う）と呼ばれ、その発端はアメリカで発足したアルコール依存症者の会（AA）とされている。", answer: true, explanation: "セルフヘルプ・グループの起源＝AA（アメリカのアルコール依存症者の会）。" },
    { id: "11-35", chapter: "11章", section: "グループ・カウンセリングの発展", text: "日本でもアルコール依存だけではなく、薬物・ギャンブル、心身の病気や疾患、DVの被害者や加害者の会などさまざまなセルフヘルプ・グループが作られ、各地で活動が広がっている。", answer: true, explanation: "日本でも多様なセルフヘルプ・グループが広がっている。" },
    { id: "11-36", chapter: "11章", section: "動機づけ面接と対人関係療法", text: "動機づけ面接は、当初アルコール依存者への面接手法として開発されたが、現在は健康行動、不安や抑うつといった心理的問題に対しても幅広く適用されている。", answer: true, explanation: "動機づけ面接の起源はアルコール依存者への面接。現在は幅広く適用。" },
    { id: "11-37", chapter: "11章", section: "動機づけ面接と対人関係療法", text: "動機づけ面接では、クライエントの中にある矛盾に焦点をあててしまうと抵抗を示されることもあるので、クライエントの外発的な動機づけを活性化し、行動変容を目指す。", answer: false, explanation: "×：動機づけ面接では、矛盾に焦点をあて、内発的な動機づけを活性化し、行動変容を目指す。外発的ではない。" },
    { id: "11-38", chapter: "11章", section: "動機づけ面接と対人関係療法", text: "対人関係療法は、重要な他者との関係性に焦点をあてたカウンセリング・アプローチである。うつ状態、双極性障害、過食症、夫婦カウンセリングなどにも適用範囲を広げている。", answer: true, explanation: "対人関係療法の適用範囲は広い。" },
    { id: "11-39", chapter: "11章", section: "動機づけ面接と対人関係療法", text: "対人関係療法では感情表現が奨励され、クライエントに感情の表出を促す。対人関係の中で感情を適切に表現できるようになることを目指す。", answer: true, explanation: "対人関係療法では感情表現を奨励。" },
    { id: "11-40", chapter: "11章", section: "動機づけ面接と対人関係療法", text: "対人関係療法では、過去の対人関係の問題を分析したうえで、「いま、ここ」で起こっている対人関係の問題を改善することをめざし、治療関係において生じる問題を積極的に扱う。", answer: false, explanation: "×：対人関係療法では、過去の対人関係の問題を分析するのではなく、「いま、ここ」で起こっている対人関係の問題を改善することをめざしている。" },
    { id: "11-41", chapter: "11章", section: "森田療法と内観療法", text: "森田療法は、森田正馬によって創始された森田神経質と呼ばれる神経症の治療を目的とした日本的な方法である。症状を取り去る治療とともに、自然な「生の欲望」をあるがままに受け入れることを促す。", answer: false, explanation: "×：森田療法では、症状を取り去ろうとはせずに、自然な「生の欲望」をあるがままに受け入れることを促す。" },
    { id: "11-42", chapter: "11章", section: "森田療法と内観療法", text: "森田療法は、症状や不安を「よりよく生きたい」「周囲から評価されたい」といった生の欲望の裏返しととらえ、「気分本位」ではなく、今やるべきことをやるという「目的本位」の自分らしい生き方を実現することを目指す。", answer: true, explanation: "森田療法：気分本位→目的本位へ。" },
    { id: "11-43", chapter: "11章", section: "森田療法と内観療法", text: "内観療法は、浄土真宗の一派の身調べという修養法をもとに吉本伊信が開発した内観法から発展した心理療法であり、1週間一切の外界との接触を断ち非日常に身を置いて行う。", answer: false, explanation: "×：内観療法では、両親・兄弟姉妹・身近な人に対し「してもらったこと」「して返したこと」「迷惑をかけたこと」について入念に思い出し自己を見つめ直す。期間の記述ではなく内容で記憶を。" },
    { id: "11-44", chapter: "11章", section: "森田療法と内観療法", text: "内観療法は、集中内観と呼ばれる宿泊型の方法と、通常の日常生活の中で一定時間の内観を行う非宿泊型の日常内観という方法もある。", answer: true, explanation: "内観療法には集中内観と日常内観がある。" },
    { id: "11-45", chapter: "11章", section: "森田療法と内観療法", text: "内観療法では自他への肯定感の高まりや自己中心的な視点からの転換などが期待されるが、自己洞察によって進む要素が大きく、クライエント自身の自発的な意思があることが求められる。", answer: true, explanation: "内観療法はクライエントの自発性が重要。" },
    { id: "11-46", chapter: "11章", section: "アサーションと統合的アプローチ", text: "アサーション・トレーニングは「自分の気持ち・考え・意見・相手への希望などを伝えたい時はなるべく率直に正直にその場に合った適切な方法で伝えられる」ように訓練する方法である。", answer: true, explanation: "アサーション・トレーニングの目的として正しい。" },
    { id: "11-47", chapter: "11章", section: "アサーションと統合的アプローチ", text: "アサーティブな自己表現は、非主張的な自己表現や攻撃的な自己表現もそのままに、自分を優先してありのままを表現していく。", answer: false, explanation: "×：アサーティブな自己表現は、非主張的・攻撃的とも異なり、自他を尊重したやり方。自分優先ではない。" },
    { id: "11-48", chapter: "11章", section: "アサーションと統合的アプローチ", text: "折衷的アプローチの代表的な方法であるアイビイが提唱したマイクロカウンセリングでは、さまざまなカウンセリングの方法を抽出し、行動レベルで定義し「マイクロ技法の階層表」で構造化した。", answer: true, explanation: "アイビイのマイクロカウンセリング＝技法の階層表で構造化。" },
    { id: "11-49", chapter: "11章", section: "アサーションと統合的アプローチ", text: "マイクロカウンセリングの方法は、かかわり行動から基本的な傾聴技法、カウンセラーが能動的にかかわる積極技法、そして技法の統合という階層となっている。", answer: true, explanation: "マイクロ技法の階層：かかわり行動→傾聴技法→積極技法→統合。" },
    { id: "11-50", chapter: "11章", section: "アサーションと統合的アプローチ", text: "統合的アプローチはさまざまな理論を統合的に捉えることで単一理論の弱点を補う。多元的アプローチは特定の理論の長所を掘り下げながらも同時に他理論や方法の意義を尊重する。", answer: true, explanation: "統合的 vs 多元的アプローチの違い。" },
    { id: "11-51", chapter: "11章", section: "発展と今日的課題", text: "遠隔心理支援のメリットとしては、クライエントがどこからでも相談できる利便性と、対人恐怖等があっても顔を出さずに済む相談のしやすさなどがあげられる。", answer: true, explanation: "遠隔心理支援のメリット。" },
    { id: "11-52", chapter: "11章", section: "発展と今日的課題", text: "遠隔心理支援のデメリットとしては、非言語情報が不足することと、危機介入の対応が難しい点などががあげられるが、相談方法によって違いがある。", answer: true, explanation: "遠隔心理支援のデメリット。" },
    { id: "11-53", chapter: "11章", section: "発展と今日的課題", text: "他者の心を理解することが苦手なクライエントに対して、その理解を促進しメンタルヘルスの向上を提供する方法として、メンタライゼーション・ベースト・トリートメントが開発された。", answer: true, explanation: "MBT＝メンタライゼーション・ベースト・トリートメント。" },
    { id: "11-54", chapter: "11章", section: "発展と今日的課題", text: "社会構成主義を背景としたナラティブ・アプローチは、ナラティブという「語り」を通して、世界の現実を自他に共通のものとしてその理解を深めていくアプローチである。", answer: false, explanation: "×：ナラティブ・アプローチは、自分にとって豊かで満足できるナラティブを見出し、人生という物語を納得のいく意味ある物語に書き直していくもの。「自他に共通のもの」ではない。" },
    { id: "11-55", chapter: "11章", section: "発展と今日的課題", text: "家族療法から発展したコンパッション・フォーカスト・セラピーは、患者やクライエント、家族、グループ全体のコミュニケーションや自他の理解を促進することを目指す。", answer: false, explanation: "×：これはオープン・ダイアローグの説明。コンパッション・フォーカスト・セラピーは第三世代認知行動療法で、コンパッション（思いやりの気持ちと行動）に焦点をあてる。" },
  ],
  "12章": [
    { id: "12-1", chapter: "12章", section: "生物的側面", text: "人間を理解するためには、心理的側面から考察することが、特に重要である。", answer: false, explanation: "×：人間理解には、生物的側面・心理的側面・社会的側面の3つから多角的・統合的に捉えることが重要（生物心理社会モデル）。" },
    { id: "12-2", chapter: "12章", section: "生物的側面", text: "自律神経系を構成する2つの神経系（生体を活発にする交感神経系と鎮静化する副交感神経系）が交互に活性化することにより、生体は活動休息のバランスを保っている。", answer: true, explanation: "交感神経（活発化）と副交感神経（鎮静化）のバランス。" },
    { id: "12-3", chapter: "12章", section: "生物的側面", text: "神経系はニューロンによって構成されるが、ニューロン同士がシナプスでつながっているのは、体性神経系である。", answer: false, explanation: "×：ニューロン同士がシナプスでつながっているのは「体性神経系」ではなく「自律神経系」である。" },
    { id: "12-4", chapter: "12章", section: "生物的側面", text: "人は、大脳新皮質が最も発達し、脳の高次機能が担われる。前頭前野は脳の各分野の情報を統合することがわかってきており、自我・意識の座ともいわれる。", answer: true, explanation: "前頭前野＝自我・意識の座。大脳新皮質で高次機能。" },
    { id: "12-5", chapter: "12章", section: "生物的側面", text: "大脳辺縁系は、旧・哺乳類の脳と見立てる仮説もあり、感情や欲動に深くかかわっている。人間の五感で最も原始的な感覚の嗅覚もここで処理されている。", answer: true, explanation: "大脳辺縁系＝旧哺乳類の脳・感情と欲動・嗅覚処理。" },
    { id: "12-6", chapter: "12章", section: "外界の知覚と感情", text: "外界の刺激は、神経系を触発し感覚となる。感覚が中枢で処理され、あるまとまりと意味をもった刺激として意識されると知覚となり、知覚は体験や思考などと関連して意味づけられ、推理・判断する認知へと進む。", answer: true, explanation: "感覚→知覚→認知の流れ。" },
    { id: "12-7", chapter: "12章", section: "外界の知覚と感情", text: "感情(情動）に類する言葉には、気分がある。気分は一時的なそれほど強くない情緒である。", answer: false, explanation: "×：気分は一時的ではなく「持続的」なそれほど強くない情緒で、感情生活の基底をなす。" },
    { id: "12-8", chapter: "12章", section: "外界の知覚と感情", text: "認知や判断の過程で、知覚されたものが意味づけられ、認知的枠組みとなる。「スキーマ」と「信念」は過去の経験から一般化された構造的な知識である。", answer: false, explanation: "×：信念も認知的枠組みだが、対象に対して個人が抱いている確信や意見であり、スキーマとは異なる。" },
    { id: "12-9", chapter: "12章", section: "外界の知覚と感情", text: "葛藤状況を変えようがないとき、自分の認知を変えて、その葛藤を解消しようとする心理的規制は、生物心理社会モデルで説明することができる。", answer: false, explanation: "×：これは「認知的不協和の理論」で説明される。生物心理社会モデルではない。" },
    { id: "12-10", chapter: "12章", section: "外界の知覚と感情", text: "感情は意識にのぼらず、言語化されなくても、精神面や人間関係に影響している。視線や態度、話し方など非言語的な対応が他人へ伝わることも多い。", answer: true, explanation: "感情は意識化・言語化されなくても影響する。" },
    { id: "12-11", chapter: "12章", section: "社会環境と人間の行動・思考", text: "ブロンフェンブレンナーは、生態学的システム論を提唱し、環境をマイクロシステム，メゾシステム，エクソシステム，マクロシステムの４っに分類した。", answer: true, explanation: "ブロンフェンブレンナーの生態学的システム論：4つのシステム。" },
    { id: "12-12", chapter: "12章", section: "社会環境と人間の行動・思考", text: "集団での行動は、個々人の合理的な思考や態度を歪めてしまうことがある。これを集団心理と呼んでいる。", answer: true, explanation: "集団心理＝個々人の合理的思考を歪める現象。" },
    { id: "12-13", chapter: "12章", section: "社会環境と人間の行動・思考", text: "アッシュとシェリフは、集団により判断が影響される「同調行動」の実験を行い、失敗体験がある者や自信が低下している者は同調しにくいことがわかった。", answer: false, explanation: "×：アッシュの研究では、失敗体験がある者や自信が低下している者は「同調しやすい」ことがわかった。" },
    { id: "12-14", chapter: "12章", section: "社会環境と人間の行動・思考", text: "ミルグラムによる権威への服従行動実験（通称「アイヒマン実験」）では、権威者である実験者の指令があれば、多くの実験協力者が危険な電気刺激付与も拒否しない結果となった。", answer: true, explanation: "ミルグラムのアイヒマン実験。権威への服従の恐ろしさ。" },
    { id: "12-15", chapter: "12章", section: "社会環境と人間の行動・思考", text: "多数の傍観者が存在することによって援助行動が抑制される「傍観者効果」の原因として、「責任の分散」、「評価懸念」の2つが考えられている。", answer: false, explanation: "×：傍観者効果の原因は「責任の分散」「評価懸念」「多数の無知」の3つ。" },
    { id: "12-16", chapter: "12章", section: "現代社会とこころ", text: "パンデミックの影響で、電子ネットワーク利用が急速に普及し、生活スタイルが大きく変化している。今後メディアの利用により、個々人の行動や習慣がどう変化するか、こころへの影響を含めて見極めていく必要がある。", answer: true, explanation: "パンデミック後の電子ネットワーク利用と心への影響。" },
    { id: "12-17", chapter: "12章", section: "現代社会とこころ", text: "インターネットや携帯電話の爆発的普及により、常に「私」は他者との関連の中にあって、私的空間は拡大している。", answer: false, explanation: "×：電子メディアにより、私的空間は「減少」し、他者とつながる公共空間が「拡大」している。" },
    { id: "12-18", chapter: "12章", section: "現代社会とこころ", text: "メールやSNS等でいつでもどこでもつながれる状況は、他者から離れた「本当の自分」と他者といる「社会的自己」の区別が明確になってきた。", answer: false, explanation: "×：「本当の自分」と「社会的自己」の区別は「希薄」になってきている。明確ではない。" },
    { id: "12-19", chapter: "12章", section: "現代社会とこころ", text: "私たちの日常生活は、電子メディアにより時間軸が分断され、さらに空間的も、身体が存在するリアリティとメディアがもたらすリアリティとの二重性が生じている。", answer: true, explanation: "電子メディアによる時間軸の分断と空間的二重性。" },
    { id: "12-20", chapter: "12章", section: "現代社会とこころ", text: "現実とメディアの葛藤の中で、何を大切に生きるかの主軸の混乱が避けられない。存在意義の揺らぎや無気力も含めて、人々のメンタルヘルスへの影響は無視できない。", answer: true, explanation: "現代のメディア環境がメンタルヘルスに与える影響。" },
    { id: "12-21", chapter: "12章", section: "ストレス", text: "ヒトの生体は開放系であり、外界の変化に対して自己の内部環境を一定に保とうとする。この自己の内部環境維持の機能をホメオスターシスと呼ぶ。", answer: true, explanation: "ホメオスターシス＝内部環境維持機能。" },
    { id: "12-22", chapter: "12章", section: "ストレス", text: "セリエは非特異的反応に関心をもち、「汎適応症候群」という仮説を提唱した。非特異的反応の時間的プロセスを｢警告反応期｣、｢抵抗期｣、「疲憊期｣に分けた。", answer: true, explanation: "セリエの汎適応症候群：警告反応期→抵抗期→疲憊期。" },
    { id: "12-23", chapter: "12章", section: "ストレス", text: "視床下部→下垂体→副腎の反応によって血中に出た副腎皮質ホルモンが長時間作用すると、全身の免疫機能が向上する。", answer: false, explanation: "×：副腎皮質ホルモンが長時間作用すると、血糖値を上昇させ、リンパ球の活動を抑制するため、全身の免疫機能が「低下」する。" },
    { id: "12-24", chapter: "12章", section: "ストレス", text: "NIOSHの職業ストレスモデルは、「仕事のストレス要因」によって「ストレス反応」が生じ、さらには「疾病」につながる場合、「個人要因」「仕事外の要因」「緩衝要因」はほとんど影響を与えないとしたものである。", answer: false, explanation: "×：NIOSHの職業ストレスモデルは、「個人要因」「仕事外の要因」「緩衝要因」が影響を与えるとしている。" },
    { id: "12-25", chapter: "12章", section: "ストレス", text: "心理的ストレスは、人が現象や状況をどのように認知するかによってストレス反応が異なるため、そのコントロールには各人の「認知のプロセス」を知ることが必要となる。", answer: true, explanation: "心理的ストレスの制御には「認知のプロセス」の理解が必要。" },
    { id: "12-26", chapter: "12章", section: "ストレスとコーピング", text: "ストレス反応は、抑うつ気分などの心理的反応、睡眠障害などの生理的反応、勤怠不良などの行動反応として表現される。", answer: true, explanation: "ストレス反応の3分類：心理的・生理的・行動。" },
    { id: "12-27", chapter: "12章", section: "ストレスとコーピング", text: "「きっとうまくいく」と将来に対してポジティブな幻想をもっている場合、自己効力感が高い場合、やりがいを感じている場合には、ストレスは感じにくい傾向がある。", answer: true, explanation: "ポジティブ幻想・自己効力感・やりがいはストレス緩衝要因。" },
    { id: "12-28", chapter: "12章", section: "ストレスとコーピング", text: "ホームズとレイエは、生活上の出来事や経験の「ストレス強度」を算出しているが、成功を収めたりする肯定的出来事はストレス要因にはなりにくいとしている。", answer: false, explanation: "×：成功を収めたり休暇をとったりする肯定的出来事もストレス要因になりうる。" },
    { id: "12-29", chapter: "12章", section: "ストレスとコーピング", text: "レジリエンスとは、変形された物体がもとの形に戻る復元力を意味し、ストレスを受けても精神的健康を維持し回復に導く、しなやかな心理的特性のことをいう。", answer: true, explanation: "レジリエンス＝心理的な復元力・回復力。" },
    { id: "12-30", chapter: "12章", section: "ストレスとコーピング", text: "レジリエンスにつながる心理的特性には、楽観性、感情の調整能力などいくつかがあげられているが、これらは各々独立して存在する。", answer: false, explanation: "×：レジリエンスにつながる心理的特性・構成する諸要因は、相互に関連して存在している。" },
  ],
  "13章": [
    { id: "13-1", chapter: "13章", section: "パーソナリティの定義と理論", text: "「パーソナリティ」が「人となり」全体を表すのに対して、「性格」は表面に現れた他の人と区別されるような特徴に注目した概念である。", answer: true, explanation: "パーソナリティ＝全体像、性格＝表面に現れた特徴。" },
    { id: "13-2", chapter: "13章", section: "パーソナリティの定義と理論", text: "パーソナリティをモデル化して記述する方法は、「特性論」「類型論」の２つである。", answer: false, explanation: "×：パーソナリティをモデル化して記述する代表的な方法は「特性論」「類型論」「力動論」の3つ。" },
    { id: "13-3", chapter: "13章", section: "パーソナリティの定義と理論", text: "パーソナリティを仮説的な機能のまとまりに分けて、それらの強弱やどのように作用しあっているかをみてパーソナリティを記述する理論を、特性論という。", answer: false, explanation: "×：仮説的な機能のまとまりに分けて、強弱や作用を見る理論は「力動論」である。特性論ではない。" },
    { id: "13-4", chapter: "13章", section: "パーソナリティの定義と理論", text: "ユングは、外向－内向という生きるエネルギーが向く方向と、4つの心的機能である思考・感情・感覚・直観の組み合せから、8つの性格タイプ類型を提唱した。", answer: true, explanation: "ユングの類型論：外向/内向 × 思考・感情・感覚・直観 = 8タイプ。" },
    { id: "13-5", chapter: "13章", section: "パーソナリティの定義と理論", text: "「ビッグ・ファイブ」について、マックレーとコスタは、神経症的傾向、外向性、経験への開放性、調和性、誠実性の5つの特性因子を提唱した。", answer: true, explanation: "ビッグ・ファイブ（マックレー&コスタ）：神経症的傾向・外向性・経験への開放性・調和性・誠実性。" },
    { id: "13-6", chapter: "13章", section: "パーソナリティの発達", text: "エリクソンの発達の漸成説では、人生の各段階に危機と発達課題があり、その発達課題は、重要な他者の発達課題と関連しながら展開するとされる。", answer: true, explanation: "エリクソンの漸成説：各段階に危機と発達課題、重要な他者との関連。" },
    { id: "13-7", chapter: "13章", section: "パーソナリティの発達", text: "乳幼児期の養育者との情緒的な関係は、パーソナリティ形成に大きな影響を与える。ボウルビィは、この特定の他者や対象との情緒的な結びつきを「愛着」と名づけた。", answer: true, explanation: "ボウルビィの愛着（アタッチメント）理論。" },
    { id: "13-8", chapter: "13章", section: "パーソナリティの発達", text: "10歳ごろには前思春期となり、記憶や時間感覚が発達し抽象的な概念を操作したり、自分自身を強烈に自覚したりして「内的ワーキングモデル」が生成される。", answer: false, explanation: "×：自分自身を強烈に自覚する体験は「自我体験」。「内的ワーキングモデル」は乳幼児期に生成される。" },
    { id: "13-9", chapter: "13章", section: "パーソナリティの発達", text: "近年、社会の複雑化とともに、通過儀礼によって思春期から一足飛びに大人の仲間入りすることで、「青年期」が喪失しつつある。", answer: false, explanation: "×：大人の仲間入りをする通過儀礼は伝統的社会で行われていた。近年は「青年期」が「延長」し希薄化するとともに、同世代集団の中での自己形成が難しくなっている。" },
    { id: "13-10", chapter: "13章", section: "パーソナリティの発達", text: "働く人を支援するには、ライフサイクルの心理社会的様相を理解し、被支援者がどのような位置にいるのかを見立てることが重要である。心理的位置と社会的位置は合致する。", answer: false, explanation: "×：心理的位置と社会的位置は必ずしも合致しない。中年期以降も、心理的な不適応が生じることもある。" },
    { id: "13-11", chapter: "13章", section: "人生後半の発達", text: "長年にわたって習熟した知識や知恵は中年期以降もなお発達しつづける。この知能を、キャッテルは「流動性知能」と提唱した。", answer: false, explanation: "×：中年期以降も発達しつづける長年の知識や知恵は「結晶性知能」。流動性知能ではない。" },
    { id: "13-12", chapter: "13章", section: "人生後半の発達", text: "エリクソンのライフサイクル論では、中年期の発達課題は、豊かな業績をあげる「生産性」とされる。また人生後半を意識し、抑圧していたこころの全体性を取り戻そうと、自分自身に限定した補償機能が生じる。", answer: false, explanation: "×：中年期の補償機能は、自分自身に限定されず、子どもに人生の肩代わりを望む形で、世代をまたがって生じることがある。" },
    { id: "13-13", chapter: "13章", section: "人生後半の発達", text: "超高齢化社会となり、老年期がより細分化され、エイジング・パラドックスや老年的超越なども見られる。ライフサイクル上の意味づけや発達課題の定義をし直す必要があるといえる。", answer: true, explanation: "超高齢化社会に伴う発達課題の見直し。" },
    { id: "13-14", chapter: "13章", section: "人生後半の発達", text: "キュブラー・ロスは、人が迫る死をどのように受け止めるのかについて、否認・怒り・取引き・抑うつ・受容の5段階があるとし、受容の最終段階を「希望」とも呼んだ。", answer: false, explanation: "×：受容の最終段階は「デカセクシス」（こだわることから離れるの意）。「希望」は5段階すべてを支えるもの。" },
    { id: "13-15", chapter: "13章", section: "人生後半の発達", text: "生涯発達論を提唱するバルテスは、全生涯において常に獲得（成長）と喪失（衰退）が結びついているとした。", answer: true, explanation: "バルテスの生涯発達論：獲得と喪失の結びつき。" },
    { id: "13-16", chapter: "13章", section: "社会や文化との関係", text: "ルース・ベネディクトは、個々人の行動の型が集団によって共同構築され継承されていく「文化の型」の考え方で、「文化相対主義」を強く打ち出した。", answer: true, explanation: "ベネディクトの「文化の型」と文化相対主義。" },
    { id: "13-17", chapter: "13章", section: "社会や文化との関係", text: "パーソナリティの形成への社会・文化的要因を特に強調し明らかにしたのが、構成主義である。ただし「自己」については、パーソナリティの要因が大きいとした。", answer: false, explanation: "×：社会構成主義の考え方では、「自己」もそれ自体で存在しているものではなく、社会的に構成されたものとして考える。" },
    { id: "13-18", chapter: "13章", section: "社会や文化との関係", text: "自分を表象する性（ジェンダー）が生物学的な性（セックス）から生じる当然のものとする考え方は、構成主義と一致している。", answer: false, explanation: "×：ジェンダーがセックスから生じる当然のものとする考え方は「本質主義的」。構成主義はジェンダーの形成に社会的・文化的要因を強調する。" },
    { id: "13-19", chapter: "13章", section: "社会や文化との関係", text: "ジェンダーの心理学的研究では、サンドラ・ベムが男性性と女性性は、文化的に個人に埋め込まれた情報処理スキーマであるとした。", answer: true, explanation: "サンドラ・ベムの情報処理スキーマとしてのジェンダー論。" },
    { id: "13-20", chapter: "13章", section: "社会や文化との関係", text: "今日では、自分を表象する性（ジェンダー）は、人格特性というより、社会的枠組みであると考えられるようになってきている。また性と性的志向の選択の自由が着目されている。", answer: true, explanation: "現代のジェンダー観：社会的枠組み・性と性的志向の選択の自由。" },
    { id: "13-21", chapter: "13章", section: "心理アセスメント", text: "心理アセスメントは、クライエントの「苦悩や病理を含めた生き方の展開」と、その人が生きる社会における「個人差（個性）」を、クライエント自身で理解するためのものである。", answer: false, explanation: "×：心理アセスメントは、カウンセラーがクライエントを理解するために行う。クライエントの自己理解を促す目的で用いることもある。「クライエント自身で理解するため」だけのものではない。" },
    { id: "13-22", chapter: "13章", section: "心理アセスメント", text: "狭義の見立てで扱われるのは、その人の時間的展開（人生のプロセス）を反映した人物理解であり、周囲との関係性や適応状況の理解は含まれない。", answer: false, explanation: "×：周囲との関係性や適応状況の理解も、狭義の見立てに含まれる。" },
    { id: "13-23", chapter: "13章", section: "心理アセスメント", text: "アセスメントの基準のうち、適応的基準は所属する社会に適応しているか不適応かの基準である。実生活と密着しており、生態学的な妥当性は比較的高い。", answer: true, explanation: "適応的基準は実生活と密着・生態学的妥当性が高い。" },
    { id: "13-24", chapter: "13章", section: "心理アセスメント", text: "平均的基準による心理検査では、個人が母集団の平均からどの程度離れているかをアセスメントするので、母集団によって平均値が変わらないことが望ましい。", answer: false, explanation: "×：平均的基準は相対性が高いので、母集団の設定によって平均値や標準偏差の意味が変わってきてかまわない。" },
    { id: "13-25", chapter: "13章", section: "心理アセスメント", text: "理論的基準によるアセスメントは、カウンセラーが最も熟知した特定のカウンセリング理論により、何らかの病理や異常が個人内にあるかどうかを見立てるのが望ましい。", answer: false, explanation: "×：特定の理論に偏った理解で対応すると、クライエントに合わずリスクを伴うことがあるので、複数の理論から見立てることが望ましい。" },
    { id: "13-26", chapter: "13章", section: "心理検査", text: "心理検査の実施前には、クライエントがその目的と必要性を理解しているかを必ず確認する。検査結果の説明時はカウンセラーが一方的に解釈をせず、クライエントの意見を求める。", answer: true, explanation: "インフォームド・コンセント＆双方向的な解釈が重要。" },
    { id: "13-27", chapter: "13章", section: "心理検査", text: "質問紙法の心理検査には、抑うつ状態を測定するMPI、ストレス測定のYG、精神的健康を測る日本版GHQ精神健康調査票などがある。", answer: false, explanation: "×：MPI、YGはともに性格検査。抑うつ状態測定にはSDSなど、ストレス測定にはCMI健康調査表などがある。" },
    { id: "13-28", chapter: "13章", section: "心理検査", text: "投影法や描画法は、他の検査法と同様に専門の訓練を受けていないと、意味ある結果が出せないことが多い。", answer: false, explanation: "×：投影法や描画法は深層心理を探るため、解釈には他の検査法「以上に」熟練を要する。同様ではない。" },
    { id: "13-29", chapter: "13章", section: "心理検査", text: "投影法や描画法は、主に欲求や葛藤などの深層心理を探るために利用されるので、解釈には他の検査法以上に熟練を要する。", answer: true, explanation: "投影法・描画法は深層心理を探る・熟練を要する。" },
    { id: "13-30", chapter: "13章", section: "心理検査", text: "科学的要件を満たした心理検査とは、標準化がなされ信頼性・妥当性が信用に足る水準で客観性に優れたものをいう。信頼性とは、検査の歪みが小さく、同じ受検者なら再検査をしてもほぼ同じ結果がでる要件であり、妥当性とは、測りたいものを測れていることをいう。", answer: true, explanation: "標準化・信頼性・妥当性の定義として正しい。" },
  ],
  "14章": [
    { id: "14-1", chapter: "14章", section: "メンタルヘルス相談", text: "相談者に関する情報を職場に知らせる決定権は、医師やカウンセラーにあるのではなく、原則として相談者側にある。", answer: true, explanation: "情報開示の決定権は原則として相談者にある。" },
    { id: "14-2", chapter: "14章", section: "メンタルヘルス相談", text: "相談者のプライバシー保護の原則は、職種や職場によることなく、すべての場合においてあてはまる。", answer: false, explanation: "×：運転業務従事者や高所作業者で脳波異常を呈する場合など、プライバシー保護より公的利益や安全が優先される場合がある。" },
    { id: "14-3", chapter: "14章", section: "メンタルヘルス相談", text: "以前から時々精神的に具合が悪くなることを職場でも把握しているような慢性的な経過をたどっている場合は、状態が悪くなったタイミングで本人や家族に働きかけることが有効である。", answer: false, explanation: "×：状態が悪くなったタイミングではなく、比較的安定している時期に、本人や家族に働きかけることが有効。" },
    { id: "14-4", chapter: "14章", section: "メンタルヘルス相談", text: "精神科領域では、一般的に病気が重くなるほど「病感」が失われ、よくなるにつれて「病識」がでてくる。", answer: false, explanation: "×：病気が重くなるほど「病識」が失われ、よくなるにつれて「病感」が出てくる。病識と病感が逆。" },
    { id: "14-5", chapter: "14章", section: "メンタルヘルス相談", text: "職場でメンタルな問題が疑われた際には「事例性」と「疾病性」とに分けて考え、病気の確定（疾病性）以上に、業務上何が問題で困っているか（事例性）を優先する。", answer: true, explanation: "事例性（業務上の問題）を疾病性（病気の確定）より優先。" },
    { id: "14-6", chapter: "14章", section: "休業・復職判定", text: "職場復帰の条件、復職後の就業場所や就業内容など、細かい内容に関する本人との協議は時間がかかるので、主治医から職場復帰可能の見解が示される前から始めるほうがよい。", answer: false, explanation: "×：職場復帰が決まりかけた時期から精神的にも体力的にも不安定になりやすい。原則的には精神科主治医から職場復帰可能の見解が示された時点で本人との協議を開始することが望ましい。" },
    { id: "14-7", chapter: "14章", section: "休業・復職判定", text: "就業規則の休業に関する規定を、カウンセラーや人事労務担当者から本人・家族に告知・説明する。直接対面し、口頭による詳しい説明が望ましい。", answer: true, explanation: "対面＆口頭での詳しい説明が望ましい。（ただし文書による補足も大事）" },
    { id: "14-8", chapter: "14章", section: "休業・復職判定", text: "職場復帰が可能とする判断の目安のひとつは、所定労働時間の勤務に耐えうるかどうかなので、「完治」ないし「治癒」したという医師の判断に基づく。", answer: false, explanation: "×：所定労働時間の勤務に耐えうるかどうかは判断の目安のひとつだが、「完治」「治癒」である必要はない。" },
    { id: "14-9", chapter: "14章", section: "休業・復職判定", text: "休業中の治療に関しては精神科主治医に任せるが、職場との定期的な報告（接触）は不可欠である。そこで本人が相談しやすいように、いくつかの窓口があるとよい。", answer: false, explanation: "×：職場との定期的な報告（接触）は、原則的には直属上司など窓口は１つにしぼる。複数ではない。" },
    { id: "14-10", chapter: "14章", section: "休業・復職判定", text: "精神疾患・精神障害者に対する職場での根強い偏見が存在する。したがって、日ごろから障害者（精神障害者にかぎらず）理解のための啓発活動が必要である。", answer: false, explanation: "×：本人・家族への告知・説明は、口頭だけではなく文書による説明が望ましい。（問題文の意図は本人・家族への説明についてなので口頭＋文書が正解）" },
    { id: "14-11", chapter: "14章", section: "精神疾患・精神障害の基礎知識", text: "精神医学的治療の中心は精神科薬物療法であるが、症状が落ち着いてきた時点でさまざまな精神科リハビリテーションも必要となる。", answer: true, explanation: "治療の中心は薬物療法＋精神科リハビリテーション。" },
    { id: "14-12", chapter: "14章", section: "精神疾患・精神障害の基礎知識", text: "精神の異常性については、文化、民族性、歴史、生活習慣、宗教などにより、判断基準が微妙に変わる。", answer: true, explanation: "精神の異常性の判断基準は文化等で微妙に変わる。" },
    { id: "14-13", chapter: "14章", section: "精神疾患・精神障害の基礎知識", text: "近年、症状だけで診断と分類をする操作的診断が主流となっているので、産業カウンセラーも心理的な原因・要因の把握は必要ない。", answer: false, explanation: "×：操作的診断が主流となっているが、産業カウンセラーにとっては心理的な原因・要因の把握は不可欠である。" },
    { id: "14-14", chapter: "14章", section: "精神疾患・精神障害の基礎知識", text: "精神の異常性の判断基準について、産業カウンセラーは、どういう状況にあれば精神医学的な援助が必要かを判断することが要求される。", answer: true, explanation: "産業カウンセラーは精神医学的援助の必要性の判断が求められる。" },
    { id: "14-15", chapter: "14章", section: "精神疾患・精神障害の基礎知識", text: "精神の異常性を判断する重要なポイントのひとつに、状況に即した感情が表出できているかどうかがある。悲しいことがあったのに悲しい感情が湧かないのも問題になる。", answer: true, explanation: "状況に即した感情表出が異常性の判断ポイント。" },
    { id: "14-16", chapter: "14章", section: "うつ病・双極性障害", text: "選択的セロトニン再取込み阻害薬（SSRI）などがうつ病の治療に多大な効果をもたらしたことから、セロトニンがうつ病にもっとも関係する生体アミン系神経伝達物質と考えられる。", answer: true, explanation: "SSRIの効果からセロトニン仮説が主流。" },
    { id: "14-17", chapter: "14章", section: "うつ病・双極性障害", text: "うつ病の好発年齢として20～25歳の若年期と50～55歳の初老期・更年期に多いと言われ、働き盛りの30歳代での発症は少ない。", answer: false, explanation: "×：30歳代のうつ病者が急増しているので、職場ではどの年代でも注意が必要。" },
    { id: "14-18", chapter: "14章", section: "うつ病・双極性障害", text: "抑うつ状態への気づきとは、言葉ではうまく表現できなくても「何かが変わった」と感じる感性である。", answer: true, explanation: "抑うつ気づきは「何かが変わった」感覚。" },
    { id: "14-19", chapter: "14章", section: "うつ病・双極性障害", text: "治療の中心は十分な休養と薬物療法である。さらに、カウンセリングは患者の心理的負担を軽減することになるので積極的に行うことが大事である。", answer: false, explanation: "×：積極的なカウンセリングや心理面接は、かえって患者の負担になる場合があるので注意を要する。" },
    { id: "14-20", chapter: "14章", section: "うつ病・双極性障害", text: "うつ病や双極性障害は回復しても、新たなストレスを契機に再発・再燃をくり返す傾向があるので、産業保健スタッフは連携を密にしながらフォローする必要がある。", answer: true, explanation: "うつ病・双極性障害は再発・再燃しやすい→継続的フォローが必要。" },
    { id: "14-21", chapter: "14章", section: "統合失調症", text: "統合失調症は、一般人口の0.1～0.3％に出現するといわれ、多様で特異な病像を示し、しばしば慢性の経過をたどり、適切な対応がなされないと人格変化を残すことがある。", answer: false, explanation: "×：一般人口の0.7～0.9％に出現する。100人に1人弱がかかる身近な病気。" },
    { id: "14-22", chapter: "14章", section: "統合失調症", text: "思春期に出現する初期症状は、学校の成績が下がる、外に出たがらない、周囲の目を気にするなど、思春期によく出現する現象と類似しているため、その鑑別は慎重を要する。", answer: true, explanation: "思春期症状は一般的な思春期現象と類似→鑑別は慎重に。" },
    { id: "14-23", chapter: "14章", section: "統合失調症", text: "学生時代に発症した場合、治療が進んでいるため、社会人になってから職場において問題となることはほぼない。", answer: false, explanation: "×：学生時代に発症していても、集団性や社会性が求められる場面が少ないことから見逃され、入社後の新人研修期間中に顕在化することがある。" },
    { id: "14-24", chapter: "14章", section: "統合失調症", text: "急性期においては薬物療法が中心ではあるものの、入院治療の必要性は依然高い傾向がある。", answer: false, explanation: "×：最近では非定型抗精神病薬の発達がめざましく、入院治療の必要性が低下している。" },
    { id: "14-25", chapter: "14章", section: "統合失調症", text: "カウンセラーの立場では、病識欠如時の対応、治療継続や規則正しい服薬のチェック、副作用に注意を払うこと、職場復帰後のフォローアップなどが求められる。", answer: true, explanation: "統合失調症へのカウンセラーの役割：服薬チェック・副作用注意・フォローアップ。" },
    { id: "14-26", chapter: "14章", section: "不安障害・ストレス関連障害・心身症・依存症", text: "社交不安障害は、社会的な場面で不安や恐怖を過大に感じることにより社会生活への支障が生じてしまう疾患であり、日本人に比較的多いとされる。", answer: true, explanation: "社交不安障害は日本人に比較的多い。" },
    { id: "14-27", chapter: "14章", section: "不安障害・ストレス関連障害・心身症・依存症", text: "心的外傷後ストレス障害は、極端な外傷的な出来事（トラウマ）体験後4週間以内に起こり、最大4週間持続する不安や解離など主観的な感覚を特徴とする。", answer: false, explanation: "×：設問文は「急性ストレス障害」の説明。急性ストレス障害が4週間以上持続する場合、PTSDと診断が移行される。" },
    { id: "14-28", chapter: "14章", section: "不安障害・ストレス関連障害・心身症・依存症", text: "心身症は、多彩な身体症状を訴え、自分が重篤な病気にかかっているという恐怖やとらわれをもつが、既知の医学的要因は見出されない。", answer: false, explanation: "×：設問文は「心気障害（心気症）」の説明。心身症は、精神的ストレスを基盤として発症する身体疾患（胃潰瘍、過敏性腸症候群、気管支喘息、円形脱毛症、顎関節症など）。" },
    { id: "14-29", chapter: "14章", section: "不安障害・ストレス関連障害・心身症・依存症", text: "アルコール依存症の診断基準は、飲酒のコントロール喪失と離脱症状があげられる。節酒を促していくことが治療の原則となる。", answer: false, explanation: "×：アルコール依存症の治療は、脳にできてしまった依存の回路を回さないよう、節酒ではなく「断酒」が原則。" },
    { id: "14-30", chapter: "14章", section: "不安障害・ストレス関連障害・心身症・依存症", text: "てんかんの発作は、抗てんかん薬の規則的服用によってかなりコントロールできるが、生活指導や職場環境の調整も必要である。", answer: true, explanation: "てんかんは薬物＋生活指導＋職場環境調整でコントロール可能。" },
    { id: "14-31", chapter: "14章", section: "発達障害", text: "発達障害とは主に先天性の脳機能障害があり、それによって思春期から生じる発達の遅れである。", answer: false, explanation: "×：発達の遅れは乳幼児期から生じる。DSM-5では「症状が発達早期に存在している」ことが発達障害の共通点。思春期からではない。" },
    { id: "14-32", chapter: "14章", section: "発達障害", text: "労働環境の変化などに伴い、発達障害を抱える人々にとっては不向きな対人スキルなどを要する業務を任される機会が増え、事例化するケースが増えたと考えられる。", answer: true, explanation: "労働環境変化で発達障害の事例化が増加。" },
    { id: "14-33", chapter: "14章", section: "発達障害", text: "自閉症スペクトラム障害をもつ人は、こだわりがあるので業務に支障を来たすことがあるが、職場でのコミュニケーションについては特に問題はない。", answer: false, explanation: "×：ASDの特徴には「複数の状況で社会的コミュニケーションおよび対人的相互反応における持続的な欠陥」があると定義されている。コミュニケーションにも問題がある。" },
    { id: "14-34", chapter: "14章", section: "発達障害", text: "注意欠如・多動性障害の特徴は、「不注意」と「多動性および衝動性」であるが、「多動性および衝動性」は成長の段階で目立たなくなることもある。", answer: true, explanation: "ADHDの多動性・衝動性は成長で目立たなくなることがある。" },
    { id: "14-35", chapter: "14章", section: "発達障害", text: "発達障害者支援法に基づき、都道府県や指定都市に発達障害者支援センターが設置されている。", answer: true, explanation: "発達障害者支援法→都道府県・指定都市に支援センター設置。" },
    { id: "14-36", chapter: "14章", section: "適応障害・労働ストレス・法律", text: "適応障害は、他の精神疾患の基準を満たしておらず、すでに存在している精神疾患の単なる悪化でもなく、通常ストレス要因がなくなると軽快する。", answer: true, explanation: "適応障害はストレス要因がなくなると軽快する。" },
    { id: "14-37", chapter: "14章", section: "適応障害・労働ストレス・法律", text: "IT関連職では心身の疲労が誘因となって、いわゆる「消耗性うつ病」、「疲弊うつ病」になりやすく、20代後半から30代にかけての働き盛りに多い。", answer: true, explanation: "IT関連職の消耗性うつ病・疲弊うつ病は20代後半～30代に多い。" },
    { id: "14-38", chapter: "14章", section: "適応障害・労働ストレス・法律", text: "精神保健福祉法において、精神科医療施設への入院制度として、措置入院、医療保護入院、応急入院、任意入院の４種類がある。", answer: true, explanation: "精神科入院制度4種類：措置入院・医療保護入院・応急入院・任意入院。" },
    { id: "14-39", chapter: "14章", section: "適応障害・労働ストレス・法律", text: "措置入院とは、自傷他害のおそれのある事例に対し、2名以上の指定医の診察結果の一致により成立する。いちばん強制力のあるもので、家族からの通報によるものが多い。", answer: false, explanation: "×：家族からの通報ではなく、警察官通報により措置入院となる事例が多い。" },
    { id: "14-40", chapter: "14章", section: "適応障害・労働ストレス・法律", text: "2013年の精神保健福祉法改正によって、精神障害者に適切な治療を受けさせるための保護者制度が規定された。", answer: false, explanation: "×：2013年の精神保健福祉法改正で保護者制度は「廃止」された。医療保護入院の同意を行う者がいない場合は市町村長が同意の判断を行う。" },
  ],
  "15章": [
    { id: "15-1", chapter: "15章", section: "産業組織と産業組織心理学", text: "産業組織とは、「目的追求のため、部門編成と分業、責任権限の付与または委譲により、もっとも効率的かつ効果的に協働できるよう統制した社会的システム」ということができる。", answer: true, explanation: "産業組織の定義として正しい。" },
    { id: "15-2", chapter: "15章", section: "産業組織と産業組織心理学", text: "産業組織心理学とは、「組織的な産業活動で生じる『人間行動の効率性追求』と『人間性尊重』にかかわる問題を取扱う心理学の一領域」ということができる。", answer: true, explanation: "産業組織心理学は効率性追求と人間性尊重を扱う。" },
    { id: "15-3", chapter: "15章", section: "産業組織と産業組織心理学", text: "産業組織には、職務を果たすために必要な権限は負担すべき責任に応じて付与されるべきという「権限委譲の原則」がある。", answer: false, explanation: "×：これは「権限責任の対応原則」。「権限委譲の原則」は最高の権限保有者の存在と、その権限を必要に応じて各職務へ委譲すること。" },
    { id: "15-4", chapter: "15章", section: "産業組織と産業組織心理学", text: "産業組織には、どの職務にも属さない例外事項の処理権限は上位者が保持するという「例外対処の原則」がある。", answer: true, explanation: "例外対処の原則：例外事項の処理は上位者が保持。" },
    { id: "15-5", chapter: "15章", section: "産業組織と産業組織心理学", text: "組織の形態には、マトリックス組織やプロジェクト組織などの「静態的組織」と、ライン組織や事業部制組織といった「動態的組織」がある。", answer: false, explanation: "×：ライン組織や事業部制組織が「静態的組織」、マトリックス組織やプロジェクト組織は「動態的組織」。（逆）" },
    { id: "15-6", chapter: "15章", section: "産業組織心理学の原点", text: "テイラーは、効率を追求して生産高を最大限に増やすように作業の仕方を科学的に定め、マニュアル化することを提案した。", answer: false, explanation: "×：テイラーはマニュアル化ではなく、作業の仕方を科学的に定め、それが実行されるように労使が密接に協力しあう「温かい協力関係」が不可欠とした。" },
    { id: "15-7", chapter: "15章", section: "産業組織心理学の原点", text: "ウェーバーは、定められた規則などの合理的・合法的な権威による組織である近代「官僚制組織」が「技術的に考えうるもっとも能率的な組織形態」であるとした。", answer: true, explanation: "ウェーバーの官僚制組織論。" },
    { id: "15-8", chapter: "15章", section: "産業組織心理学の原点", text: "ホーソン工場で行われた照明度と生産高の関係の実験では、照明度を変えて明るくした実験群のほうの生産高が上がった。", answer: false, explanation: "×：照明度を変えた実験群、変えなかった対象群ともに生産高が上がる結果となった。" },
    { id: "15-9", chapter: "15章", section: "産業組織心理学の原点", text: "ホーソン研究で、労働条件を変更しても生産高が下がらなかった結果について、レスリスバーガーは実験対象者に選ばれた従業員たちの満足感や仲間意識、働く意欲などの理由を見出した。", answer: true, explanation: "レスリスバーガーの解釈：満足感・仲間意識・働く意欲。" },
    { id: "15-10", chapter: "15章", section: "産業組織心理学の原点", text: "メイヨー、レスリスバーガーらは、組織で働く人間は、社会的な存在であり、その行動は非公式集団の規範によって規制され、経済的条件以外に感情的側面によって動機づけられるとした。", answer: true, explanation: "メイヨー・レスリスバーガー＝人間関係論：社会的存在・非公式集団・感情的側面。" },
    { id: "15-11", chapter: "15章", section: "動機づけ理論", text: "ハーズバーグは、人の行動には「外発的動機づけ」と「内発的動機づけ」の2種類があるとした。", answer: false, explanation: "×：外発的動機づけと内発的動機づけの2種類があるとしたのはマーレイ。ハーズバーグは2要因理論（動機づけ要因・衛生要因）。" },
    { id: "15-12", chapter: "15章", section: "動機づけ理論", text: "デシとフラストは、内発的動機づけによる行動に外からの報酬が与えられると内発的動機づけが低下する反面、外からの報酬が内発的動機づけを誘発することもあるとした。", answer: true, explanation: "デシとフラスト：外的報酬が内発的動機づけに与える影響。" },
    { id: "15-13", chapter: "15章", section: "動機づけ理論", text: "アルダーファは、マズローの理論を3つの欲求にまとめたERG理論を提起したが、2つ以上の階層の欲求が同時に働くことがあるという点において大きな違いがある。", answer: true, explanation: "アルダーファのERG理論：マズローと違い、複数の欲求が同時に働く。" },
    { id: "15-14", chapter: "15章", section: "動機づけ理論", text: "仕事にかかわる欲求として「達成欲求」、「権力欲求」、「親和欲求」に注目したのは、ハックマンである。", answer: false, explanation: "×：達成欲求・権力欲求・親和欲求に注目したのはマクレランド。ハックマンではない。" },
    { id: "15-15", chapter: "15章", section: "動機づけ理論", text: "モチベーションによる行動の生起過程は、行動主義心理学の基礎理論であるハルの「動因低減説」や、スキナーの「オペラント条件づけ」などの学習理論からも説明される。", answer: true, explanation: "ハルの動因低減説・スキナーのオペラント条件づけ。" },
    { id: "15-16", chapter: "15章", section: "仕事意欲向上策とコミットメント", text: "戦後のわが国企業に特有といわれた「終身雇用」と「年功賃金」の制度も、古くから行われてきた外発的動機づけ策のひとつである。", answer: true, explanation: "終身雇用・年功賃金は外発的動機づけ策。" },
    { id: "15-17", chapter: "15章", section: "仕事意欲向上策とコミットメント", text: "「目標による管理」は、組織の側の要求と従業員個人の要求をマッチングさせ自己管理で遂行させる方策であり、わが国でも1990年代以降多くの企業が導入している。", answer: true, explanation: "目標による管理（MBO）：1990年代以降多くの日本企業で導入。" },
    { id: "15-18", chapter: "15章", section: "仕事意欲向上策とコミットメント", text: "従業員の内発的動機づけについて組織のトップ層はその重要さを認識し、内発的動機づけの方策を管理技法として部分的に取り入れていくことが望まれる。", answer: false, explanation: "×：トップ層が内発的動機づけの重要さを認識し、部分的に取り入れるのではなく、同時に組織体制自体を持続的に変えることが必須の条件。" },
    { id: "15-19", chapter: "15章", section: "仕事意欲向上策とコミットメント", text: "労働者のウェルビーイングは、活力やポジティブ感情などの快楽主義的、人生の意義・目的に対する充実感などの幸福主義的、生活や仕事への満足度などの評価的の３つに整理することができる。", answer: true, explanation: "ウェルビーイングの3整理：快楽主義的・幸福主義的・評価的。" },
    { id: "15-20", chapter: "15章", section: "仕事意欲向上策とコミットメント", text: "エンプロイーエンゲージメントを高めるには会社への忠誠を表す「コミットメント」、所属集団に対する「帰属意識」、組織への真摯な関与を表す「ロイヤルティ」などが重要な概念になる。", answer: false, explanation: "×：会社への忠誠を表すのは「ロイヤルティ」、組織への真摯な関与を表すのは「コミットメント」。（逆）" },
    { id: "15-21", chapter: "15章", section: "グループ・ダイナミックス", text: "グループ・ダイナミックスは、個人が集団から受ける影響や、集団における人間の行動の特徴やメカニズムを明らかにしようと、レヴィンによって創始された研究である。", answer: true, explanation: "グループ・ダイナミックスの創始者＝レヴィン。" },
    { id: "15-22", chapter: "15章", section: "グループ・ダイナミックス", text: "グループ・ダイナミックスの研究方法のうち、実験室などで集団行動の仮説についての課題解決行動をとらせ、仮説の適否を検証するものを「アクション・リサーチ」という。", answer: false, explanation: "×：設問は「実験室研究」の説明。アクション・リサーチは現場の問題解決策の仮説を立て、当事者が実践し検証する「実践研究」。" },
    { id: "15-23", chapter: "15章", section: "グループ・ダイナミックス", text: "集団の凝集性は、メンバーがその集団にどの程度魅力を感じているか、例えば、集団の目的や活動への魅力が測定要素となるが、物的報酬への魅力は含まれない。", answer: false, explanation: "×：集団の凝集性の測定要素には、「そこで得られる物的報酬が他の集団より高いこと」も含まれる。" },
    { id: "15-24", chapter: "15章", section: "グループ・ダイナミックス", text: "ジンバルドの疑似刑務所実験やミルグラムのアイヒマン実験などの結果、人は集団の中で役割を与えられると個人的な思いとは別の行動を実行することがあると証明された。", answer: true, explanation: "ジンバルドの疑似刑務所実験・ミルグラムのアイヒマン実験。" },
    { id: "15-25", chapter: "15章", section: "グループ・ダイナミックス", text: "集団の中で意思決定を行う際、ひとりで意思決定を行うときよりも極端に保守的なものになりやすい傾向を、コーシャスシフトという。", answer: true, explanation: "コーシャスシフト＝集団では保守的になる傾向。" },
    { id: "15-26", chapter: "15章", section: "リーダーシップとフォロワーシップ", text: "近年注目されている「サーバント・リーダーシップ論」では、リーダーに求められる10の特性として傾聴、癒し、概念化などをあげている。", answer: true, explanation: "サーバント・リーダーシップ：傾聴・癒し・概念化など10特性。" },
    { id: "15-27", chapter: "15章", section: "リーダーシップとフォロワーシップ", text: "三隅二不二のPM理論は、集団の「課題遂行」の機能と「集団維持」の機能のどちらかでなく、両方の機能をバランスよく果たすことが有効なリーダーシップを発揮できるとしている。", answer: true, explanation: "三隅のPM理論：Performance（課題遂行）＋Maintenance（集団維持）。" },
    { id: "15-28", chapter: "15章", section: "リーダーシップとフォロワーシップ", text: "フィードラーやハーシーらは、リーダーのパーソナリティだけでなくリーダーの状況やフォロワーの成熟度によってリーダーシップの有効性が異なるとした。", answer: true, explanation: "フィードラー・ハーシーらの状況適合理論（SL理論）。" },
    { id: "15-29", chapter: "15章", section: "リーダーシップとフォロワーシップ", text: "フォロワーのあり方が集団の成果に対する貢献度に影響があるとしたケリーは、フォロワーのタイプを「模範型」、「順応型」、「孤立型」、「消極型」、「実務型」の5つに分けた。", answer: true, explanation: "ケリーのフォロワー5タイプ：模範型・順応型・孤立型・消極型・実務型。" },
    { id: "15-30", chapter: "15章", section: "リーダーシップとフォロワーシップ", text: "「報酬性」、「強制性」、「正当性」、「専門性」、「準拠性」の5つの特性すべてが備わっていると周囲から認識されると、その人はリーダーとして認められる。", answer: false, explanation: "×：フレンチらは、5つすべてではなく、このうちのどれか、またはいくつかが備わっているとリーダーとして認識されるとした。" },
    { id: "15-31", chapter: "15章", section: "産業組織の実態調査", text: "協力者に直接面接して話を聞き、質的な分析をすることをアンケート調査という。", answer: false, explanation: "×：協力者に直接面接して話を聞き、質的な分析をするのは「質的調査」。アンケート調査ではない。" },
    { id: "15-32", chapter: "15章", section: "産業組織の実態調査", text: "より正確に調査を実施するためには、ときには調査の目的や方法を伏せることも仕方がない。", answer: false, explanation: "×：調査の内容や結果について、だれが責任を負うのかを明確にし、調査時に個人の回答の秘密保持などを調査協力者に明示しなければならない。目的・方法を伏せるのはNG。" },
    { id: "15-33", chapter: "15章", section: "産業組織の実態調査", text: "既存データ調査とは、すでに実施して公開されている調査結果を検索し、改めて分析したり自分なりに考察したりする方法である。", answer: true, explanation: "既存データ調査の定義として正しい。" },
    { id: "15-34", chapter: "15章", section: "産業組織の実態調査", text: "一般的にアンケート用紙は、「案内部」、「本体部」、「個人情報部」で構成される。", answer: true, explanation: "アンケート用紙の3構成：案内部・本体部・個人情報部。" },
    { id: "15-35", chapter: "15章", section: "産業組織の実態調査", text: "面接調査の場合、ある程度の仮説をもとに質問を構成し、仮説が崩されることも想定して対応する質問も用意しておくことが望ましい。", answer: true, explanation: "面接調査：仮説ベース＋仮説崩壊時の対応質問も準備。" },
  ],
  "16章": [
    { id: "16-1", chapter: "16章", section: "コミュニケーションの基本", text: "対面的コミュニケーションにおいて、コミュニケーション能力とは、話し方全般のルールに関する知識の度合いである。", answer: false, explanation: "×：コミュニケーション能力は、コミュニケーションを支える知識とスキルからなる。知識の度合いだけではない。" },
    { id: "16-2", chapter: "16章", section: "コミュニケーションの基本", text: "権威主義の受け手が低地位の送り手の言うことを馬鹿にし、軽視するのは意味的ノイズである。", answer: false, explanation: "×：権威主義の受け手が低地位の送り手の言うことを軽視するのは「心理的ノイズ」。意味的ノイズではない。" },
    { id: "16-3", chapter: "16章", section: "コミュニケーションの基本", text: "ノイズは主に受け手がメッセージを解釈する段階で発生する。", answer: false, explanation: "×：ノイズはコミュニケーションのあらゆる段階で発生する。受け手の解釈段階だけではない。" },
    { id: "16-4", chapter: "16章", section: "コミュニケーションの基本", text: "非言語的コミュニケーションはコントロールが難しく、無意識に表出してしまうため、相手の内的状態を知る手がかりとして活用できる。", answer: true, explanation: "非言語は無意識に表出→内的状態を知る手がかり。" },
    { id: "16-5", chapter: "16章", section: "コミュニケーションの基本", text: "言語的コミュニケーションと非言語的コミュニケーションの意味が異なる場合を葛藤という。", answer: false, explanation: "×：言語と非言語の意味が異なる場合は「二重束縛的コミュニケーション（ダブルバインド）」という。葛藤ではない。" },
    { id: "16-6", chapter: "16章", section: "自己開示と自己呈示", text: "自己呈示とは、自分の本当の姿を隠して高評価を得ようとする不誠実な行為である。", answer: false, explanation: "×：自己呈示は、他者とうまくつきあっていくためのソーシャル・スキル。不誠実な行為ではない。" },
    { id: "16-7", chapter: "16章", section: "自己開示と自己呈示", text: "自己開示することによって相手からの信頼は高くなるので、どのような相手に対しても積極的に自己開示することが望ましい。", answer: false, explanation: "×：不適切な自己開示は開示者自身あるいは二者関係に好ましくない結果をもたらす場合がある。積極的にすべきとは限らない。" },
    { id: "16-8", chapter: "16章", section: "自己開示と自己呈示", text: "自己呈示には、否定的印象を回避しようとする防衛的自己呈示と、相手からの報酬や特定の印象を与えようとする主張的自己呈示とがある。", answer: true, explanation: "自己呈示の2分類：防衛的自己呈示・主張的自己呈示。" },
    { id: "16-9", chapter: "16章", section: "自己開示と自己呈示", text: "自己開示の個人的機能には、感情浄化機能、自己明確化機能、社会的妥当化機能がある。", answer: true, explanation: "自己開示の3つの個人的機能：感情浄化・自己明確化・社会的妥当化。" },
    { id: "16-10", chapter: "16章", section: "自己開示と自己呈示", text: "自分と否定的な結果との関係性を弱めて、責任を回避する自己呈示を、正当化という。", answer: false, explanation: "×：自分と否定的な結果との関係性を弱めて責任を回避する自己呈示は「弁解」。正当化ではない。" },
    { id: "16-11", chapter: "16章", section: "コミュニケーションと人間関係の変化", text: "ジョハリの窓におけるクライエントの開放領域の拡大を支援することが、産業カウンセラーの重要な役割のひとつである。", answer: true, explanation: "ジョハリの窓の開放領域拡大支援＝産業カウンセラーの役割。" },
    { id: "16-12", chapter: "16章", section: "コミュニケーションと人間関係の変化", text: "自分も他者も知らない未知領域の発見は、自己他者同時発見と自己発見の２通りがある。", answer: false, explanation: "×：未知領域の発見には「自己他者同時発見」「自己発見」「他者発見」の3通りがある。" },
    { id: "16-13", chapter: "16章", section: "コミュニケーションと人間関係の変化", text: "クライエントが開放領域が大きく表面的なパーソナリティをもつ場合は、カウンセリングが効率的に展開できないことを承知しておく必要がある。", answer: true, explanation: "開放領域が大きく表面的なパーソナリティはカウンセリング展開に留意が必要。" },
    { id: "16-14", chapter: "16章", section: "コミュニケーションと人間関係の変化", text: "人間関係の発展段階におけるコミュニケーションの特徴で「統合の段階」は、「結束の段階」の前のステップである。", answer: false, explanation: "×：「統合の段階」は「結束の段階」の「次」のステップ。前ではない。" },
    { id: "16-15", chapter: "16章", section: "コミュニケーションと人間関係の変化", text: "人間関係の段階に関する情報を聴くこともクライエントの支援に効果的である。", answer: true, explanation: "人間関係の発展段階の情報もクライエント支援に有効。" },
    { id: "16-16", chapter: "16章", section: "他者に影響を与える/異文化間コミュニケーション", text: "説得は、「主に言語的コミュニケーションによって、納得させながら他者の態度や行動を特定の方向へと変化させる行為」である。", answer: true, explanation: "説得の定義として正しい。" },
    { id: "16-17", chapter: "16章", section: "他者に影響を与える/異文化間コミュニケーション", text: "説得する相手の特徴を分析し、その特徴に適したメッセージを工夫して使用すれば、送り手の説得力は高まる。", answer: true, explanation: "相手特性に合わせたメッセージで説得力が高まる。" },
    { id: "16-18", chapter: "16章", section: "他者に影響を与える/異文化間コミュニケーション", text: "送り手が使用するうそには、隠蔽、偽装、その中間型がある。", answer: true, explanation: "うその3分類：隠蔽・偽装・中間型。" },
    { id: "16-19", chapter: "16章", section: "他者に影響を与える/異文化間コミュニケーション", text: "互いにわかり合えるとの前提のもとに行われるコミュニケーションを、低コンテクスト・コミュニケーションという。", answer: false, explanation: "×：同質性の高い文化に依存し、互いにわかり合えるとの前提のもとに行われるコミュニケーションは「高コンテクスト・コミュニケーション」。低ではない。" },
    { id: "16-20", chapter: "16章", section: "他者に影響を与える/異文化間コミュニケーション", text: "価値観や役割意識の違いが、世代間のコミュニケーションの大きな壁になっている。", answer: true, explanation: "世代間コミュニケーションの壁：価値観・役割意識の違い。" },
    { id: "16-21", chapter: "16章", section: "非対面のコミュニケーション", text: "主にインターネットを介して行われるオンラインコミュニケーションは、新型コロナウィルスの感染予防策が求められるようになって以降、不可欠なコミュニケーションの形態となった。", answer: true, explanation: "コロナ以降、オンラインCMは不可欠な形態に。" },
    { id: "16-22", chapter: "16章", section: "非対面のコミュニケーション", text: "非対面のコミュニケーションは伝達情報の種類から「テキストコミュニケーション」「ボイスコミュニケーション」「ビデオコミュニケーション」の３つに分類される。", answer: true, explanation: "非対面CMの3分類：テキスト・ボイス・ビデオ。" },
    { id: "16-23", chapter: "16章", section: "非対面のコミュニケーション", text: "CMC（Computer Mediated Communication）の普及は「時間の解放」や「社会的制約からの解放」「自己開示の解放」など制約の解放をもたらした。", answer: true, explanation: "CMCの3つの解放：時間・社会的制約・自己開示。" },
    { id: "16-24", chapter: "16章", section: "非対面のコミュニケーション", text: "対面的コミュニケーションと違ってCMCは互いの空間の中でコミュニケーションが行われることによってタイムラグが起きるなどの「フレームの二重化」、「視線の不一致」などの問題点もある。", answer: true, explanation: "CMCの問題点：フレームの二重化・視線の不一致。" },
    { id: "16-25", chapter: "16章", section: "非対面のコミュニケーション", text: "時間や空間的な制約から解放されたテレワークでは、雑談や面倒な報告が減り、業務の効率化だけでなくメンタル不調の予防も予測されている。", answer: false, explanation: "×：対面でのちょっとしたあいさつや何気ない会話などのインフォーマルコミュニケーションの果たす役割は大きい。テレワークでこれが減ることでむしろメンタル不調リスクは増える可能性がある。" },
  ],
  "17章": [
    { id: "17-1", chapter: "17章", section: "コミュニティ心理学の誕生と発展", text: "ボストン会議では、「コミュニティ心理学は、個人が生活し参加している社会システムに焦点を当て、治療よりも予防を強調する全く新しいメンタルヘルスへのアプローチを目指す」という合意を得た。", answer: true, explanation: "ボストン会議（コミュニティ心理学誕生）の合意内容。" },
    { id: "17-2", chapter: "17章", section: "コミュニティ心理学の誕生と発展", text: "コミュニティ心理学誕生の背景には、地域精神医療に関する立法などとともに、人種差別撤廃をめざす公民権運動により「公民権法」が成立し、精神障害者に対する態度・処遇などにも影響を与え始めたことがあげられる。", answer: true, explanation: "公民権運動・公民権法がコミュニティ心理学誕生の背景。" },
    { id: "17-3", chapter: "17章", section: "コミュニティ心理学の誕生と発展", text: "コミュニティ心理学を「異なる身体的・心理的・社会的・文化的条件をもつ人々が、だれも切り捨てられることなく、共に生きることを模索するなかで、人と環境の適合性を最大にするための基礎知識と方略に関しての研究」と定義したのは、ベネットらである。", answer: false, explanation: "×：この定義は「山本和郎」のもの。ベネットらではない。" },
    { id: "17-4", chapter: "17章", section: "コミュニティ心理学の誕生と発展", text: "コミュニティ心理学は、精神障害者を「地域社会の生活者」として支援する学問としてスタートし、個人、多様なコミュニティや社会全体などの関係に焦点をあて、QOLの向上を目的とする実践的学問へと進化してきた。", answer: true, explanation: "コミュニティ心理学の発展とQOL向上目的。" },
    { id: "17-5", chapter: "17章", section: "コミュニティ心理学の誕生と発展", text: "コミュニティ心理学の発展において、一般システム論の考え方はコミュニティ心理学に影響を与えることはなかった。", answer: false, explanation: "×：自然科学における一般システム論の考え方が社会科学にも導入され、コミュニティ心理学も影響を受けた。" },
    { id: "17-6", chapter: "17章", section: "コミュニティ心理学の「理解」", text: "コミュニティ心理学では、コミュニティは個人と環境からなるシステムであると考え、個人と集団、個人と組織、個人と地域社会などが本質的に対立的関係にあると考える。", answer: false, explanation: "×：本質的に対立的関係にあるわけではなく、包含的で可変的な関係であると考える。" },
    { id: "17-7", chapter: "17章", section: "コミュニティ心理学の「理解」", text: "コミュニティ心理学では、人間を生物心理社会的存在として、個人それ自身がシステムであると考える。", answer: true, explanation: "個人自身がBPS（生物心理社会）システム。" },
    { id: "17-8", chapter: "17章", section: "コミュニティ心理学の「理解」", text: "コミュニティ心理学では、「問題」を「個人と環境の相互作用の結果として不適合を起こしている状態」であるととらえる。", answer: true, explanation: "問題＝個人と環境の相互作用による不適合。" },
    { id: "17-9", chapter: "17章", section: "コミュニティ心理学の「理解」", text: "ブロンフェンブレンナーは、コミュニティが４つの入れ籠状のシステムから成り立っており、それぞれが影響し合うが、独立したものであるとした。", answer: false, explanation: "×：4つのシステムは独立したものではなく、それぞれが影響し合うと同時に、マイクロ・メゾ・エクソのシステムはマクロシステムの中で機能している。" },
