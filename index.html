:root{

.srcBadgeQB{font-size:9.5px; font-weight:700; color:var(--gold); background:rgba(185,138,61,.10); border:1px solid rgba(185,138,61,.42); border-radius:5px; padding:2px 7px; letter-spacing:.04em; line-height:1.4; white-space:nowrap;}
.qCard{background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 16px; min-height:100px; margin-bottom:18px; box-shadow:0 4px 14px rgba(31,42,60,.06);}

.rb-ng{background:rgba(31,58,95,.09); color:var(--indigoDeep);}

.explainLabel{font-family:'Shippori Mincho',serif; font-size:11px; font-weight:700; color:var(--gold); letter-spacing:.15em; margin-bottom:5px;}
.explainText{font-size:12.5px; line-height:1.85; color:var(--inkSoft);}
.correction{display:inline-block; margin-top:8px; font-size:11.5px; font-weight:700; color:var(--indigo); background:#fff; padding:4px 9px; border-radius:6px; border:1px solid var(--line);}
.nextBtn{width:100%; padding:14px; border:none; border-radius:12px; background:var(--indigoDeep); color:var(--washi); font-size:13.5px; font-weight:700; cursor:pointer;}
.summaryWrap{text-align:center; padding:30px 10px 8px;}
.summaryBig{font-family:'Shippori Mincho',serif; font-size:40px; font-weight:800; color:var(--indigoDeep);}
.summaryBig small{font-size:15px; color:var(--inkSoft); font-weight:400;}
.summarySub{font-size:12.5px; color:var(--inkSoft); margin:8px 0 20px;}
.wrongItem{display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line); border-radius:9px; padding:9px 11px; font-size:12px; text-align:left; margin-bottom:7px;}
.wrongItem .wid{font-family:'Shippori Mincho',serif; font-weight:800; color:var(--indigo); font-size:11.5px; width:34px; flex-shrink:0;}
.wrongItem .wtx{color:var(--inkSoft); flex:1;}
.footerNote{text-align:center; color:var(--inkSoft); font-size:10px; padding:18px 10px 10px; letter-spacing:.05em;}

.resetLink{display:inline-block; margin-top:10px; color:var(--inkSoft); opacity:.7; font-size:10.5px; text-decoration:underline; background:none; border:none; cursor:pointer;}

<script>
/* ============ DATA (QuizApp.tsx \u3088\u308a\u305d\u306e\u307e\u307e\u62bd\u51fa) ============ */
const DATA_VERSION = 10;
const CHAPTERS = [
  { id: 1, title: "産業カウンセリングの発展と課題" },
  { id: 2, title: "産業カウンセラーの役割と活動" },
  { id: 3, title: "活動規範・倫理" },
  { id: 4, title: "産業組織と人事労務管理" },
  { id: 5, title: "産業カウンセリングに関わる関係法令" },
  { id: 6, title: "カウンセリングの基本" },
  { id: 7, title: "傾聴の意義と技法" },
  { id: 8, title: "カウンセリングの諸理論" },
  { id: 9, title: "こころとからだのメカニズム" },
  { id: 10, title: "パーソナリティ心理学" },
  { id: 11, title: "心理アセスメント" },
  { id: 12, title: "精神医学の基本" },
  { id: 13, title: "コミュニケーションの基本" },
  { id: 14, title: "職場におけるメンタルヘルス対策" },
  { id: 15, title: "キャリア形成支援" },
  { id: 16, title: "事例検討" },
  { id: 17, title: "スーパービジョン" },
];
const INITIAL_DATA = [
  // ===== 第1章 産業カウンセリングの発展と課題 (1-12) =====
  {id:1, chapter:1, text:"産業カウンセリングのルーツは、20世紀初頭にアメリカで起こった「能力開発運動」「教育測定運動」「精神衛生運動」の社会運動である。", answer:false, correction:"能力開発運動 → 職業指導運動", explanation:"専門的援助活動としてのカウンセリングは20世紀初頭のアメリカで起こり発展してきた。そのルーツは①職業指導運動、②教育測定運動、③精神衛生運動の3つの社会運動で、3大源流と呼ばれている。"},
  {id:2, chapter:1, text:"パーソンズ（Parsons, F.）による科学的な職業選択とは、①自分の能力・興味・個人的諸条件について明確な理解をする、②その職業が必要とする資質・適性や報酬、将来性などを分析する、③①と②を統合し合理的判断をするという3つのプロセスである。", answer:true, explanation:"パーソンズによる科学的な職業選択は設問のとおり。パーソンズは③のマッチングをカウンセラーの中心業務とし、「丸いクギは丸い穴に」というスローガンを掲げた。"},
  {id:3, chapter:1, text:"ソーンダイク（Thorndike, E. L.）は、「すべて存在するものは量的に存在する。量的に存在するものはこれを測定することができる」というスローガンを発表した。", answer:true, explanation:"個人の能力・適性などを正しくとらえるために客観的な測定技術が必要であるとの観点から各種の心理診断の技術が発達し、これを背景に教育測定運動が展開され、1914年の「教育測定第1回大会」でソーンダイクが設問のスローガンを発表した。"},
  {id:4, chapter:1, text:"ソーンダイク（Thorndike, E. L.）らによって展開された教育測定運動は、当初企業分野で広がり、その後、職業指導運動と合体しつつ特性因子理論へと発展していった。", answer:false, correction:"企業分野 → 学校教育分野", explanation:"教育測定運動はソーンダイクが始めた運動で、彼は学力の測定を客観的に採点できるテストの作成と普及に努めた。この運動は学校教育の分野で広がり、職業指導運動と合体しつつ特性因子理論へと発展していった。"},
  {id:5, chapter:1, text:"ビアーズ（Beers, C. W.）によってなされた精神衛生運動は、後に予防、健康の保持・向上を主張するようになり、今日のメンタルヘルス運動への流れをつくった。", answer:true, explanation:"ビアーズは患者として精神病院に入院した経験から、その体験記を『わが魂にあうまで』として出版した。その後精神医学者たちの支援を受け精神衛生運動の場を作った。この運動は初期は患者の処置や看護の改善が狙いだったが、後に予防・健康の保持向上を主張し、現在のメンタルヘルス運動への流れをつくった。"},
  {id:6, chapter:1, text:"ホーソン研究における従業員面接調査において、面接の担当者が従業員の発言に対して意見やアドバイスを言わずに辛抱強く接した結果、従業員に一種のカタルシス効果が生じることが明らかになった。", answer:true, explanation:"ホーソン研究は工場の従業員に対して作業の能率向上策を探るために行われた。面接担当者は本心を聞くため発言内容の秘密厳守を伝え、発言に対して辛抱強く聞くことに徹した方法をとった。その結果、一種のカタルシスが生じ好評であった。その後カウンセリング活動として展開していった。"},
  {id:7, chapter:1, text:"キャタピラー計画は、心理学者主導のもとに企画・実施され、精神衛生の見地から、心理テスト、カウンセリング、教育訓練が体系的に行われた。", answer:true, explanation:"大手トラクターメーカーのキャタピラーは、従業員の離職・欠勤・事故などの問題を抱えていた。会社は従業員の定着と健康改善を図るための計画を進めた。この計画はすべて心理学者主導のもとに企画・実施され、精神衛生の見地から心理テスト、カウンセリング、教育訓練が体系的に行われた。"},
  {id:8, chapter:1, text:"1950年以降、日本の産業界にカウンセリングが普及していった背景には、機械化・合理化による職場環境の急変と、それに伴う職場への不適応の問題があった。", answer:true, explanation:"1950年頃、アメリカ的な人間関係論およびカウンセリング心理学という理論に基づく産業相談の実践が人事労務管理の一環として日本に紹介された。同時に、産業界にカウンセリングが普及していく背景には機械化・合理化による職場環境の急変と、それに伴う職場への不適応の問題があった。"},
  {id:9, chapter:1, text:"EAP（Employee Assistance Programs）は、1940年代のアメリカにおいて従業員の薬物依存、アルコール依存による企業損失の対策として始まった。", answer:true, explanation:"EAPは1940年代のアメリカで、従業員の薬物依存・アルコール依存による企業損失の対策として始まった取り組みである。国際EAP協会によると、現在のEAPは①生産性にかかわる職場組織の取り組み、②社員の個人的問題の発見と解決、の2点を援助するプログラムとして定義されている。"},
  {id:10, chapter:1, text:"EAP（Employee Assistance Programs）は、生産性にかかわる職場組織の取り組み、社員の個人的問題の発見と解決の2点を援助するものである。", answer:true, explanation:"国際EAP協会によると、現在のEAPは設問のとおりのプログラムとして定義されている。面接相談にとどまらない幅広い産業ニーズに応えるところにEAPの特徴がある。"},
  {id:11, chapter:1, text:"日本におけるEAP（Employee Assistance Programs）は、メンタルヘルス問題との関係で注目されており、産業カウンセラーは、EAPサービスとの関りが増している。", answer:true, explanation:"厚生労働省は2006年「労働者の心の健康の保持増進のための指針」において心の健康づくり計画と4つのケアについての指針を示した。この中で、事業場内に相談窓口を設置できない場合、事業場外資源として「登録相談機関」EAPの利用が示された。"},
  {id:12, chapter:1, text:"ADR（Alternative Dispute Resolution）は、産業カウンセラーの新たな活躍が求められる領域で、裁判（訴訟）以外での民事による簡易な手続きを指す。", answer:false, correction:"民事による簡易な手続き → 紛争解決手続き", explanation:"2007年「労働審判法」および「裁判外紛争解決手続きの利用促進に関する法律（ADR促進法）」が施行され、一定の条件を満たす機関を認証する制度がつくられた。ADRは裁判（訴訟）以外での紛争解決手続きを指す。日本産業カウンセラー協会が設置するADRセンターも2008年に法務省の認可を受け「対話促進型調停」を行っている。"},

  // ===== 第2章 産業カウンセラーの役割と活動 (13-40) =====
  {id:13, chapter:2, text:"産業カウンセリングの対象は、産業の場で働いている人に限定される。", answer:false, correction:"産業の場で現に働いている人に限定される → 働いていない人や家族も対象となる", explanation:"「働く人々」をより具体的にいうと、一般従業員だけでなく管理職、経営者などのトップ層も含まれる。立場は違ってもさまざまな心の問題を抱えていることは同じである。現に働いている人だけでなく、働くことを求めている人も対象とし、さらにはそれらの人々の家族も対象にしている。"},
  {id:14, chapter:2, text:"産業カウンセリングの目的の1つは、働く人個人が「心身ともに健康で、それぞれの個性と役割が十分に発揮されるよう支援する」ことである。", answer:true, explanation:"産業カウンセリングの目的の1つは、働く人の一時的な不適応の解消を図るだけでなく、人生のさまざまな局面で直面する問題に対し、働く人が自律・自立して対応できるように支援することである。"},
  {id:15, chapter:2, text:"職場におけるいじめ・いやがらせ・差別などの人権問題や、過重労働を引き起こす組織文化や風土を改善することは、産業カウンセリングの対象ではない。", answer:false, correction:"対象ではない → 対象とする", explanation:"設問内容は産業カウンセリングの目的の1つであり対象とする。個人の問題と不可分であることが多い組織に対して、職場におけるいじめ・いやがらせ・差別などの人権問題、長時間労働や過重労働などの問題を引き起こす組織文化や風土、組織システムを改善し、個人・集団・組織の「共生関係」を成長・発展させる支援を行うことまで含まれる。"},
  {id:16, chapter:2, text:"産業カウンセラーの呼称は、商標登録されているため、産業カウンセラーを呼称して活動するには、資格登録が必要となる。", answer:true, explanation:"産業カウンセラーを呼称して活動するには資格登録を行うことが必要である。"},
  {id:17, chapter:2, text:"産業カウンセラーは、人間尊重を基本理念として個人の尊厳と人格を最大限に尊重し、深い信頼関係を築いて勤労者に役立つことを使命としている。", answer:true, explanation:"産業カウンセリングの基本理念を人間尊重としていることは、産業カウンセラー協会の倫理綱領の第1条（使命）にあり、「人間尊重」とは人は皆1人ひとり異なる存在であり、誰もが他に代えがたいものとしてとらえ、その1人ひとりの独自性を尊重し受けとめることである。"},
  {id:18, chapter:2, text:"産業カウンセラーは、社会的現象や個人的問題はすべて心のありようにより解決できるという立場をとっている。", answer:false, correction:"解決できるという立場をとっている → 解決できるという立場をとっていない", explanation:"産業カウンセラー倫理綱領第1条（使命）の2項では、産業カウンセラーは社会的現象や個人的問題はすべて心のありようにより解決できるという立場はとらず、勤労者の問題は勤労者をとりまく社会環境の在り方と関連していると捉える、と規定している。"},
  {id:19, chapter:2, text:"産業カウンセラーが、コンサルタントとしての役割を担う場合は、職場環境改善に関する情報や事例に精通し、改善するために情報提供をすることが求められる。", answer:true, explanation:"産業カウンセラーはコンサルタントとして、メンタルヘルス・キャリア形成・職場環境にかかわる企業内のプログラムや研修の改善、人事労務や安全衛生の仕組みの改善、職場風土の改善などの相談にのり対応策を提案するなど、情報提供する役割も求められる。"},
  {id:20, chapter:2, text:"産業カウンセラーが専門家として果たすべき役割・機能は、契約や立場によって限定されることもあるので、明確に契約しておく必要がある。", answer:true, explanation:"産業カウンセラーの雇用形態は極めて多様である。特に組織とのかかわりの強い役割を担う場合は、設問のようにその組織との契約関係などによって立場上の限定があることをわきまえ、明確に契約しておく必要がある。産業カウンセラーの役割について組織側に十分認識がない場合もある。日頃より産業カウンセラーの専門的役割についてPRや関係者との信頼関係を築いておく必要もある。"},
  {id:21, chapter:2, text:"産業カウンセラー協会では、「キャリア開発」、「組織開発」とともに、人間関係をより望ましいものに変革し発展させる「人間関係開発」を重視している。", answer:true, explanation:"「人間関係開発」という用語は、産業カウンセラー協会特有の用語で「キャリア開発」や「組織開発」と同様に、人間関係をより望ましいものに変革し発展させるといった意味合いの言葉である。"},
  {id:22, chapter:2, text:"職場における人間関係は、職場を構成する人々の間に人為的あるいは自然発生的に形成され、維持される人と人とのつながり、かかわりである。", answer:true, explanation:"「職場における人間関係」は、職場を構成する人々の間に人為的あるいは自然発生的に形成され維持される人と人とのつながり、かかわりである。その関係は構成する人々が心に抱く特定の感情、気分、意思などと、それにもとづく言動によって形成される。"},
  {id:23, chapter:2, text:"産業カウンセラーは、組織の各種担当者との関係の中で活動するので人間関係の形成・維持・発展に関する理論と技法を習得する必要がある。", answer:true, explanation:"産業カウンセラーは組織の各種担当者との関係の中で活動する上で、働く人を取り巻く社会・経済的状況と職場環境の急激な変化の影響により人間関係の希薄化などがストレスの一大要因となっていることや、人間関係の形成・維持・発展とそのツールとしてのコミュニケーションに関する理論と技法を習得することは必須である。"},
  {id:24, chapter:2, text:"産業カウンセラーが教育訓練に携わる場合の役割には、一般的に、①企画・評価をする（プランナー）、②調整・まとめをする（コーディネーター）、③教授・指導・促進の役割がある。", answer:true, explanation:"産業カウンセラーが教育訓練に関わる時には、その組織における立場・役割によって異なるが、組織の依頼を受けて教育訓練の支援に携わる際の役割には設問の3つが考えられる。"},
  {id:25, chapter:2, text:"組織の依頼を受けて教育研修を実施するにあたって、産業カウンセラーは、実際の研修会の運営全体のマネジメントを行い、すべてを引き受けていく姿勢が大切である。", answer:false, correction:"すべてを引き受けていく姿勢が大切である → 組織が主体的に判断し、取り組むことを促進する姿勢が必要", explanation:"産業カウンセラーは教育訓練に関して専門的な提案やアドバイスができるレベルは必要で、組織から信頼されることは必要であるが、組織が継続的に教育施策を展開できるように組織の側が主体的に判断し取り組むことを促進する姿勢も必要である。"},
  {id:26, chapter:2, text:"バーク（Burke, W. W.）は、組織開発には経営学などの理論や技法を駆使することは必要だが、心理学、社会学、人類学、精神医学などのアプローチは必要ないと述べている。", answer:false, correction:"アプローチは必要ない → アプローチを駆使する", explanation:"バークは「組織開発とは、行動科学の技法、リサーチおよび理論を活用して、組織文化のなかで起こす計画的な変革プロセスである」とし、心理学、社会学、人類学、精神医学、経営学などの理論や技法を駆使するアプローチは必要と述べている。"},
  {id:27, chapter:2, text:"教育訓練の方法には、受講者が能動的に参加して行動した結果をふり返って学ぶ、ロールプレイなどの体験学習もある。", answer:true, explanation:"職場における人間関係開発に関する支援活動において、産業カウンセラーに期待される役割に教育訓練がある。この教育訓練における教育方法には、さまざまなものがある。設問にあるロールプレイはさまざまな教育訓練で用いられている。"},
  {id:28, chapter:2, text:"教育方法のうち、訓練の目標や課題のポイントとなる部分で演技を一時中断して、ふり返りを行い、望ましい言動を検討する研修法は、サーベイ・フィードバック法といわれる。", answer:false, correction:"サーベイ・フィードバック法 → ロールプレイング", explanation:"設問はロールプレイングの説明である。サーベイ・フィードバック法は、客観的な調査データに基づいて課題を解決するもので、組織開発の技法の1つ。組織の構成員に組織や職場の風土、仕事に関する調査（サーベイ）を行い、その結果を構成員にフィードバックし、職場の問題点や個人の課題などを見出す議論をし改善を図る方法である。"},
  {id:29, chapter:2, text:"教育訓練の評価のうち、形成的評価の機能は、研修会などの終了時にどの程度学習が進んだか、満足したかの評価をし、今後の研修会の展開や教授法などを改善したり、フォローアップの必要性を判断することである。", answer:false, correction:"形成的評価 → 総括的評価", explanation:"設問は教育訓練の評価の機能のうちの総括的評価に該当するもので、形成的評価とは研修会などの進行中に随時、受講者などの反応を評価して展開を変更し改善するものである。"},
  {id:30, chapter:2, text:"職場における人間関係開発の分野の教育訓練で、産業カウンセラーに期待される主なテーマとして、人間関係、対人コミュニケーション、自己理解、リーダーシップ、ワーク・モチベーション、組織開発などがある。", answer:true, explanation:"職場における人間関係開発の分野の教育訓練で、産業カウンセラーに期待される主要なテーマは設問のとおりである。"},
  {id:31, chapter:2, text:"労働安全衛生法が1992年改正され、「事業主は快適な職場環境を形成するよう努めなければならない」とされ、作業環境や作業方法の改善をはじめとする職場のソフト面の改善が推進されてきた。", answer:false, correction:"ソフト → ハード", explanation:"近年、急激に産業構造が大きく変わり、職場で働く人にさまざまな影響を及ぼしている。1992年、このような状況を軽減し快適な職場を形成していくために労働安全衛生法が改正された。この中で作業環境や作業方法の改善をはじめとする職場のハード面の改善が推進されてきた。"},
  {id:32, chapter:2, text:"快適職場調査（ソフト面）の調査票のチェック項目は、キャリア形成・人材育成、人間関係、仕事の裁量性、処遇、社会とのつながり、休暇・福利厚生、労働負荷の7つの領域からなっている。", answer:true, explanation:"快適職場づくりは当初ハード面の改善が進められたが、ソフト面も考慮した総合的な快適職場づくりが必要とされることを受けて「快適職場調査（ソフト面）調査票」が作成された。その項目は設問のとおり。"},
  {id:33, chapter:2, text:"職場環境改善における産業カウンセラーの役割に組織トップ層へのコンサルテーションがあるため、産業カウンセラーは実施推進チームでは責任者の機能を担うのが望ましい。", answer:false, correction:"責任者の機能を担う → アドバイザーとして位置づけてもらう", explanation:"産業カウンセラーの役割は組織のトップなどへのコンサルテーション、関係者間のコーディネーション、グループ討議のファシリテーションがあるが、これらは組織や職場の要請に応じた側面的な支援である。産業カウンセラーは実施推進チームにおいてのアドバイザーとして位置づけられる。"},
  {id:34, chapter:2, text:"メンタルヘルス対策については、第1次予防、第2次予防、第3次予防のそれぞれの次元で個人・集団・組織を支援することが有効とされる。", answer:true, explanation:"産業カウンセラーの支援活動領域の1つに「メンタルヘルス対策への支援」がある。メンタルヘルス対策については、第1次予防、第2次予防、第3次予防のそれぞれの次元で個人・集団・組織を支援することが有効とされる。"},
  {id:35, chapter:2, text:"ストレスチェック制度において産業カウンセラーは、実施者にはなれず、高ストレス者選定の補足的面接にも携わることはできない。", answer:false, correction:"携わることはできない → 携わることはできる", explanation:"2015年より実施されたストレスチェック制度は第1次予防の施策である。産業カウンセラーはこのストレスチェック制度の実施者にはなれないが、高ストレス者選定の補足的面談、結果通知後の相談対応、分析結果に基づく職場環境改善について携わることはできる。"},
  {id:36, chapter:2, text:"メンタルヘルス対策のうち、第1次予防は、メンタルヘルス不調者の早期発見と早期対処を行うことである。", answer:false, correction:"早期発見と早期対処 → 不調者を生じさせないための対策", explanation:"設問は第2次予防の説明である。第1次予防は、メンタルヘルス不調者を生じさせないための対策を行うことである。"},
  {id:37, chapter:2, text:"メンタルヘルス対策のうち、第3次予防は、職場復帰支援・再発防止についての対処を行うことである。", answer:true, explanation:"第3次予防とは設問のとおりである。休職者などのスムーズな職場復帰を図ることであり、職場復帰プログラムにもとづいて休職者や復帰者との面談やストレス対応に関する教育・研修、復帰職場の管理監督者のコンサルテーションなどを行うことである。"},
  {id:38, chapter:2, text:"「労働者の心の健康の保持増進のための指針」では、セルフケア、事業場内産業保健スタッフ等によるケア、事業場人事労務部門によるケア、事業場外資源によるケアの4つが示されている。", answer:false, correction:"人事労務部門 → ライン", explanation:"「労働者の心の健康の保持増進のための指針」で示された4つのケアとは、①セルフケア、②ラインによるケア、③事業場内産業保健スタッフ等によるケア、④事業場外資源によるケアである。セルフケアは労働者自らのストレス状態を知りそれに適切に対処する取り組みで、ラインによるケアとは管理監督者による職場環境の評価と改善、部下からの相談への適切な対応などである。"},
  {id:39, chapter:2, text:"キャリア形成支援の背景には、高度経済成長期後、仕事を通して自分の人生をふり返り、再構築することにうまく対応できず、雇用や生活設計の不安などを訴える人々の増加がある。", answer:true, explanation:"キャリア形成支援の背景には、産業構造の急激な変化、労働者の意識の多様化や労働移動の増加、企業の内外を問わず通用する能力が労働者側に求められるようになり、仕事を通しての自分の人生をふり返り再構築することにうまく対応できず雇用や生活設計の不安などを訴える人々が増加してきたことを挙げることができる。"},
  {id:40, chapter:2, text:"産業カウンセラーが企業から期待されることのひとつに、管理職や従業員に対して、人間関係やコミュニケーション、リーダーシップに関する知識や技能をトレーニングすることがある。", answer:true, explanation:"産業カウンセラーの活動領域に「職場における人間関係開発・職場環境改善への支援」がある。企業などの組織が産業カウンセラーに期待するのは設問のとおりである。この支援を行うにあたり、産業カウンセラーは産業組織心理学やグループ・ダイナミックスの知識とさまざまなトレーニング手法についても身に付けておく必要がある。"},

  // ===== 第3章 活動規範・倫理 (41-61) =====
  {id:41, chapter:3, text:"産業カウンセラーが遵守すべき事項の中核となるものは、守秘義務、プライバシーの保護、個人情報管理である。", answer:true, explanation:"産業カウンセラーが遵守すべき事項の中核となるものは設問のとおりである。守秘義務とは業務上あるいは職務上知り得た秘密を他に漏らさないようにすることである。プライバシーの保護の具体的内容は自己情報のコントロール権を守ることである。個人情報管理とは自己情報の権利を守るために必要な行為を明示し、それを実行することである。"},
  {id:42, chapter:3, text:"労働契約や委任契約などを締結した当事者が、これらの契約にもとづいて負う民事上の守秘義務は、産業カウンセラーにもかかっている。", answer:true, explanation:"労働契約や委任契約などを締結した当事者がこれらの契約にもとづいて負う民事上の守秘義務がある。産業カウンセラーにもこの民事上の守秘義務はかかっている。"},
  {id:43, chapter:3, text:"産業カウンセラーは、職務上知ることのできた秘密を正当な理由なく漏らしてはならないと倫理綱領で守秘義務を課している。この正当な理由とは、クライエントに自傷・他害のおそれがあることおよび重大な不法行為のおそれがあることなどである。", answer:true, explanation:"産業カウンセラー倫理綱領は、危機への介入として設問のような危険を感知した場合、速やかにその防止に努めなければならないとしている。この行為は、それが緊急に求められ、それによりクライエントまたは被害者の安全等の利益が他に優越して守られる場合は正当な行為として許される。情報開示する際にはクライエントの不利益を最小限に抑えることが必要である。"},
  {id:44, chapter:3, text:"事業者から安全配慮義務の履行に必要であるとの理由で相談内容の開示を求められた場合、産業カウンセラーは、相談内容を一切漏らしてはいけない。", answer:false, correction:"一切漏らしてはいけない → 一定の条件下で許容している", explanation:"産業カウンセラー倫理綱領では事業者の安全配慮義務への協力を規定している。事業者から相談内容について開示を要求された場合、開示資料の使用目的が健康管理上必要・不可欠なものかを吟味した上で判断し、双方の利害対立を調整する。相談内容を開示する場合には、クライエントの同意の上、目的の正当性、手段の必要性、開示方法・内容の妥当性の条件を満たさなければならない。"},
  {id:45, chapter:3, text:"OECD（経済協力開発機構）は、1980年、加盟国に対し「プライバシー保護と個人データの国際流通についてのガイドライン」で、プライバシーと個人の自由保護に係わる原則8項目を、国内法で考慮することを求める勧告を行った。", answer:true, explanation:"OECDが1980年に行った勧告付属文書のガイドラインに示されたのは、1）収集制限の原則、2）データ内容の原則、3）目的明確化の原則、4）利用制限の原則、5）安全保護の原則、6）公開の原則、7）個人参加の原則、8）責任の原則の8項目で、加盟国の国内法の中で考慮することを求めた。現在、この8項目がプライバシー保護に関する国際的なスタンダードとしてシェアされている。"},
  {id:46, chapter:3, text:"個人情報保護法は、個人情報の適正な取扱いに関し、基本理念及び政府による基本方針の作成その他の個人情報の保護に関する施策の基本となる事項を定め、国及び地方公共団体の責務等を明らかにし、個人情報を取り扱う事業者及び行政機関等について遵守すべき義務等を定めている。", answer:true, explanation:"2015年の改正では、法律の目的に「個人情報の有用性に配慮しつつ、個人の権利利益を保護すること」が追加され、取扱う個人情報の数が5,000人以下である事業者もすべて規制の対象となった。"},
  {id:47, chapter:3, text:"個人情報保護法によれば、個人情報は①氏名、生年月日その他の記述等か、②個人識別符号が含まれるもの、のいずれかに該当するものと定義されているが、健康情報は含まれていない。", answer:false, correction:"含まれていない → 含まれている", explanation:"「健康情報」は健康診断の結果や従業員の健康確保措置のための活動を通じて得られる従業員の心身の状態に関する情報のうち「要配慮個人情報」に該当するものをいう。2017年に行われた個人情報保護法改正により、個人情報の中に新たに「要配慮個人情報」というカテゴリーが設けられ、不当な差別、偏見その他不利益が生じないようにその取扱いに特に配慮を要するとされている。"},
  {id:48, chapter:3, text:"日本産業カウンセラー協会が考える人間尊重とは、人は皆1人ひとり異なる存在であり、誰もが他に代えがたいものとしてとらえ、その1人ひとりの独自性を尊重し、受けとめることである。", answer:true, explanation:"産業カウンセラー倫理綱領第1条（使命）では、産業カウンセラーは人間尊重を基本理念として個人の尊厳と人格を最大限に尊重し、深い信頼関係を築いて勤労者に役立つことを使命とする、と規定している。この「人間尊重」とは、人は皆1人ひとり異なる存在であり、誰もが他に代えがたいものとしてとらえ、その1人ひとりの独自性を尊重し受け止めることである。"},
  {id:49, chapter:3, text:"産業カウンセラーは、カウンセリング関係において潜在的に強者・弱者の立場が生ずる非対称性が存在することを認識しておくことが重要である。", answer:true, explanation:"産業カウンセラーはカウンセリングの実践にあたり、設問のように潜在的に力の非対称性が存在することを認識することが重要である。産業カウンセラーが無意識のうちにクライエントを支配、管理するという事態が生じていないかを点検し、この点への気付きをよくするには第三者の目を借りることが有用で、事例検討やスーパービジョンを活用するとよい。"},
  {id:50, chapter:3, text:"産業カウンセラーは、自分の能力の限界を超えたとしても、クライエントからの要求にはすべて対応しなければならない。", answer:false, correction:"すべて対応しなければならない → 限界をわきまえて対処する", explanation:"産業カウンセラー倫理綱領では実践能力とその限界として、産業カウンセラーは自己の受けた教育、訓練、職業経験などに基づいた支援の専門家としての能力の限界をわきまえ実践する、とし、限界を自覚した場合は適切なスーパービジョンあるいは他の分野の専門家に助言を求め、クライエントの同意を得て他の専門家を紹介することを規定している。"},
  {id:51, chapter:3, text:"産業カウンセラーは、クライエントにカウンセリングの役割、自己の背景、料金、時間と終結、中断とリファー、守秘の本質・目的と限界について、十分に説明したうえで同意を得て、カウンセリングを進める必要がある。", answer:true, explanation:"設問のとおり。カウンセリングの初期もしくは必要な段階において、クライエントに十分に説明したうえで同意を得ることをインフォームド・コンセントという。"},
  {id:52, chapter:3, text:"インフォームド・コンセントは、必ず、面接の冒頭で場面構成として行わなければならない。", answer:false, correction:"必ず面接の冒頭で行わなければならない → 面接の冒頭で行うことが原則", explanation:"インフォームド・コンセントは面接の冒頭で場面構成として行うことが原則であるが、クライエントの状況、理解度、面接の進行に応じて変わる部分もあるので、すべてを冒頭で行う必要はない。"},
  {id:53, chapter:3, text:"カウンセリングの中断・リファーはクライエントを傷つける可能性がある。カウンセラーは、何故、中断・リファーするのかクライエントが理解し同意できるように丁寧に説明しクライエントの不安の解消に努める。", answer:true, explanation:"カウンセリングの中断・リファーに関しては、カウンセリング契約の内容にかかわることである。クライエント自身の意思や自己決定を尊重することを確実に伝えなければならない。クライエントの状況、理解度、面接の進行度に応じて設問のようにかかわることが求められる。"},
  {id:54, chapter:3, text:"二重関係あるいは多重関係は、カウンセラーとクライエントの両者の基本的なあり方に大きな影響を与え、産業カウンセラーの正確な判断を阻害することにつながる。", answer:true, explanation:"カウンセリングを進める上で、クライエントとの基本的な関係とは別の家族的、社交的、金銭的などの個人的関係およびビジネス的関係などを二重関係あるいは多重関係という。この関係は両者の基本的な関係のあり方に大きな影響を与え、産業カウンセラーの正確な判断を阻害し、クライエントの利益を損なうことにつながるので、この関係を避けるように努める。"},
  {id:55, chapter:3, text:"産業カウンセラーが職場組織への働きかけを行う調整役になった場合は、中立の立場で、クライエントの不利益を最小限に抑えるように配慮しなければならない。", answer:true, explanation:"産業カウンセラーは職場組織とかかわる際は相談担当者であると同時に職場の調整者でもある。管理監督者の話を聴くときの立ち位置は中立である。事業者が行う安全配慮義務履行のために協力する場合であっても、事業者と個々の労働者の利害が衝突することもありうる。中立を維持しながらも可能な限りクライエントの不利益を最小限に抑えるよう配慮しながら調整を行う。"},
  {id:56, chapter:3, text:"安全配慮義務を履行するために、面接で得られたクライエントの情報を提供する場合、産業カウンセラーは、クライエントの同意を得る必要はない。", answer:false, correction:"必要はない → 必要がある", explanation:"事業者から安全配慮義務を履行するにあたって面接で得られたクライエントの情報を求められ、提供する場合は必要性とその使途を明確にした上で、それが十分合理性のあるものであれば、可能な限りクライエントの同意を得た上で情報提供を行う。"},
  {id:57, chapter:3, text:"産業カウンセラーは、事業者が安全配慮義務を果たすうえで、労働者がカウンセリングを受けることの必要性と重要性について事業者が理解を深められるよう、協力する。", answer:true, explanation:"産業カウンセラー倫理綱領第20条には安全配慮義務への協力として記載されている。"},
  {id:58, chapter:3, text:"現場経験の豊富な産業カウンセラーは、安定したカウンセリングができるので、更なる研鑽を行う必要はない。", answer:false, correction:"必要はない → 必要がある", explanation:"産業カウンセリングの場面では自分の能力を超えるような厳しい現実に直面することもある。産業カウンセラーにはこうした事態でも安定したカウンセリングができるようになることが求められている。そのためには現場体験を増すことと同時に、日常的な自己研鑽を継続して行い、能力の向上に努める必要がある。"},
  {id:59, chapter:3, text:"善管注意義務とは、民法第644条に「受任者は委任の本旨に従い善良な管理者の注意をもって委任事務を処理する義務を負う」と規定されているものであり、産業カウンセラーもその義務を負う。", answer:true, explanation:"産業カウンセラーは善管注意義務を負っている。産業カウンセラーの場合、委任者はクライエントもしくは企業で、その本旨はカウンセリングを適切に実施することである。注意義務が果たせていないと民法上の注意義務違反が生じ、委任者から民事訴訟による損害賠償訴訟が提起される可能性がある。"},
  {id:60, chapter:3, text:"教育訓練における必要な教材や資料の作成にあたって、講義や演習に必要な補助資料として、新聞記事や統計資料などを用いる場合があるが、それらの使用に際しては、著作権者の承諾などの必要な手続きを取る必要がある。", answer:true, explanation:"設問のとおり。著作権のある著作物を無断で利用をすると著作権侵害となる。"},
  {id:61, chapter:3, text:"産業カウンセラーは、社会的・文化的・歴史的に形成された性差（ジェンダー）が固定化する慣行を見直す視点で行動する。", answer:true, explanation:"設問のとおり。産業カウンセラー倫理綱領第4条2項に基本的立場として記載されている。"},

  // ===== 第4章 産業組織と人事労務管理 (62-115) =====
  {id:62, chapter:4, text:"テイラー（Taylor, F. W.）は、「マネジャーの新しい任務」として、作業の科学的基準の設定、労働者の科学的選考と育成、労働者との親密な協力関係の構築、マネジャーと労働者との職務内容の分離・明確化を挙げ、マネジメントに科学的手法を導入した。", answer:true, explanation:"テイラーは、「マネジメントの目的は、雇用主に限りない繁栄をもたらし、かつ働き手にも最大限の豊かさを届けることである」とし、効率を追求して生産高を最大限に増やすように作業の仕方を科学的に定め、それが実行できるよう労使が密接に協力し合う「温かい協力関係」が不可欠であるとし、「マネジャーの新しい任務」として設問にある4つを提案した。"},
  {id:63, chapter:4, text:"ウェーバー（Weber, M.）は、定められた規則などの合理的・合法的な権威による組織（近代「官僚制組織」）が、「技術的に考えうるもっとも能率的な組織形態」であるとした。", answer:true, explanation:"ウェーバーは、人が人を支配すること、特に組織の権力と権威についての研究を行った。その結果、設問のとおりであるとした。"},
  {id:64, chapter:4, text:"ホーソン工場で行われた実践的な研究の一つに従業員面接調査があった。面接の担当者が従業員と直接面接することから「直接的方法」と呼ばれた。", answer:false, correction:"直接的方法 → 間接的方法", explanation:"ホーソン研究の代表的なものの1つに、従業員面接調査がある。管理監督方法、作業条件、職務などについて従業員の意見を集める目的で面接が行われた。面接担当者は、従業員に発言内容の秘密を厳守することを伝え、発言に対して意見やアドバイスを言わずに辛抱強く友好的に接するという「間接的方法」をとった。"},
  {id:65, chapter:4, text:"ホーソン工場で行われた実践的な研究結果から、メイヨー（Mayo, G. E.）、レスリスバーガー（Roethlisberger, F. J.）らは、組織で働く人間は、社会的（相互関係的）な存在であり、その行動は公式集団の規範によって規制されるとした。", answer:false, correction:"公式集団の規範 → 非公式集団の規範", explanation:"ホーソン研究における一連の結果から、メイヨー、レスリスバーガーらは、組織で働く人間は、社会的（相互関係的）な存在であり、その行動は非公式集団の規範によって規制されるとした。また、経済的条件以外に感情的側面によって動機づけられるとした。"},
  {id:66, chapter:4, text:"メイヨー（Mayo, G. E.）らは、ホーソン研究の結果から、従業員を意欲的にするには、マネジャーが人間関係や個人の状況に対処する能力を身につけ、人事労務的な施策を整えなければならないとした。", answer:true, explanation:"ホーソン研究の結果から、従業員を意欲的にするために、マネジャーは、従業員の人間関係や個人の状況に対処する能力（行動理解、動機づけ、助言、指導、コミュニケーションなど）を身につけ、人事労務的な施策を整えなければならないとした。このような考え方は「人間関係論」と称され、その発想に基づいて、管理者研修、モラール・サーベイ、人事相談などのさまざまな施策が行われた。"},
  {id:67, chapter:4, text:"マーレイ（Murray, E. J.）は、人の行動の動機には内発的動機づけと外発的動機づけの2種類があるとした。", answer:true, explanation:"マーレイは、人の行動の動機には、外発的動機づけ（外からの報酬が目的で行動は手段）と内発的動機づけ（行動自体から得られる達成感や成長感が目的）の2種類があるとした。両者の関係は相互に影響しやすくきわめて微妙なものであり、明確に分けられるものではない。産業界、教育界においても、この両者の関係を考慮しながら、内発的動機づけを高めることが望ましいとされている。"},
  {id:68, chapter:4, text:"外発的動機づけでは、報酬がなくなる、あるいはその魅力がなくなると意欲や行動は起きにくくなるが、内発的動機づけでは、たとえ結果はうまくいかなくても行動の過程にポジティブな感情が伴うので意欲や行動は維持しやすいとされる。", answer:true, explanation:"企業内でのキャリアや生活の見通しの保証を報酬にして、従業員に心理的な安定をもたらし、組織へのコミットメントを強め、意欲を高めることは、外発的動機づけの一例である。一方で、生産性を上げるためには、従業員の自発的に行動しようとする内発的動機づけが重要とされ、それを発揮させるように多くの内発的動機づけ策が考えられている。"},
  {id:69, chapter:4, text:"マズロー（Maslow, A. H.）は、欲求階層理論で「人間は、人類に普遍的で、発生的、本能的な起源をもつ基本的な欲求によって動機づけられている」とした。", answer:true, explanation:"マズローの欲求階層理論は設問のとおりである。この欲求は、「生理的欲求」「安全の欲求」「所属と愛情の欲求」「尊重（承認）の欲求」「自己実現の欲求」の5つである。この理論では、人間のポジティブな成長志向性を基調に、5つの基本的欲求を階層として整理し、人間の欲求は重層的でかつ順序性があると提起した。"},
  {id:70, chapter:4, text:"マズロー（Maslow, A. H.）の欲求階層理論によれば、下層の欲求がある程度充足されると上層の欲求が活性化するが、下層の欲求の動機づけの機能は薄れることはない。", answer:false, correction:"薄れることはない → 薄れる", explanation:"マズローの欲求階層理論では、生理的欲求を基礎とする階層をなしており、下層の欲求がある程度充足されて初めて上層の欲求が活性化するが、「自己実現の欲求」以外は、ある程度充足されるとその動機づけの機能は薄れるとした。"},
  {id:71, chapter:4, text:"アルダーファ（Alderfer, C. P.）は、欲求を現実的な視点から「生存欲求」「関係欲求」「成長欲求」の3つの次元にまとめた。", answer:true, explanation:"アルダーファは、より現実的な視点から、マズローの欲求階層理論を修正したERG理論を提起した。要点は、「生理的欲求」と「安全の欲求」を【生存欲求】に、「所属と愛情の欲求」と「尊重（承認）の欲求」を【関係欲求】に、「自己実現の欲求」を【成長の欲求】にと、欲求の階層を3つにまとめた。"},
  {id:72, chapter:4, text:"マグレガー（McGregor, D.）は、人間は生来、働くことが嫌いで、できれば働きたくないと思っている、という考えを「Y理論」と呼んだ。", answer:false, correction:"Y理論 → X理論", explanation:"設問は、マグレガーのX理論の説明である。Y理論では、働くことは人間の本性であり、条件次第で満足感の源になる、というものである。マズローの理論を組織の人的資源管理に適用したのがマグレガーのX理論、Y理論である。"},
  {id:73, chapter:4, text:"マグレガー（McGregor, D.）の「X理論」は、魅力的な目標と適切な条件で責任を与えることにより、従業員は目標達成と組織の成功に向けて献身的に取り組むようになる、という考え方が前提となっている。", answer:false, correction:"X理論 → Y理論", explanation:"設問は、マグレガーのY理論の考え方である。Y理論は、マズローの欲求階層における高次の欲求（尊重の欲求、自己実現の欲求）を多く持つ人間のモデルである。なお、X理論は欲求階層における低次の欲求（生理的欲求、安全の欲求）を多く持つ人間のモデルであり、この人間観に基づく経営管理の基本原則は、命令や強制による管理、目標未達に対する罰、厳密な進捗管理などである。"},
  {id:74, chapter:4, text:"マクレランド（McClelland, D. C.）は、仕事意欲に関わる欲求として、「達成欲求」「権力欲求」「親和欲求」に注目した。", answer:true, explanation:"マクレランドが、マーレイ（Murray, H. A.）によって作成された30数項目の社会的欲求リストから、仕事意欲にかかわる欲求として3つの欲求に注目したのは設問のとおりである。達成欲求は、ある目標に対して十分に達成し成功しようと努力したいという欲求。権力欲求は、人に働きかけて影響力を行使しコントロールしたいという欲求。親和欲求は、人に好かれ受け入れてもらい、親密な関係を求める欲求である。"},
  {id:75, chapter:4, text:"ハーズバーグ（Herzberg, F.）は、仕事への適応をより高めるためには、不満足の解消だけではなく、満足を充足できるように管理方法を改善する必要があるとして、「衛生要因」を組み込んだ職務充実を提唱している。", answer:false, correction:"衛生要因 → 動機づけ要因", explanation:"ハーズバーグは、面接調査した結果から、働く人をより高い業績に動機づけるという意味で「動機づけ要因」、仕事への不満を予防する働きをするという意味で「衛生要因」と名づけた。仕事への適応をより高めるためには、不満足の解消だけではなく、満足を充足できるよう管理方法を改善する必要があるとし、「動機づけ要因」を組み込んだ職務充実を提唱している。"},
  {id:76, chapter:4, text:"ハックマン（Hackman, J. R.）らは、個人を内発的に動機づける潜在的可能性をもつ職務の特性として、多様性、完結性、有意義性、自律性、フィードバックの5つを抽出した。", answer:true, explanation:"ハックマンらは、ハーズバーグの動機づけ要因の研究を発展させ、個人を内発的に動機づける潜在的可能性をもつ職務の特性を明らかにし、それに基づいて職務の診断や再設計を行おうとした。そして、5つの職務特性を抽出し、これらが個人に心理的影響を与え、結果として、動機づけ、仕事の質、満足感が高まり、欠勤や離職を少なくするとした。"},
  {id:77, chapter:4, text:"コーチングの基本は、クライエントとの信頼関係を構築し、潜在的な能力に気づかせ、それを問題解決の戦略や戦術に結びつけ、組織の中でより効果的に行動できるようサポートすることである。", answer:true, explanation:"コーチングの基本は、コーチがクライエントとの信頼関係を築き、積極的傾聴や質問などによって潜在的な能力に気づかせ、それを問題解決の戦略や戦術に結びつけ、組織の中でより効果的に行動できるように援助的にサポートすることである。"},
  {id:78, chapter:4, text:"ワーク・エンゲージメントとは、仕事に熱心に取り組み、誇りを持ち、仕事から活力を得ていきいきと働く状態であり、メンタルヘルスや生産性に影響を与えるものである。", answer:true, explanation:"近年では、労働者のウェルビーイングが注目されており、個々人がより幸せに、働きがいを感じることのできる働き方が求められるようになっている。ワーク・エンゲージメントは、活力、熱意、没頭を構成要素とし、個人の資源（楽観性など）と仕事の資源（仕事の意義など）から影響を受けている。"},
  {id:79, chapter:4, text:"ドラッカー（Drucker, P. F.）は、人間のある時の行動は、その人の個人特性とそのときの環境や状況の関数としてとらえるべきであると考えた。", answer:false, correction:"ドラッカー（Drucker, P. F.） → レヴィン（Lewin, K.）", explanation:"レヴィンは、人間の行動（Behavior）は、個人特性（Person）と「対象や相手や状況」（Environment）との力学的な相互影響関数（function）の結果であると考え、この関係をB=f（P, E）と公式化した。"},
  {id:80, chapter:4, text:"アクション・リサーチは、集団、組織、地域社会などのコミュニティで発生した諸問題の解決に向けて、研究者が現場担当者および課題を抱えている当事者と連携して協同作業を行う実践的研究法である。", answer:true, explanation:"集団における人間行動の法則を把握する方法として、実験室研究と実践研究がある。アクション・リサーチは、特定の現場が抱える問題の解決を目指して、解決策の仮説を立て、現場の従業員集団による実践を観察したり、そのときの従業員の心境や意識を質問したり、行動の結果を調査して効果検証をし、仮説に合わない結果が出た場合には再度仮説を修正・検証し直すなどして、実際に現場に役立つ方策を見出す実践的研究法である。"},
  {id:81, chapter:4, text:"集団で何かを決める場合、メンバーに課題を提起し自由に議論させてその結果をまとめて決めるより、リーダーが一方的に指示命令をして説得して決める方が、課題解決の実行度は高い傾向が認められる。", answer:false, correction:"高い → 低い", explanation:"グループ・ダイナミックス研究により、集団における人間行動についてさまざまな法則が見出されてきた。組織や集団で何か決めごとをする場合、リーダーが一方的に指示命令をしたり説得したりして決めるよりも、メンバーに課題を提起し自由に議論させ、その結果をまとめるほうが、その後の課題解決の実行度が高い傾向が認められる。これは、参加的意思決定の効果である。"},
  {id:82, chapter:4, text:"ハウス（House, R. J.）は、仕事が定型化されているほどフォロワーの内発的動機づけが生じにくくなるため、関係志向型リーダーシップよりも課題志向型リーダーシップが必要になると述べた。", answer:false, correction:"関係志向型リーダーシップ→課題志向型リーダーシップ、課題志向型リーダーシップ→関係志向型リーダーシップ", explanation:"ハウスは、リーダーシップに関する研究において、リーダーが置かれた状況における影響の次元から、パスゴール理論を唱えた。その中で、仕事が定型化（ルーティン化）されているほどフォロワーの内発的動機づけが生じにくくなるため、課題志向型リーダーシップよりも関係志向型リーダーシップが必要になると述べた。"},
  {id:83, chapter:4, text:"ケリー（Kelley, R.）は、フォロワーのあり方に注目し、そのタイプを「貢献力」と「批判力」の2軸で分類し、「模範型」「順応型」「孤立型」「消極型」「実務型」の5つのタイプに分けた。", answer:true, explanation:"リーダーシップとフォロワーシップの関係でフォロワーのあり方に注目したケリーは、ある組織集団の成果に対する貢献度の8割はフォロワーがカギを握っているとし、フォロワーのタイプを「貢献力」と「批判力」の2軸で分類し、設問のとおりフォロワーを5つのタイプに分けた。"},
  {id:84, chapter:4, text:"調査の方法には、既存データ調査、実験・テスト、観察、質的調査、量的調査の5種類がある。このうち、アンケートを用いてデータを集め、結果を数量的に分析するものは、質的調査である。", answer:false, correction:"質的調査 → 量的調査", explanation:"調査と呼ばれる方法には、設問のとおり5種類ある。このうち、アンケート（質問紙）を用いてデータを集め、結果を数量的に分析する方法は量的調査である。質的調査は、協力者に直接面接をして話を聞き、質的な分析をする調査方法である。"},
  {id:85, chapter:4, text:"面接調査の方法には、構造化面接、半構造化面接、非構造化面接があり、このうち、構造化面接は、あらかじめ用意した質問と回答選択肢を、定められた順番に読み上げたり示したりして協力者（回答者）に答えてもらう方法である。", answer:true, explanation:"設問のとおりである。構造化面接は、あらかじめ用意した質問と回答選択肢を、定められた順番に読み上げたり示したりして協力者（回答者）に答えてもらう方法である。質問フローが決まっているため、柔軟性はないが、標準化したデータを聴取することができる。"},
  {id:86, chapter:4, text:"半構造化面接により面接調査を実施する場合、調査目的に応じて質問すべき事項を設定するが、回答は協力者に自由に語ってもらい、その範囲内で質問の順番を変えたり、質問を変化させたりすることができる。", answer:true, explanation:"質的調査として面接調査があり、面接調査の方法には構造化面接、半構造化面接及び非構造化面接がある。半構造化面接においては、あらかじめ用意した質問事項とインタビューガイドに従って質問を行う。面接担当者は、面接の流れに合わせて質問の順番を変えたり、質問を変化させたりすることができるが、原則として準備した質問事項にはすべて回答してもらう。"},
  {id:87, chapter:4, text:"企業の組織形態で、製造、営業、研究開発等の機能別の組織のことをマトリックス組織という。", answer:false, correction:"マトリックス組織 → 機能別組織", explanation:"設問は、企業の組織形態のうち機能別組織の説明である。マトリックス組織とは、機能別組織と事業部組織を組み合わせた組織をいい、事業部組織とは、製品別、顧客別、地域別等々の事業部門に分かれた組織をいう。企業の組織形態として他に、単純・未分化組織、戦略的事業単位、分社化・カンパニー制度、社内ベンチャーなどがある。"},
  {id:88, chapter:4, text:"人事評価の要素として、「能力評価」や「情意評価」以外に、仕事の成果に結びつく行動特性を評価する「タスクフォース評価」などがある。", answer:false, correction:"タスクフォース評価 → コンピテンシー評価", explanation:"評価の要素としては、潜在能力、労働意欲、職務行動、仕事（遂行状況）、業績等がある。評価としては、能力評価、仕事に対する気持ちや思いを評価する情意評価、成果に結びつく行動特性を評価するコンピテンシー評価、職務評価、業績評価等がある。"},
  {id:89, chapter:4, text:"企業で導入されている評価方法で、上司からの評価だけでなく、部下や同僚からの評価も重要視する方法を「180度評価」という。", answer:false, correction:"180度評価 → 360度評価", explanation:"評価方法として360度評価を導入する企業も多い。多面評価と呼ばれることもあるが、これは上司、同僚、部下など、職場の関係者が広く評価に参加するものである。上司からの評価だけでなく、部下や同僚からの評価も重要であることから導入されている。"},
  {id:90, chapter:4, text:"人事評価においては、様々な偏りや誤りが生じるとされるが、特定の評価項目での印象などが、他の評価項目に影響してしまうことを「寛大化傾向」という。", answer:false, correction:"寛大化傾向 → ハロー効果", explanation:"設問はハロー効果の説明である。評価に関しては、偏りや誤りが生じることが知られている。ハロー効果、先入観による誤った評価、第一印象による評価、依怙贔屓など、評価を歪めてしまう要素がある。寛大化傾向は評価が甘くなり、実際よりも高く評価してしまうことをいう。"},
  {id:91, chapter:4, text:"評価者が自身の能力や業績と比較してしまい、評価が甘くなったり辛くなったりすることを「中央化傾向」という。", answer:false, correction:"中央化傾向 → 対比誤差", explanation:"設問は対比誤差の説明である。中央化傾向は、評価が真ん中に集中し、高い評価、低い評価が出にくくなることをいう。"},
  {id:92, chapter:4, text:"賃金の決め方に成果主義的な賃金制度として「年俸制」がある。年俸制を採用した場合、賃金は年1回一括して支払われる。", answer:false, correction:"年1回一括して → 分割し、月1回", explanation:"賃金は、年俸制の場合も、労働基準法により最低月1回の支払いが必要になるため、年俸額を分割して毎月、またボーナスとして支払うことになる。なお、年俸は本人と会社側の話し合いによって決められる。"},
  {id:93, chapter:4, text:"職能資格制度とは、従業員の仕事をする能力、職務遂行能力によって、従業員をランクに分け、それに応じて処遇を決める制度のことである。", answer:true, explanation:"職能資格制度でのランクが上がることが「昇格」で、役職が上がることを「昇進」という。職能資格制度では昇格によって給与が上がる。日本では職能資格制度が一般的で多くの会社や団体で行われている。"},
  {id:94, chapter:4, text:"会社や団体は従業員の能力開発のため、研修や訓練によって人材育成を行っている。日常の業務を行いながら、教育訓練を行うものをOff-JTという。", answer:false, correction:"Off-JT → OJT", explanation:"人材育成は研修、訓練によって行われるが、これにはOJT、Off-JTがある。設問は、OJT（On the Job Training）の説明である。Off-JT（Off the Job Training）は、一時的に通常の仕事を離れ、教育訓練を集中的に行うものである。"},
  {id:95, chapter:4, text:"法定労働時間を超える場合は、時間外・休日に関する労使協定を締結し、労働基準監督署に届け出なくてはならない。", answer:true, explanation:"法定労働時間を超える場合は、労働基準法第36条の定めにより、設問のとおり、労使協定を締結し、労働基準監督署に届け出なくてはならない。労使協定は「時間外労働協定」といい、労働基準法第36条に定めがあることから「サブロク協定」と呼ばれる。"},
  {id:96, chapter:4, text:"多様な働き方の1つにフレックスタイム制がある。これは、一定の条件下、始業時刻、終業時刻を労働者が自主的に決めることができるものである。", answer:true, explanation:"フレックスタイム制は、就業規則等で定めたうえで、労使協定により、始業時刻、終業時刻をそれぞれの労働者が自主的に決めることができる制度である。一定期間（1か月以内、条件を満たせば3か月以内）を平均し1週間あたりの労働時間が法定労働時間を超えない範囲内において、その期間における総労働時間を定める必要がある。"},
  {id:97, chapter:4, text:"専門業務型裁量労働となる19の業務について、実際の労働時間数にかかわらず、法定労働時間数を働いたものとみなす制度を「みなし労働時間制」という。", answer:false, correction:"法定労働時間数 → あらかじめ定めておいた時間", explanation:"「みなし労働時間制」とは、実際の労働時間にかかわらず、あらかじめ定めておいた時間、労働したものとみなす制度である。みなし労働時間制には、「事業場外みなし労働時間制」「専門業務型裁量労働制」「企画業務型裁量労働制」がある。"},
  {id:98, chapter:4, text:"労働基準法では、労働時間が8時間を超える場合、使用者は、少なくとも1時間の休憩を労働時間の途中に与えなければならないとされている。", answer:true, explanation:"設問のとおり。労働時間が6時間を超え8時間以下の場合は少なくとも45分、8時間を超える場合は少なくとも1時間の休憩を与えなければならない、と定められている。"},
  {id:99, chapter:4, text:"労働基準法第39条では、6か月間継続勤務した者すべてに、10日（継続または分割）の有給休暇を与えなければならないと定めている。", answer:false, correction:"6か月間継続勤務した者すべて → 6か月間継続勤務した者で6か月間の全労働日の8割以上出勤した場合", explanation:"労働基準法第39条では、使用者は、労働者が、①6か月間継続勤務し、②その6か月間の全労働日の8割以上を出勤した場合は、10日（継続または分割）の有給休暇を与えなければならない、と定められている。6か月の継続勤務以降は、継続勤務1年ごとに1日ずつ、継続勤務3年6か月以降は2日ずつ増加した日数（最高は年に20日）を与えなければならない。"},
  {id:100, chapter:4, text:"福利厚生について、一律、画一的に提供するのではなく、個人のニーズに合わせて従業員が選択できる「カフェテリアプラン（選択的福利厚生制度）」を導入する企業も大企業などに広がっている。", answer:true, explanation:"福利厚生には、「法定福利厚生」と「法定外福利厚生」がある。法定福利厚生は、法律によって使用者に実施が義務づけられている。一方、法定外福利厚生は、使用者が任意に行うさまざまな措置をいう。"},
  {id:101, chapter:4, text:"人材マネジメントの基本的な考え方には、「ジョブ型」雇用と「メンバーシップ型」雇用があるが、このうち、「人」と「仕事」の結びつきはできるだけ自由に変えられるようにしておくのは「ジョブ型」である。", answer:false, correction:"ジョブ型 → メンバーシップ型", explanation:"人材マネジメントの基本的な考え方として、「仕事」をきちんと決めておいてそれに「人」を当てはめる「ジョブ型」雇用と、「人」を中心に管理し、「人」と「仕事」の結びつきはできるだけ自由に変えられるようにしておく「メンバーシップ型」雇用があり、この「メンバーシップ型」が日本の正規雇用労働者の特徴とされている。"},
  {id:102, chapter:4, text:"平成26年版「労働経済の分析」で示されている厚生労働省「就労条件総合調査」によれば、業績評価制度を導入している企業は近年低下しているが、導入している企業の半数が問題点として一番多く挙げたものは、「職場の雰囲気が悪化する」だった。", answer:false, correction:"職場の雰囲気が悪化する → 評価によって勤労意欲の低下を招く", explanation:"平成26年版「労働経済の分析」で示されている厚生労働省「就労条件総合調査」によれば、業績評価制度のある企業の約半数は問題点があるとしており、「評価によって勤労意欲の低下が招く」（20.9%）が多く、次に多かったのは「評価結果に対する本人の納得が得られない」（19.1%）だった。「職場の雰囲気が悪化する」は（5.4%）と少なかった。"},
  {id:103, chapter:4, text:"経済産業省がいうダイバーシティマネジメントとは、多様な人材を生かし、その能力が最大限発揮できる機会を提供することで、イノベーションを生み出し、価値創造につなげる経営のことである。", answer:true, explanation:"ダイバーシティマネジメントの内容は設問のとおりである。最近は、多様性を受容し、さまざまな意見やアイデアを取り入れ、会社、団体の力を高めるものとして行われ、ダイバーシティ&インクルージョンと表記されることも多い。"},
  {id:104, chapter:4, text:"経済産業省がいうダイバーシティマネジメントにおいて、「多様な人材」とは、性別、年齢、人種や国籍、障害の有無、性的指向、宗教・信条、価値観など多様性であるとされ、キャリアや経験、働き方に関する多様性は含まれない。", answer:false, correction:"は含まない → も含まれる", explanation:"経済産業省は、ダイバーシティマネジメントにおける「多様な人材」を、性別、年齢、人種や国籍、障害の有無、性的指向、宗教・信条、価値観などの多様性だけでなく、キャリアや経験、働き方などに関する多様性も含むとしている。"},
  {id:105, chapter:4, text:"完全失業率を算出するための「労働力人口」とは、20歳以上の働く意欲のある人の数をいう。", answer:false, correction:"20歳以上 → 15歳以上", explanation:"総務省統計局の「労働力調査」で用いられる労働力人口とは、15歳以上のうち「就業者」と「完全失業者」をあわせたものをいう。"},
  {id:106, chapter:4, text:"完全失業率は、非労働力人口は除いて計算されており、景気が良くなると非労働力人口であった人びとが仕事を探し始めるため、完全失業率は低下する。", answer:false, correction:"低下する → 高くなる", explanation:"完全失業率とは、「労働力人口」に占める「完全失業者」の割合をいい、非労働力人口（通学、家事、高齢者など）は除いて計算されている。景気が良くなると非労働力人口であった人々が仕事を探し始め、それによって分母である労働力人口が増え、完全失業率が一時的に高くなることがある。"},
  {id:107, chapter:4, text:"完全失業者とは、①仕事に就いておらず、②仕事があればすぐ就ける、③仕事を探す活動や事業を始める準備をしていた者のことをいう。", answer:true, explanation:"完全失業者とは、設問のとおり次の3つの条件、①仕事がなくて調査週間中に少しも仕事をしなかった（就業者ではない）、②仕事があればすぐ就くことができる、③調査週間中に仕事を探す活動や事業を始める準備をしていた（過去の求職活動の結果を待っている場合を含む）を満たした者をいう。"},
  {id:108, chapter:4, text:"有効求人倍率は、ハローワークにおける求人、求職、就職の状況を各都道府県がとりまとめたものである。", answer:false, correction:"各都道府県 → 厚生労働省", explanation:"有効求人倍率は、公共職業安定所（ハローワーク）における求人、求職、就職の状況を厚生労働省がとりまとめた業務統計である。求人倍率とは、求職者に対する求人数の割合であり、「新規求人倍率」と「有効求人倍率」の2種類がある。"},
  {id:109, chapter:4, text:"有効求人倍率を算出するための「有効求職者数」には新卒者も含まれる。", answer:false, correction:"含まれる → 含まれない", explanation:"有効求職者数とは、公共職業安定所（ハローワーク）に登録されている、前月から繰り越された求職者数と当月の新規求職者数の合計をいい、新卒者は含まれない。"},
  {id:110, chapter:4, text:"労働力調査は、総務省統計局が実施しているサンプル調査で、15歳以上の者を対象とし、就業、不就業の状態を調査している。", answer:true, explanation:"労働力調査はサンプル調査であるが、統計的に調整し（ウェートバックによる復元）、日本全国の数値として毎月公表されている。"},
  {id:111, chapter:4, text:"わが国の労働組合組織率は低下しているが、これは、組合に加入しない非正規雇用者が増えたこと、組織率の低いサービス業へ産業構造が変わってきたことなどが理由となっている。", answer:true, explanation:"わが国の労働組合は「企業別組合」が主流であるが、組織率は年々低下している。低下の理由は、組合に加入しない非正規雇用者が増加したこと、組織率の高い製造業から組織率の低いサービス業へ産業構造が変わってきていることなどが挙げられる。"},
  {id:112, chapter:4, text:"高年齢者雇用安定法では、60歳までの雇用機会の確保が求められている。", answer:false, correction:"60歳までの → 65歳までの", explanation:"高齢者雇用安定法により、65歳までの雇用機会の確保が企業には求められている。事業主は、「65歳までの定年の引き上げ」「65歳までの継続雇用制度の導入」「定年の廃止」のいずれかの措置を実施する必要がある。また、2021年から70歳までの就業確保が事業主の努力義務になっている。"},
  {id:113, chapter:4, text:"高年齢者雇用安定法における継続雇用制度とは、雇用している高年齢者を、本人が希望すれば定年後も引き続いて雇用する「再雇用制度」などのことである。", answer:true, explanation:"「継続雇用制度」とは設問のとおり「再雇用制度」などのことである。2013年度以降、希望者全員を対象とすることが必要となっている。継続雇用は自社だけでなく、グループ会社も認められている。"},
  {id:114, chapter:4, text:"日本における15歳以上の各年代の女性の就業率は、結婚、出産の年代に一時低下し、育児が落ち着いた時期に再び上昇する、いわゆる「M字カーブ」を描くとされており、その傾向は、欧米諸国も同様である。", answer:false, correction:"同様である → みられない", explanation:"女性の労働参加は、結婚、出産の年代に一時低下し、育児が落ち着いた時期に再び上昇する、「M字カーブ」を描くとされる。このM字カーブは欧米諸国では見られず、出産期、育児期の落ち込みがない。"},
  {id:115, chapter:4, text:"開発途上国の経済発展を支援する国際貢献のひとつとして、「外国人技能実習制度」があり、技能実習も行われている。", answer:true, explanation:"外国人技能実習制度の基本的な趣旨は、設問のとおりである。2016年（平成28年）法改正があり、技能実習期間が技能の検定により最長3年から5年となった。技能実習は労働者に需給の調整手段として行われてはならない、とされているが、なかには就労に近いものがあるといった問題点も指摘されている。なお、外国人技能実習制度は見直しが行われ、育成就労制度として関連する法律が2024年に成立している。"},

  // ===== 第5章 産業カウンセリングに関わる関係法令 (116-151) =====
  {id:116, chapter:5, text:"労働契約法の労働契約とは、労働者が使用者に使用されて労働し、使用者がこれに対して労働者を保護することを約束することである。", answer:false, correction:"労働者を保護する → 賃金を支払う", explanation:"労働契約（雇用契約）とは、労働者が使用者に使用されて労働し、使用者がこれに対して賃金を支払うことを約束する契約である（労働契約法第6条）。労働者と使用者の関係は、法的には、個々の労働者と使用者の間の労働契約（民法上は「雇用契約」と呼ばれる）に基づくものである。"},
  {id:117, chapter:5, text:"労働契約は書面で締結されたものが有効で、口頭での約束は無効である。", answer:false, correction:"無効 → 有効", explanation:"労働契約は、労働契約法第4条2項により、できる限り書面によって内容を確認することが望ましい、となっているが、労働契約は口頭の約束でも成立する。言葉で明確には表されていない内心の意思の合致（黙示の合意）で成立することもある。"},
  {id:118, chapter:5, text:"労働基準法では、休日労働を含まない時間外労働の上限は原則として、月45時間、年360時間とされており、臨時的な特別の事情がなければこれを超えることはできないとされている。", answer:true, explanation:"労働基準法36条に規定されている。同条文に基づき36協定（いわゆる「さぶろく協定」）を労使間で締結し、労基署に届け出ることで、原則として問題文にある限度時間を超えない範囲での時間外労働が認められる。"},
  {id:119, chapter:5, text:"労働時間の上限を週50時間とする契約を会社と労働者の間で結んだ場合、その時間数は有効となる。", answer:false, correction:"有効 → 無効", explanation:"労働時間は、労働基準法32条により上限が週40時間と定められている。会社と労働者の間で週50時間という契約を結んだとしても、週40時間を超える部分は無効とされ、法律の定めに従って契約内容は週40時間に修正される。これは「強行法規」と呼ばれ、当事者の合意の有無や内容にかかわらず当事者を規律するものとされている。"},
  {id:120, chapter:5, text:"労働基準法では、常時50人以上の労働者を使用する使用者に「就業規則」を作成することを義務づけている。", answer:false, correction:"50人 → 10人", explanation:"労働基準法は、常時10人以上の労働者を使用する使用者に一定の事項を記載した就業規則を作成することを義務づけている。就業規則に記載が義務付けられている事項は、労働者のすべてに適用される事項といった広範なものにわたっている。"},
  {id:121, chapter:5, text:"労働基準法では、就業規則の作成又は変更について、労働者の過半数で組織する労働組合または労働者の過半数を代表する者の意見を聴いて、所轄労働基準監督署長に届出をしなければならないとされている。", answer:true, explanation:"設問のとおり。労働基準法90条に規定されている。"},
  {id:122, chapter:5, text:"労働関係の法規について、法的な強さの順に並べると、労働契約＞就業規則＞労働協約＞労働基準法の順になる。", answer:false, correction:"労働契約>就業規則>労働協約>労働基準法 → 労働基準法>労働協約>就業規則>労働契約", explanation:"労働契約を基礎としつつ、それに規制を加える法律（強行法規）、労働協約、就業規則（最低基準効）という、あわせて4つの法源によって規律されている。法的な強さの順は、①法律（強行法規）②労働協約③就業規則④労働契約である。"},
  {id:123, chapter:5, text:"入社後の試用期間は労働者の適格性を観察する期間であり、まだ労働契約は成立していない。", answer:false, correction:"成立していない → 成立している", explanation:"使用者が、入社の際に適格者を観察する期間として試用期間を設けることがある。これも労働契約が成立しているものとされ、試用期間終了時になされる本採用拒否は留保解約権の行使（＝解雇）であって、客観的合理性・社会的相当性がある場合のみに許される。理由がない場合は、労働契約はその後も存続する。"},
  {id:124, chapter:5, text:"使用者は、労働契約の締結に際し、賃金・労働時間その他の労働条件を労働者に明示しなければならない。", answer:true, explanation:"使用者は、労働契約の締結に際し、賃金・労働時間その他の労働条件を労働者に明示しなければならない（労働基準法15条1項）。労働契約の期間、就業場所、従事すべき業務、労働時間、賃金、退職（解雇事由を含む）に関する事項については書面の交付が求められている。なお2024年4月から①就業場所・業務範囲の変更、②更新上限の有無と内容、③無期転換申込機会、④無期転換後の労働条件の明示が追加された。"},
  {id:125, chapter:5, text:"休職とは、労働者に労働させることが適切でない場合に、労働契約を存続させながら労働義務を一時消滅させることをいう。", answer:true, explanation:"休職は、設問のとおりである。休職には、傷病休職、事故欠勤休職、起訴休職、出向休職、自己都合休職、組合専従休職などがある。休職制度は、一般に労働協約や就業規則などに定められ、それに基づいて使用者が一方的に発令することが多い。"},
  {id:126, chapter:5, text:"整理解雇の4要件と呼ばれているのは、①人員削減の必要性、②解雇回避の努力義務、③人選の合理性、④解雇保障費の妥当性である。", answer:false, correction:"解雇保障費 → 手続きの妥当性", explanation:"経営上の理由からなされる解雇（整理解雇）については、整理解雇法理が形成されている。これは、①人員削減の必要性、②解雇回避の努力義務、③人選の合理性、④手続の妥当性、という4つの観点から、解雇の合理性・相当性をより具体的に判断しようとするものである。"},
  {id:127, chapter:5, text:"労働基準法では、使用者が労働者を解雇する場合は、少なくとも30日前に予告するか、30日分以上の平均賃金を支払わなければならないとしている。", answer:true, explanation:"解雇に関しては、労働契約法以外にも法律上の規制が定められている。労働基準法では設問のとおり、賃金の支払いを規定している。予告日数は1日分の平均賃金を支払った日数だけ短縮でき、予告日数と平均賃金支払日数の合計が30日に達していればよい。"},
  {id:128, chapter:5, text:"労働契約法では、解雇は、客観的に合理的な理由を欠き、社会通念上相当であると認められない場合には、その権利を濫用したものとして無効とするとされている。", answer:true, explanation:"労働契約法第16条に規定されている。解雇とは使用者からの申し出による一方的な労働契約の終了であるが、自由に行えるものではない。客観的に合理的な理由があり、社会通念上相当と認められる場合に限定されている。"},
  {id:129, chapter:5, text:"1年契約を5回更新し、通算して5年を超える場合、6回目の契約期間中に労働者が申込みすれば6回目の契約が終了すると同時に無期労働契約が締結されたものとして取り扱われる。", answer:true, explanation:"期間の定めのある有期契約労働者の不安定な雇用状況に対し、2012年の労働契約法改正は、有期労働契約が更新され通算契約期間が5年を超える場合には、労働者に無期労働契約への転換権を付与する規定を定めた。"},
  {id:130, chapter:5, text:"労働基準法は、使用者が労働者の国籍、信条、社会的身分を理由として労働条件について差別的扱いをすることを禁じている。", answer:true, explanation:"労働基準法3条は、使用者が労働者の国籍、信条、社会的身分を理由として労働条件について差別的取扱いをすることを禁止している。「信条」には宗教的・政治的な信念の他、思想的な信念も含まれる。「社会的身分」については、出身地、門地、人種、非嫡出子などの生来的な地位を指している。"},
  {id:131, chapter:5, text:"最低賃金法が定める最低賃金には、都道府県ごとの地域別最低賃金と、特定の産業ごとに地域別最低賃金を上回る最低賃金を定める特定産業別最低賃金の2種類がある。", answer:true, explanation:"最低賃金法は、賃金が低くなりすぎることや、企業間で不公正な競争が行われることを避けるため、賃金の最低額を設定することを定めている。最低賃金には、都道府県ごとの地域別最低賃金と特定の産業ごとに地域別最低賃金を上回る最低賃金を定める特定産業別最低賃金の2種類がある。"},
  {id:132, chapter:5, text:"労働安全衛生法で用いられている「事業者」とは、法人企業では法人そのもの、個人企業では事業主自身を指し、労働契約法で使われている「使用者」と同義である。", answer:true, explanation:"労働安全衛生法で用いられている「事業者」と労働契約法で使われている「使用者」は同義であるが、労働基準法における「使用者」とは、「事業主又は事業の経営担当者その他その事業の労働者に関する事項について、事業主のために行為をなすすべての者」とされている。これは、労働基準法が規制している事業に関しては実質的な権限を有している者を指している。"},
  {id:133, chapter:5, text:"労働安全衛生法は、労働者の安全と健康を確保するために職場内で行われねばならない事項および行われることが望ましい事項がまとめられている。", answer:true, explanation:"労働安全衛生法は、1972年に労働基準法から分離する形で制定された。その趣旨は設問のとおりである。なお、条文の大半は「事業者」が主語となっており、事業者の義務および努力義務を示している。産業保健活動は、この労働安全衛生法を法的背景としている。"},
  {id:134, chapter:5, text:"労働安全衛生法では、労働安全衛生管理体制の整備のため、事業者は、業種と規模に応じて総括安全衛生管理者、安全管理者、および労働者数50人以上の事業場においては衛生管理者と産業医を選任しなければならないと規定している。", answer:true, explanation:"労働安全衛生法では、安全衛生活動を安定的に推進するため、設問のような安全衛生管理体制の整備を求めている。また、労働者数50人未満の事業場では、業種によって安全衛生推進者または衛生推進者を選任しなければならないと規定している。なお、労働者数1,000人以上では専属の産業医が必要となる。"},
  {id:135, chapter:5, text:"労働組合法は、適法な労働組合が使用者に団体交渉を申し入れた場合には、正当な理由なくこれを拒否してはならない、と定めている。", answer:true, explanation:"労働組合法は、憲法28条の団体交渉権の保障を具体化する形で、使用者が労働組合との団体交渉を正当な理由なく拒否することを不当労働行為の一類型として禁止している。使用者は労働者が加入する労働組合から団体交渉を申し入れられた場合には、原則としてそれに応じなければならない。"},
  {id:136, chapter:5, text:"労働協約とは、労働者が労働組合という組織を作り、この労働組合と会社との間で締結される労働条件などに関する合意・協定のことをいう。", answer:true, explanation:"労働協約は、設問のとおりである。労働組合と使用者は、団体交渉などを通じて労働条件等について合意に達した内容を労働協約として締結することが多い。この労働協約は、書面に作成し、両当事者が署名または記名捺印するという様式を満たすことを条件に、労働協約を規律する効力が認められている。"},
  {id:137, chapter:5, text:"職業能力開発促進法では、事業主が従業員のキャリア形成支援のために講ずべき措置が定められている。", answer:true, explanation:"職業能力開発促進法（2001年改正）で、「事業主が講ずべき措置」として、事業主は従業員のキャリア形成支援のために、①情報の提供、相談その他の援助、②配置その他の雇用管理についての配慮、③休暇の付与、④教育訓練などを受ける時間の確保、⑤その他職業能力開発推進者の選任とその活用などが求められた。"},
  {id:138, chapter:5, text:"雇用対策法は、2018年改正され労働施策総合推進法（「労働施策の総合的な推進並びに労働者の雇用の安定及び職業生活の充実等に関する法律」）となった。", answer:true, explanation:"設問のとおりである。雇用対策法は、2018年、働き方改革を推進するための関係法律として改正され、労働施策総合推進法となっている。なお、2020年の改正により、職場におけるパワーハラスメント防止対策が事業主に義務付けられることが加わったため、「パワハラ防止法」と通称されることもある。"},
  {id:139, chapter:5, text:"精神保健福祉法における精神科医療施設への入院制度は、緊急措置入院、応急入院、任意入院の3つである。", answer:false, correction:"緊急措置入院、応急入院、任意入院の3つ → 措置入院、医療保護入院、応急入院、任意入院がある", explanation:"精神科医療施設への入院制度には、措置入院、医療保護入院、応急入院、任意入院がある。緊急措置入院は、緊急避難的な制度であり、72時間を限度に指定医1名によってなされる措置入院である。"},
  {id:140, chapter:5, text:"医療保護入院とは、1名以上の精神保健指定医の診察により入院が必要と判断され、かつ本人の同意が得られない場合、家族等のうちのいずれかの者の同意によって成立する精神科医療施設への入院制度のことをいう。", answer:true, explanation:"設問のとおり。精神保健指定医は、5年以上診断または治療に従事し、3年以上精神障害の診断または治療に従事する者で、一定の条件を満たした場合に厚生労働大臣により指定される。"},
  {id:141, chapter:5, text:"日本の社会保障制度は、①社会保険、②国家扶助（公的扶助）、③公衆衛生および医療、④社会福祉の4部門に分類できる。", answer:true, explanation:"社会保障は、国民の「人たるに値する生活」の確保を目的として、一定の所得ないし医療、生活にかかわる福祉サービス等を公的に提供する制度とされ、1950年社会保障制度審議会勧告によって、社会保障制度を、①社会保険②国家扶助③公衆衛生および医療④社会福祉の4部門に分類したと考えられる。その後もこの枠組みは概ね維持されている。"},
  {id:142, chapter:5, text:"社会保障の機能には、所得再分配機能、リスク分散機能、景気変動を微調整する機能がある。", answer:true, explanation:"社会保障の目的は、国民の生活保障と個人の自立（自律）の支援にある。所得再分配機能は、社会保障制度を通じて一次的な所得分配が社会保障の目的に合致するよう、一定程度再分配されることをいい、リスク分散機能は、リスクが現実に発生した際、財源をプールしておき、そこから給付を行うしくみである。"},
  {id:143, chapter:5, text:"日本の公的年金制度は、職種を問わず18歳以上のすべての者が、年金保険に加入する方式を採用している。", answer:false, correction:"18歳 → 20歳", explanation:"日本の公的年金制度は、職種を問わず20歳以上のすべての者が、年金保険に加入する方式を採用し、老齢、障害および死亡を保険事故として、一定の要件を満たす場合に、保険料の拠出に応じた年金給付を行う。"},
  {id:144, chapter:5, text:"公的年金制度の構造は、全国民共通の定額の国民年金（基礎年金）と、それに上乗せされる報酬比例の被用者年金（厚生年金等）の「2階建て」である。", answer:true, explanation:"公的年金制度の構造は設問のとおり「2階建て」である。これに加えて、民間保険会社との私的な契約による個人年金や、任意に行われる各種の企業年金・国民年金基金等が3階部分として、公的年金を補完する役割を果たしている。"},
  {id:145, chapter:5, text:"老齢年金には、老齢基礎年金と老齢厚生年金があり、原則として60歳から支給される。", answer:false, correction:"60歳 → 65歳", explanation:"国民年金と厚生年金は、老齢に対する給付を行う。老齢年金には、老齢基礎年金（国民年金）と老齢厚生年金（厚生年金）があり、原則として65歳から支給される。老齢基礎年金を受けるためには、保険料を支払った期間と保険料を免除された期間を合わせた期間が一定以上あることを要する。"},
  {id:146, chapter:5, text:"老齢基礎年金を受給するためには、受給資格期間は25年とされてきたが、2017年10月支払い分より、その期間は15年に短縮された。", answer:false, correction:"15年 → 10年", explanation:"老齢基礎年金を受けるための受給資格期間は25年（300か月）とされてきたが、2012年の法改正等により2017年10月支払い分から資格期間が10年（120か月）に短縮された。"},
  {id:147, chapter:5, text:"健康保険の傷病手当金とは、被保険者が療養のため労務不能となったときに、労務に服することができなくなった日から起算して4日目から最長6カ月までの間、支給されるものである。", answer:false, correction:"最長6カ月 → 1年6か月", explanation:"傷病手当金は医療保険の給付の一つで、被保険者が療養のため労務不能となったときに支払われる。労務に服することができなくなった日から起算して4日目から最長1年6か月までの間に労務に服することができなかった日について傷病手当金として1日当たり標準報酬日額の3分の2が支給される。"},
  {id:148, chapter:5, text:"健康保険料の額は、被保険者の標準報酬月額と標準賞与額に保険料率を乗じた額で、そのうち3割は被保険者が負担する。", answer:false, correction:"3割は被保険者が負担 → 労使折半", explanation:"健康保険料の額は、被保険者の標準報酬月額と標準賞与額に保険料率を乗じた額で、労使折半である。国民健康保険の国民健康保険料（税）は、応能割と応益割の部分からなり、市町村ごとに地域の実情に応じて決められている。"},
  {id:149, chapter:5, text:"介護保険の被保険者が保険給付を受けるためには、市町村に申請を行い、要介護（要支援）認定を受けなければならない。", answer:true, explanation:"介護保険の被保険者が保険給付を受けるためには、設問のとおり、被保険者が市町村に申請を行い、要介護（要支援）認定を受けなければならない。要介護認定は、市町村に設置される介護認定審査会で判断される。"},
  {id:150, chapter:5, text:"生活保護法の目的は、国が生活に困窮するすべての国民に対し、その困窮の程度に応じ、必要な保護を行い、その最低限度の生活を保障するとともに、その自立を助長することにある。", answer:true, explanation:"生活保護法の目的は、設問のとおりである。国民の最低生活の実現を最終的に引き受け、他の制度を補完する役割を担っているので、最後のセーフティネットと呼ばれる。生活保護の特徴は、所得保障のための金銭給付だけでなく、医療・介護扶助によるサービスなどの現物給付を用意している。保護の財政はすべて租税が用いられている。"},
  {id:151, chapter:5, text:"生活保護法には、①国家による最低生活保障の原理、②自立助長の原理、③無差別平等の原理、④補足性の原理が規定されている。", answer:true, explanation:"生活保護法には、制度の根幹を支える4つの原理が規定されている。これらは、生活保護のそれぞれの条文を解釈し、制度を運用する際に重要な指針となる（生活保護法5条）。"},

  // ===== 第5章続き (152-162) =====
  {id:152, chapter:5, text:"障害者基本法は、障害者を「身体障害、知的障害、精神障害（発達障害を含む）、その他の心身の機能の障害がある者であって、障害及び社会的障壁により継続的に日常生活又は社会生活に相当な制限を受ける状態にあるものをいう」と定義している。", answer:true, explanation:"障害者基本法での障害者の定義は、設問のとおりである。なお、定義にある「社会的障壁」とは、「障害がある者にとって日常生活又は社会生活を営む上で障壁となるような社会における事物、制度、慣行、観念その他一切のものをいう」とされている。"},
  {id:153, chapter:5, text:"障害者雇用率制度において、雇用義務の対象は、身体障害者、知的障害者、症状が安定し就労が可能な状態にある者で精神障害者保健福祉手帳の交付を受けている者である。", answer:true, explanation:"障害者雇用促進法に基づく雇用義務制度には、法定雇用率以上の障害者を雇用することを事業主に義務付ける障害者雇用率制度と、障害者雇用納付金制度がある。雇用義務の対象は、設問のとおりである。法定雇用率は民間の事業主については2024年4月から2.5%以上となり、2026年7月から2.7%以上に引き上げが予定されている。"},
  {id:154, chapter:5, text:"障害者雇用促進法は、事業主に、労働者の募集・採用について障害者に対して障害者でない者と均等な機会を与えることを義務づけている。", answer:true, explanation:"障害者雇用促進法の2013年の改正により、障害者雇用差別の禁止と、合理的配置の提供の義務が定められた。差別禁止について募集・採用時の規定は設問のとおりである。採用後においては、「賃金の決定、教育訓練の実施、福利厚生施設の利用その他の待遇について、障害者であることを理由として、障害者でない者と不当な差別的取扱いをしてはならない」と規定している。"},
  {id:155, chapter:5, text:"男女雇用機会均等法は、労働者の募集・採用や配置・昇進などについて、性別を理由とした差別を禁止しているが、他にも体力要件をつけるなどの直接差別を禁止する旨の規定を定めている。", answer:false, correction:"直接差別 → 間接差別", explanation:"男女雇用機会均等法において、性別を理由とした差別を「直接差別」と呼び、実質的に性別を理由とする差別となるおそれがあるものを「間接差別」と呼び禁止する規定がある。間接差別には、募集・採用で身長・体重・体力要件をつけること、転居を伴う転勤要件をつけること、昇進において転勤経験要件をつけることの3つが対象となっている。"},
  {id:156, chapter:5, text:"パートタイム・有期雇用労働法において「パートタイム労働者」とは、1週間の所定労働時間がその事業所の正社員にくらべ短い労働者としている。", answer:true, explanation:"パートタイム・有期雇用労働法（「短時間労働者及び有期雇用労働者の雇用管理の改善等に関する法律」）において、パートタイム労働者の定義は設問のとおりである。"},
  {id:157, chapter:5, text:"パートタイム・有期雇用労働法において「有期雇用労働者」とは、事業主と期間の定めのある労働契約を締結している労働者をいう。", answer:true, explanation:"設問のとおり。なお、この法律では、正社員と職務内容が同じで、雇用の全期間において職務内容・配置の変更範囲も同じであると見込まれるパートタイム・有期雇用労働者については、すべての待遇について、パートタイム・有期雇用労働者であることを理由とする差別的取り扱いが禁止されている。"},
  {id:158, chapter:5, text:"パートタイム・有期雇用労働法では、パートタイム・有期雇用労働者の基本給、賞与などのすべての待遇について、それぞれの待遇の性質・目的に照らして、正社員の待遇との不合理な違いを設けることを禁止している。", answer:true, explanation:"設問のとおり。正社員との間で待遇の違いがある場合には、パートタイム・有期雇用労働者の求めに応じて、待遇の違いの内容と理由を説明する義務が事業主に課せられている。"},
  {id:159, chapter:5, text:"職場におけるハラスメントは、法的には、①被害者の人格的利益を侵害する不法行為にあたるか、②事業主が労働者に対して信義則上負っている職場環境配慮義務に反する点はなかったかが、主な争点となる。", answer:true, explanation:"ハラスメントには、セクハラ、パワハラ、アカハラなどさまざまな名称・態様なものがある。しかし、法的には、名称を問わず、①被害者の人格的利益（「働きやすい職場環境で働く利益」）を侵害する不法行為にあたるか、②事業主が労働者に対して信義則上負っている職場環境配慮義務（働きやすい良好な職場環境を維持する義務）に反する点がなかったかが、主な争点となる。"},
  {id:160, chapter:5, text:"1997年に「介護保険法」が制定されて以降、介護保険制度では、社会保険の方式が採用され、給付の方式は利用者とサービス提供者との契約関係を基礎としてその費用を給付する形に改められた。", answer:true, explanation:"1997年に介護保険法が制定され、新たな介護保険制度が実施されることとなった。新制度では、給付の方式として「措置から契約へ」という標語のもとに、行政庁の決定によりサービスの実施から、利用者とサービス提供者との契約関係を基礎として、その費用を給付する形に改められた。"},
  {id:161, chapter:5, text:"求職者支援法でいう「特定求職者」には、雇用保険の求職者給付の受給が終わってしまった者も含まれる。", answer:true, explanation:"求職者支援法に基づき、失業者の職業訓練と就職支援を行う求職者支援制度が実施されている。この制度の対象者となる者（特定求職者）には、設問に書かれている者の他、被保険者期間が短く受給資格が得られなかった者、短時間または短期間の就労で適用除外とされていた者、学卒未就職者、自営業を廃業した者などが含まれる。"},
  {id:162, chapter:5, text:"改正高年齢者雇用安定法では、事業主に、65歳までの就業確保の義務、70歳までの雇用確保の努力義務が求められている。", answer:false, correction:"65歳までの就業確保の義務、70歳までの雇用確保の努力義務 → 65歳までの雇用確保の義務、70歳までの就業確保の努力義務", explanation:"似た用語であるが、「就業」と「雇用」が逆。「高年齢者等の雇用の安定等に関する法律」の一部が改正され（改正高年齢者雇用安定法）、70歳までの就業確保が雇用主の努力義務となっている。措置として、①70歳までの定年引き上げ、②定年制の廃止、③70歳までの継続雇用制度（再雇用制度・勤務延長制度）の導入、④70歳まで継続的に業務委託契約を締結する制度の導入、⑤70歳まで継続的に社会貢献事業に従事できる制度の導入、が求められている。"},

  // ===== 第6章 カウンセリングの基本 (163-179) =====
  {id:163, chapter:6, text:"カウンセリングとは、一般に、個人がもつ問題や悩みの解決のために、専門的な理論と方法に基づいて行われる相談や援助のことを意味する。", answer:true, explanation:"カウンセリングの意味については設問のとおりである。広い意味では、クライエントのニーズに対応した種々の相談や助言を意味することも多い。"},
  {id:164, chapter:6, text:"カウンセリングの主な目標は、クライエントの人間的成長を援助すること、豊かな社会生活の実現に向けて援助すること、および生涯において遭遇する諸問題を発見し解決するための援助を行うことである。", answer:false, correction:"発見し解決する → 予防と解決する", explanation:"設問は、日本カウンセリング学会の定義に付記されたものの一つで、カウンセリングの目標は3つあるとしている。①クライエントの人間的成長への援助を中心に、②豊かな社会生活の実現の援助、③生涯において遭遇する諸問題の予防と解決のための援助の3つである。"},
  {id:165, chapter:6, text:"カウンセリングは、クライエントの個性と生き方を尊重し、クライエントの自己資源を活用し、それを開発・発展させるとともに、それらをカウンセラー自身が十分に活用できるようにする援助である。", answer:false, correction:"カウンセラー → クライエント", explanation:"設問は、日本カウンセリング学会の定義に付記されたもので、カウンセリングは、クライエントの個性と生き方を尊重することを第一とし、クライエントの自己資源を活用し、それを開発・発展させるとともに、それらをクライエント自身が十分に活用できるようにする援助である、と定義されている。"},
  {id:166, chapter:6, text:"カウンセリングの定義は、どのような人間観や哲学的背景に立脚しているか、カウンセリングの目標の強調点が人格の変化や成長か具体的な問題解決か、方法として重視するものがカウンセリング関係か介入技法か、によって異なる。", answer:true, explanation:"カウンセリングの定義については、設問のとおり種々の立場や考え方があり、その理論的背景等の違いによってさまざまな定義がなされている。"},
  {id:167, chapter:6, text:"カウンセリングは、専門的には、カウンセリング心理学その関連領域の科学的・臨床的な知見に基づいた、心理学的な援助である。", answer:true, explanation:"カウンセリングは、広い意味ではクライエントのニーズに対応し、種々の相談や支援を示すことが多いが、専門的には設問のとおりである。"},
  {id:168, chapter:6, text:"カウンセラーには、クライエントに自由で安全な自己主張を促すような関与が求められる。", answer:false, correction:"自己主張 → 自己探索", explanation:"カウンセリングにおけるカウンセラーの関与には、権威的なものや、ストレスや不安を与えるものではなく、クライエントに自由で安全な自己探索を促すような関与が求められる。"},
  {id:169, chapter:6, text:"多くの人は、日常会話によって問題が解決したり、わかってもらえたと感じたときには、喜びや安堵感やカタルシスが生じる。", answer:true, explanation:"日常的に行われている会話や身の上相談にもカウンセリングと共通する部分がある。いずれも対話を中心としたコミュニケーションによって行われるものである。多くの人は、問題が解決したり、わかってもらえたと感じたときには、喜びや安堵感やカタルシスが生じる。"},
  {id:170, chapter:6, text:"カウンセリング関係を質の高いものにするためには、カウンセリングの目標が合意され、明確で安全な設定がつくられ、カウンセラー主導で進められていくことが重要である。", answer:false, correction:"カウンセラー主導 → 両者の協働によって", explanation:"カウンセリングでは、クライエントとの間に安全で質の高い関係を築く必要がある。そのためには、クライエントと十分な話し合いのもとにカウンセリングの目標が合意され、明確で安全な設定がつくられ、両者の協働によって進められていくことが重要となる。"},
  {id:171, chapter:6, text:"ソーシャルワークでは、クライエントの社会生活の向上や幸福を主な課題とするのに対し、カウンセリングではクライエントの心理的で内面的な変化や成長を主要な目標としている。", answer:true, explanation:"ソーシャルワークでは、クライエントの生活環境や社会制度などの環境要因を重視し、クライエントを取り巻くさまざまな社会的な要因へ働きかけ、生活の向上や幸福を主な課題とするのに対し、カウンセリングではクライエントの心理的で内面的な変化や成長を主要な目標としている。"},
  {id:172, chapter:6, text:"医療の主な目的は診断と治療であり、カウンセリングの目的には人間的成長や自己実現を含んでいる点で違いがある。", answer:true, explanation:"勤労者の上質な職業人生の実現を支援し、産業社会の発展に寄与するという根底には自己実現の理念がある（産業カウンセラー倫理綱領第1条3参照）。"},
  {id:173, chapter:6, text:"カウンセリングの効果のひとつとして、クライエントが「積極的に自分の問題と向き合えるようになる」ことがある。", answer:true, explanation:"カウンセリングの効果としては、問題対処能力の向上や自己成長の他に、問題となる行動や症状の改善、心理社会的な安定や機能性の改善、対人関係上の問題解決や目標達成、自己についての認識の変化や自信の増大などがある。"},
  {id:174, chapter:6, text:"カウンセリングで用いる専門的な技法や介入は、クライエントとの関係に大きな影響を与える。クライエントとの安定した関係づくりのためには、カウンセラーは自分が得意な技法のみを用いるべきである。", answer:false, correction:"得意な技法のみ → 他の技法も有効に活用する", explanation:"カウンセリングの専門的な技法や要因は、それがクライエントの問題やニーズに応じて適切に用いられる場合はとても効果的に働く。安定したカウンセリング関係の構築が難しい場合、何らかの技法を有効に活用し、関係性をつくっていくという方法も求められる。そのためには、クライエントの問題やニーズに応じて適切な技法を用いることが求められるため、新たな技法、方法等について積極的に学んでいく姿勢が求められる。"},
  {id:175, chapter:6, text:"カウンセリングの効果について実証的研究をレビューしたクーパー(Cooper, M.)は、カウンセラーの個人的、実際的あるいは専門的特性よりも、カウンセリング関係の方が効果に与える影響がより大きい、と述べている。", answer:true, explanation:"設問のとおり。クーパーは、特にカウンセラーの協働的で、思いやりがあり、共感的で熟練した関わり方はより良い結果と関係している、と述べた。また、カウンセリングの効果のエビデンスから得られた知見を、①カウンセリングの有効性、②クライエント要因の重要性、③カウンセリング関係の重要性、④介入技法の有効性、としてまとめている。"},
  {id:176, chapter:6, text:"カウンセリングの効果には、蓄積された臨床的な知見から、問題となる行動や症状の改善、対人関係上の問題解決や目標達成などがあることがわかっている。", answer:true, explanation:"カウンセリングの効果について、これまでに蓄積された臨床的な知見から、①問題となる行動や症状の改善、②心理社会的な安定や機能性の改善、③対人関係上の問題解決や目標達成、④自己についての認識の変化や自信の増大、⑤問題対処能力の向上や自己成長などがあることがわかっている。"},
  {id:177, chapter:6, text:"カウンセリングには限界がある。クライエントのコミュニケーション能力や内省力、自身の行動に対する責任能力などが乏しい場合がその一例である。", answer:true, explanation:"カウンセリングは万能な方法ではない。限界を認識した上で適切な対応することが求められる。設問のような限界の場合、コミュニケーション能力や責任能力などの欠如には何らかの心身的な疾患や障害が原因となっている場合もある。必要な場合には、医療機関へリファーする。"},
  {id:178, chapter:6, text:"クライエントのカウンセリングに対する理解不足はカウンセリングを実践するうえで妨げとなるが、過剰な期待はカウンセリングの効果によい影響をもたらす。", answer:false, correction:"良い影響をもたらす → 阻害要因となることがある", explanation:"カウンセリングに対する過剰な期待やクライエントを取り巻く職場や家庭などのカウンセリングへの先入観などは、カウンセリングを進めるにあたっての阻害要因となることがある。"},
  {id:179, chapter:6, text:"カウンセリングにおいて、行政や利害関係者に対して申し立てや調停の必要が生じた場合には、適切な部署や機関にリファーすることが大切である。", answer:true, explanation:"カウンセリングではクライエントの主体的な問題解決や人格的な成長の支援を基本としているため、クライエントが行動すべきことをカウンセラーが代わって手助けすることは原則行わない。そのため、クライエントに代わって関係者に申し立てや調停を行うことがクライエントに有益な場合は、適切な部署や機関にリファー（委託・紹介）することが必要である。"},

  // ===== 第7章 傾聴の意義と技法 (180-218) =====
  {id:180, chapter:7, text:"傾聴では、カウンセラーにはクライエントの内的な世界を理解することが求められるので、クライエントと同じ価値判断をもつ必要がある。", answer:false, correction:"同じ価値判断をもつ → クライエントの視点から理解しようとする", explanation:"カウンセラーには、クライエントの内的な世界を理解しようとする態度が求められる。カウンセラーは、クライエントの語りや表現に対する評価や価値判断をいったん脇に置いて、あくまでもクライエントの視点からその人を理解しようとする必要がある。"},
  {id:181, chapter:7, text:"傾聴は、あらゆるカウンセリング実践のもっとも重要な基礎として位置づけられており、すべてのカウンセラーが必須のスキルとして、身につけておかなければならないものである。", answer:true, explanation:"設問のとおり。その基礎の上に、様々な方法や介入技法が構成され、必要に応じて提供される。"},
  {id:182, chapter:7, text:"傾聴は、相手の語りや表現に耳を傾け、その意味を相手の身になって理解することであり、理解した意味が正しいかどうかを相手に確認する必要はない。", answer:false, correction:"必要はない → 必要がある", explanation:"カウンセリングにおける傾聴は、相手の語りや表現に耳を傾け、その意味を相手の身になって理解することで、理解した意味が正しいものであるかを確かめるために応答していくことも必要である。"},
  {id:183, chapter:7, text:"傾聴は、クライエントがカウンセリングの場に対してもつ不安や緊張を低減させ、安心感や信頼感を形成し、両者の信頼関係をつくる基盤となる。", answer:true, explanation:"傾聴の効果に関する信頼関係の形成は、設問のとおりである。クライエントは自分の語りに耳を傾け、それを正確に理解しようとするカウンセラーのかかわりによって、「ここでは話が聴いてもらえる」「この人には自分のことがわかってもらえる」といった実感をもつことができるようになる。"},
  {id:184, chapter:7, text:"クライエントは、傾聴されることで混乱した状態が収まり落ち着きを取り戻したとき、「スッキリした」とか「胸のつかえが取れた」という表現をすることがあるが、これをラポールという。", answer:false, correction:"ラポール → カタルシス（浄化）", explanation:"設問はカタルシス（浄化）の説明である。カタルシスとは、ギリシア語で、傷つき抑圧されている感情体験が、連想や他人の示唆や支持によって抑え込みを解かれ、感情が解放されることで心が洗われる効果である。ラポールとは、こころが通い合い互いに信頼感をもっている関係である。"},
  {id:185, chapter:7, text:"傾聴には、クライエント自身の肯定的な面だけでなく、見たくない自己、否定してきた自己といったネガティブな側面を見つめ、それに触れていくといった自己探求を促す効果がある。", answer:true, explanation:"傾聴には、設問のとおり自己探求を促す効果がある。特にネガティブな側面を見つめ、それに触れていくといった場合は、カウンセラーの温かく非評価的な傾聴の態度が重要となる。"},
  {id:186, chapter:7, text:"傾聴には、クライエントに①信頼関係の形成、②苦悩や混乱の鎮静化、カタルシス効果、③自己探求の促進、④自己理解や気づきを導く、⑤変容への展開を支える、といった効果がある。", answer:true, explanation:"傾聴による効果には、クライエントに①信頼関係の形成、②苦悩や混乱の鎮静化、カタルシス効果、③自己探求の促進、④自己理解や気づきを導く、⑤受容への展開を支える、といったものがある。これらの効果の記述は、傾聴によってクライエントにおこる変化のプロセスと考えることができる。"},
  {id:187, chapter:7, text:"クライエントの発言にすぐに反応するようにして、クライエントに自分自身を考えさせ、その気持ちや考えを明確にしていく態度を積極的傾聴(active listening)という。", answer:false, correction:"クライエントの発言にすぐに反応するようにして、クライエントに自分自身を考えさせ、その気持ちや考えを明確にしていく態度 → クライエントの発言をすぐに否認したり是認したりせず、クライエントの立場に立って、気持ちや考えを理解しつつ聴く態度", explanation:"傾聴とは、誠心誠意、集中して相手の語りや表現を聴くことである。傾聴は決して受身的で消極的な行為ではなく、相手に積極的に関わろうとする能動的な行為であることから積極的傾聴ともいわれる。"},
  {id:188, chapter:7, text:"傾聴の前提となる基本的な人間観として、人間の独自性や個別性の理解と尊重、人間の成長へと向かう潜在力への信頼があげられる。", answer:true, explanation:"傾聴の前提となる基本的な人間観には、①人間の独自性や個別性を理解し、尊重すること、②人間の成長へと向かう潜在力を信頼することなどが挙げられ、②は、自然治癒力、自己成長力、実現傾向などと呼ばれるものである。"},
  {id:189, chapter:7, text:"カウンセラーは、クライエントが理不尽なことや常識と異なることを語ったときは、専門家として正しいと思われる道理や常識をクライエントに助言・教示しなければならない。", answer:false, correction:"専門家として正しいと思われる道理や常識をクライエントに助言・教示しなければならない → 対等な人としてクライエントに真摯に、誠実に向き合うことが必要である", explanation:"カウンセラーは、クライエントが理不尽なことや常識と異なることを語ったときは、対等な人としてクライエントの語りの中に表現されている意思や感情について、細部に分け入るように、あるいはもつれた糸を解きほぐすように、それらの意味の複雑さを感受性豊かに傾聴することが求められ、クライエントに真摯に、誠実に向き合うことが必要である。"},
  {id:190, chapter:7, text:"傾聴のための基本的態度に、ロジャーズ(Rogers, C. R.)が公式化した①自己一致あるいは純粋性、②無条件の肯定的配慮、③共感的理解があり、これらはカウンセラーの態度の中核三条件と呼ばれている。", answer:true, explanation:"傾聴のための基本的態度は、設問のとおり、ロジャーズが公式化したものである。これらの基本的態度は、カウンセラーの内側にとどまっているだけでは意味がなく、具体的で実際的な応答や行為としてクライエントに伝えられるときに、基本的態度の効果が生じる。"},
  {id:191, chapter:7, text:"自己一致は、真実性、透明性などとも言われ、その意味はカウンセラーの態度がうわべだけのものでなく、多少演技的になったとしても、思ったままの本音をクライエントに伝える態度で接することである。", answer:false, correction:"多少演技的になったとしても、思ったままの本音をクライエントに伝える態度 → 偽りのない、あるいは隠し立てをしないありのままの態度", explanation:"自己一致は、真実性、透明性などとも言われ、その意味はカウンセラーの態度がうわべだけのものであってはならず、偽りのない、あるいは隠し立てをしないありのままの態度でクライエントに接することである。"},
  {id:192, chapter:7, text:"無条件の肯定的配慮とは、クライエントの存在そのもの、また体験や表現に対して、条件付きでない温かな関心を示し、受け止めることである。", answer:true, explanation:"無条件の肯定的配慮は、クライエントの存在そのもの、クライエントの体験や表現に対して、条件付きでない温かな関心を示し、受けとめることで、受容、尊重、温かさなどともよばれる。"},
  {id:193, chapter:7, text:"クライエントが感じている世界は、あくまでもクライエントのものである。カウンセラー自身が今ここで体験していることは、クライエントを理解するうえで邪魔になるので、感じない様にする必要がある。", answer:false, correction:"邪魔になるので、感じない様にする必要がある → 体験や感じたことを保持する必要がある", explanation:"クライエントが体験し感じている世界は、あくまでもクライエントのものである。カウンセラーはそれを自分のものであるかのように共感的に理解するが、同時にカウンセラー自身の自己や体験も自分のものとして保持する必要がある。"},
  {id:194, chapter:7, text:"共感的理解とは、クライエントの視点からクライエントが表現していることや感じていることを、カウンセラーが感受性豊かにそして正確に感じ取り、理解することである。", answer:true, explanation:"共感的理解で重要な点は、クライエントへの同情や同一視に陥らない、ということである。ロジャーズは共感的理解について、クライエントの私的な世界をあたかも自分自身のものであるかのように感じ取り、同時にこの「あたかも〜のように(as if)」という特質を失わないことが重要であるとした。"},
  {id:195, chapter:7, text:"傾聴のための基本的態度は、カウンセラーが自分の内側にとどめておき、クライエントに対する具体的な実際的な応答や行為として伝える必要はない。", answer:false, correction:"自分の内側にとどめておき、具体的な実際的な応答や行為として伝える必要はない → カウンセラーの内側にとどまっているだけではあまり意味がない", explanation:"傾聴の基本的態度は、カウンセラーの内側にとどめているだけではなく、具体的で実際的な応答や行為としてクライエントに伝わるようにすることが必要である。"},
  {id:196, chapter:7, text:"カウンセリング学習者には、まず特定の問題への介入を行う専門的で特定的な技法を十分に習得することが求められる。", answer:false, correction:"専門的で特定的な技法 → 基本的で汎用性の高い技法", explanation:"カウンセリング学習者には、まず、基本的で汎用性の高い技法を十分に習得することが求められる。その際、技法を単なる型やパターンとして機械的に身につけるのではなく、基本的態度を具体化するための行為、さらに言語的表現として体現することが求められる。"},
  {id:197, chapter:7, text:"カウンセリングに求める目標や課題をカウンセラーとクライエントが話し合い明確化することは、クライエントが自ら決定することを阻害するため、行わないことが大切である。", answer:false, correction:"行わないこと → 目標や課題を明確化することが取り扱われる", explanation:"カウンセラーとクライエントのあいだで協働的に行われる場面構成では、クライエントがカウンセリングに求める目標や課題の明確化することが大切である。"},
  {id:198, chapter:7, text:"かかわり行動は、カウンセラーからクライエントに具体的で積極的な関心を向けるために行うもので、クライエントに直接伝える言語的メッセージのみによって行われる。", answer:false, correction:"直接伝える言語的メッセージのみ → 伝える言語的・非言語的メッセージ", explanation:"かかわり行動は、クライエントへの非言語的メッセージを含めたカウンセラーからの積極的な関心を向ける行為である。クライエントの非言語的な側面を含めた態度全体に対する観察も重要である。"},
  {id:199, chapter:7, text:"かかわり行動には、カウンセリングの場の環境を整えることや落ち着いた声で自然な語りを用いること、穏やかで自然な表情で話すことなども含まれる。", answer:true, explanation:"かかわり行動には、設問の他に、カウンセラーの心身の状態や準備を整える、表情や視線、姿勢、動作で積極的な関心を向ける、声の質や話す速度に留意する、クライエントの語りの促進などが含まれる。"},
  {id:200, chapter:7, text:"伝え返し(内容のくり返し)は、クライエントの語っている内容を理解し、重要なキーワードや独特の言い回しを含めて伝え返すことである。", answer:true, explanation:"伝え返し（内容のくり返し）は、クライエントの語っている内容を理解し、重要なキーワードや独特の言い回しを含めて伝え返すことである。クライエントの語っていることから状況の理解を通して経験の理解をさせることで自己探索の促進につながる。"},
  {id:201, chapter:7, text:"クライエントが「職場に行くことは気が重いのです。」と語ったことに対して、カウンセラーが「どんなことで気が重く感じるのですか。」と伝え返すことを反射という。", answer:false, correction:"反射 → 質問", explanation:"クライエントが「職場に行くのが気が重いんです」と語ったことに対して、カウンセラーが「どんなことで気が重く感じるんですか」と気が重くなる要因を訊ねているので質問の技法に相当する。"},
  {id:202, chapter:7, text:"感情の反射とは、クライエントの言葉だけで表現されている感情を受けとめ、それに的確に触れながら、共感的に伝え返すことである。", answer:false, correction:"クライエントの言葉だけで → クライエントの言葉だけでなく", explanation:"感情の反射とは、クライエントの言葉だけでなく、そこで表現されている感情を正確に受けとめ、それに的確に触れながら、クライエントに感じられ表現されている言語、非言語も含めて共感的に伝え返すことである。"},
  {id:203, chapter:7, text:"要約は、クライエントの一連の語りや表現の要点をまとめて伝え返すものであるが、面接の初めに前回の内容をふり返る場合や終了時に面接の内容を確認するためにも用いられる。", answer:true, explanation:"要約は、クライエントの一連の語りや表現の要点をまとめて伝え返すもので、セッションの初めに前回の内容のふり返りや終了時に確認するために用いられる。それ以外でも、クライエントの全体の語りをふり返って、その内容や感情のうち重要な部分を短縮し、具体化しての要約は、クライエントの思考の統合への援助につながる。"},
  {id:204, chapter:7, text:"クライエントが長い話をする場合、その話の内容や要点をまとめて伝え返すものなので、できるだけ事柄の理解に絞って簡潔に伝え返すことが求められる。", answer:false, correction:"事柄の理解に絞って → 事柄だけでなく気持ちの理解を含めて", explanation:"要約は、クライエントが長い話をする場合、その話の内容や要点をまとめて伝え返すものなので、できるだけ事柄だけでなく、クライエントの気持ちの理解を含めて簡潔に伝え返すことが求められる。"},
  {id:205, chapter:7, text:"クローズド・クエスチョンは、ピンポイントで情報を得たい場合に用いられ、多用することでクライエント理解が促進される機能を持つ。", answer:false, correction:"促進される → 誘導的、尋問的となり、主体的な語りを阻害する", explanation:"質問技法のうち、クローズド・クエスチョンは、ピンポイントで情報を得たい場合に用いられ、一言か二言で答えられる回答を求めるものである。多用すると、誘導的、尋問的となり、クライエントの主体的な語りを阻害することとなる。オープン・クエスチョンは、クライエントの視点から考えや感情などを自由に語ってもらう質問で、語りの広がりや深まりを求める問いかけとなる。"},
  {id:206, chapter:7, text:"質問は、クライエントに主体的な自己探究を促進させる機能を持たない。", answer:false, correction:"持たない → 持っている", explanation:"クライエントが気づいていなかったり、避けたり、矛盾しているのではないかと思われること、あるいはカウンセラーが気になっていることを質問することで、クライエントが抱えている問題状況を明確化したり、主体的な自己探究を促進させることができる。"},
  {id:207, chapter:7, text:"クライエントからカウンセラーに「私はどうしたらいいでしょうか。」といった質問をされたときには、よりよい関係を築くためにもすぐに回答する必要がある。", answer:false, correction:"すぐに回答する必要がある → クライエントの質問の背景を考えて、適切に対応する", explanation:"クライエントが質問するときは、①具体的な情報を知りたい、②期待、願望、要求を伝えたい、③自分の不安や恐れを伝えたい、④自分のことを支持あるいは保証してもらいたい、⑤カウンセラーを試したい、などの背景がある。クライエントからの質問には婉曲な表現であることが多い。よって質問にすぐに回答するのではなく、クライエントの立場に立ってみて、質問した気持ちに焦点を当て応答する。"},
  {id:208, chapter:7, text:"クライエントの沈黙には、肯定的、否定的な意味や背景が考えられるが、どちらの場合も必ず、カウンセラーは沈黙を破らずにクライエントの発言を待たなければならない。", answer:false, correction:"破らずにクライエントの発言を待たなければいけない → 意味や背景を見極めつつ、慎重に対応していく", explanation:"クライエントの沈黙には、その意味や背景に、①自分の内面をみつめ、より適切な言葉を探している、②自分の問題を語ることをためらっている、③カウンセラーへの不満や怒りなどによって、話すことを拒否している、④混乱や苦悩によって語ることが困難であるなど、肯定的、否定的なものが考えられる。どちらにしても、沈黙への対応は、その沈黙がどのような意味や背景から沈黙になっているかを見極めつつ慎重に対応することが求められる。"},
  {id:209, chapter:7, text:"クライエントがカウンセリングの申込みをした際、最初に行う面接をインテーク面接あるいは受理面接という。", answer:true, explanation:"カウンセラーとクライエントの最初の面接は、設問のとおりである。インテーク面接（受理面接）は、カウンセリングのスタート、クライエントとカウンセラーとの新しい出会いの場であり、非常に大きな意味を持っている。"},
  {id:210, chapter:7, text:"クライエントは、カウンセリングによる自己探索と自己洞察を通して自己認識を深めるが、クライエントの問題や課題についてはカウンセラーが主体となって解決する。", answer:false, correction:"カウンセラーが主体となって解決する → クライエント自身が問題解決できるよう、クライエントとカウンセラーが協力する", explanation:"クライエントは面接初期段階で問題や悩みについて触れ、その解決の援助を求めている。カウンセラーは、クライエントが何を問題としており、その問題をどうしたいのか、自分自身はどうありたいのか、といった内容についてクライエント自身が自己理解を進めることができるよう援助していく。そしてクライエント自身が、主訴を自分自身が取り組む課題であると自覚し、自分の問題として考えることができるような関係づくりを進め、その過程を通じて問題解決を支援するよう面接を進める。"},
  {id:211, chapter:7, text:"クライエントの問題や課題が明確になると、取り組むべき目標が検討される。クライエントが望む目標が実現不可能なものであったとしても、カウンセラーは否定せずそのまま受け入れるべきである。", answer:false, correction:"実現不可能なものであったとしても、カウンセラーは否定せずそのまま受け入れるべき → クライエントの実感に即しつつ希望を見いだし、なおかつ実現への可能性を模索しうるものとなるよう援助する", explanation:"クライエントの問題や課題が明確になると、次の段階として、クライエントが「自分はどこにいきたいのか」「これからどうしたらいいのか」といった目標を考えられるよう支援を続ける。目標設定の段階における留意点は、明確で具体的な目標を見いだすこと、目標を達成した状態が具体的にイメージできるようなものにすること、クライエントの能力の範囲内で実現可能であるよう吟味すること、目標が肯定的・積極的な内容であること、クライエントの価値観を大切にしていること、クライエント自身の目標であることなどである。"},
  {id:212, chapter:7, text:"カウンセリング・プロセスは、クライエントが問題解決へ向かう過程である。過程には「リレーションづくり」「問題の把握」「目標の設定」「目標の達成」の4段階があり、これらを明確に区切りながら段階を移行していくように進める。", answer:false, correction:"これらを明確に区切りながら → これらが重なり、時には前後しながら", explanation:"産業カウンセラー協会では、カウンセリング・プロセスについて「リレーションづくり」「問題の把握」「目標の設定」「目標の達成」の4段階のプロセスを示している。各段階は一応の区切りとして示されているが、実際には明確に区切られるものではなく、また時には戻ったりしながら、それぞれが重なり合って移行していく。"},
  {id:213, chapter:7, text:"カウンセリング・プロセスにおける「リレーションづくり」において重要なことは、クライエントが安心して自己を探索し、自分の問題・状況について率直に語れるようになることである。", answer:true, explanation:"カウンセリングは「リレーションづくり」から始まる。リレーションが深まり、ラポール（こころが通い合い互いに信頼感をもっている関係）が醸成されると、クライエントが安心して自己を探索し、自分の問題・状況について率直に語れるようになる。この信頼関係はカウンセリングの土台となるものである。"},
  {id:214, chapter:7, text:"カウンセリングの進行によって、クライエントは自分の問題をいろいろな角度から理解し、何をどう変えたいのか、変える必要はあるのかを吟味するようになる。この段階を「問題の把握」という。", answer:true, explanation:"「問題の把握」の段階の内容は設問のとおりである。この段階は、クライエントにとって自分自身に向き合い、自己受容を経て自己の責任において解決すべき問題を明らかにする段階であり、時には厳しい内的作業になることもあるため、カウンセラーによる内的探究への丁寧な支援が求められる。"},
  {id:215, chapter:7, text:"クライエントの問題を把握した後、カウンセラーは、問題解決のための目標を主導して設定し、クライエントがそれに取り組めるよう指示する。", answer:false, correction:"カウンセラーは、問題解決のための目標を主導して設定し、クライエントがそれに取り組めるよう指示する → クライエントが主体的に問題解決に向けて自ら検討し、それに取り組めるよう支援する", explanation:"クライエントにとっての問題や課題が明確になると、次に、解決あるいは課題の達成に向けた「目標の設定」の段階になる。目標を設定するにあたっては、カウンセラーはクライエントが主体的に選択し、設定し、取り組めるよう支援することが肝要である。"},
  {id:216, chapter:7, text:"クライエントが主訴としていた問題が解決し目標が達成されると終結となるが、本質的な問題が解決していないとカウンセラーが判断した場合には、カウンセリングの継続を促さなくてはならない。", answer:false, correction:"継続を促さなくてはならない → クライエントの意向を確認し、継続か終結かについての意思を尊重する", explanation:"クライエントが主訴としていた問題が解決し目標が達成されると終結となるが、場合によっては未解決の課題が残っているとカウンセラーが認識する場合もある。そのような場合であっても、カウンセラーの思いのみで面接の継続を求めることは適切ではない。クライエントの意向を確認し、継続か終結かについてのクライエントの意思を尊重する。終結となった場合には、必要な時はいつでも面接を再開できることを伝える。"},
  {id:217, chapter:7, text:"様々な努力によってもカウンセリングがうまく進まない場合もあるが、クライエントが主訴としていた問題が解決され目標が達成されるまでカウンセリングを続けなければならない。", answer:false, correction:"クライエントが主訴としていた問題が解決され目標が達成されるまで続けなければならない → 現状についてクライエントとカウンセラー間で整理したうえで、カウンセリングの今後について話し合う", explanation:"クライエントの状況などによって、カウンセリングの進み方は一様ではなく、うまく進まない場合もある。そのような場合、行き詰まりを明確にし、両者が現状を整理して、カウンセリングの今後について話し合うことが必要である。"},
  {id:218, chapter:7, text:"カウンセリングにおける見立てとは、クライエントが解決したい、解消したいと訴えることに潜む「問題または課題」をカウンセラーが探索し、その状況的な情報を勘案して査定を行ったうえで、クライエントへの支援方針を立てることである。", answer:true, explanation:"カウンセリングにおける見立ては、設問のとおりである。ただし、見立てはあくまでも仮説であるので、面接の進行に応じて適宜見直すことにより、その変更や修正を行う必要がある。"},

  // ===== 第8章 カウンセリングの諸理論 (219-340) =====
  {id:219, chapter:8, text:"カウンセリングとサイコセラピーは、理論や方法において重なるところが多い。カウンセリングはヨーロッパにおいて、サイコセラピーは米国において生まれた。", answer:false, correction:"カウンセリングはヨーロッパにおいて、サイコセラピーは米国において → カウンセリングは米国において、サイコセラピーはヨーロッパにおいて", explanation:"カウンセリングとサイコセラピーは、理論や方法において重なるところが多く、交換可能な用語として使用されることもある。歴史的にはサイコセラピーはヨーロッパで治療関係を背景として、カウンセリングは米国で職業指導を背景として、生まれたものである。"},
  {id:220, chapter:8, text:"1896年から1897年頃、催眠浄化法に限界があると考えたフロイト（Freud, S.）は、催眠を用いることを断念し、通常の意識状態で、過去の記憶を想起させる再帰性法を用いることとした。", answer:false, correction:"再帰性法 → 自由連想法", explanation:"催眠浄化法ではヒステリーがいったん治癒しても、再発や悪化が繰り返されることが多く、また患者の依存を助長しがちだった。フロイトは、催眠浄化法に限界を感じ、催眠を用いることを断念して、通常の意識状態で、過去の記憶を想起させる自由連想法を用いるようになった。"},
  {id:221, chapter:8, text:"ロジャーズ（Rogers, C. R.）は、当初、非指示的アプローチを提案したが、カウンセラーの指導助言や働きかけがクライエントの問題解決を阻害すると考えて、来談者中心療法に名称を修正させた。", answer:false, correction:"カウンセラーの指導助言や働きかけによってクライエントの問題解決を阻害する → カウンセラーが受身的で消極的であるという印象を与えてしまう", explanation:"ロジャーズは、カウンセリング関係の中でクライエントが自由に、主体的に自己探求し、自己決定していくプロセスの重要性を主張し、カウンセラーは傾聴を中心とした非指示的態度をとるべきとした。その後、「非指示」という用語がカウンセラーの受身的で、消極的な印象を強調してしまうといった誤解につながると考え、来談者中心療法に名称を修正した。"},
  {id:222, chapter:8, text:"さまざまに存在するカウンセリング理論のうち、どれか1つの立場に固執するのではなく、クライエントの問題やニーズに応じて、それぞれのカウンセリング理論の利点を選択的に活用する考え方は、折衷的カウンセリングと呼ばれる。", answer:true, explanation:"設問のとおり。さまざまなカウンセリング理論を統合的にとらえることで、単一の理論の弱点を補おうとする考え方は、統合的アプローチと呼ばれる。"},
  {id:223, chapter:8, text:"精神分析学は、フロイト（Freud, S.）によって創始された人間心理の理論と治療技法の体系を指し、フロイトは、局所論を提唱し、その後、構造論、曝露法的発達論などを提唱した。", answer:false, correction:"曝露法的発達論 → 精神性的発達論", explanation:"精神分析学は、フロイトによって創始された人間心理の理論と治療技法の体系を指し、フロイトは、局所論を提唱し、その後、構造論、精神性的発達論などを提唱した。"},
  {id:224, chapter:8, text:"フロイト（Freud, S.）以降の、自我心理学、対象関係論、ユングの分析心理学などを含めて、精神力動的セラピーと呼ぶ。", answer:true, explanation:"フロイト以降の、自我心理学、対象関係論、ユングの分析心理学などを含めて、精神力動的セラピーと呼ぶ。"},
  {id:225, chapter:8, text:"心理的問題や苦悩の原因として、個人の意識的な働きよりも無意識的な力動性を重視する。精神分析および精神力動的セラピーでは、クライエントがその無意識的な力動性への洞察が深まるように支援する。", answer:true, explanation:"心理的問題や苦悩の原因として、個人の意識的な働きよりも無意識的な力動性を重視する。精神分析および精神力動的セラピーでは、クライエントがその無意識的な力動性への洞察が深まるように支援する。"},
  {id:226, chapter:8, text:"精神分析および精神力動的セラピーでは、心理的問題や苦悩の原因として、クライエントの不適応な思考や感情、行動につながってしまった、誤った学習過程の修正を目指す治療法である。", answer:false, correction:"不適応な思考や感情、行動につながってしまった、誤った学習過程の修正を目指す治療法である。 → 思考や感情、行動を規定している無意識的な力への洞察や理解が深まるのを支援する治療法である。", explanation:"精神分析および精神力動的セラピーは、クライエントの思考や感情、行動を規定している無意識的な力への洞察や理解が深まるのを支援するものであり、それまでの学習過程の修正を目指すものではない。"},
  {id:227, chapter:8, text:"精神分析および精神力動的セラピーでは、行動の源となっている人間の心理現象の背後にある無意識的な力動性よりも、個人の意識の働きを重視する。", answer:false, correction:"無意識的な力動性よりも、個人の意識の働きを重視 → 無意識的な動機や意図を重視", explanation:"精神分析および精神力動的セラピーでは、行動の源となっている人間の心理現象の背後にある無意識的な動機や意図を重視する。"},
  {id:228, chapter:8, text:"精神分析および精神力動的セラピーで重要視する4つの特徴として、①無意識的な力動性の重視、②親子関係や生育史の重視、③問題や苦悩の意味やその洞察の重視、④対人関係の重視、があるが特に対人関係の重視においては、治療的退行や抵抗、転移といった独特の関係が生じ、またそうした関係性の克服（洞察）をしていくことが重要な支援の目的となる。", answer:true, explanation:"精神分析および精神力動的セラピーで重要視する4つの特徴として、①無意識的な力動性の重視、②親子関係や生育史の重視、③問題や苦悩の意味やその洞察の重視、④対人関係の重視、があるが特に対人関係の重視においては、治療的退行や抵抗、転移といった独特の関係が生じ、またそうした関係性の克服（洞察）をしていくことが重要な支援の目的となる。"},
  {id:229, chapter:8, text:"フロイト（Freud, S.）は、人間の心は、意識・前意識・無意識の3つの領域から構成されるという構造論を提唱した。", answer:false, correction:"構造論 → 局所論", explanation:"フロイトは、局所論で人間の心を意識、前意識、無意識の3つの領域から構成されているという説を提唱した。無意識的な内容は当人には気付かれず、夢、症状、不適応行動、失錯行為などの中に現れるとした。"},
  {id:230, chapter:8, text:"無意識領域は、欲動の充足と発散をはかる心的活動の働く場所であり、本人が認めがたいものは、意識から締め出して、無意識に閉じ込められる場所である。", answer:true, explanation:"無意識領域は、設問のとおりである。無意識の内容は、現実的な論理性や倫理性などを無視して欲動を発散、充足を図ろうとする。"},
  {id:231, chapter:8, text:"精神分析の構造論によれば、夢は、無意識に閉じ込めてある禁断の欲求や願望が、当人には気づかれず、願望を充足するため現れるものだとされる。", answer:false, correction:"構造論 → 局所論", explanation:"精神分析の局所論によれば、「夢は」無意識に閉じ込めてある禁断の欲求や願望を充足させるものである。"},
  {id:232, chapter:8, text:"フロイト（Freud, S.）が提唱した構造論とは、人間の心は、エス、自我、超自我の3層構造モデルからなっているという説である。", answer:true, explanation:"フロイトは「エス」から生じる心的エネルギーである「リビドー」とその満足に禁止をかける「超自我」との葛藤を調節し、現実適応をめざす「自我」の役割を仮定して、構造論を提唱した。エスとは、本能的性欲動の源泉である。不快を避けて快を求める快楽原則に支配されており、非論理的で非現実的な思考や不道徳で衝動的な行動をもたらす。"},
  {id:233, chapter:8, text:"超自我とは、内的な欲求と禁止の力関係を調整して現実世界への適応を図る部分である。", answer:false, correction:"超自我 → 自我", explanation:"自我は、エス・超自我・外界からの要求から生じる精神力動的葛藤を現実原則に従って調整する機関である。超自我とは、良心あるいは道徳的禁止機能を果たす。快楽原則に従う本能的衝動を検閲し抑圧する。多くは無意識的なものであり、この超自我の禁止に反した場合、後悔や罪悪感といった感情をもたらす。"},
  {id:234, chapter:8, text:"防衛機制とは、自分の現実感覚を正確に保つ働きや、自分の内面を安定させるために、働く機能であり、超自我の働きである。", answer:false, correction:"超自我 → 自我", explanation:"自我機能の1つとして、リビドーの衝動を受け流し、超自我からの禁止と外界への適応のために無意識的にとる防衛があるが、フロイトは、その防衛の特殊な手段を防衛機制と呼んだ。防衛機制は、自分の現実感覚を正確に保つ働きや、自分の内面を安定させるために、働く機能である。"},
  {id:235, chapter:8, text:"自我にとって危険な耐えられない衝動、それに結びついた記憶、イメージを意識から追放すること、あるいは無意識に押しとどめることによって忘れてしまったり、思い出すまいとしたり、気づくまいとする防衛機制を「隔離」という。", answer:false, correction:"隔離 → 抑圧", explanation:"記述は抑圧のことである。隔離とは、ある体験・経験からそれに当然伴ってくるはずの感情、イメージ、観念を切り離し、遠ざけることで距離を置く防衛機制である。"},
  {id:236, chapter:8, text:"こころに苦痛を引き起こす事態に直面したとき、現在の自分より幼い時期の発達段階に戻る防衛機制を「同一化」という。", answer:false, correction:"同一化 → 退行", explanation:"記述は退行のことである。同一化とは、ある人物があたかも別な人物になったかのような気持ちになったり、考えたりする防衛機制である。"},
  {id:237, chapter:8, text:"本当は、自分が相手のことを嫌っているのに、そう言うと自分が悪者になってしまうため、相手が自分を嫌っているとする防衛機制を「合理化」という。", answer:false, correction:"合理化 → 投影", explanation:"投影とは、自分の中の認めがたい抑圧した感情を、外界または他者に属するもの、それらから自己に向かってくるものとして知覚するという防衛規制である。"},
  {id:238, chapter:8, text:"自分が欲求不満を感じているなど、自分にとってマイナスの事態に対して、何かと理屈をつけて、その不満を感じなくしようとする防衛機制は、知性化という。", answer:false, correction:"知性化 → 合理化", explanation:"設問は防衛機制の合理化の説明である。知性化が弱まったときに現れやすい防衛である。歪曲された事実を用いたり、飛躍した論理を用いたりする防衛機制である。イソップの寓話『すっぱいぶどう』がこれにあたる。"},
  {id:239, chapter:8, text:"リビドー（性的エネルギー）の満足とは、身体が心地よいとか、満足を得たいという快の感情のことである。", answer:true, explanation:"リビドー（性的エネルギー）の満足とは、身体感覚、身体的な快感のことであり、身体が心地よいとか、満足を得たいという快の感情のことである。"},
  {id:240, chapter:8, text:"フロイト（Freud, S.）は、精神発達の過程は、口唇期、肛門期、男根期、発情期、性器期の段階における部分的な満足から、最終的には成人としての異性に統合されるとした。", answer:false, correction:"発情期 → 潜伏期", explanation:"フロイトは、精神発達の過程において、リビドーが溜まってしまう時期（固着点）を想定し、各過程を口唇期、肛門期、男根期、潜伏期、性器期として、各段階においては異性対象の部分的な満足から、最終的には一人の人間として愛せるようになり、バラバラであった倒錯的な性的活動が性器を中心としたものと統合されると考えた。"},
  {id:241, chapter:8, text:"カウンセラーがクライエントに対して恋愛感情を持つことを転移という。", answer:false, correction:"転移 → 逆転移", explanation:"転移とは、クライエントが過去の重要人物に対して抱いていた感情を、カウンセラーに向けることである。逆転移とは、カウンセラーがクライエントに対して生じる転移である。"},
  {id:242, chapter:8, text:"フロイト（Freud, S.）による自我の防衛機制やその発達についての考えを発展させて、自我心理学の基礎を築いたのはエリクソン（Erikson, E. H.）である。", answer:false, correction:"エリクソン（Erikson, E. H.） → アンナ・フロイト（Freud, A.）", explanation:"フロイトによる自我の防衛機制やその発達についての考えを発展させて、自我心理学の基礎を築いたのはアンナ・フロイトである。アンナ・フロイトは、成人のみならず児童に対しての精神療法（遊戯療法）を導入した。一方、エリクソンは、心理社会的な危機と発達課題が設定されているライフサイクル論を展開した。"},
  {id:243, chapter:8, text:"クライン（Klein, M.）は、フロイト（Freud, S.）のタナトス（死の本能）の概念を受け継ぎ、誕生間もない乳児にも、ともにタナトスが内在すると考えた。", answer:true, explanation:"フロイトの晩年の理論の継承者であったクラインはタナトス（死の本能）の概念を受け継ぎ、誕生間もない乳児にも、エロス（生の本能）とともにタナトスが内在すると考えた。そして、乳児のエロスは外界の良い対象（たとえば母親の良い乳房）と結びつき、タナトスは悪い対象（たとえば母親の悪い乳房）へ結合するとした。"},
  {id:244, chapter:8, text:"クライン（Klein, M.）は、乳幼児の発達において、妄想的ーシゾイド的態勢後に、乳幼児は自分が最も愛し必要としているものを、攻撃して破壊してしまったのではないかという後悔（罪悪感）を体験するとしている。", answer:true, explanation:"クラインは生後4〜6か月以降の乳幼児は、妄想的ーシゾイド的態勢後に、自分がもっとも愛し、必要としているものを、攻撃し破壊してしまったのではないかという後悔（罪悪感）を体験するとしている。こうした乳幼児の対象破壊の幻想と、それに伴う罪悪感の体験の様相を抑うつ的態勢と呼んだ。"},
  {id:245, chapter:8, text:"クライン（Klein, M.）の考え方を土台にして、フェアバーン（Fairbairn, W. R. D.）やガントリップ（Guntrip, H）らは、過度に本能論的なクライン（Klein, M.）の考えに修正を加え、対象希求的な人間の傾向性を重視し、より対人関係論的な理論を発展させた。", answer:true, explanation:"設問のとおり。フェアバーンやガントリップは、対象関係論を発展させた。"},
  {id:246, chapter:8, text:"アイゼンク（Eysenck, H. J.）は、言語連想実験等を通じて深層心理の探求を行い、フロイト（Freud, S.）の精神分析に共鳴し、共同研究者となった。", answer:false, correction:"アイゼンク（Eysenck, H. J.） → ユング（Jung, C. G.）", explanation:"言語連想実験等を通じて深層心理の探求を行ったユングは、フロイトの精神分析に共鳴し、共同研究者となったが、後に袂を分かった。"},
  {id:247, chapter:8, text:"ユング（Jung, C. G.）はフロイト（Freud, S.）の言う無意識の層と前意識との中間に、人類のきわめて長い時間の経験の蓄積によって構成された元型（アーキタイプ）が存在する、集合的無意識の層があると考えた。", answer:false, correction:"無意識の層と前意識との中間 → 無意識の層よりもさらに深い位置", explanation:"ユングはフロイトの言う無意識の層よりもさらに深い位置に、人類のきわめて長い時間の経験の蓄積によって構成された元型（アーキタイプ）が存在する、集合的無意識の層があると考えた。"},
  {id:248, chapter:8, text:"ユング（Jung, C. G.）は、無意識を「個人的無意識」と「文化的無意識」に分けて考えた。", answer:false, correction:"文化的無意識 → 集合的無意識", explanation:"ユングは、精神病患者らの語るイメージに共通点が多いこと、また、世界各地の神話・伝承とも一致する点が多いことから、人間の無意識の奥底に人類共通の素地が存在すると考えた。ユングは、無意識を「個人的無意識」と「集合的無意識」に分けて考え、集合的無意識とは、個人を超えた集団や民族、人類の心に普遍的に存在する領域であると考えた。"},
  {id:249, chapter:8, text:"ウィニコット（Winnicott, D. W.）は、自然で十分な育児を行う「ほどよい」母親を理想とした。", answer:true, explanation:"フロイト以降の精神分析の発展として、対象関係論学派がある。その一人であるウィニコットは、精神病やパーソナリティ障害は子どもの心身を抱える環境側に由来すると考え、設問のとおり、とても良いのではなく「ほどよい」（good enough）母親を理想とした。"},
  {id:250, chapter:8, text:"日本では2010年度に、習熟した医師がうつ病に対して認知行動療法を行った場合、医療保険の対象となった。", answer:true, explanation:"2010年の厚生労働省通知で認知行動療法が医療保険適用の対象に定められている。認知療法・認知行動療法に習熟した医師が治療に関する計画を作成し、患者に詳細な説明を行うこと、セッション1回あたり30分以上かけること、全16回以内におさめることとなっている。"},
  {id:251, chapter:8, text:"現在、うつ病、強迫症、社交不安症、パニック症、心的外傷後ストレス障害、神経性過食症に対して認知行動療法を行った場合は、医療保険の対象となっている。", answer:true, explanation:"認知行動療法が医療保険の対象となるのは、気分障害（うつ病など）以外に強迫症、社交不安症、パニック症、心的外傷後ストレス障害又は神経性過食症の患者に対して、認知の偏りを修正し、問題解決を手助けすることによって治療することを目的とした精神療法を行う場合である。現在のところ、習熟した医師、もしくは医師と看護師が共同して行った場合に、医療保険の対象となっている。（2024年8月現在）"},
  {id:252, chapter:8, text:"認知行動療法はうつ病、不安障害、摂食障害や睡眠障害などの幅広い心の問題に対して効果的であるというエビデンスが多くの研究によって示されてきた。", answer:true, explanation:"認知行動療法のエビデンスについては、英国保健省の「NICEクリニカルガイドライン」、アメリカ心理学会（APA）の「心理トリートメントのリサーチエビデンス」などによりその効果が認められている。日本でも、うつ、強迫症、社会不安症、パニック症、心的外傷後ストレス障害、過食症に対する認知行動療法の効果を厚生労働省がすでに認めており、国立研究開発法人国立精神・神経医療研究センター（NCNP）認知行動療法センターの研究グループは、うつや不安などの感情的な症状が改善することを明らかにしている。"},
  {id:253, chapter:8, text:"1950年代から台頭してきた行動療法に、1970年代から注目され始めた認知的アプローチが加わり、1970年代後半から認知行動療法という用語が使われるようになった。", answer:true, explanation:"行動療法は古典的条件づけやオペラント条件づけなどの行動研究から発展して1950年代に体系化された。認知行動療法は、ベック（Beck, A. T.）の認知療法やエリス（Ellis, A.）の論理情動行動療法などから始まり、1970年代後半に体系化された。"},
  {id:254, chapter:8, text:"行動療法では、心の問題を不適応な行動の学習あるいは適応的な行動の未学習であると考える。", answer:true, explanation:"行動療法の特徴は、客観的に測定可能である行動を重視し、心の問題を不適応な行動の学習あるいは適応的な行動の未学習であると捉え、行動の原理に基づき行動の変容を通して、問題解決を図る点にある。"},
  {id:255, chapter:8, text:"行動療法は、実験的に明らかにされた行動の原理に基づき、不適応的な行動を減らしたり、適応的な行動を増やしたりする技法の総称である。行動療法が基づく行動の原理のひとつに、パブロフ（Pavlov, I. P.）によるオペラント条件づけがある。", answer:false, correction:"パブロフ（Pavlov, I. P.） → スキナー（Skinner, B. F.）（あるいはオペラント条件づけ→レスポンデント条件づけ）", explanation:"行動療法の理論では、人間の反応を刺激ー反応ー結果のつながりで捉える。パブロフのレスポンデント条件づけは刺激ー反応のつながりで、オペラント条件づけは反応ー結果のつながりに関する原理に関係している。オペラント条件づけという用語はスキナーによって提唱された。"},
  {id:256, chapter:8, text:"犬にベルの音を聞かせながらエサを呈示することを何回か繰り返すと、ベルの音だけで唾液分泌をするようになる、このような条件づけをオペラント条件づけという。", answer:false, correction:"オペラント条件づけ → レスポンデント条件づけ", explanation:"犬にベルの音を聞かせるだけで唾液を出させる実験はレスポンデント条件づけと呼ばれ、その代表例が「パブロフの犬」の実験である。オペラント条件づけとは、能動的な行動によって得られる、報酬や罰といった刺激に応じて、その能動的な行動の強弱が変化する学習のことである。"},
  {id:257, chapter:8, text:"犬に「お座り」と言って、犬がお座りをしたときにエサをあげるなどの強化をすると、「お座り」の指示でお座りをする確率が高くなっていく、このような条件づけをレスポンデント条件づけという。", answer:false, correction:"レスポンデント条件づけ → オペラント条件づけ", explanation:"犬に芸を仕込もうと餌で特定の行動をする頻度を増やし強化する条件づけは、「オペラント条件づけ」と呼ばれる。1898年に、ソーンダイク（Thorndike, E. L.）が行った試行錯誤学習に関する実験で命名されたものである。レスポンデント条件づけは、犬にエサを与えるときベルを鳴らし、ベルの音だけで唾液を出す条件づけを指す。"},
  {id:258, chapter:8, text:"オペラント条件づけでは、結果によって行動の頻度が増加することを強化と呼び、減少することを弱化と呼ぶ。", answer:true, explanation:"設問のとおり。オペラント条件づけの観点では、良い結果が伴えばその後同じ振る舞いをすることが増え、逆に悪い結果が伴えば、その後同じ振る舞いをすることは減ると考える。"},
  {id:259, chapter:8, text:"1960年代後半から、スキナー（Skinner, B. F.）が、認知に着目した社会的学習理論を提唱した。", answer:false, correction:"スキナー（Skinner, B. F.） → バンデューラ（Bandura, A.）", explanation:"社会学習理論を提唱したのはバンデューラである。社会的学習理論とは、他者の行動を観察することで、自らも新たな行動を習得していく、または既存の行動を変容していくことである。スキナーは、オペラント条件づけの理論を提唱した。"},
  {id:260, chapter:8, text:"モデルの行動やその結果の観察により、学習者の行動に変化が生じる現象をモデリングという。", answer:true, explanation:"社会的学習理論は、バンデューラによって提唱されたもので、人間がある行動を身に付けるうえで、認知が重要な役割を果たしていることを示している。モデル（他者）と同一の行動を遂行せず、強化を受けずとも、学習者がモデルの行動やその結果の観察により学習者の行動に変化が生じる現象をモデリングと呼んだ。"},
  {id:261, chapter:8, text:"認知的アプローチの特徴は、心の問題は、きっかけとなる出来事ではなく、その出来事の捉え方、つまり認知によって生じるという考え方である。", answer:true, explanation:"認知的アプローチは、バンデューラが、認知に着目した社会的学習理論を提唱したことを契機に、発展してきた。その特徴は、設問のとおりである。1970年代の後半から第一世代の行動療法と認知的アプローチの総称として認知行動療法という用語が使われるようになった。"},
  {id:262, chapter:8, text:"1970年代から、エリス（Ellis, A.）の認知療法や、ベック（Beck, A. T.）の論理療法が注目されるようになった。", answer:false, correction:"エリス（Ellis, A.）の認知療法や、ベック（Beck, A. T.）の論理療法 → エリスの論理療法や、ベックの認知療法", explanation:"1950年代に、「論理療法」はアルバート・エリスにより、また「認知療法」はアーロン・T・ベックにより提唱された。これらの第2世代の認知行動療法では、悩みなどの心理的な問題や生理的な反応は、出来事や刺激そのものではなく、それをどのように受け取ったのかという認知によって生じると考える。"},
  {id:263, chapter:8, text:"論理情動行動療法を提唱したエリス（Ellis, A.）は、心の問題は出来事ではなく、その出来事に関する信念、つまり認知によって生じると主張した。", answer:true, explanation:"エリスは1995年頃、心の問題は、出来事ではなく、その出来事に関する不合理な信念によって生じるとする心理療法を提唱した。その心理療法を当初は論理療法と称していたが、情動を無視して論理性だけで心理療法を行えるわけはないという批判から、情動を無視しているわけではないことを明らかにするために論理情動療法とエリス自身が改名した。さらに、信念つまり認知のみを変容しても、体験を伴わないと本質的な解決にはならないことから、論理情動行動療法とエリス自身が改名している。"},
  {id:264, chapter:8, text:"エリス（Ellis, A.）のABC理論におけるB（Belief）の信念には、理性的な信念（Rational Belief）と非理性的（不合理）な信念（Irrational Belief）の2つのタイプがあり、心の問題となる結果C（Consequence）を引き起こすのは、不合理な信念であるとされる。", answer:true, explanation:"エリスの「ABC理論」における「A」は「出来事（Activating event）」、「B」は「信念（belief）」で、その人の世界観を作り上げる信念やその人の持つ認知の枠組みなどを指し、「C」は「結果（Consequence）」である。信念には、理性的な（合理的な）（rational belief）信念と、非理性的な（不合理な）（irrational belief）信念があり、多くの場合、不適切な情動や行動は、不合理な信念によって生じていると考えられている。エリスは、非理性的な信念を論理的に打ち破ること、論駁すること「D」（Dispute）によって、心の問題が改善するといった効果「E」（Effect）が生じると考えた。この一連のプロセスは、ABCDE理論と呼ばれることもある。"},
  {id:265, chapter:8, text:"ベック（Beck, A. T.）の認知理論では、より表層に現れる「自動思考」、より深層にある「スキーマ」、スキーマから自動思考を生じさせる「推論の誤り」の3つの認知のレベルを想定している。", answer:true, explanation:"ベックの認知理論では、認知の3つのレベルが想定されている。より表層に現れる自動思考、より深層にあるスキーマ、スキーマから自動思考を生じさせる推論の誤りである。"},
  {id:266, chapter:8, text:"認知行動療法の代表的な技法として、セルフモニタリング、行動活性化療法、エクスポージャー法などがある。", answer:true, explanation:"認知行動療法の代表的な技法として、セルフモニタリング（自分自身の行動や認知、感情を継続的に観察する行為）、行動活性化療法（抑うつ状態にみられる活動抑制や嫌悪体験からの回避行動を減少させ、ポジティブな体験が得られるよう自分の価値に沿った行動を増やすことをめざす技法）、エクスポージャー法（不安反応の誘発刺激に一定時間曝露する技法）などがある。他にもソーシャルスキル・トレーニングやアサーション・トレーニング、認知再構成法、問題解決療法などがある。"},
  {id:267, chapter:8, text:"エクスポージャー法とは、不安反応を誘発する刺激に一定時間曝露する技法である。エクスポージャー法を実施する際に、自律訓練法などのリラクセーション技法を併用する場合もある。", answer:true, explanation:"エクスポージャー法とは、恐怖や不安な事態に直接さらして（暴露して）慣れさせるというもので、多くの不安症や恐怖症に対する治療法である。不安反応を消していくことを目指す古典的条件づけの原理に基づいた行動療法の一つである。不安階層表を作成し段階的に行っていくが、自律訓練法などでリラクセーションを取り入れながら行う場合もある。"},
  {id:268, chapter:8, text:"行動活性化療法は、抑うつ状態にみられる活動抑制や嫌悪体験からの回避行動を減少させ、ポジティブな体験が得られるような自分の価値に沿った行動を増やすことをめざした技法である。", answer:true, explanation:"行動活性化療法とは、抑うつ状態やうつ病に対して選択される認知行動療法の一つである。抑うつ状態やうつ病のネガティブな出来事を避ける回避行動に介入し、本人の思考ではなく行動パターンを変えることを重視し、それにより気持ちを軽くして本来の自分を取り戻すことを目的としたアプローチ法である。治療法として体系化されたのは2000年代に入ってからで、うつ病の治療において高い効果が得られることが国内外の臨床研究によって報告されている。"},
  {id:269, chapter:8, text:"ソーシャル・スキル・トレーニングでは、具体的で実現可能な訓練目標をたてて、ロールプレイによって練習し、望ましい行動は即座に強化する。そして練習したスキルを日常生活においても実際に用いてもらい、社会的スキルの不足による不適応を減らしていく。", answer:true, explanation:"設問のとおり。ロールプレイの時に、モデルが実際の行動を示すモデリング法も活用されている。"},
  {id:270, chapter:8, text:"問題解決療法は、ストレス体験となっている日常生活における問題の解決に至るプロセスを5段階に分け、順に取り組むことを繰り返し、問題解決に向けた一連のスキルを高めることを目的としている。", answer:true, explanation:"設問のとおり。いろいろな問題で何度もカウンセリングを受けるクライエントの中には、問題解決のスキルを習得できていない人がいる。そのような人に、問題解決療法で問題解決のスキルを習得させれば、何度もカウンセリングに訪れる必要がなくなるのである。"},
  {id:271, chapter:8, text:"アサーショントレーニングでは、相手がどう受け止めるかに関係なく、自分の意見や感情をなるべく率直に表現する方法を訓練する。", answer:false, correction:"相手がどう受け止めるかに関係なく → その場にあった適切な方法で", explanation:"アサーション・トレーニングは、自己の意見や感情を社会的に認められる形で表現するために必要な主張行動を訓練する方法である。このトレーニングでは、自分も相手も大切にした自己表現の仕方の訓練であり、自分の感情や考え、要求などをおもに言語を通して適切に表現する能力を養うので、「自分の言いたいことが言えない人」「対人関係で自己中心的な人」「引っ込み思案な人」などに有効とされている。"},
  {id:272, chapter:8, text:"認知再構成法とは、非機能的な認知に焦点をあて、より機能的な認知へと置き換えていくことを目指す技法である。", answer:true, explanation:"認知再構成法とは、非機能的な認知に焦点をあて、より機能的な柔軟な認知へと置き換えていくことを目指す認知療法の代表的な技法である。この療法では、まず、クライエント自らの自動思考を捉えられるようになることが大切で、思考記録表を用いてセルフモニタリングを行う。思考記録表には①状況、②気分、③自動思考、④根拠、⑤反証、⑥適応的な思考、⑦いまの気分（感情）を記載する。"},
  {id:273, chapter:8, text:"1990年代前後から、弁証法的行動療法、マインドフルネス認知療法、アクセプタンス&コミットメントセラピー等の新たな心理療法が提唱され、これらが第三世代の認知行動療法と称されるようになった。", answer:true, explanation:"第三世代の認知行動療法と称されるのは、1990年代前後から始まった新しい精神療法で、認知の機能やプロセスを重視しながら治療するのが特徴である。代表的なものに弁証法的行動療法、マインドフルネス認知療法、アクセプタンス&コミットメントセラピーなどがある。弁証法的行動療法は、境界性パーソナリティ障害向けに開発され、マインドフルネス認知療法は、うつ病再発防止を目的として開発された。アクセプタンス&コミットメントセラピーは、マインドフルネスの考え方を基盤としたものである。"},
  {id:274, chapter:8, text:"第三世代の認知行動療法に位置づけされるマインドフルネスとは、「いま、ここの自らの体験に、判断をしないで、意図的に気づきを向けること」である。", answer:true, explanation:"第三世代の認知行動療法は、不適応的な認知や感情自体を直接的に変えるのではなく、それらの体験とのつき合い方に焦点をあてる。第三世代の認知行動療法には、弁証法的行動療法、マインドフルネス認知療法、アクセプタンス&コミットメント・セラピー等の新たな心理療法が提唱されている。この中のマインドフルネスについては、設問のとおりである。"},
  {id:275, chapter:8, text:"ネフ（Neff, K. D.）によると、セルフ・コンパッションの主要な要素は、自分に優しくすること、無意識の欲求を意識化すること、ありのままの世界に対してマインドフルでいることである。", answer:true, explanation:"ネフの提唱したセルフ・コンパッション（self-compassion）とは、困難な状況において、自己に生じた苦痛をありのまま受け入れ、その苦痛を緩和し、幸せになりたいと願い、自己との肯定的な関わり方をすることである。その3つの要素として①優しさと理解で自分を扱う②自分の考えや感情に気づく③ありのままの世界に対してマインドフルネスでその場にいることである。"},
  {id:276, chapter:8, text:"人間性心理学とは、人間の統合性や創造性、自己実現といった高次の機能を重視しつつ、否定的な性格を修正することを目指す心理学の潮流を指す。", answer:false, correction:"否定的な性格を修正 → 肯定的な側面を重視", explanation:"人間性心理学とは、人間の統合性や創造性、自己実現といった高次の機能や肯定的な側面を重視する心理学の潮流を指す。ヒューマニスティック心理学とも呼ばれている。代表的な人間性心理学者に、マズロー、ロジャーズ、パールズらがいる。"},
