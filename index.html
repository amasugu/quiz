  {id:277, chapter:8, text:"来談者中心療法は、マズロー（Maslow, M.）によって創始されたカウンセリングの理論と方法である。", answer:false, correction:"マズロー（Maslow, M.） → ロジャーズ（Rogers, C. R.）", explanation:"来談者中心療法は、ロジャーズによって創始されたカウンセリングの理論と方法である。マズローは、1954年人間は人類に普遍的で、発生的、本能的な起源をもつ基本的な欲求によって動機づけられているとして、欲求階層理論を発表した。"},
  {id:278, chapter:8, text:"ロジャーズ（Rogers, C. R.）は、生命体は自らをよりよく実現していこうとする潜在的な力を持ち、適切な環境下では、生命体はこの傾向に従って成長していくという人間観を示した。", answer:true, explanation:"ロジャーズは、『クライアント中心療法』（1951）で、「生命体は、一つの基本的な傾向と力をもっている。それは体験のただ中にある生命体自体を実現し、維持し、増進することである」と述べている。ロジャーズは、人間の唯一かつ最大の動因は「実現傾向」であると考え、適切な条件下にある生命体は、この傾向に従って成長するという、生命体が持つ潜在力を重視した。"},
  {id:279, chapter:8, text:"ロジャーズ（Rogers, C. R.）が1951年に発表した「自己理論」と呼ばれる人格理論は、自己構造（自己概念）と体験の一致・不一致から自己のありかたを説明する理論である。", answer:true, explanation:"ロジャーズが1951年に発表した人格理論は、自己構造（自己概念）と体験（生命体的な体験）の一致・不一致を表したものである。この人格理論は19の命題と解説で構成されている。"},
  {id:280, chapter:8, text:"ロジャーズ（Rogers, C. R.）の自己理論によれば、生命体が感覚的・知覚的かつ内臓的・直感的な体験に気づくことを否認すると、体験が象徴化されず心理的不適応が生じるとされる。", answer:true, explanation:"ロジャーズは、心理的不適応を「生命体が重要な感覚的・知覚的かつ内臓的・直感的な体験に気づくことを否認すると、そうした体験が自己構造の中に組織化されないときに生じる」（人格理論・命題14）と考えた。"},
  {id:281, chapter:8, text:"ロジャーズ（Rogers, C. R.）の「パーソナリティ変化の必要十分条件」において、セラピストの中核条件とされているのは、自己一致、条件付き肯定的配慮、共感的理解の3条件である。", answer:false, correction:"条件付き → 無条件の", explanation:"ロジャーズの「パーソナリティ変化の必要十分条件」は、ロジャーズの態度として、自己一致・無条件の肯定的配慮・共感的理解の中核3条件とまとめられている。パーソナリティ変化の必要十分条件は、①2人の人が心理的接触をもっており、②クライエントは、不一致の状態にあり、③セラピストは、その関係の中で一致して統合しており、④セラピストは、クライエントに対して無条件の肯定的配慮を体験しており、⑤セラピストは、クライエントの内的照合枠を共感的に理解しており、⑥セラピストの共感的理解と無条件の肯定的配慮が、最低限クライエントに伝わっていることである。"},
  {id:282, chapter:8, text:"体験過程の概念を作り出したのは、ウィニコット（Winnicott, D. W.）である。", answer:false, correction:"ウィニコット（Winnicott, D. W.） → ジェンドリン（Gendlin, E. T.）", explanation:"体験過程の概念を作り出したのは、ジェンドリンである。これは、ロジャーズが自己理論において重視した体験の概念を緻密に規定し直し、体験過程がいかに機能するかということを明らかにした。なお、ウィニコットは、フロイト以降の精神分析的立場で対象関係論学派である。心の中の対象イメージと、自我・自己との関係を重視する立場である。"},
  {id:283, chapter:8, text:"ロジャーズ（Rogers, C. R.）は、相手と共にいることへの誠実な態度のことをストレート（straight）と呼んだ。", answer:false, correction:"ストレート（straight） → プレゼンス（presence）", explanation:"ロジャーズは、相手と共にいることへの誠実な態度のことをプレゼンス（presence）と呼んだ。自己への執着から離れて、そこで体験されることに誠実に心を開いているあり方のことである。"},
  {id:284, chapter:8, text:"ロジャーズ（Rogers, C. R.）に影響を受けた人々に、ヘルピング技法の提案者カーカフ（Carkutff, R.）やフォーカシングを創案したジェンドリン（Gendlin, E. T.）らがいる。", answer:true, explanation:"ロジャーズに影響を受けた人々には、ヘルピング技法の提案者カーカフ、実存的児童心理療法家のムスターカス（Moustaka, C.）やフォーカシングとして概念化したジェンドリンらがいる。"},
  {id:285, chapter:8, text:"ロジャーズ（Rogers, C. R.）は、晩年、個人カウンセリングだけでなく、社会的活動にも携わるようになり、こうした活動を「体験的セラピー」と呼ぶようになった。", answer:false, correction:"体験的セラピー → パーソンセンタード・アプローチ", explanation:"ロジャーズは晩年、個人カウンセリングだけでなく、エンカウンターグループや社会活動にも携わり、こうした活動をパーソンセンタード・アプローチ（PCA）と呼ぶようになった。ロジャーズは、このエンカウンターグループをグループによる集団トレーニングに応用し、ベーシック・エンカウンターグループと名付け、そのねらいは、集団の育成よりも個人の成長の促進におかれた。"},
  {id:286, chapter:8, text:"交流分析の理論の哲学的前提は、人はだれでも自分で考える能力をもち、人はだれでも自分の運命を決めることができるが、その決定にしばられてしまう、というものである。", answer:false, correction:"その決定にしばられてしまう → その決定は変えることができる", explanation:"交流分析の理論は、精神分析から出発してエリック・バーン（Berne, E.）が創始したもので、人間、人生、その変化についてある哲学的前提に立っている。それは「人はだれでも自分で考える能力をもち、人はだれでも自分の運命を決めることができ、その決定は変えることができる。」というものである。"},
  {id:287, chapter:8, text:"交流分析では「自我状態」の概念を用いて人のパーソナリティを分析する。この自我状態は「親」「他者」「子ども」の3つに分類される。", answer:false, correction:"「他者」 → 「成人」", explanation:"交流分析では「自我状態」の概念を用いて人のパーソナリティを分析する。自我状態は「親」（P）、「成人」（A）、「子ども」（C）の3つに分類される。過去に取り入れた特定の人の姿を示すものが「親」であり、特定の年齢の自分の姿を示すものが「子ども」であり、「今、ここ」で起こっている問題に対して直接取り組んでいる姿が「成人」である。"},
  {id:288, chapter:8, text:"デュセイ（Dusay, J. M.）は、「描写された自我状態」を図として表示する直観的な方法を考案し、それを「エゴグラム」と呼んだ。", answer:true, explanation:"デュセイは、「描写された自我状態」を図として表示する直観的な方法を考案し、それを「エゴグラム」と呼んだ。それは、描写された自我状態の項目を横に並べ、それぞれにどの程度、精神的エネルギーが費やされているかを棒グラフで描くものである。"},
  {id:289, chapter:8, text:"交流分析における「交差するやりとり」とは、交流の相手が期待した自我状態で反応し、自分の当初の自我状態に返ってくるやりとりである。", answer:false, correction:"「交差するやりとり」 → 「相補的なやりとり」", explanation:"設問は「相補的なやりとり」に関する記述である。「相補的なやりとり」ではコミュニケーションは続いていく。「交差するやりとり」は、やりとりが交差するものでコミュニケーションは中断する。それを再開するには、一人または両者が別の自我状態に移行する必要がある。"},
  {id:290, chapter:8, text:"交流分析におけるストロークは、受け取った人が心地よい体験をするポジティブなものと心の痛みを体験するネガティブなものがある。", answer:true, explanation:"交流分析におけるストロークは、相手の存在を認める働きかけの単位で、①言葉によるかそうでないか、②受け取った人が心地よい体験をするポジティブなものか、心の痛みを体験するネガティブなものか、③条件つきか無条件か、によって分類される。"},
  {id:291, chapter:8, text:"交流分析における基本的な人生のポジションは、①私はOK、あなたもOK、②私はOKであるが、あなたはOKでない、③私はOKではないが、あなたはOK、④私はOKでなく、あなたもOKでない、の4つに分類される。", answer:true, explanation:"交流分析における基本的な人生のポジションは、設問のとおり、4つに分類される。いったんどれか1つが選択されると、人は自分の脚本をそれに合うように構成する。"},
  {id:292, chapter:8, text:"交流分析の治療では、具体的で達成可能な目標を設定する。そのゴールは「自律性」と「脚本からの解放」である。", answer:true, explanation:"交流分析の治療では、具体的で達成可能な目標を設定する。そのゴールである「自律性」とは、「気づく、自発的になる、親密になる」の3つの能力が自由に発揮できることを指す概念である。この交流分析を創始したエリック・バーンは、自律性を尊重すると同時に「治すこと」も強調した。バーンは「治るとは、脚本を完全に打ち破り、新たな事業を開始すること」と述べている。"},
  {id:293, chapter:8, text:"ゲシュタルト療法では、断片的で不完全な生き方を、より統合的で全体的な生き方へと変容させるために「いま、ここ」での体験への覚醒を通して、自分自身を取り戻すことを目指す。", answer:true, explanation:"ゲシュタルト療法は、ゲシュタルト心理学や実存哲学などに基づきパールズ（Pearls, F. S）によって創始されたサイコセラピーである。ゲシュタルト（gestalt）はドイツ語で「形態」や「全体」の意味であり、ゲシュタルト療法の理論の基本的概念である。"},
  {id:294, chapter:8, text:"ゲシュタルト療法ではクライエントのいまの関心や欲求が向かっている対象を「図」と呼ぶ。その関心や欲求が満たされると図は背景（地）となるが、不適応状態のときには失敗の経験などが図として固着し、別の見方ができなくなってしまうと捉える。", answer:true, explanation:"「ルビンの盃」で説明される横顔が見えるとき、それが「図」であり、盃の部分は背景、つまり「地」である。盃が「図」となれば、横顔は「地」となる。ゲシュタルト療法では、「図」と「地」の反転、別の見方ができることへの気づきと統合を促すことをめざす。"},
  {id:295, chapter:8, text:"ゲシュタルト療法では、不適応は「いま、ここ」にあると捉えるので、不適応を乗り越えるためにクライエントの注意を現在ではなく過去や未来へと向けていく。", answer:false, correction:"クライエントの注意を現在でなく過去や未来 → クライエントの注意を過去や未来ではなく「いま、ここ」", explanation:"ゲシュタルト療法では、「いま、ここ」という現在性を重視する。過去や未来に注意を向けるのではなく、「いま、ここ」で起こっている現象に注意を向け、観察し表現することが勧められる。"},
  {id:296, chapter:8, text:"ゲシュタルト療法は、知性化よりも体験を重視し、クライエントの自己への気づき促進するために、ホットシート、エンプティチェア、夢のワークなどの方法が用いられる。", answer:true, explanation:"ゲシュタルト療法では、言語的な表現だけでなく、非言語的な表現、動作、表情にも注目する。各種のボディワークもあり、この療法では、知性化よりも体験やその表現を重視する。"},
  {id:297, chapter:8, text:"家族療法では、何らかの問題行動を当の本人だけの問題とみるのではなく、家族全体あるいは家族システムの問題とみる見方を提示している。", answer:true, explanation:"家族療法では、何らかの問題行動を当の本人だけの問題とみるのではなく、家族全体あるいは家族システムの問題とみる見方を提示している。すなわち、その人に何らかの原因があるとする従来の見方ではなく、その人が所属する家族、さらにはその家族を取り巻く地域社会に、その人がそうならざるをえないような何かがあるのではないか、と考える。"},
  {id:298, chapter:8, text:"家族療法では、家族システムの維持のために必要とされる人のことをIP（identified patient）という。", answer:true, explanation:"家族療法の特徴の一つに、家族メンバーのだれかを悪者にする考え方から抜け出そうとすることがある。家族システムの維持のために必要とされる人をIP（患者の役割を担う人）という。その家族システムがIPを必要としていると考える。"},
  {id:299, chapter:8, text:"家族療法では、問題となっている行動の直線的な原因を探すことはしないで、家族病理を円環的因果律として捉え、その問題の背景に、その問題の原因となり、その問題を持続させているという悪循環が生じていないかと問い、その悪循環から抜け出す手立てを探求しようと試みる。", answer:true, explanation:"家族療法では、問題となっている行動の直線的な原因を探すことはしないで、家族病理を円環的因果律として捉え、その問題の背景に、その問題の原因となり、その問題を持続させているという悪循環が生じていないかと問い、その悪循環から抜け出す手立てを探求しようと試みる。"},
  {id:300, chapter:8, text:"家族療法における重要な理論に、ベイトソン（Bateson, G.）のダブルバインド（二重拘束）理論がある。ダブルバインドとは、ある二者関係において、一方からもう一方に、言語的なメッセージとそれに相反するような非言語的なメッセージを同時に送ることなどである。", answer:true, explanation:"ベイトソンは、機能不全家族におけるコミュニケーションの研究を行い、言語的メッセージと同時に相反するような非言語的メッセージを同時に送ると、その矛盾したメッセージを受け取った相手は混乱し、葛藤状態におかれやすくなることを見出した。ベイトソンは、統合失調症患者とその母親との間には、ダブルバインドが繰り返し生じている可能性を指摘し、その後の家族療法の発展に影響を与えた。"},
  {id:301, chapter:8, text:"家族療法の主要な立場には、MRI（Mental Research Institute）を拠点としたコミュニケーション派/戦略派のほかに、ミニューチン（Minuchin, M. S.）らの構造派、ボーエン（Bowen, M.）らの多世代派などがある。", answer:true, explanation:"設問のとおり。その他に、家族の行動パターンや信念体系に焦点を当てるパラツォーリ（Selvini-Palazzoli, M）らのミラノ派/システミック派などがある。"},
  {id:302, chapter:8, text:"家族療法の方法には、家族メンバー全員による面接を行う合同家族面接や、セラピストが家族の文化の中に溶けこみ、家族パターンやコミュニケーションなどを観察し、模倣するリフレーミングなどがある。", answer:false, correction:"リフレーミング → ジョイニング", explanation:"リフレーミングは、出来事、行動および関係性などの事実を変えずに、その事実が生じた文脈や意味づけを変容させることである。セラピストが家族の文化の中に溶けこみ、家族パターンやコミュニケーションなどを観察し、模倣する技法はジョイニングという。"},
  {id:303, chapter:8, text:"解決焦点型アプローチ（SFA）におけるコンプリメントとは、主に相手の話に同意や同情することである。", answer:false, correction:"同意や同情 → ねぎらいや称賛", explanation:"解決焦点型アプローチ（SFA）における技法であり態度でもあるコンプリメントとは、主に相手の話にカウンセラーがねぎらいや称賛することで、様々な場面で用いられている。"},
  {id:304, chapter:8, text:"解決焦点型アプローチ（SFA）においては、クライエントの生活の中にある「例外（問題が生じていないとき）」や「リソース（クライエントの努力や資質・能力）」を探して、解決の構築を支援していく。", answer:true, explanation:"設問のとおり。解決焦点型アプローチ（SFA）は、クライエントが自発的に考えられる解決方法を導き出せるように手助けする方法である。"},
  {id:305, chapter:8, text:"ブリーフセラピーの問題焦点型アプローチは、クライエントが用いている解決行動それ自体が問題を維持し再生産する「偽解決」になっているととらえ、そのようなコミュニケーションのパターンを変化させることで問題解決を図るものである。", answer:true, explanation:"設問のとおり。問題を活性化させるような指示を与えることで逆に悪循環を断ち切る「治療的パラドックス」を用いて、クライエントのコミュニケーションパターンを変化させる。問題状況とその解決の道筋をイメージ出来るようにメタファーを積極的に活用する。"},
  {id:306, chapter:8, text:"ブリーフセラピーで用いられるスケーリングクエスチョンとは、クライエントにとって最悪な状態を「0」、望ましい状態を「10」として、どうすれば「10」の状態になれるかを考えさせる方法である。", answer:false, correction:"どうすれば「10」の状態になれるかを考えさせる → 例えば、現状プラス1にするには何が役立つのかを考えさせる", explanation:"現在がすでに「3」の状態ならば「3」であることのリソースは何があるのか、「4」になるためには何が役立ち、何ができるのか、スモールステップでクライエントのリソースに焦点を当てる。"},
  {id:307, chapter:8, text:"ブリーフセラピーでは、もしも奇跡が起きたらどうなるかを問うことで解決後の状況をイメージさせるコーピングクエスチョンを用いることがある。", answer:false, correction:"コーピングクエスチョン → ミラクルクエスチョン", explanation:"設問は、ミラクルクエスチョンについての記述である。コーピングクエスチョンとは、クライエントに対して、これまでどのように問題に対処してきたかを問い、その答えから対処できている部分もあることを確認する。これがクライエントが自分のリソースに気づくきっかけとなる。"},
  {id:308, chapter:8, text:"表現芸術療法は、表現的あるいは芸術的な媒体を活用するカウンセリングの方法の総称で、通常のカウンセリングでは表されにくい非言語的で感性的、身体的なさまざまな側面の表現が可能となり、より多面的な心理支援が可能になる。", answer:true, explanation:"表現芸術療法には多様な広がりがあり、理論的背景もさまざまであるが、ユングは、表現芸術療法の創始者のひとりとされている。ユングは、心の中のイメージを表現しようとすることでイメージに積極的に関与できると考えた。また、体験することの大切さも強調しており、知的な理解にとらわれずに、非言語的、情動的なものを体験するための手段と考えた。"},
  {id:309, chapter:8, text:"アートセラピーは、視覚的な芸術作品の制作や鑑賞などを活用するカウンセリングの技法であり、表現や鑑賞の素材として絵画、スケッチ、工作、彫刻などが用いられる。", answer:true, explanation:"アートセラピーには、作品を完成すること自体にセラピー的な効果を認める立場、自己の内面を表現することに意義を見出す立場、作品や表現を心理的状態の解釈の素材として活用する立場などがある。さまざまな視覚芸術とその表現手段がカウンセリングプロセスの中で活用される。"},
  {id:310, chapter:8, text:"風景構成法は、砂箱と多数のミニチュアで世界を表現させる技法であり、クライエントに特別な技術がなくてもできる簡便性、砂を触ることで適度な退行を促す触覚性、クライエントの世界を直接的に体験できる視覚性などが特徴である。", answer:false, correction:"風景構成法 → 箱庭療法", explanation:"設問は箱庭療法の説明である。風景構成法は、A4の紙にサインペンとクレパスを用いて風景を描く方法で、中井久夫が箱庭療法にヒントを得て考案した。川、山、田（畑）、道、家、木、花、動物、石あるいは岩の順に一つずつアイテムを追加して描いた後、彩色して風景として完成させる。"},
  {id:311, chapter:8, text:"音楽療法は、音楽の鑑賞や演奏、歌唱などを活用するカウンセリング技法の総称であり、心身の機能の維持改善、生活の質の向上、行動の変容などが目指される。", answer:true, explanation:"設問のとおり。音楽がもつ生理的、社会的、心理的な働きを活用する療法。歌唱や演奏を行う能動的音楽療法と、音楽を聴くなどの受動的音楽療法の2つのアプローチがある。"},
  {id:312, chapter:8, text:"サイコドラマは、モレノ（Moreno, J. L.）によって開発された、個人の葛藤場面をテーマにした劇を演じる集団療法である。1人が主人公となり、セラピストは監督、グループの他のメンバーは脇役などとなり、作成されたシナリオに沿った劇が演じられる。", answer:false, correction:"作成されたシナリオに沿った劇 → 即興劇", explanation:"サイコドラマは、作成されたシナリオに沿った劇ではなく、即興的な演技を通じてクライエントが抱える問題への理解を深め、解決をめざしてゆく集団療法である。"},
  {id:313, chapter:8, text:"レヴィン（Lewin, K.）らが開発したTグループは、メンバー10人前後とトレーナーが数日間を共に過ごす中で生じる人間関係を題材にしながら、他者へのかかわり方に気づき、新たなかかわり方をその場で試すことによって進められていく。", answer:true, explanation:"Tグループ（training group）は、レヴィンらが行った研修後の振り返りミーティングにおいて、参加者の率直な話し合いがなされ、それが各自の気づきを促進したことが発端となって開発されたものである。"},
  {id:314, chapter:8, text:"感受性訓練は、各種のエクササイズを活用しながらコミュニケーションの改善や自己理解を促進しようとする構成的な方法によるグループ・アプローチである。", answer:false, correction:"感受性訓練 → 構成的グループ・エンカウンター", explanation:"設問は、構成的グループ・エンカウンターの説明である。感受性訓練（sensitivity training）はアメリカのNTL（National Training Laboratory）によってTグループの方法が引き継がれて展開された。グループ内でのやり取りを通じて自分の感情に気づき、それが他者に与える影響や交流の仕方を体験的に学ぶ非構成的教育訓練法である。"},
  {id:315, chapter:8, text:"ベーシック・エンカウンター・グループは、来談者中心療法の理論と方法を集団におけるメンバーの心理的成長やコミュニケーションに適用するもので、メンバー間の自発的な自己表現やコミュニケーションによってセッションが進められる。", answer:true, explanation:"ベーシック・エンカウンター・グループ（Basic Encounter Group）では、思い浮かぶ思いや、感情を表現し合い、メンバー間の相互作用を通じて自己と他者の理解と受容を体験する。自らの在り方を肯定的に見直すとともに、一人ひとりの存在の独自性を他に代えがたいものとして認める人間尊重の態度を養うことも期待される。"},
  {id:316, chapter:8, text:"ソーシャル・スキル・トレーニングやアサーション・トレーニングは、個人カウンセリングだけでなく集団で実施されることも多く、保健医療、教育、福祉、産業等の分野で広く活用されている。", answer:true, explanation:"産業カウンセラーは個人のカウンセリングにとどまらず、こうした訓練を理解し、自らも行えるように研鑽を積んでおくことが望ましい。"},
  {id:317, chapter:8, text:"セルフヘルプ・グループは、問題を抱える当事者や家族が、医師をはじめとした専門家の指導や支援のもとに問題解決を図るために行われている活動である。", answer:false, correction:"医師をはじめとした専門家の指導や支援のもとに問題解決を図るために行われている活動 → 互いに支援し合う活動", explanation:"セルフヘルプ・グループ（self-help group：自助グループ）は、共通の自己課題を持った人たちの非専門的、自主的な集まり。アルコールや薬物の依存症、摂食障害、精神障害、DV被害者・加害者、がん患者、それらを支える家族などの当事者が、対等の立場で体験を分かち合い、問題を直視することを通して自己成長などを支援し合う。"},
  {id:318, chapter:8, text:"動機づけ面接は、当初アルコール依存の問題を抱えた人への面接手法として開発されたが、現在は健康行動、不安や抑うつといった心理的問題に対しても幅広く適用されている。", answer:true, explanation:"動機づけ面接は、ミラー（Miller, W. R.）とロルニック（Rollnick, S.）により開発された。それまでのアルコール依存の問題を抱えた人たちへのカウンセリングは、デメリットを一方的に強調して説得する手法が主流であったのに対して、動機づけ面接ではアドバイスを抑えてクライエントが自ら発言するのを促すように面接を進める。"},
  {id:319, chapter:8, text:"動機づけ面接の原理は、「正確な理解を示すこと」「矛盾を広げること」「クライエントの自己効力感をサポートすること」「抵抗を手玉にとること」である。", answer:true, explanation:"動機づけ面接では、「聞き返し」によってクライエントを正確に理解し、クライエントの「変わりたい」と「変わらずにいたい」といった矛盾した両面の気持ちに配慮しつつ、クライエントが変化に向かえるように支援する。クライエントの抵抗を、クライエント理解の好機ととらえたり、クライエントが「これならできる」と自信が持てるような行動計画について話し合ったりするなどを通じて、カウンセラーはクライエントとの信頼関係を築きながら、問題解決への内発的な動機づけを活性化する。"},
  {id:320, chapter:8, text:"対人関係療法は、重要な他者との関係性に焦点をあてたカウンセリング・アプローチである。もとはうつ状態の成人の治療法として開発されたが、その後若年成人や高齢者を含むクライエントのうつ状態、双極性障害、過食症、夫婦カウンセリングなどにも適用範囲を広げている。", answer:true, explanation:"対人関係療法では、サリヴァン（Sullivan, H. S.）の対人関係論などを理論的背景とし、「疾患の症状と対人関係は相互に影響を与え合う」という考えのもとに、クライエントの現在の対人関係に取り組むことによって症状の改善を目指す。「悲哀」「対人関係上の役割を巡る不和」「役割の変化」「対人関係の欠如」にみられる対人関係の症状への影響を吟味し、特に感情表現への承認やコミュニケーションの分析や改善を通じて、カウンセラーとクライエントが協働して対人関係の改善に取り組む。"},
  {id:321, chapter:8, text:"森田療法は、森田正馬によって創始された、森田神経質と呼ばれる神経症の治療を目的とした日本的な方法である。森田は森田神経質を、病的（神経質）=素質（ヒポコンドリー性基調）×機会×病因（精神交互作用）と表現した。", answer:true, explanation:"森田神経質の特徴は、自己内省が強く、心配性で敏感であるという弱さがある反面、完全主義、理想主義、頑固、負けず嫌いといった強さを併せ持つことから、内的葛藤に陥りやすいとされた。森田療法では、症状を自然な「生の欲望」の裏返しととらえ、「生の欲望」をあるがままに受け入れるよう促すことにより治療を進める。"},
  {id:322, chapter:8, text:"「神経質（森田神経質）」の症状を強める心理的メカニズムである「精神交互作用」とは、ある感覚に注意を集中すれば、その感覚に対して敏感になり、ますますその方向に感情を移動させてしまう現象のことである。", answer:false, correction:"感情を移動 → 注意を固着", explanation:"「精神交互作用」とは、ある感覚に注意を集中することにより、その感覚に対してより敏感になり、ますますその方向に注意を固着させてしまい、森田神経質の症状を強めてしまう現象をいう。森田療法は、自己に向いているエネルギーを、作業を通じた建設的な「行動」に向かう方向に生かせるように援助することにより、「気分本位」から「目的本位」に生き方を変えるよう治療を進める。"},
  {id:323, chapter:8, text:"内観療法は、浄土真宗の一派の身調べという修養法をもとに、吉本伊信が開発した内観法から発展した心理療法であり、両親、兄弟姉妹、身近な人に対して「してもらったこと」「して返したこと」「迷惑をかけられたこと」について入念に思い出し、自己を見つめ直すことによって進められる。", answer:false, correction:"「迷惑をかけられたこと」 → 「迷惑をかけたこと」", explanation:"内観療法では、身近な人に対して、「してもらったこと」「して返したこと」「迷惑をかけたこと」を思い出し、自己を見つめなおす。これまで多くの世話や愛情を受けてきたこと、自分が返したことの少なさに気づき、自己中心的な視点からの転換を通じて他者への肯定感や自己肯定感の向上が期待される。内観療法には、宿泊型の集中内観、非宿泊型の日常内観がある。"},
  {id:324, chapter:8, text:"アサーション・トレーニングは、自分の意見や感情を社会的に認められる形で表出するために必要な主張行動を訓練する方法で、「非主張的な自己表現」や「攻撃的な自己表現」ではない、「アサーティブな自己表現」を重視する。", answer:true, explanation:"アサーション・トレーニングでは、相手も自分も大切にする「アサーティブ（適切な主張）な自己表現」を意識して使えるよう、ロールプレイなどの体験学習を進める。自分の気持ち・考え・意見・相手への希望などを人に伝えたいときに、なるべく率直で、自分自身に正直でありつつ、他者にも配慮された適切な伝え方を学ぶことができる。"},
  {id:325, chapter:8, text:"統合的アプローチにおける統合の様式には、「理論的統合」「同化的統合」「共通要因アプローチ」「技法的折衷」がある。", answer:true, explanation:"設問のとおり。統合的アプローチは、折衷的統合的アプローチのひとつである。折衷的統合的アプローチは、複数のカウンセリング理論を柔軟かつ選択的に活用しようとする理論と方法で、それには、①種々のカウンセリングの利点を活用しようとする「折衷的アプローチ」、②さまざまなカウンセリングの理論を統合的にとらえる「統合的アプローチ」、③カウンセラーが学んできた特定の理論を活かしつつ他の理論も活用する「多元的アプローチ」がある。"},
  {id:326, chapter:8, text:"折衷的アプローチの代表的な方法であるアイビイ（Ivey, A. E.）が提唱したマイクロカウンセリングは、さまざまなカウンセリングの方法を行動レベルで定義し、「マイクロ技法の階層表」という形で構造化している。", answer:true, explanation:"「マイクロカウンセリング」は、折衷的統合的アプローチのうち「折衷的アプローチ」の考え方に沿っている。マイクロカウンセリングでは、クライエントの問題や症状に対する働きかけに加えて、文化的アイデンティティなどその他の特徴にも焦点が当てられる。"},
  {id:327, chapter:8, text:"マイクロカウンセリングでは、さまざまなカウンセリングの方法が「かかわり行動」、「基本的傾聴技法」の連鎖、「積極技法」と呼ばれる3技法群と、これらを統合する「技法の統合」の4階層に整理されている。", answer:true, explanation:"設問のとおり。「マイクロ技法の階層表」では、「かかわり行動」、「基本的傾聴技法」の連鎖、「積極技法」と呼ばれる3技法群と、これらを統合する「技法の統合」の4階層に整理されている。"},
  {id:328, chapter:8, text:"パソコンやスマートフォン等を介した新しい媒体を活用するアプローチを総称して、「遠隔心理学」という名称が使用されるようになってきている。", answer:true, explanation:"遠隔心理学の対象は、電話、モバイル機器、ビデオチャット、電子メール、チャット、ショートメッセージ、インターネットなどを利用した、遠隔でのコミュニケーションのための情報技術を用いた心理支援サービス全般に及ぶ。電話やSNSによる同期システム（リアルタイム）での利用、電子メールなどを活用する非同期のシステムによる利用などさまざまなカウンセリングへの活用が考えられる。"},
  {id:329, chapter:8, text:"遠隔心理学を活用する心理支援者は、特定のクライエントに対して特定の状況下での情報技術を選択する際に、潜在的な利点と限界があることを認識するように努める必要がある。", answer:true, explanation:"心理支援における遠隔心理学の活用は、対面式カウンセリングの補完のため、遠隔のみによるカウンセリングなど、その利用方法についてさまざまな可能性が考えられる。利用に際しては、非言語情報、クライエントの利便性、相談のしやすさ、危機介入、伝わりやすさなどの観点を考慮しつつ、クライエントの状態に応じて潜在的な利点と限界があることを認識しておく必要がある。"},
  {id:330, chapter:8, text:"他者の心を理解することが苦手なクライエントに対して、その理解を促進しメンタルヘルスの向上を提供する方法として、第三世代認知行動療法の立場からメンタライゼーション・ベースト・トリートメントが開発されている。", answer:false, correction:"メンタライゼーション・ベースト・トリートメント → コンパッション・フォーカスト・セラピー", explanation:"問題はコンパッション・フォーカスト・セラピーの説明である。メンタライゼーション・ベースト・トリートメントは、他者を深く理解することが苦手な人たちなどに対して、精神力動的な立場から他者の心の状態や動きを類推し、他者を理解するメンタライジングの能力を促進することにより、他者理解とメンタルヘルスの向上を提供するものである。"},
  {id:331, chapter:8, text:"ナラティブ・アプローチは、世界はすべての人に共通の現実から成っているのではなく、各自の語り（ナラティブ）によって織りなされている多様性から構成されているという実存主義の考え方を背景としている。", answer:false, correction:"実存主義 → 社会構成主義", explanation:"ナラティブ・アプローチは、世界は各自の語り（ナラティブ）によって織りなされている多様性によって構成されているとする社会構成主義の考え方を背景として、家族療法から発展したアプローチのひとつである。ナラティブ・アプローチは、生きづらさや苦悩を抱えるクライエントが、自分にとってより豊かで満足できるナラティブを見出すのを支援する。"},
  {id:332, chapter:8, text:"コミュニティ心理学は、アメリカ合衆国の地域精神保健活動の流れとは別に、心理学の独自の発展の中で誕生した。", answer:false, correction:"心理学の独自の発展の中で誕生した → 地域精神保健活動の大きな流れの中で誕生した", explanation:"コミュニティ心理学は、アメリカ合衆国の地域精神保健活動の大きな流れの中で誕生した。「地域精神保健にたずさわる心理学者の教育に関するボストン会議」には社会学、福祉学、医学、看護学などの専門家と共に臨床心理学者が参加した。"},
  {id:333, chapter:8, text:"コミュニティ心理学という言葉が初めて正式に使用されたのは、1965年に開催された「地域精神保健に携わる心理学者の教育に関するボストン会議」である。", answer:true, explanation:"設問のとおり。1965年5月に開催された「地域精神保健にたずさわる心理学者の教育に関するボストン会議」で、Community Psychologyという言葉が初めて正式に使用された。"},
  {id:334, chapter:8, text:"コミュニティ心理学の誕生時の背景として、精神医療における診察室、相談室での医療サービスから地域社会における生活者支援への流れがあった。", answer:true, explanation:"コミュニティ心理学の誕生時の背景として、精神医療における診察室、相談室での医療サービスから地域社会における「生活者支援」への流れがあった。これは伝統的個人心理臨床の弱点をどう超えられるかという問題意識とともに、コミュニティ・メンタルヘルス活動の中での発展である。"},
  {id:335, chapter:8, text:"ベネット（Bennett, C.）らによると、コミュニティ心理学とは「個人の行動に、社会システムが複雑に相互作用する形で関連している心的過程全般について研究を行うものである」と定義される。", answer:true, explanation:"ベネットら（Bennett, C. et al., 1966）の定義では、「個人の行動に、社会システムが複雑に相互作用する形で関連している心的過程全般について研究を行うものである」。この関連を概念的にかつ実験的に明確化することによって、個人、集団、さらに社会システムを改善しようとする活動計画の基礎を提供するもの」である。"},
  {id:336, chapter:8, text:"コミュニティ心理学では、「問題」を「個人と環境の相互作用の結果として不適合を起こしている状態」であるととらえる。", answer:true, explanation:"コミュニティ心理学では、「問題」というのは「個人と環境が不適合を起こしている状態」であるととらえる。システム論的な人間観では、個人をシステムから取り出して個人だけを理解しようとしても本当の姿を理解できないと考える。したがって、「問題」を直線的な因果関係として理解するのではなく、循環的な因果関係としてとらえることを重視する。"},
  {id:337, chapter:8, text:"キャプラン（Caplan, G.）は、コミュニティが「マイクロシステム」「メゾシステム」「エクソシステム」「マクロシステム」の4つの入れ籠状のシステムから成り立っているとした。", answer:false, correction:"キャプラン（Caplan, G.） → ブロンフェンブレンナー（Bronfenbrennar, U.）", explanation:"児童発達の生態学的理論において、実際のコミュニティは、「マイクロシステム」「メゾシステム」「エクソシステム」「マクロシステム」の4つの入れ籠状のシステムから成り立っていることを提示したのはブロンフェンブレンナーである。"},
  {id:338, chapter:8, text:"コミュニティ心理学では、個人の改善と環境の改善のどちらが大切かという点においては、より環境の改善を図ることで個人のウェルビーイングを達成することが重要であると考える。", answer:false, correction:"より環境の改善を図ること → 個人と環境の適合性を高めること", explanation:"コミュニティ心理学では、個人の改善と環境の改善のどちらが大切かという考え方ではなく、個人と環境の適合性を高めることによりウェルビーイングを得ることが大切であると考える。"},
  {id:339, chapter:8, text:"コミュニティ心理学においては、当事者が自らの行動でエンパワーすることを、専門家としてアドボカシー（代弁と権利擁護）などを通して支援することは重要であると捉える。", answer:true, explanation:"ディスエンパワーされている当事者が、自らの行動を通じて力を取り戻していくエンパワメントはとても重要である。主体的に自らをエンパワーしようとしている人々を専門家として支援し、役立つことができるかはとても大切で、それは専門家に必要な新しい支援能力となる。具体的には、自助グループを支援し、ディスエンパワーされた状態にある人に代わって社会に理解を求め、処遇の変更を要請し、よりよい関係の再構築を図るための働きかけを行うアドボカシー（advocacy：代弁と権利擁護）を行う、などである。"},
  {id:340, chapter:8, text:"コミュニティ心理学におけるコミュニティ感覚とは、コミュニティへの所属を肯定的に感じていて、メンバー同士が相互監視的関係をもち、コミュニティの維持・統制についての責任感を抱いている感覚である。", answer:false, correction:"メンバー同士が相互監視的関係をもち、コミュニティの維持・統制についての責任感を抱いている → そこのメンバーとは自然に依存的・援助的関係をもつことができ、またコミュニティに対して何かを依頼・要請した場合、それに応えてもらえると信じられる", explanation:"コミュニティ心理学におけるコミュニティ感覚とは、コミュニティへの所属を肯定的に感じていて、そこのメンバーとは自然に依存的・援助的関係をもつことができ、またコミュニティに対して何かを依頼・要請した場合、それに応えてもらえると信じられる感覚である。"},
  // ===== 第9章 こころとからだのメカニズム (341-370) =====
  {id:341, chapter:9, text:"人間のあり様を理解し捉えるためには、生物的側面、心理的側面、社会的側面の3つから多角的・統合的に捉えることが重要である。", answer:true, explanation:"人間のあり様を理解し捉えるうえでは「生物心理社会モデル」が参照されることが多い。これは人間を生物的側面・心理的側面・社会的側面の3つから多角的・統合的にとらえようとするモデルで、対人支援のあり方を考えるうえで重要である。これらの3つの側面は密接に関連しつつ、それぞれが独立性をもち、重なりあったりズレが生じたりして、こころに影響している。"},
  {id:342, chapter:9, text:"神経系は、大きく、情報処理にかかわる末梢神経系と情報の伝達にかかわる中枢神経系に二分される。", answer:false, correction:"末梢神経系 → 中枢神経系、中枢神経系 → 末梢神経系", explanation:"神経系は私たちが情報を処理・判断し外界へかかわることを制御している。神経系は大きく中枢神経系と末梢神経系に二分される。中枢神経系は情報処理にかかわり、末梢神経系は情報の伝達にかかわる。"},
  {id:343, chapter:9, text:"自律神経系は、内臓や血管など、生体そのものの自動制御やコンディションの生成にかかわるものである。", answer:true, explanation:"設問は自律神経系の説明である。末梢神経系は自律神経系と体性神経系に分けられる。自律神経系は内臓や血管の働きをコントロールし、生体内部の環境調節にかかわる。それに対し体性神経系は外界への適応にかかわる。"},
  {id:344, chapter:9, text:"自律神経系は、交感神経系と副交感神経系から構成されている。", answer:true, explanation:"設問のとおりである。交感神経系は生体の反応性や活動性を高くしていくものである。それに対して副交感神経系は生体を鎮静化し修復させるものである。この背反する働きをもつ両方の神経系が交互に活性化することで、生体は活動したり休息したりできる。"},
  {id:345, chapter:9, text:"副交感神経系は、休息・安静時に優位に働く。", answer:true, explanation:"副交感神経系は生体を鎮静化し修復させるものであり、設問のとおりである。"},
  {id:346, chapter:9, text:"神経系は、数多くのニューロンによって構成されており、ニューロン同士はシナプスを介してつながりあっている。", answer:true, explanation:"神経系は数多くのニューロン（神経細胞）によって構成されており、ニューロン同士は直接につながり合っているのではなく、シナプスと呼ばれる接合部分を介してつながっている。シナプスには間隙があり、神経伝達物質という一種の化学物質を介して情報の伝達が行われている。"},
  {id:347, chapter:9, text:"自律神経系は、自分の意思でコントロールすることができる。", answer:false, correction:"できる → 難しい", explanation:"体性神経系については私たちもその働きを理解・意識しやすく、自分の意思でコントロール可能な部分も多い。それにくらべて自律神経系は、自分の意思でコントロールすることは難しい。"},
  {id:348, chapter:9, text:"反射は、生命の維持にかかわる外界の危険を即座に回避するために、脳で情報処理をした後に、脊髄の自律的な反応により行動を生じさせるものである。", answer:false, correction:"脳で情報処理をした後に → 脳で情報処理をする前に", explanation:"脊髄は身体に張りめぐらされた感覚神経・運動神経・自律神経などが集まっている場所で、脳に直結してさまざまな情報を伝達している。それだけでなく脊髄自体が自律的な働きをしており、脳で情報処理をする前に、脊髄の自律的な反応により行動を生じさせる。このことを反射と呼ぶ。熱いものに手が触れたとき、脳が熱いと認識して回避の指令を出す前に即座に手をひっこめるのは反射の一例である。"},
  {id:349, chapter:9, text:"ヒトの脳は、解剖学的には、大脳、小脳、中脳、延髄に分けられる。", answer:false, correction:"大脳、小脳、中脳、延髄 → 大脳、間脳、小脳、中脳、橋、延髄", explanation:"ヒトの脳は脊髄の先端に位置し、あらゆる神経系がここに集約されており、人間の精神やこころに関して中心的な役割を果たす器官である。その脳は解剖学的には大脳（終脳）、間脳、小脳、中脳、橋、延髄に分けられる。"},
  {id:350, chapter:9, text:"大脳辺縁系は、知覚や思考など、脳の高次機能が担われる場所とされている。", answer:false, correction:"大脳辺縁系 → 大脳新皮質", explanation:"設問は大脳新皮質の説明である。ヒトは他の生物に比べて大脳新皮質がもっとも発達している。一方、大脳辺縁系は情緒や欲動、記憶に深くかかわる場所であるといわれている。大脳は大脳新皮質（新しい脳）が大脳辺縁系（古層の脳）と呼ばれる部分を覆う構造となっており、新しい脳が古層の脳をより細やかにコントロールしている。"},
  {id:351, chapter:9, text:"大脳新皮質は、解剖学的には、前頭葉と後頭葉という領野に分けられる。", answer:false, correction:"前頭葉と後頭葉 → 前頭葉、側頭葉、頭頂葉、後頭葉", explanation:"大脳新皮質は解剖学的には脳の皺の中でもとりわけ深い溝をもとに区分され、前頭葉、側頭葉、頭頂葉、後頭葉という領野に分けられる。"},
  {id:352, chapter:9, text:"記憶の形成や保持に重要な働きをするのは、脳の中の大脳辺縁系の一部である海馬であるとされている。", answer:true, explanation:"私たちが体験したことは、大脳新皮質で意味的な処理をされる以前に、いったん海馬に蓄えられる。その記憶は意味的な処理をされていないので断片的で感覚的である。海馬に蓄えられている間に記憶は整理され、大脳新皮質に伝えられ、体系化された記憶となり、長期的に残るようになる。"},
  {id:353, chapter:9, text:"「知覚」とは、感覚していることが意識され、あるまとまりと意味をもった刺激として感じられたものをいう。", answer:true, explanation:"知覚とは設問のとおりである。知覚されたものが過去の自分の経験や記憶、そして思考などと関連して意味づけられることを「認知」という。刺激が感覚→知覚→認知という順に、私たちの意味づけや主観的な構成がなされていく。"},
  {id:354, chapter:9, text:"エックマンとフリーセン（Ekman, P.＆Friesen, W.V.）は、基本的な情動を、怒り、嫌悪、喜び、悲しみ、楽しみ、恐怖の6つに分類した。", answer:false, correction:"楽しみ → 驚き", explanation:"エックマンとフリーセン（Ekman, P.＆Friesen, W.V.）は、基本的な情動を怒り、嫌悪、喜び、悲しみ、驚き、恐怖の6つのカテゴリーに分類し、人類に普遍的なものであると主張した。"},
  {id:355, chapter:9, text:"感情は、精神生活や対人関係に影響を与えており、非言語的な側面を通しても他者に伝わる。", answer:true, explanation:"感情は私たちの意識にのぼらなくとも、精神生活や対人関係に影響を与えている。対人関係において感情は、姿勢、声の調子、身振りや態度、視線などの非言語的な側面を通しても他者に伝わる。"},
  {id:356, chapter:9, text:"人間の知覚において、外界の個々の刺激がひとまとまりとして知覚（群化）されるという「ゲシュタルトの法則」の例には、近接、類同、連続などがある。", answer:true, explanation:"知覚とは感覚していることが意識され、あるまとまりと意味をもった刺激として感じられたものである。ゲシュタルトの法則には近接の要因、類同の要因、連続の要因の他に、閉合の要因、共同運命の要因、図と地の関係などがある。"},
  {id:357, chapter:9, text:"「認知的不協和」とは、自分がある対象に対して強い信念やスキーマをもっているとき、それらに合致しない情報は選択的に排除され、信念やスキーマに合致する情報だけが取り入れられる現象のことである。", answer:false, correction:"認知的不協和 → 確証バイアス", explanation:"設問は確証バイアスの説明である。高度情報化社会において、とりわけインターネット上で真偽も定かとはいえない多くの情報が飛び交う中で、人々はますます選択的に自分に都合のよい情報を見出そうとする傾向があることが知られている。また、特定の社会的集団への偏見や差別などが生じて固定化することにも確証バイアスは関わっている。なお、認知的不協和とは、葛藤的な状況を自分では変えづらいときに、自分の認知を変えることによりその葛藤状況を解消しようとする心理的機制のことである。"},
  {id:358, chapter:9, text:"集団により判断が影響される「同調行動」に関するアッシュ（Asch, S. E.）の実験では、失敗体験がある者や自信が低下している者は同調しにくいことがわかった。", answer:false, correction:"同調しにくい → 同調しやすい", explanation:"アッシュ（Asch, S. E.）の線分の比較判断課題を用いた同調に関する実験によると、1人で答えるときには誤答はないが、集団のなかで答えるときには同調して誤答することがあるとわかった。また、その後の研究では、失敗体験がある者や自信が低下している者は同調しやすいことも見出された。"},
  {id:359, chapter:9, text:"ミルグラム（Milgram, S.）の権威への服従行動実験では、権威者である実験者の命令があれば、多くの実験協力者が危険な電気ショックを与えることを拒否しないという結果となった。", answer:true, explanation:"アメリカの心理学者ミルグラム（Milgram, S.）は、権威に服従する人の行動がどのように生じるかを明らかにするための実験を行った。この実験による結果は設問のとおりである。権威者とされる実験者からの命令があると、危険な電気ショックであっても実験協力者自身も正常な判断を失い、最後には服従してしまうことを示している。"},
  {id:360, chapter:9, text:"ラタネ（Latane, B.）とダリィ（Darley, J. M.）は、傍観者効果について火災報知器が鳴るという実験場面で検証した。その結果、実験協力者が1人でいるときよりも複数いた方が、通報が遅れるか、通報されないことがわかった。", answer:true, explanation:"援助が必要な人の周囲に傍観者が多数存在することによって、本来迅速にとられるべき援助行動が抑制されることは「傍観者効果」と呼ばれている。ラタネ（Latane, B.）とダリィ（Darley, J. M.）は傍観者効果について実験的に検証した。その結果は設問のとおりである。"},
  {id:361, chapter:9, text:"複数の傍観者が存在することによって援助行動が抑制される傍観者効果の原因として、「責任の分散」「評価懸念」「多数の無知」がある。", answer:true, explanation:"設問のとおり。「責任の分散」とは多数の人がいる場合には責任が分散し自分1人の責任ではなくなると考えることである。「評価懸念」とは結果に対して周囲から否定的評価が起こるかもしれないと考えることである。「多数の無知」とは、人々が積極的に行動しないので事態は緊急性を要しないと考えることである。"},
  {id:362, chapter:9, text:"個人の当初の判断や行動、態度、感情などが集団内でのやりとりを通して極端化し、特にリスキーな方向あるいは保守的な方向のいずれかに傾きがちになる現象を集団極性化という。", answer:true, explanation:"集団討議による意思決定は、1人での意思決定にくらべて冒険的な性格を帯び、場合によってはまったく不合理で間違いとしかいえないような判断をしてしまうことがある。この現象をリスキーシフトという。また、反対に集団の決定が極端に保守的で安全指向的となる場合もあり、この現象をコーシャスシフトという。これらは集団極性化と呼ばれる現象である。"},
  {id:363, chapter:9, text:"ホメオスターシスとは、外界の変化に対して自己の内部環境を一定に保とうとする機能のことである。", answer:true, explanation:"ヒトの生体は開放系であり、外界の変化に対して自己の内部環境を一定に保つことが、その個体の生命を維持するための基本条件になっている。この自己の内部環境維持の機能をホメオスターシスという。"},
  {id:364, chapter:9, text:"セリエ（Selye, H.）は、非特異的反応の時間的プロセスを「警告反応期」、「疲憊期（疲弊期）」、「抵抗期」の順で、生体反応が起こるとした。", answer:false, correction:"「疲憊期（疲弊期）」、「抵抗期」の順 → 「抵抗期」、「疲憊期（疲弊期）」の順", explanation:"セリエ（Selye, H.）は非特異的反応のプロセスを「警告反応期」「抵抗期」「疲憊期（疲弊期）」の順で生体反応が起こるとした。警告反応期とはストレス要因に対して、ストレスに耐えるための内部環境を準備する時期である。抵抗期とはストレス要因への適応反応としての生体の自己防衛機制が持続し、ストレス要因とストレス耐性とが拮抗している時期である。疲憊期（疲弊期）とはストレス要因への暴露が続き、ストレス要因に対する抵抗力が衰えていく時期である。"},
  {id:365, chapter:9, text:"副腎皮質ホルモンは長時間作用すると、血糖値を上昇させ、リンパ球の活動を抑制するため、全身の免疫機能が向上する。", answer:false, correction:"向上する → 低下する", explanation:"副腎皮質ホルモンには、①肝臓における糖新生を促し、組織へのエネルギー源の供給が増加する、②ノルアドレナリンとアドレナリンの作用を増強し心収縮力の増加と血圧の上昇をもたらす、③胃酸分泌を増加させる、④炎症やアレルギー症状を緩和するなどの作用がある。しかし、副腎皮質ホルモンが長時間作用すると、血糖値を上昇させ、リンパ球の活動を抑制するため、全身の免疫機能が低下する。"},
  {id:366, chapter:9, text:"米国国立職業安全衛生研究所（NIOSH）の職業性ストレスモデルでは、「職場のストレス要因」により「急性ストレス反応」が生じて、やがて「疾病」につながる場合、「個人的要因」「仕事以外の要因」「緩衝要因」が影響を与える、としている。", answer:true, explanation:"NIOSHの職業性ストレスモデルは設問のとおりである。ストレス反応には個人差があり、「個人的要因」（年齢、性別、性格、対処能力など）が影響する。さらに「仕事以外の要因」（家族の病気、介護、家庭内不和など）の負荷が加わることもあれば、「緩衝要因」（上司や同僚、家族などからの物理的・精神的な社会的支援）によりストレス反応が緩和されることもあり、これらの要因はストレス反応や疾病の発生に大きな影響を与える。"},
  {id:367, chapter:9, text:"ストレスコーピング（ストレス対処）において、上司から叱責された際に、気晴らしをしたり、上司の良い面を探して自分の感情反応を変化させようとする対処は、情動焦点型コーピングである。", answer:true, explanation:"ストレスコーピング（ストレス対処）には、大きく分けて問題焦点型コーピングと情動焦点型コーピングがある。問題焦点型コーピングはストレス要因そのものの解決を目指すものである。情動焦点型コーピングは、問題に対する不快な感情反応をうまくコントロールさせたり、問題のとらえ方を変化させたりするものであり、設問はその一例である。"},
  {id:368, chapter:9, text:"ストレス耐性の高さと認知のあり方に関する研究では、客観的に同じ状況であっても、将来に対してポジティブな見通しをもっている場合は、それをもっていない場合に比べて、ストレスを感じにくい傾向があることが示されている。", answer:true, explanation:"ストレス耐性の高さと認知のあり方がどう関連しているかに関する研究では、客観的に同じ状況にあっても、ポジティブな見通しをもっている場合はストレスを感じにくく、ストレス要因がさほど大きくない場合は、自分で努力すれば何とかなるという自己効力感をもっているほうが、ストレスを感じにくくなることが示されている。"},
  {id:369, chapter:9, text:"ホームズとレイエ（Holmes, T.H. & Rahe, R.H.）は、生活上の出来事や経験の「ストレス強度」を算出しているが、成功を収めたりする肯定的出来事はストレス要因にはならないとしている。", answer:false, correction:"要因にはならない → 要因になりうる", explanation:"ホームズとレイエ（Holmes, T.H. & Rahe, R.H.）は、生活上の出来事や経験の「ストレス強度」を推定・算出しているが、必ずしも否定的な出来事ばかりでなく、成功を収めたり、長期休暇をとったりするという肯定的な出来事もストレス要因になりうるとしている。"},
  {id:370, chapter:9, text:"レジリエンスとは、もともと、物体に力が加わって変形しても、もとの形に復元する力を意味しており、ストレスを受けても精神的健康を維持し回復に導く、しなやかな心理的特性のことを指す。", answer:true, explanation:"設問はレジリエンスについての説明である。ストレスフルな状況でも精神的に健康な状態を保つことに影響する要因には、個人的な資質に関する要因や個人が獲得した態度や行動といった個人内の要因、および周囲から提供される個人外の要因がある。レジリエンスにつながる心理的要因を一言でいうと「精神的なしなやかさ」である。"},
  // ===== 第10章 パーソナリティ心理学 (371-387) =====
  {id:371, chapter:10, text:"パーソナリティ理論における類型論とは、性格特徴の基本的な要素（成分、パラメーター）を想定し、それぞれの要素を個人がどれくらいの比率で併せもっているかによりパーソナリティを記述する方法である。", answer:false, correction:"類型論 → 特性論", explanation:"類型論はパーソナリティをパターン化して分類する方法である。設問は特性論の説明である。"},
  {id:372, chapter:10, text:"パーソナリティ理論における類型論には、人間のパーソナリティという複雑な事象を限られた数の型に分けようとするために、どの類型にも属さない型やあいまいな中間型が生じてしまう欠点がある。", answer:true, explanation:"パーソナリティ理論における類型論では、パーソナリティをパターン化して分類するが、7つぐらいまでの型に分類されることが多い。類型が増えると、それらの差異が直観的にわかりにくく、区分としての意味を失うためである。"},
  {id:373, chapter:10, text:"アイゼンク（Eysenck, H. J.）は、リビドーの向かい方による内向ー外向の2類型に、4つの心的機能である思考・感情・感覚・直観を組み合せて、8つの性格タイプの類型論を提唱した。", answer:false, correction:"アイゼンク（Eysenck, H. J.） → ユング（Jung, C. G.）", explanation:"ユング（Jung, C. G.）は、人間のリビドー（生きるエネルギー）が外界の対象に向かう外向と、自分自身に向かう内向という区分をまず考えた。これに加えて、思考・感情・感覚・直観という4つの心的機能を考え、人によってこのいずれかの機能が優位に発達・分化するとした。この内向ー外向の2類型に、4つの心的機能を組み合せて、8つの性格タイプ類型を提唱した。"},
  {id:374, chapter:10, text:"「ビック・ファイブ」について、マックレーとコスタ（McCrae, R. R.& Costa, P. T.）は、神経症的傾向、外向性、経験の開放性、調和性、誠実性の5つの因子次元を提唱した。", answer:true, explanation:"「ビック・ファイブ」について、マックレーとコスタ（McCrae, R. R.& Costa, P. T.）は、因子分析の手法を用いて、神経症的傾向、外向性、経験の開放性、調和性、誠実性の5つの因子次元を提唱した。ビッグ・ファイブは人間の性格を構成する基本的な次元であると考えられている。"},
  {id:375, chapter:10, text:"エリクソン（Erikson, E. H.）は、ライフサイクル理論における発達の漸成説において、ライフサイクルの各段階での心理社会的な危機と発達課題を示した。", answer:true, explanation:"エリクソン（Erikson, E. H.）が提唱した発達の漸成説では、8つの発達段階が示され、各段階で心理社会的な危機と発達課題が設定されている。そして、各段階における心理社会的な危機を乗り越えて発達課題が達成できれば、次の段階へと移行できるが、それが達成できなければ、その段階に留まってしまう（固着する）と考えられている。"},
  {id:376, chapter:10, text:"エリクソン（Erikson, E. H.）のライフサイクル理論では、1人の人間の発達課題は、重要な他者の発達課題と関連しながら展開していくとされる。", answer:true, explanation:"エリクソン（Erikson, E. H.）の発達の漸成説理論では、1人の人間の発達課題は、重要な他者の発達課題と関連しながら展開していくという、ライフサイクルの相互性という観点も重要である。たとえば、親密さをもって次世代を育み育てていくことができるかどうかという親の課題が、そのまま、子どもが世界や他者に対して基本的信頼を得て希望を持つことができるかという、子どもの課題に直結しているのである。"},
  {id:377, chapter:10, text:"ボウルビィ（Bowlby, J.）は、特定の他者や対象との養育的な結びつきのことを「愛着」と名づけた。", answer:false, correction:"養育的な結びつき → 情緒的な結びつき", explanation:"乳幼児期において、養育者をはじめとする親密な他者との情緒的な関係は、パーソナリティの形成に大きな影響を与える。ボウルビィ（Bowlby, J.）は、こうした特定の他者や対象との情緒的な結びつき、信頼感を「愛着」と名づけた。"},
  {id:378, chapter:10, text:"ボウルビィ（Bowlby, J.）は、ストレンジ・シチュエーションという手法を用いて、子どもの反応の特徴から愛着パターンを回避型、安定型、アンビバレント型に分類した。", answer:false, correction:"ボウルビィ（Bowlby, J.） → エインズワースら（Ainsworth, M. D. S. et al.）", explanation:"エインズワースら（Ainsworth, M. D. S. et al.）は、母親との共在、母親からの分離（見知らぬ人と共在）、母親との再会の場面を設定したストレンジ・シチュエーションという手法によって、子どもの反応の特徴から愛着パターンを、A型（回避型）、B型（安定型）、C型（アンビバレント型）の3つに分類した。なお、その後の研究でD型（混乱型）が付加された。"},
  {id:379, chapter:10, text:"クルト・レヴィン（Lewin, K. Z.）は、青年期にある人を、子どもと大人とのあいだに位置づけられることから「中間人」と名付けた。", answer:false, correction:"中間人 → 境界人（マージナル・マン）", explanation:"子どもは思春期から始まる不安定な時期を通過する中で、自分のあり方や他者との関係の取り結び方を変化させ、やがて大人へと仲間入りしていく。青年期はこうした心理社会的な移行を体験する時期であり、子どもと大人のあいだに位置づけられることから、アメリカの社会学者であるクルト・レヴィン（Lewin, K. Z.）は、青年期にある人をマージナル・マン（境界人）の位置にいるとした。"},
  {id:380, chapter:10, text:"チャムシップとは、前思春期に見られる、同性の友人との親密で排他的な関係のことである。", answer:true, explanation:"前思春期は心理的にも大きな揺れと変化を体験する時期である。この時期の子どもたちには、チャムシップと呼ばれる同性の友人との親密で排他的な関係が典型的に見られる。そして不安定的な自己感を補償するかのように、「いつもいっしょ」「どこでもいっしょ」に行動したり、お互いがお互いをまねしあったり取り入れたりして、「自分」を形成していく。"},
  {id:381, chapter:10, text:"エリクソン（Erikson, E. H.）は、青年期を、大人の世界に参入し責任を果たすことを未だ免除されているという意味で、「モラトリアムの時期」であるとした。", answer:true, explanation:"エリクソン（Erikson, E. H.）は、青年期を大人の世界に参入し責任を果たすことを未だ免除されているという意味で、「モラトリアム（支払い猶予）の時期」であるとした。青年期という概念は近代社会になって出てきた概念である。社会が発展複雑化し、大人になるまでに学ぶべきことが多くなり、一人前になるまでの猶予期間が生じて、青年期が登場した。近年では青年期がさらに延長される傾向にある。"},
  {id:382, chapter:10, text:"ユング（Jung, C. G.）は、中年期の始まりを、「人生の旅立ち」と呼んだ。", answer:false, correction:"人生の旅立ち → 人生の正午", explanation:"ユング（Jung, C. G.）は、中年期の始まりを「人生の正午」と呼んだ。太陽が正午を過ぎてやがて下降に入っていくように、中年期を過ぎると人生の時間イメージが、それまでの終わりのない上昇的なものから、終わりのある下降的なものに変化するからである。"},
  {id:383, chapter:10, text:"ユング（Jung, C. G.）は、「中年の危機」と呼ばれるこころの動きについて、それまでの一面的な生き方に対して、こころがその全体性を取り戻そうとする補償機能としてとらえている。", answer:true, explanation:"中年期には「中年の危機」と呼ばれる特有の危機が訪れることも多いとされる。人生の後半に入ったとき、人生の前半では上昇し成功を収めるために抑圧してきた趣味や感情にふと気づき、自分の人生を埋め合わせるかのように、それに没頭する人もいる。ユング（Jung, C. G.）は、こうしたこころの動きを、それまでの一面的な生き方に対して、こころが全体性を取り戻そうとする補償機能としてとらえている。"},
  {id:384, chapter:10, text:"キャッテル（Catell, R. B.）は、自分が受けた教育や経験、長年にわたってくり返され習熟したことから得られた知識などからなる知能を流動性知能と提唱した。", answer:false, correction:"流動性知能 → 結晶性知能", explanation:"キャッテル（Catell, 1971）が提唱した流動性知能とは、新規場面への適応能力や新しい事柄の学習にかかわる知能であり、20歳前後にピークがあり、その後ゆるやかに低下していく。他方、結晶性知能とは設問のとおりであり、中年期を過ぎてからもなお発達し続ける。"},
  {id:385, chapter:10, text:"バルテスら（Baltes, P. B.et al.）は、生涯発達論を提唱し、人間の発達の過程は、全生涯にわたって常に獲得（成長）と喪失（衰退）が結びついて生じることを指摘した。", answer:true, explanation:"生涯発達論を提唱するバルテスら（Baltes, P. B.et al.）は、人間の発達過程とは多様であり多領域にわたり一概に直線的な発達を想定できないこと、どの年齢での発達も他にくらべて特別な地位をもつわけではないことを示したうえで、発達の過程は設問のとおりであることを指摘している。"},
  {id:386, chapter:10, text:"キュブラー・ロス（Kübler-Ross, E.）は、人が死の準備を行うのに5段階あるとした。その段階は、「否認」「怒り」「取引き」「抑うつ」「受容」という段階である。", answer:true, explanation:"死が身近に迫ったとき、どのように人はその事実を受けとめ、新たな旅立ちへ向かうのか、キュブラー・ロス（Kübler-Ross, E.）は、人が死の準備を行うのに5段階あるとし、それは「否認」「怒り」「取引き」「抑うつ」「受容」というプロセスである、と説いた。"},
  {id:387, chapter:10, text:"今日では、自分を表象する性（ジェンダー）は、人格特性というより、社会的に構成され、当面私たちがそれに依拠している社会的枠組みであると考えられるようになった。", answer:true, explanation:"設問のとおり。現在、個人の性（ジェンダー）と性的指向（セクシュアリティ）の選択の自由が着目され、性別不合の人々の存在も考慮した社会環境がつくられつつある。"},
  // ===== 第11章 心理アセスメント (388-402) =====
  {id:388, chapter:11, text:"科学的な要件を満たした心理検査とは、標準化がなされ信頼性・妥当性が信用に足る水準にあり、客観性に優れた検査のことである。", answer:true, explanation:"科学的な要件を満たした心理検査とは設問のとおりである。ここでいう標準化とは、統計的な標準化と検査手続きの標準化という2つの意味がある。"},
  {id:389, chapter:11, text:"心理検査において、測りたいものを測っていることを信頼性という。", answer:false, correction:"信頼性 → 妥当性", explanation:"設問は心理検査における妥当性の内容である。"},
  {id:390, chapter:11, text:"心理検査における妥当性は、同じ受検者に再検査をした時、ほぼ同じ結果が出ることで検証することができる。", answer:false, correction:"妥当性 → 信頼性", explanation:"妥当性とは、心理検査において、測りたいものを図っていることである。信頼性とは、測定する物差しが歪んでいないことで、同じ受検者に再検査をした時、ほぼ同じ結果が出ることで検証することができる。"},
  {id:391, chapter:11, text:"心理検査を行うにあたり、受検者に検査の目的を伝える必要はない。", answer:false, correction:"必要はない → 必要がある", explanation:"心理検査活用の留意点として、検査の目的とその必要性を受検者が正しく理解していることが必要である。"},
  {id:392, chapter:11, text:"質問紙法の長所は、簡便で短時間で多くのデータを取ることができることである。一方、短所は、嘘の回答や社会的に望ましい方向に回答が歪むことである。", answer:true, explanation:"心理検査で用いる質問紙法の長所、短所は設問のとおりである。なお、嘘の回答についてはlie scale（虚構尺度）を設けることである程度防ぐことは可能である。"},
  {id:393, chapter:11, text:"投影法は、信頼性、妥当性、客観性は低いが、解釈は容易である。", answer:false, correction:"容易である → 熟練を要する", explanation:"心理検査で用いる投影法は、あいまいな図形や文章を呈示して、口頭あるいは文章などで回答を求め、性格を測定・査定する方法であり、おもに欲求や葛藤などの深層心理を探るために利用される。投影法は全般的に信頼性、妥当性、客観性は低いので、解釈には熟練を要する。"},
  {id:394, chapter:11, text:"CMI健康調査表は、12区分の身体的項目と6区分の精神的項目についての質問で構成され、身体的・精神的自覚症状を幅広く把握する質問紙法の心理検査である。", answer:true, explanation:"CMI健康調査表は、ブロードマンら（Brodman, K. et al.）によって考案された検査で、12区分の身体的項目と6区分の精神的項目についての質問から構成されている。職場や学校などの健康管理のスクリーニングに利用されており、情緒障害の評価にも用いられる。"},
  {id:395, chapter:11, text:"内田クレペリン作業検査は、作業検査法のひとつで、道具を使って作業させ、その結果を分析してパーソナリティを査定する検査である。", answer:false, correction:"道具を使って → 連続加算", explanation:"内田クレペリン作業検査は、心理検査における作業検査法のひとつで、一桁の足し算を連続して行うという連続加算作業をさせて、その作業結果を分析してパーソナリティを査定する検査である。"},
  {id:396, chapter:11, text:"うつ性自己評価尺度（SDS）は、質問項目が20項目と少なく、精神保健のためのスクリーニング検査などに利用されている。", answer:true, explanation:"うつ性自己評価尺度（SDS）は質問紙法の心理検査であり、質問項目が20項目と少なく、簡易な検査である。質問項目には「憂うつ」「不眠」「食欲」「将来の希望の有無」などが含まれている。精神保健のためのスクリーニング検査や医療機関等で利用されている。"},
  {id:397, chapter:11, text:"精研式文章完成法テスト（SCT）は、短い刺激文を提示し、その後に思いつくことを自由に記述させて文章を完成させる心理検査であり、投影法のひとつである。", answer:true, explanation:"精研式文章完成法テスト（SCT）は、投影法の心理検査のひとつで、短い刺激文を提示し、その後に思いつくことを自由に書いてもらうことにより、パーソナリティの全体的な把握が可能となる。環境、身体、能力、性格、指向などの要因や筆跡などから総合的に評価する。"},
  {id:398, chapter:11, text:"バウムテストは、インクのしみを見せて何に見えるかを述べてもらう投影法の検査である。", answer:false, correction:"バウムテスト → ロールシャッハ・テスト", explanation:"設問は、ロールシャッハ・テストの説明である。ロールシャッハ・テストは、インクのしみを見せて、何に見えるかを被検者に聞いて、その見方からパーソナリティを把握しようとする検査である。バウムテストは、木の絵を描いてもらう描画法の検査である。描いてもらった樹木を分析することで、その人のパーソナリティを把握する。"},
  {id:399, chapter:11, text:"WAISは、ウェクスラー（Wechsler, D.）によって開発された成人用知能検査である。", answer:true, explanation:"WAISは、ウェクスラー（Wechsler, D.）によって開発された成人用知能検査である。第4版では、言語理解、知覚推理、ワーキングメモリー、処理速度を測定し、全般的な全検査IQを算出する。"},
  {id:400, chapter:11, text:"投影法は、比較的容易に実施できる検査であり、解釈も容易である。", answer:false, correction:"比較的容易に実施できる検査であり、解釈も容易である → 習熟した人でなければ意味のある結果が出せないことが多い", explanation:"投影法は深層心理を探るために利用されるが、質問紙法と比較すると、全般的に信頼性、妥当性、客観性が低いので、解釈には熟練を要する。"},
  {id:401, chapter:11, text:"心理検査を行う前に、検査の目的と必要性を受検者が正しく理解しているかについて確認することが必要である。", answer:true, explanation:"心理検査を活用する際、心理検査を行う前に必ず、①ラポールが形成されている（受検者の動機づけや願望を正しく理解しておく）、②受検者が検査に関心をもっているかを確認する（カウンセラーの興味で実施してはならない）、③検査の目的と必要性を受検者が正しく理解しているかを確認する（十分な説明もなく実施してはならない）について十分に配慮する。"},
  {id:402, chapter:11, text:"心理検査の結果を伝えるときには、被検者の心情に配慮する必要はなく、得られた結果をそのまま伝える。", answer:false, correction:"被検者の心情に配慮する必要はなく、得られた結果をそのまま伝える → 被検者の心情に配慮しながら伝える", explanation:"心理検査の結果を被検者に説明するときは、①専門用語ではなくだれにでもわかる言葉を使う、②被検者が過度に自分に期待をしたり悲観したりすることがないように被検者の反応を考慮しながら伝える、③検査の結果は一方的に解釈するのではなく、被検者にも意見を求め解釈に参加してもらえるよう心がける、ことに十分配慮する。"},
  // ===== 第12章 精神医学の基本 (403-428) =====
  {id:403, chapter:12, text:"産業保健スタッフが、相談者に関する精神医学的な病名を知った場合、それを職場に伝えるべきかどうか、どのように伝えるかについては、原則的には本人の意向に従う。", answer:true, explanation:"産業保健スタッフが、精神医学的な病名を職場に、どこまで伝えるべきか、どのように伝えるかについては設問のとおり。相談者が職場で引き続き働く場合、本人の了解を得たうえで、再発防止の観点から直属上司など職場のキーパーソンになる人に伝えておくことは重要である。"},
  {id:404, chapter:12, text:"自分が病気であると認識・自覚できることを、病感という。", answer:false, correction:"病感 → 病識", explanation:"設問は、精神科領域における「病識」の説明である。「病感」とは何となく自分が病気であると感じられることである。"},
  {id:405, chapter:12, text:"精神障害で自傷他害の恐れがあるなど緊急度が高い場合は、警察での保護や措置入院を含めた対応が必要となる。", answer:true, explanation:"設問のとおり。措置入院を含めた対応が必要となる場合、入院についての相談窓口は地元行政機関である。"},
  {id:406, chapter:12, text:"「疾病性」とは、疾病の有無や症状の程度に関することで、医師が判断するのが原則である。", answer:true, explanation:"「疾病性（illness）」とは、疾病の有無や症状の程度に関することで、医師が判断するのが原則である。"},
  {id:407, chapter:12, text:"職場でメンタルヘルス不調が疑われた際には、業務上何が問題になって困っているか（事例性）よりも、病気の確定（疾病性）を優先しなければならない。", answer:false, correction:"業務上何が問題になって困っているか（事例性）よりも、病気の確定（疾病性） → 病気の確定（疾病性）よりも、業務上何が問題になって困っているか（事例性）", explanation:"職場でメンタルヘルス不調が疑われた際には「事例性」と「疾病性」とに分けて考え、「疾病性」以上に、業務上何が問題になって困っているかという「事例性」を優先する。その結果、精神医学的な問題がありそうだと判断されれば、どうやって精神医療につなげていくのかを職場で考えていく。"},
  {id:408, chapter:12, text:"大規模災害などの危機介入に際して、産業カウンセラーには、多くの関係者とネットワーク構築を図り、チームの一員として対応することが求められる。", answer:true, explanation:"設問のとおり。大規模災害などの危機介入に際しては、産業カウンセラーには、多くの関係者とネットワーク構築を図り、チームの一員として対応することが求められる。その際、チームとして支援するという発想を共有することが重要である。"},
  {id:409, chapter:12, text:"復職の条件や、復職後の就業場所、就業内容といった細かい内容に関する本人と職場側との協議は、原則的には主治医から職場復帰が可能という見解が示される前から開始することが望ましい。", answer:false, correction:"示される前から → 示された時点から", explanation:"復職の条件や、復職後の就業場所、就業内容といった細かい内容に関する本人と職場側との協議は、原則的には主治医から職場復帰が可能という見解が示された時点から開始することが望ましい。"},
  {id:410, chapter:12, text:"職場復帰が可能であると判断する目安のひとつは、医学的に治癒していることである。", answer:false, correction:"医学的に治癒していることである → 医学的に就労に問題がないとされる程度に回復していることである", explanation:"職場復帰でのポイントは、就労には問題ないかどうかという視点であり、「治癒」での職場復帰とは限らない。職場復帰が可能であると判断する目安のひとつは、医学的に就業に耐える状態である。"},
  {id:411, chapter:12, text:"職場復帰を計画する場合、復帰先としては元の職場への復帰が原則となる。", answer:true, explanation:"職場復帰を計画する場合、受け入れ側の職場関係者の了解や環境調整が不可欠であり、元の職場への復帰が原則となる。"},
  {id:412, chapter:12, text:"精神医学的治療の中心は、精神科薬物療法であるが、症状が落ち着いてきた時点では、社会参加・社会復帰をめざしたさまざまな精神科リハビリテーションも必要となる。", answer:true, explanation:"精神医学的治療の中心は精神科薬物療法であるが、症状が落ち着いてきた時点で、社会参加・社会復帰をめざしたさまざまな精神科リハビリテーションが必要となる。精神科デイケア、小規模作業所、生活技能訓練（ソーシャル・スキル・トレーニング：SST）などが、その人の症状や障害レベルに合わせて実施される。"},
  {id:413, chapter:12, text:"うつ病の代表的な症状は、抑うつ感、悲哀感、不安感、意欲低下などであるが、1日のうちでも気分の波があり、一般的に午後の気分がもっともよくない。", answer:false, correction:"午後の気分 → 午前中の気分", explanation:"うつ病の代表的な症状は、抑うつ感、悲哀感、不安感、意欲低下などである。1日のうちでも気分の波（日内変動）があって、一般的に午前中の気分がよくない。"},
  {id:414, chapter:12, text:"うつ病と診断された従業員から「今の仕事は自分に向いていないから辞めたい。」と相談された場合、今は判断するにふさわしくない時期であることを伝え、判断を先送りさせるアドバイスが原則である。", answer:true, explanation:"うつ病は判断力の低下を伴うが、産業カウンセラーや周囲が設問のような相談を受けた場合には、今は決断するにふさわしくない時期であること、病気が回復し判断能力がついたときに一緒に考えようと伝え、判断を先送りさせるアドバイスが原則である。"},
  {id:415, chapter:12, text:"うつ病に対しては、十分な休養と薬物療法以外に、心理療法も有効なので、治療当初より積極的に行う。", answer:false, correction:"治療当初より積極的に行う → 時期を見ながら行うことを検討する", explanation:"うつ病の治療に認知行動療法や対人関係療法が有効であるとされている。しかし、病態が重い場合は、患者の心理的負担になる場合も少なくないので、心理療法は、一般的には治療当初ではなく回復期に行われることが多い。"},
  {id:416, chapter:12, text:"統合失調症の急性期に目立つ症状としては、幻聴、被害的な妄想、作為体験、思考伝播などがあげられる。", answer:true, explanation:"統合失調症の急性期に目立つ症状として、設問にある諸症状があげられる。作為体験は「自分が他人から操られてしまう」などの体験で、思考伝播は「自分の考えが他人にわかられてしまう」という体験のことである。"},
  {id:417, chapter:12, text:"統合失調症の治療について急性期においては、抗精神病薬での治療が中心となり、慢性期では、継続的な精神医学的治療や精神科リハビリテーションの実施が不可欠となる。", answer:true, explanation:"統合失調症の治療について急性期においては抗精神病薬での治療が中心となる。最近では非定型抗精神病薬の発達がめざましく入院治療の必要性が低下している。慢性期では、継続的な精神医学的治療や精神科リハビリテーションの実施が不可欠となる。また、当事者および家族に対する病気や薬への理解を促進させる心理教育も大切である。"},
  {id:418, chapter:12, text:"パニック障害（パニック症）は、予期しないパニック発作（急に起こる動悸、冷汗、しびれ、不安など）の出現と、発作の再度の出現を不安に感じる予期不安が特徴的である。", answer:true, explanation:"パニック障害（パニック症）は、器質的疾患がないにもかかわらず、予期しないパニック発作（動悸、呼吸困難、冷汗、しびれ、不安など）の出現と、発作の再度の出現を不安に感じる予期不安が特徴的である。"},
  {id:419, chapter:12, text:"既知の医学的要因が見出されないにもかかわらず、自分が重篤な病気にかかっているという恐怖やとらわれをもっている場合を心身症という。", answer:false, correction:"心身症 → 心気障害（心気症）", explanation:"設問の説明は心気障害（心気症）であり、DSM-5（アメリカ精神医学会における精神障害の診断・統計マニュアル 第5版）では、病気不安症（illness anxiety disorder）として不安障害から分離されている。多くはドクターショッピングの傾向が認められる。"},
  {id:420, chapter:12, text:"心身症患者は、身体症状がストレス要因と関連していることをよく認識している。", answer:false, correction:"よく認識している → 気づいていないことが多い", explanation:"心身の相互関係を重視した病態理解に基づき、心理社会的ストレス要因と関連して発症・悪化する身体疾患を心身症という。本人はストレス要因に気がつかないまま過剰適応していることが少なくないので、心身症患者が自らの身体症状とストレス要因との関連を認識することは困難である。"},
  {id:421, chapter:12, text:"アルコール依存症の治療は、精神科専門施設での入院治療が必要となることがあるが、退院後の断酒を支えるためには、断酒会やAA（アルコール依存症者の匿名の会）といった自助グループへの参加が効果的である。", answer:true, explanation:"アルコール依存症の治療の実際としては、脳に作られた依存の回路を回さないことが原則となり、精神科専門施設での入院治療が必要になることがある。退院後の断酒を支えるためには、断酒会やAA（匿名断酒会）といった自助グループへの参加が効果的である。"},
  {id:422, chapter:12, text:"てんかんの発作は、抗てんかん薬の規則的服用によりコントロールできることが多いが、生活指導や職場環境の調整も大切である。", answer:true, explanation:"てんかんは、種々の原因による慢性の脳障害で、神経細胞の過剰な電気活動に由来する反復発作を特徴とする。抗てんかん薬の規則的服用によって発作はコントロールできることが多いが、睡眠不足、過労、精神的緊張、性ホルモン（月経、妊娠）、感覚刺激などに影響されるので、服薬を含めた発作コントロールや生活指導、職場環境の調整も大切となる。"},
  {id:423, chapter:12, text:"注意欠如・多動症（ADHD）の特徴は、①不注意、②多動性および衝動性であり、このうち多動性および衝動性は成長の段階で目立たなくなることが多い。", answer:true, explanation:"注意欠如・多動症（ADHD）は発達障害の一つで、その特徴は設問のとおりである。職域では不注意により支障が生じることが多い。"},
  {id:424, chapter:12, text:"発達障害者支援法は、発達障害に対し、それぞれの障害特性やライフステージに応じた支援を国・自治体・国民の責務として定めた法律である。", answer:true, explanation:"発達障害者支援法第3条1項は、国及び地方公共団体は、発達障害の早期発見のため必要な措置を講じることを規定している。同条2項では、発達障害児に対し、早期に適切な支援が行われるよう必要な措置を講じることを規定し、第4条では国民の責務を規定している。"},
  {id:425, chapter:12, text:"精神科医療施設への入院制度には、精神保健福祉法にもとづく、措置入院、医療保護入院、応急入院、任意入院がある。", answer:true, explanation:"設問のとおり。措置入院には72時間を限度に指定医1名によるいわゆる緊急措置入院もある。"},
  {id:426, chapter:12, text:"精神科医療施設への入院で、1名以上の指定医の診察により入院が必要と判断され、かつ本人の同意が得られない場合、家族等のうちのいずれかの者の同意によって成立する入院制度のことを応急入院という。", answer:false, correction:"応急入院 → 医療保護入院", explanation:"設問は医療保護入院の説明である。応急入院は、医療保護入院制度を補充するもので、指定医の診察により入院が必要と判断されるものの、本人の同意が得られず、かつ緊急を要し、家族等のうちのいずれかの者の同意が得られない場合、72時間以内にかぎって入院が成立する。"},
  {id:427, chapter:12, text:"障害者雇用促進法は、雇用の分野における障害者に対する差別の禁止及び障害者が職場で働くにあたっての支障を改善するための措置等を義務付けている。", answer:true, explanation:"設問のとおり。障害者雇用促進法は、現状に対応するため度々改正されてきた。2016年に施行されたものでは、障害者差別の禁止と合理的配慮の提供義務が定められた。さらに、雇用促進を進めるため、2018年には、精神障害者も法定雇用率の算定基礎に加えられた。なお、法定雇用率は民間の事業主については2024年4月から2.5%以上となり、2026年7月から2.7%以上に引き上げが予定されている。"},
  {id:428, chapter:12, text:"産業カウンセラーには、精神医学的な異常性・正常性の判断を求められるのではなく、実際にどういう状況にあれば、精神医学的援助が必要かを判断することが要求される。", answer:true, explanation:"産業カウンセラーには、設問のような判断が要求される。その際の留意点は、病的体験を有しているか、その認識があるかという疾病性よりも、社会生活や家庭生活への支障の程度といった事例性を重視することである。"},
  // ===== 第13章 コミュニケーションの基本 (429-441) =====
  {id:429, chapter:13, text:"コミュニケーションを妨害するあらゆるものをノイズといい、それは、送り手がメッセージを作成する記号化段階ではなく、受け手がメッセージを解釈する記号解読段階で発生する。", answer:false, correction:"送り手がメッセージを作成する記号化段階ではなく → あらゆる段階で発生する", explanation:"コミュニケーションを妨害するあらゆるものをノイズという。ノイズは、送り手がメッセージを作成する記号化段階、メッセージが受け手の感覚チャネルあるいは媒体によって運ばれる搬送段階、受け手がメッセージを解釈する記号解読段階のあらゆる段階で発生する。"},
  {id:430, chapter:13, text:"心理的ノイズは、送り手や受け手の性格、価値観、偏見などがもたらす認知や思考の歪みなど心理的な原因により起こる。", answer:true, explanation:"心理的ノイズは、送り手のメッセージの記号化を妨害したり、受け手の記号解読を妨害したりする心理的な原因である。送り手や受け手の性格、価値観、先入観、偏見などがもたらす認知や思考の歪みが、メッセージの生成と解釈を歪めてしまう。"},
  {id:431, chapter:13, text:"非言語的コミュニケーションの準言語とは、話す速度、声の大きさ、間の取り方、沈黙など、言語に付随する非言語的要素のことである。", answer:true, explanation:"非言語的コミュニケーションの準言語（パラ・ランゲージ）は、設問のとおりである。この準言語なしには、実際の言語的コミュニケーションは存在しえない。"},
  {id:432, chapter:13, text:"言語的コミュニケーションの意味と非言語的コミュニケーションの意味が異なるとダブルバインド（二重拘束的）コミュニケーションになる。", answer:true, explanation:"非言語的コミュニケーションは、言語的コミュニケーションに比べて、コントロールすることが難しく、無意識に表出されてしまう。言語的コミュニケーション（例：歓迎の言葉）ではタテマエを表現しているのに、非言語的コミュニケーション（例：困った表情）ではホンネを漏らしていることがある。このように言語的コミュニケーションと非言語的コミュニケーションの意味が異なるとダブルバインド（二重拘束的）コミュニケーションになる。"},
  {id:433, chapter:13, text:"他者とのコミュニケーションにおける自己開示には、開示者自身に対して望ましい効果をもたらす個人的機能がある。この個人的機能には、感情浄化機能、自己明確化機能、社会的妥当化機能がある。", answer:true, explanation:"他者とのコミュニケーションにおける自己開示とは、自己に関する情報を主に言語的コミュニケーションによって伝達することであり、自分に関する新たな情報、隠していた情報を他者に知らせることである。その個人的機能は設問のとおりである。なお、自己開示の機能には他に、対人的機能として二者関係の発展機能、社会的コントロール機能、親密感の調整機能がある。"},
  {id:434, chapter:13, text:"他者とのコミュニケーションにおける自己呈示は、他者に対して特定の印象を与えるために、自己に関する情報を調節して、主に言語的コミュニケーションによって伝達する行為である。", answer:true, explanation:"他者とのコミュニケーションにおける自己呈示に関する定義は、設問のとおりである。設問にある「調節」するとは、本当の自分を隠す、飾る、誇張する、歪曲する、偽る、タテマエを言う、演技することである。"},
  {id:435, chapter:13, text:"「高圧的に言ってしまったことは悪かったけれど、君のためを思えばこそなんだ」という発言は、防衛的自己呈示における「セルフ・ハンディキャッピング」の一例である。", answer:false, correction:"セルフ・ハンディキャッピング → 正当化", explanation:"設問の例文は、防衛的自己呈示における「正当化」の一例である。正当化とは、部分的に責任を認めるが、否定的な結果を過小評価させる行為である。なお、セルフ・ハンディキャッピングとは、否定的な評価を受ける恐れがあるときに、前もって「ハンディキャップがある」と言う行為、あるいは、実際にハンディキャップを作り出す行為のことである。"},
  {id:436, chapter:13, text:"「ジョハリの窓」には開放領域、隠蔽領域、盲点領域、未知領域の4つの領域がある。", answer:true, explanation:"ジョーゼフ・ラフト（Luft, J.）とハリー・インガム（Ingham, H.）が自己に関するものとして提示した「ジョハリの窓」は、自己への気づきが人間関係の発展に結びつくためのものとして利用されている。4つの窓（領域）で表され、開放領域、盲点領域、隠蔽領域、未知領域がある。"},
  {id:437, chapter:13, text:"「ジョハリの窓」における開放領域とは、私と他者の双方が知っている「私」であり、他者に開放された公的な「私」である。", answer:true, explanation:"「ジョハリの窓」における開放領域とは、設問のとおりである。この開放領域が大きいほど、私と他者のコミュニケーションは活性化する。この開放領域の拡大を支援することが産業カウンセラーの役割の1つでもある。なお、開放領域が大きくても表面的な人にはカウンセリングが効率的に展開できないことを承知しておく必要がある。"},
  {id:438, chapter:13, text:"説得は、主に言語的コミュニケーションによって、指示しながら他者の態度や行動を特定の方向へ変化させる行為である。", answer:false, correction:"指示しながら → 納得させながら", explanation:"他者に影響を与えるコミュニケーションの中で、納得させながら他者の態度や行動を特定の方向へ変化させる説得がある。説得に成功するためには、説得する相手の能力・関心・立場などの特徴を分析し、相手の特徴に応じて適したメッセージを使用すると説得力は高まる。"},
  {id:439, chapter:13, text:"「うそ」の発見の手がかりとして、言い間違いや言いよどみの増加、声の上ずりやアイコンタクトの減少、無意味な手の動きの増加、話す速度や表情の変化などがある。", answer:true, explanation:"「うそ」とは、計画的、意図的に他者を欺くことである。平均的な人は、うそをつくと、そのうそを見破られるのではないかと不安や緊張感が高まる。よって、「うそ」の発見には、非言語的な側面を中心に不自然なコミュニケーションの形で表出される、言い間違いや言いよどみの増加、声の上ずり、話す速度や表情、無意味な手の動きの増加などの変化などが手がかりとなる。"},
  {id:440, chapter:13, text:"日本人のコミュニケーションは、簡単であいまいなメッセージでも意味が通じる場合が多く、これを低コンテクスト・コミュニケーションという。", answer:false, correction:"低コンテクスト → 高コンテクスト", explanation:"コンテクストとは、空間的、時間的、社会的要素を併せもつ概念であり、場面、文脈、状況といった意味合いを含んでいる。日本人のコミュニケーションは、簡単であいまいなメッセージでも意味が通じる場合が多いので、これを高コンテクスト・コミュニケーションという。一方、同質性の低い文化では、互いにわかり合うことが困難だという前提のもと、詳細で明確に表現するコミュニケーションが行われる。このようなコミュニケーションを低コンテクスト・コミュニケーションという。"},
  {id:441, chapter:13, text:"異文化間コミュニケーションで重要なことは、文化が異なれば、常識、規範、習慣、価値観、行動様式などが異なることを認識し、理解することである。", answer:true, explanation:"異文化間コミュニケーションで重要なことは、設問のとおりである。異文化コミュニケーションの問題は、外国語が話せるかどうかの問題ではない。ずれが生じることを前提にして、コミュニケーションに臨むことが望ましい。"},
  // ===== 第14章 職場におけるメンタルヘルス対策 (442-466) =====
  {id:442, chapter:14, text:"メンタルヘルス対策は、産業保健活動の一環であるので、企業経営のリスクとして考えなくてもよい。", answer:false, correction:"考えなくてよい → 対応する必要がある", explanation:"多くの職場でメンタルヘルス不調に陥る労働者が増加し、その状態像も多様化している。メンタルヘルス不調の主因が職場のストレスであるとして、訴訟に発展する例もみられる。事業者は企業経営のリスクを回避する意味でも、メンタルヘルス対策を講じていく必要性に迫られている。"},
  {id:443, chapter:14, text:"職場で行われているメンタルヘルス対策は、労働安全衛生法を中心として、労働基準法、労働契約法、精神保健福祉法を主な法的背景としている。", answer:false, correction:"精神保健福祉法 → 労働者災害補償保険法", explanation:"一般企業（地方自治体を含む）の職場で行われているメンタルヘルス対策は、産業保健活動の一環という位置づけである。これは労働安全衛生法を中心として、労働基準法、労働者災害補償保険法、労働契約法を主な法的背景としている。"},
  {id:444, chapter:14, text:"労働者が業務上の事由により負傷、死亡するか、または疾病にかかることを労働災害といい、労働基準法において使用者（事業主）に労災補償責任が定められている。", answer:true, explanation:"労働災害に関する内容は、設問のとおりである。その責任に基づく対応を、国の強制保険制度によって、事業主に代わって行っているのが労働者災害補償保険（労災保険）である。この労災補償制度は、労災保険法によって規定されている。"},
  {id:445, chapter:14, text:"労働者災害補償保険法によると、保険給付されるのは業務災害に限定されている。", answer:false, correction:"業務災害に限定されている → 業務災害と通勤災害に関するものがある", explanation:"労働者が業務上の事由により負傷、死亡するか、または疾病にかかることを労働災害といい、労働基準法において使用者に労災補償責任が定められている。労働災害補償は労働者災害補償保険法（労災保険法）によって規定されている。保険給付には業務災害に関するものと、通勤災害に関するものがある。"},
  {id:446, chapter:14, text:"労災補償の要件である業務起因性が成立するとは、業務と傷病等との間に一定の因果関係が存在することである。", answer:true, explanation:"業務起因性が成立するためには、単に当該傷病が業務遂行中に起きたというだけでは不十分で、①労働の場において当該健康障害を起こす有害因子が存在したこと、②当該健康障害を起こすに足りる曝露があったこと、③発症の経過および病態が有害因子の性質、曝露条件などからみて医学的に妥当であることの3要件が満たされる必要がある。"},
  {id:447, chapter:14, text:"労災補償を得るには、本人あるいは家族が、事業主の証明と医師の診断書を添えて、管轄のハローワークに書面を提出しなければならない。", answer:false, correction:"ハローワーク → 労働基準監督署", explanation:"労災補償を得るには、本人あるいは家族が事業主の証明と医師の診断書を添えて、管轄の労働基準監督署に書面を提出する。認定の有無は、労働基準監督署長が決定する。その決定に対して請求側が不服の場合には、審査請求、再審査請求を行うことができる。それらの結果にも不服であれば、国を相手取って、訴訟を起こすことが可能である。"},
  {id:448, chapter:14, text:"労災給付（治療費、休業給付）は、産業医が治癒と判断した段階で打ち切られる。", answer:false, correction:"産業医 → 主治医", explanation:"労災給付（治療費、休業給付）は、主治医が治癒と判断した段階で打ち切りとなる。治癒とは、積極的な医学的治療を加えても、それ以上症状の改善がみられない状態を指す。一定の後遺障害を残す例に対しては、定められた障害等級によって補償がなされる。"},
  {id:449, chapter:14, text:"労災認定では、長時間労働に関して「発病日から起算した直前の1か月間におおむね160時間を超える時間外労働を行った場合等」は、「特別な出来事」に該当するものとして扱われる。", answer:true, explanation:"設問にある「発病日から起算した直前の1か月間におおむね160時間を超える時間外労働を行った場合等」は、「業務による心理的負荷評価表」により、極度の長時間労働として「特別な出来事」に該当するものとして扱われる。労災認定は、その要件の1つである「対象疾病の発病前おおむね6か月の間に、客観的に当該精神障害を発病させるおそれのある業務による強い心理的負荷が認められること」の「業務による心理的負荷評価表」を用いて本要件を満たすかどうかで判断される。"},
  {id:450, chapter:14, text:"労働安全衛生法は、労働者の安全と健康を確保するために、職場内で行われねばならない事項および行われることが望ましい事項がまとめられている。", answer:true, explanation:"労働安全衛生法は、事業者の義務および努力義務を示しており、設問のとおりである。現在の職場における安全衛生活動（産業保健活動を含む）のほとんどは、この労働安全衛生法を法的背景としている。"},
  {id:451, chapter:14, text:"労働安全衛生法では、産業医は、労働者が常時10人以上の事業場で選任義務が課せられており、1000人以上では専属の産業医を選任しなければならないと規定されている。", answer:false, correction:"10人以上 → 50人以上", explanation:"労働安全衛生法で産業医は、労働者数が常時50人以上の事業場で選任義務が課せられており、1,000人以上では、専属の産業医が必要となる。選任後、選任報告書を労働基準監督署に提出しなければならない。"},
  {id:452, chapter:14, text:"労働衛生の3管理とは、作業環境管理・作業管理・健康管理である。健康診断、ストレスチェックなどは作業環境管理に含まれる。", answer:false, correction:"作業環境管理 → 健康管理", explanation:"労働衛生の3管理と呼ばれるのは、設問のとおりである。このうち、健康管理では、健康診断およびその結果に基づく事後措置、健康測定およびその結果に基づく指導、ストレスチェック制度の実施などを行う。なお、これらは月1回以上開催しなければならない衛生委員会での審議を通じて進められる。"},
  {id:453, chapter:14, text:"ストレスチェック制度は、メンタルヘルス不調者の早期発見・早期対処を第一義的な目的としている。", answer:false, correction:"早期発見・早期対処 → 第1次予防（未然防止）", explanation:"2014年の労働安全衛生法の改正により、事業者に対してストレスチェック制度の実施が義務化された。ストレスチェック制度は、特定の精神障害を有する労働者を発見し、治療の勧奨を行うためのものではなく、メンタルヘルス不調にならないよう対策を行うことを狙いとしている。"},
  {id:454, chapter:14, text:"ストレスチェック制度では、高ストレス者に該当した者全員に対して、事後措置として医師の面接指導を受けさせなければならないとされている。", answer:false, correction:"高ストレス者に該当した者全員 → 高ストレス者に該当した者のうち、本人の申し出があった者", explanation:"ストレスチェックによって、高ストレス者に該当した者のうち、申し出た者に対して、医師による面接指導を行う。面接指導は強制ではない。面接指導の結果、必要と判断された場合には、就業面の配慮などの措置が行われる。"},
  {id:455, chapter:14, text:"事業者（使用者）が負っている安全配慮義務には、危険予知義務と結果回避義務がある。", answer:true, explanation:"事業者（使用者）は、雇用する労働者に対して、安全配慮義務を負っている。安全配慮義務とは、雇用する労働者が仕事を遂行する中で生命や安全が脅かされることがないかどうかを確認し（危険予知義務）、その可能性が高い場合には、未然にその対策を講じなければならない（結果回避義務）ことをいう。"},
  {id:456, chapter:14, text:"「労働者の心の健康の保持増進のための指針」では、メンタルヘルス不調を、精神障害のみならず、ストレスや強い悩み、不安などを含む幅広いものと定義している。", answer:true, explanation:"「労働者の心の健康の保持増進のための指針」で、メンタルヘルス不調とは、精神および行動の障害に分類される精神障害や自殺のみならず、ストレスや強い悩み、不安など、労働者の心身の健康、社会生活および生活の質に影響を与える可能性のある精神的および行動上の問題を幅広く含むものをいう、と定義している。"},
  {id:457, chapter:14, text:"「労働者の心の健康の保持増進のための指針」では、「セルフケア」「ラインによるケア」「管理監督者によるケア」「事業場外資源によるケア」の4つのケアを明示している。", answer:false, correction:"管理監督者によるケア → 事業場内産業保健スタッフ等によるケア", explanation:"「労働者の心の健康の保持増進のための指針」では、事業者が率先してメンタルヘルス対策に取り組む旨を表明することの重要性が強調されている。職場の実態を把握したうえで、設問にあるセルフケア、ラインによるケア、事業場内産業保健スタッフ等によるケア、事業場外資源によるケアの4つを関連付けながら事業場全体で推進することを求めている。"},
  {id:458, chapter:14, text:"ラインによるケアとは、労働者が自らのストレス状態を知り、それに適切に対処するため、周囲への自発的な相談を含む、取り組みである。", answer:false, correction:"ラインによるケア → セルフケア", explanation:"設問は、セルフケアによる取り組みである。労働者が自らのストレス状態を知り、それに適切に対処する取り組みである。ラインによるケアは、管理監督者による職場環境の評価と改善、部下からの相談への適切な対応などをいう。管理監督者は部下に対する面談に対応できるように面談スキルを上げていかなくてはいけない。"},
  {id:459, chapter:14, text:"「心の健康問題により休業した労働者の職場復帰支援の手引き」は、当該労働者が休業を開始してから職場復帰を果たし職場に再適応するまでの期間の活動を、5つのステップに分けて整理している。", answer:true, explanation:"厚生労働省から公表されている「心の健康問題により休業した労働者の職場復帰支援の手引」は、休業した労働者の職場復帰支援のあり方を示したものである。支援の流れは、第1ステップ：疾病休業開始および休業中のケア、第2ステップ：主治医による職場復帰可能の判断、第3ステップ：職場復帰の可否および職場復帰支援プランの作成、第4ステップ：最終的な職場復帰の決定、第5ステップ：職場復帰後のフォローアップである。"},
  {id:460, chapter:14, text:"職場復帰支援を進めるにあたり、休業中の本人から症状等の情報が得にくい場合は、本人を介さず、主治医に職場の実情を伝えると、より職場復帰に関する現実的な意見を得られやすくなる。", answer:false, correction:"本人を介さず → 本人の同意を得て", explanation:"休業中は、本人が不要な心配や不安を抱かないように、また必要に応じて家族や親族が安心して本人の支援ができるよう、職場から休業および職場復帰に関する社内の諸制度をわかりやすく伝える。この時点で、主治医に職場の実情を伝えることによって、主治医からより職場復帰に関する現実的な意見を得られやすくなるが、主治医と連絡をとるときには必ず本人の同意を得て行う。"},
  {id:461, chapter:14, text:"病状が回復し、本人から職場復帰を希望する意思表示が出され、主治医からの職場復帰に関する診断書が提出された際に、職場復帰の可否を決めるための面談を最初に行うのは直属の上司である。", answer:false, correction:"直属の上司である → 通常は産業医である", explanation:"主治医からの診断書が提出された際に、当該労働者本人と職場復帰の可否を決めるための面談を最初に行うのは、通常、産業医である。"},
  {id:462, chapter:14, text:"「心の健康問題により休業した労働者の職場復帰支援の手引き」（平成21年3月改訂）によれば、休業した労働者を職場復帰させるかどうかの最終的な決定は事業者が行うとされている。", answer:true, explanation:"第4ステップでは事業者による最終的な職場復帰の決定を行う。「心の健康問題により休業した労働者の職場復帰支援の手引き」（平成21年3月改訂）では、実際の職場復帰にあたって事業場で行われる職場復帰支援の内容が総合的に示されている。"},
  {id:463, chapter:14, text:"復帰先職場は、休業となった元の職場はストレス要因となっているので、原則、他の職場とすることが望ましい。", answer:false, correction:"原則、他の職場 → 原則、元の職場とする", explanation:"復帰先職場は、休業前の元の職場とするのが原則である。当該労働者にとって、慣れた職場環境で仕事を再開することがもっともストレスが抑えられると考えられるからである。当該職場における人間関係や、そこで仕事をする限り避けては通れない業務によるストレスが、不調をきたす主因となっていた例などでは、職場異動も考慮される。"},
  {id:464, chapter:14, text:"リワークプログラムとは、在職精神障害者の職場復帰支援プログラムの通称であり、各都道府県の地域障害者職業センターや民間医療機関で実施されている。", answer:true, explanation:"事業場外資源によるリワークプログラムが注目を集めているが、リワークプログラムとは、在職精神障害者の職場復帰支援プログラムの通称であり、現在各都道府県の地域障害者職業センターや民間医療機関で実施されている。障害者職業カウンセラーおよびアシスタントが、主治医、当該労働者の職場関係者と連携しながら、12〜16週程度の支援活動を行っている。"},
  {id:465, chapter:14, text:"過重労働対策の基本は、時間外・休日労働時間の削減および年次有給休暇の取得促進である。", answer:true, explanation:"過重労働対策の基本は、時間外・休日労働時間の削減および年次有給休暇の取得促進であるが、そのうえで長時間労働を行わざるを得なかった労働者に対して面接指導などが実施され、脳・心臓疾患に加えて、気分障害をはじめとするメンタルヘルス不調についての評価とそれに基づいた指導が行われる必要がある。"},
  {id:466, chapter:14, text:"「業務における過重な負荷による脳血管疾患もしくは心臓疾患を原因とする死亡」は、「過労死等防止対策推進法」における「過労死等」に該当する。", answer:true, explanation:"「過労死等防止対策推進法」でいう「過労死等」とは、「業務における過重な負荷による脳血管疾患もしくは心臓疾患を原因とする死亡、もしくは業務における強い心理的負荷による精神障害を原因とする自殺による死亡またはこれらの脳血管疾患もしくは心臓疾患もしくは精神障害」を指している。"},
  // ===== 第15章 キャリア形成支援 (467-495) =====
  {id:467, chapter:15, text:"自殺対策基本法には、「国及び地方公共団体が実施する自殺対策に協力するとともに、その雇用する労働者の心の健康の保持を図るため必要な措置を講じるよう努めるものとする」と職場に求める取り組みが記されている。", answer:true, explanation:"わが国の自殺者数は、1998年に急増し、2011年までの14年間、年間3万人を超える状態が続いた。こうした自殺者数の高止まりの状況に対して「自殺対策基本法」が制定され、それには、設問のとおり、事業主に求める取り組みが盛り込まれた。職場で行われるべき活動として、労働者の心の健康の保持増進のための指針に沿った取り組み、自殺未遂者、遺された人への支援などがあげられている。"},
  {id:468, chapter:15, text:"自殺対策は、プリベンション、インターベンション、ポストベンションの3つに分けられ、自殺者の周囲の遺された人々に対する支援は、インターベンションという。", answer:false, correction:"インターベンション → ポストベンション", explanation:"自殺者の周囲の遺された人々に対する支援は、ポストベンションである。自殺した労働者の上司、同僚、親交の深かった他の職場関係者が対象とし、彼らに及ぶ心理的影響をできるだけ緩和することを目的とする。インターベンションとは、自殺の危険が特に高まっている者への個別対応（保護）を指す。"},
  {id:469, chapter:15, text:"自殺対策のうち、プリベンションには、精神障害の罹患者、重大な喪失体験を経験した者など、自殺リスクが高いと考えられる集団を対象とした働きかけがある。", answer:true, explanation:"自殺対策のうち、プリベンションについては、設問のとおりである。また、自殺問題に関する一般的な啓発活動などもあげられる。職場には、ストレス要因のような自殺のリスクを高める可能性があるが、その抑止効果を期待できる要素もある。"},
  {id:470, chapter:15, text:"悲惨な災害の発生後、被災者の心理状態は、茫然自失期、ハネムーン期、幻滅期、再建期の4相性の段階を踏んで経過していくとされる。", answer:true, explanation:"悲惨な災害の発生後、被災者の心理状態は、災害発生後数時間〜数日間の茫然自失期、数日後〜数週間または数か月間のハネムーン期、数週間後〜年余の幻滅期、そして数年間の再建期の4相性の段階を踏んで経過していくとされる。"},
  {id:471, chapter:15, text:"キャリア理論は、キャリア発達やキャリア選択に関するさまざまな現象を概念化したもので、選択理論、構造理論、発達理論の3つに分けられる。", answer:true, explanation:"キャリア理論は、キャリア発達やキャリア選択に関するさまざまな現象を概念化し一般化した科学的知識の体系のことで、大きく選択理論、構造理論、発達理論の3つに分けられる。"},
  {id:472, chapter:15, text:"スーパー（Super, D. E.）は、生涯キャリア発達の視点を強調し、人生役割の組み合わせによるライフキャリアの概念を示し、これを図示したものがキャリア・アンカーである。", answer:false, correction:"キャリア・アンカー → ライフキャリア・レインボー", explanation:"スーパー（Super, D. E.）は、生涯キャリア発達の視点を強調し、人生役割の組み合わせによるライフキャリアの概念を示し、日常生活における個人の役割の結びつきが個人のライフスタイルを構成し、その継続的な結合がライフサイクルを構成するものであるとした。これを図示したのがライフキャリア・レインボーである。"},
  {id:473, chapter:15, text:"パーソンズ（Parsons, F.）が提唱した「マッチング理論」は、特性因子論的アプローチとも呼ばれ、個人の特性と職業の要件との適合によって職業選択を説明しようとするものである。", answer:true, explanation:"パーソンズ（Parsons, F.）が提唱した「マッチング理論」の基本的な考え方は、①個人の心理的特性には差異があり、個人にもっとも適した職業が存在する、②職業を遂行するにはその要件に違いがあり、もっとも適した人を必要とする、③職業適応の度合いは、個人の特性と職業の要件との一致の程度による。この理論は、個人の特性と職業の要件を結びつけることが職業選択であると考える。"},
  {id:474, chapter:15, text:"ジェラット（Gelatt, H. B.）は、不確実な社会におけるキャリア形成の視点として、不確実性を積極的に受け入れ、未来を創造する「客観的合理性」の概念を提唱した。", answer:false, correction:"客観的合理性 → 積極的不確実性", explanation:"ジェラット（Gelatt, H. B.）の連続的意思決定のモデルは、採択された決定には、試験的決定と最終的決定の2つがある。意思決定の方策としては、①予測システム、②価値システム、③基準システムの3段階から成り立っている。ジェラットはその後、不確実な社会におけるキャリア形成の視点として、不確実性を積極的に受け入れ、未来を創造する「積極的不確実性」の概念を提唱し、客観的で合理的な戦略だけでなく、主観的で直観的な戦略を統合することを組み込んだ新たな意思決定の枠組みを提示した。"},
  {id:475, chapter:15, text:"ホランド（Holland, J. L.）は、個人と環境（職業）に6つのタイプ、現実的、研究的、芸術的、社会的、企業的、価値的を設けた。", answer:false, correction:"価値的 → 慣習的", explanation:"ホランド（Holland, J. L.）は、個人と環境（職業）に6つのタイプ（現実的、研究的、芸術的、社会的、企業的、慣習的）を設けた。これら6つのタイプの仕事や活動に対する興味を測定すれば、個人のパーソナリティを類型化することができ、また仕事を分類すれば、職業を類型化することができるとした。この6つのタイプを図示したものはホランドの六角形と呼ばれる。"},
  {id:476, chapter:15, text:"人間は学習によって変容し続ける存在であることを強調し、キャリア発達や職業選択は学習プロセスの結果であるととらえ、社会的学習理論を提唱したのはロー（Roe, A.）である。", answer:false, correction:"ロー（Roe, A.） → クランボルツ（Krumboltz, J. D.）", explanation:"設問の社会的学習理論を提唱したのはクランボルツ（Krumboltz, J. D.）である。キャリア発達や職業選択、あるいはこれらに関する意思決定の要因として、①遺伝的な資質と特殊な能力、②環境条件と出来事、③学習経験、④課題接近スキルの4つがあり、これらが相互に影響し合ってキャリアが決定されるが、キャリアに関する意思決定は学習のプロセスであると考えられている。"},
  {id:477, chapter:15, text:"クランボルツ（Krumboltz, J. D.）は、キャリアはさまざまな偶発的なできごとによって決定されるという「計画された偶発性」という概念を提唱した。", answer:true, explanation:"設問はクランボルツ（Krumboltz, J. D.）が提唱した概念で、予期せぬ新たな出来事が個人のキャリアの機会を生むのであるから、それを避けるのではなく、最大限に活用することが必要であるとし、そのためには、「好奇心」「持続性」「楽観性」「柔軟性」「リスク・テイキング」のスキルが必要であるとした。"},
  {id:478, chapter:15, text:"ハンセン（Hansen, L. S.）は、統合的人生設計（ILP）を提唱し、生涯キャリア発達についての全般的なプラニングを支援するのがキャリアカウンセリングの役割であるとした。", answer:true, explanation:"ハンセン（Hansen, L. S.）は、設問のとおり、「統合的人生設計（ILP）」を提唱し、単なる適職選択や就職問題だけでなく、その後生涯にわたって継続する職業生活に関する問題、さらには家庭や地域など職業生活以外の生活領域における多様な役割の問題といった、生涯キャリア発達についての全般的なプラニングを支援するのがキャリアカウンセリングの役割であるとした。"},
  {id:479, chapter:15, text:"シュロスバーグ（Schlossberg, N. K.）のキャリア発達理論では、転機に対処するためには、状況、自分、周囲の支援、戦略の4つの資源を確認し、この4つを強化することがキャリア発達であるとした。", answer:true, explanation:"キャリア発達理論を構築したシュロスバーグ（Schlossberg, N. K.）は、キャリアの転機に「予測していた転機」「予測していなかった転機」「期待していたものが起こらなかった転機」の3つのタイプに区別し、どんな転機でも、それを見定め、点検し、受け止めるプロセスを通じて乗り越えていくことができるが、転機に対処するためには状況（situation）、自分（self）、周囲の支援（support）、戦略（strategies）の4つの資源（4Sと呼ぶ）を確認し、活用できる資源と脆弱な資源を明らかにしつつ、4Sを強化していくことがキャリア発達であるとした。"},
  {id:480, chapter:15, text:"シャイン（Schein, E. H.）は、組織心理学の立場にたって、組織内キャリアの発達段階説を提唱し、長期的な職業生活における個人の拠り所をキャリア・アンカーと呼んだ。", answer:true, explanation:"シャイン（Schein, E. H.）は、組織心理学の立場にたって、組織内キャリアの発達段階説を提唱し、長期的な職業生活における個人の拠り所をキャリア・アンカーと呼んだ。キャリア・アンカーのタイプとしては、①特定専門分野/職能別コンピテンス、②全般管理コンピテンス、③自律/独立（自由）、④保障/安定、⑤企業家的創造性、⑥純粋な挑戦、⑦奉仕/社会献身、⑧生活様式の8タイプとした。"},
  {id:481, chapter:15, text:"キャリアは他者との関係の中で、お互いに学び合うことによって形成されるという関係性アプローチ（Relational Approach）を提唱したのはサビカス（Savickas, M. L.）である。", answer:false, correction:"サビカス（Savickas, M. L.） → ホール（Hall, D. T.）", explanation:"設問はホール（Hall, D. T.）の理論である。サビカス（Savickas, M. L.）は、過去や現在の経験に新たな意味を与えて再構築し、将来への展望につながる「物語的事実」をつくり出していく、という「キャリア構築理論」を提唱した。"},
  {id:482, chapter:15, text:"VPI職業興味検査は、ホランド（Holland, J. L.）のモデルに基づいて開発されたもので、6つの興味領域尺度と5つの傾向尺度に対する個人の特性を測定するものである。", answer:true, explanation:"VPI職業興味検査は、自己理解を促進するために用いられる。ホランド（Holland, J. L.）のモデルに基づいて開発されたもので、6つの興味領域尺度と5つの傾向尺度から、職業興味や職業選択における心理的傾向をみるものである。"},
  {id:483, chapter:15, text:"キャリア・ガイダンスは、①意思決定への援助、②自己概念へのかかわり、③ライフスタイル、価値観、余暇へのかかわり、④自由な選択の尊重、⑤個人差の重視、⑥変化への対応と柔軟性などに重点が置かれている。", answer:true, explanation:"職業発達を支援する職業指導は、職業からキャリアへの概念の転換が図られ、キャリア・ガイダンスは、①意思決定への援助、②自己概念へのかかわり、③ライフスタイル、価値観、余暇へのかかわり、④自由な選択の尊重、⑤個人差の重視、⑥変化への対応と柔軟性などに重点が置かれ、「包括的なキャリア・ガイダンス」（comprehensive career guidance）へと範囲と内容を広げるようになっている。"},
  {id:484, chapter:15, text:"キャリア教育は、中央教育審議会の答申（2011年）の中で「一人一人の社会的・職業的自立に向け、必要な基盤となる能力や態度を育てることを通して、キャリア発達を促す教育」と定義された。", answer:true, explanation:"学校教育における進路指導と進路相談は、教育活動の一環として行われてきた。キャリア教育は、中央教育審議会答申（2011）「今後の学校におけるキャリア教育・職業教育の在り方について」の中で「一人一人の社会的・職業的自立に向け、必要な基盤となる能力や態度を育てることを通して、キャリア発達を促す教育」と定義された。"},
  {id:485, chapter:15, text:"公共職業安定機関等における職業紹介は、求職者に対する生活支援や職業相談と一体となって行われてきた。", answer:false, correction:"生活支援 → 職業指導", explanation:"公共職業安定機関等における職業紹介は、求職者に対する職業指導や職業相談と一体となって行われてきた。職業指導とは、職業に就こうとする者に対し、実習、講習、指示、助言、情報の提供その他の方法により、その者の能力に適合する職業の選択を容易にさせ、及びその職業に対する適応性を増大させるために行う指導をいう、と職業安定法（第4条）に規定されている。"},
  {id:486, chapter:15, text:"キャリアコンサルティングとは、労働者の職業の選択、職業生活設計又は職業能力の開発及び向上に関する相談に応じ、助言及び指導を行うことをいう。", answer:true, explanation:"2016年に改正された職業能力開発促進法第2条第5項では、キャリアコンサルティングは設問のように表現されている。"},
  {id:487, chapter:15, text:"キャリア形成支援を担う際に必要とされる能力には、キャリア発達やキャリア選択に関する知識を体系的に習得すること、ネットワークを形成し活用できることなどがある。", answer:true, explanation:"キャリア形成支援を担う際に必要とされる能力には、幅広いテーマを扱うため、複数の視点、理論・技法を応用する必要があるなど、設問の他に、カウンセリングに必要な一般的能力、情報に関する能力、個人の評価に関する能力、組織の評価に関する能力などがある。"},
  {id:488, chapter:15, text:"自己理解を支援するために用いられるテストには、厚生労働省編一般職業適性検査（GATB）、職業レディネステスト、キャリアインサイトなどがあり、いずれも小学生から高齢者まで制限なく実施される。", answer:false, correction:"制限なく → 検査ごとに適用対象が異なる", explanation:"自己理解を支援するために用いられるテストには、厚生労働省編一般職業適性検査（GATB）、職業レディネステスト、キャリアインサイトなどがあり、いずれも適用対象は検査ごとに異なる。GATBは中学生以上〜45歳未満、VRT（職業レディネステスト）は、中学生〜大学生、キャリアインサイトは、概ね18歳〜34歳（職業経験が少ない者）と35歳以上（職業経験がある者）とされている。"},
  {id:489, chapter:15, text:"啓発的経験とは、一般的には実際に職業に就く前に探索的に体験してみることである。職場体験、インターンシップ、アルバイト等が含まれるが、ボランティア体験は含まれない。", answer:false, correction:"含まれない → 含まれる", explanation:"啓発的経験は、一般的には実際に職業に就く前に探索的に体験してみることである。職場体験、インターンシップ、アルバイト等が含まれ、ボランティア体験も含まれる。自己理解や職業理解を深めたり、広げたりすることも啓発的経験のもたらす効果である。"},
  {id:490, chapter:15, text:"キャリア・ガイダンスの6分野とは、「自己理解の支援」「職業理解の支援」「啓発的経験」「カウンセリング」「方策の実行」「フォローアップ（追指導）・職場適応」の6つである。", answer:true, explanation:"キャリア形成支援におけるキャリアコンサルティングは、設問のとおり6分野で行う。それぞれの分野における具体的な活動としては、カウンセリング、テスト、キャリアの棚卸し、情報提供、グループワーク、実習などさまざまな方法が取られるが、各分野ともカウンセリングを伴って行われる。なお、6分野すべて行う場合もあれば、どれかを部分的に行う場合もある。"},
  {id:491, chapter:15, text:"職業理解の支援とは、進路や職業、キャリア・アンカーの種類と内容をクライエントが理解できるようにすることである。", answer:false, correction:"キャリア・アンカー → キャリア・ルート", explanation:"キャリアガイダンスの6分野のうち、職業理解の支援とは、進路や職業、キャリア・ルートの種類と内容をクライエントが理解できるようにすることである。職業理解の内容は、職業、産業、事業所、労働市場その他の関連情報を理解することである。最も重要な情報は仕事の責任と内容、作業環境と条件、労働条件など、「職業」そのものに関する情報である。"},
  {id:492, chapter:15, text:"ジョブ・カードは、職業能力の形成機会に恵まれない人に対する支援にのみ使われる職業能力を証明するツールである。", answer:false, correction:"支援にのみ使われる → さまざまな人が利用できる", explanation:"ジョブ・カード（職業経歴等記録書）は、生涯を通じたキャリア・プランニングと職業能力証明の機能を担うツールである。求職者、在職者、職業訓練受講者、学生等が、職業生活を通じて利用するものになっている。厚生労働省「マイジョブ・カード」に詳細な説明があり、様式のファイルやプログラムを無料でダウンロードすることができる。"},
  {id:493, chapter:15, text:"職業情報提供サイトjob tag（厚生労働省）では企業や団体からの具体的な求人情報を提供している。", answer:false, correction:"求人情報を提供している → 求人情報は提供していない", explanation:"職業情報提供サイトjob tagでは、その職業の国内の就労者数を示している場合もあるが、企業や団体からの具体的な求人情報は提供していない。"},
  {id:494, chapter:15, text:"職業情報提供サイトjob tag（厚生労働省）では簡単な職業興味診断等を行いその結果から関連する職業を見ることができる。", answer:true, explanation:"職業情報提供サイトjob tagではサイトの中で、職業興味、価値観、能力などの簡易な診断等を行い、その結果から関連する職業を見ることができる。"},
  {id:495, chapter:15, text:"ユースエール認定制度は、若者の採用・育成に積極的で、若者の雇用管理の状況などが優良な中小企業を厚生労働大臣が認定する制度である。", answer:true, explanation:"ユースエール認定制度は設問の通り。若者にとっては優良な中小企業を探す上で一つの目安となり、この認定を受けることで中小企業は人材確保の面で有利となる。"},
  // ===== 第16章 事例検討 (496-498) =====
  {id:496, chapter:16, text:"社会的学習理論を提唱したバンデューラ（Bandura, A.）は、他者の行動を観察することで成立する学習を「直接経験による学習」と呼んだ。", answer:false, correction:"直接経験による学習 → 観察学習（モデリングによる）", explanation:"社会的学習理論を提唱したバンデューラ（Bandura, A.）は、基本的な学習パターンとして、主にある行為に関する罰や報酬によって決定される直接体験による学習と、他者の行動を観察することで成立する学習を観察学習（モデリングによる学習）を提唱した。"},
  {id:497, chapter:16, text:"カウンセリング力の向上を図るためには、自他の相談事例を参考として、そのプロセスや結果をふり返り、自らの見方や姿勢をふり返る機会とすることが必要である。", answer:true, explanation:"カウンセリング力の向上を図るために求められるものは、設問のとおりである。カウンセリング学習は、これだけ体験学習を積めば十分という目に見えるハードルがあるわけではない。実際の面接についてその経過や結果を事例報告書としてまとめ、自らふり返って検討したり、スーパービジョンで援助を受けつつ個別の学びを通し身に付けていくことや、自他の事例を可能な限り数多く検討するなどが求められる。"},
  {id:498, chapter:16, text:"事例検討における基本的な着眼点には、クライエントの状況の明確化、カウンセリングの契約、設定の検討、援助資源（支援体制）の検討、カウンセラーの見立てと働きかけ、カウンセリング関係、カウンセリングのプロセス、カウンセリングの成果などがある。", answer:true, explanation:"事例検討における基本的な着眼点は、設問のとおりである。事例提供者には、これらが十分検討できるような内容の事例報告書を作成することが求められる。"},
  // ===== 第17章 スーパービジョン (499-500) =====
  {id:499, chapter:17, text:"スーパービジョンは、スーパーバイジーの個人的な心理的課題に焦点を当て、より深い自己理解を得ることを第一の目的としている。", answer:false, correction:"スーパーバイジーの個人的な心理的課題に焦点を当て、より深い自己理解を得ること → スーパーバイジーの専門的なスキルやアイデンティティを高めること", explanation:"スーパービジョンはスーパーバイジーの専門的なスキルやアイデンティティを高めることをねらいとしており、スーパーバイジーが抱える個人的な問題や苦悩などについては原則として取り扱わない。それらは、教育分析や教育カウンセリングなどで取り扱われる。"},
  {id:500, chapter:17, text:"スーパービジョンとは、スーパーバイザーが見立てや対応の仕方について評価し、スーパーバイジー自身が気づかない点について明確に指摘し指導を行うことである。", answer:false, correction:"明確に指摘し指導を行う → 異なる視点から指導・助言", explanation:"カウンセリングにおけるスーパービジョンとは、カウンセラーとしての態度や技能を向上させるために、スーパーバイジーが担当したケースにおける見立てや対応の仕方について当人が気付いていない点や誤解している点などを、スーパーバイザーが異なる視点から指導・助言をすることをいう。"},

  // ===== eラーニング（養成講座）追加分 (501-650) source:"eラーニング" =====
  // ----- eラーニング1章 産業カウンセラーとは → 既存 第2章・第3章 -----
  {id:501, chapter:2, text:"日本産業カウンセラー協会の考える「人間尊重」とは、人は皆1人ひとり異なる存在であり、誰もが他に代えがたいものとしてとらえ、その1人ひとりの独自性を尊重し、受け止めることである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:502, chapter:2, text:"産業カウンセリングの対象は、雇用形態や業種・業態を問わず、一般従業員から管理職、経営者など「働く人々」であるが、働くことを求めている人、これらの家族も含まれる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:503, chapter:2, text:"産業カウンセリングの対象は「働く人々」であり、職場組織、所属集団については対象としない。", answer:false, correction:"職場組織・所属集団は対象としない → 対象として活動する", explanation:"個人の心の問題に影響する所属集団や職場組織についても対象として活動する。", source:"eラーニング"},
  {id:504, chapter:2, text:"産業カウンセリングの目的の1つは、「人が自己の内に潜在している可能性を最大限に開発し実現して生きる」という「自己実現」を支援することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:505, chapter:2, text:"職場におけるいじめ・いやがらせ・差別などの人権問題や、過重労働を引き起こす組織文化や風土を改善することは、産業カウンセリングの対象ではない。", answer:false, correction:"対象ではない → 対象（目的の1つ）である", explanation:"個人の問題と不可分であることが多い組織の課題（職場における人権問題、過重労働、組織文化、組織風土等）を改善する支援も、産業カウンセリングの目的の1つである。", source:"eラーニング"},
  {id:506, chapter:2, text:"産業カウンセラーの支援活動の3つの領域とは「メンタルヘルス対策への支援」「キャリア形成への支援」「職場における人間関係開発・職場環境改善への支援」である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:507, chapter:2, text:"メンタルヘルス対策における第2次予防とは、管理監督者による部下のメンタルヘルスの管理をいう。", answer:false, correction:"第2次予防＝管理監督者による部下管理 → 第2次予防は早期発見・早期対処", explanation:"第1次予防は「未然防止」、第2次予防は「早期発見・早期対処」、第3次予防は「職場復帰支援・再発防止」である。第1次〜第3次予防は対象者の分類ではない。", source:"eラーニング"},
  {id:508, chapter:2, text:"産業カウンセラーは、「労働者の心の健康の保持増進のための指針」に則り「事業場内の心の健康づくり専門スタッフ」として業務の一翼を担うことができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:509, chapter:2, text:"産業カウンセラーは、「ストレスチェック制度」における高ストレス者選定の補足的面談、結果通知後の相談対応、分析結果による職場環境改善に携わることができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:510, chapter:2, text:"キャリアコンサルタントが国家資格になったため、産業カウンセラーはキャリアカウンセリングの理論と技法を習得する必要がなくなった。", answer:false, correction:"習得する必要がなくなった → 依然として産業カウンセラーの活動領域である", explanation:"キャリアコンサルタントが国家資格になったが、依然として「キャリア形成への支援」は産業カウンセラーの活動領域である。", source:"eラーニング"},
  {id:511, chapter:3, text:"産業カウンセラーがその業務を遂行するうえで必要な基本的な姿勢に関しては、倫理綱領の前文および第1章総則の条文に記されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:512, chapter:3, text:"倫理綱領第3条の「人格の養成」にいう「人格」とは、心理学でいう、個人の行動傾向を表す性格、パーソナリティのことである。", answer:false, correction:"性格・パーソナリティ → 独立した個人としての人間的・道徳的なあり方（姿勢）", explanation:"倫理綱領第3条の「人格の養成」の「人格」は、独立した個人としての人間的、道徳的なあり方（姿勢）を表す。", source:"eラーニング"},
  {id:513, chapter:3, text:"産業カウンセラーは、私人ではなく専門家としてクライエントの心の問題を通してその人の人生にかかわるという大きな責任を負うことの自覚をもつことが必須である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:514, chapter:3, text:"産業カウンセラーは、倫理綱領第3条「責任」、第4条「基本的立場」について自らを律する姿勢が大事である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:515, chapter:3, text:"近年、日本の産業社会は多様性（ダイバーシティ）推進への取り組みが進んでいる。産業カウンセラーは、多様な1人ひとりを理解し尊重して慎重に対応することも求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:516, chapter:2, text:"クライエント個人や集団に働きかけ、何らかの変化を生じさせる「介入」の役割を果たすには、傾聴技法、心理療法、グループ・アプローチ、心理アセスメントなどに習熟する必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:517, chapter:2, text:"コンサルテーションとは、組織の要請に基づき、他の分野の「専門家」に対しても、産業カウンセリングや心理学的な専門知識や技能を用いて支援することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:518, chapter:2, text:"職場復帰プログラム等を開発したり、実施したりすることも産業カウンセラーの役割に含まれる。この場合PDCAのサイクルを自ら回せる能力が必要になる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:519, chapter:2, text:"産業カウンセラーに求められる役割のひとつに、組織内の関係部署や産業保健スタッフ、外部の専門機関などが良好な関係を築き協力体制を発展させるための「コーディネーター」がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:520, chapter:2, text:"ストレスチェック制度におけるストレス測定・評価に産業カウンセラーは直接的には携われないので、その方法などについての知識をもつ必要はない。", answer:false, correction:"知識をもつ必要はない → 知識をもつ必要がある", explanation:"産業カウンセラーはストレス測定・評価に直接携われないが、結果通知後の相談対応や分析結果に基づく職場環境改善などには携われるので、知識をもつ必要がある。", source:"eラーニング"},
  {id:521, chapter:2, text:"職場環境改善のためには、問題が発生してから対応に追われるのではなく、「未然防止のための体制づくり」が不可欠である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:522, chapter:2, text:"メンタルヘルス不調での休業・復職支援のために、ふだんから職場全体に対して「メンタルヘルス不調」「職場復帰」への誤解や偏見をなくす取り組みを行っておきたい。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:523, chapter:2, text:"新入・中途入社者、転勤・異動者などの職場不適応は個人の問題であり、生活や職場の環境変化そのものがストレスになっている可能性はない。", answer:false, correction:"個人の問題／ストレスになっている可能性はない → 環境変化そのものがストレス要因になり得る", explanation:"新入・中途入社者、転勤・異動者などは、生活や職場の環境変化そのものがストレスになっているととらえて見守ること、気軽に相談しやすい環境をつくることが必要である。", source:"eラーニング"},
  {id:524, chapter:2, text:"ハラスメントで苦しむのは被害者だけであり、加害者や関係者、会社への影響は考える必要はない。", answer:false, correction:"被害者だけ／影響を考える必要はない → 加害者・関係者・会社にも大きな影響がある", explanation:"ハラスメントでは、被害者はもちろん、加害者や関係者の苦悩や職場への不信感、ひいては会社の社会的信用の失墜、損害賠償など影響は大きい。", source:"eラーニング"},
  {id:525, chapter:2, text:"自殺問題や災害などへの危機介入は、正しい知識理解とネットワーク体制の構築を含めた準備があることで、発生時に落ち着いて迅速かつ適切な対応が可能になってくる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:526, chapter:2, text:"若年者への対応として産業カウンセラーは、「未熟」「甘えている」などの先入観をもつことなく尊重して話を聴き、まずは信頼関係を築くことが重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:527, chapter:2, text:"定年延長、雇用延長など中・高年齢者の「セカンドキャリア」を考えるには、「ワーク」の観点のみが重要であり、個人的な「ライフ」にかかわる必要はない。", answer:false, correction:"「ワーク」の観点のみ／「ライフ」にかかわる必要はない → 「ライフ」の観点も重要", explanation:"中・高年齢者の「セカンドキャリア」を考えるには、「ワーク」だけでなく、年金を含めた経済面、健康面、家庭面や個人の価値観といった「ライフ」の観点が重要である。", source:"eラーニング"},
  {id:528, chapter:2, text:"障害者が働きやすい職場は、だれもが働きやすい職場であると考えられる。ふだんから相互理解に努め、誤解・偏見のない組織風土づくりにもかかわりたい。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:529, chapter:2, text:"育児・介護、治療と仕事の両立支援は、個人や一部の問題なので、関係ない社員には利益がなく不公平である。", answer:false, correction:"個人や一部の問題／不公平 → 「働き方改革」の一環で職場全体の課題", explanation:"育児・介護、治療と仕事の両立支援は、個人や一部の問題ではなく、「働き方改革」の一環ととらえることで、職場全体が働きやすい対応を考えることが大切である。", source:"eラーニング"},
  {id:530, chapter:2, text:"現代では、LGBTQ（性的少数者）に対する差別的言動もセクハラに該当する。産業カウンセラーは自分の価値観について常に検証する必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング2章 コンプライアンスと倫理 → 既存 第3章 -----
  {id:531, chapter:3, text:"コンプライアンスは、広義には社会で広く是認されているモラルを守ることも含まれる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:532, chapter:3, text:"産業カウンセラーの狭義のコンプライアンスとしては、①守秘義務・プライバシーの保護・個人情報管理に関することと、②労働法規に関することを理解すれば十分である。", answer:false, correction:"①守秘義務等と②労働法規を理解すれば十分 → 精神保健福祉法・障害者雇用促進法等の関連法も理解する必要がある", explanation:"労働法規に限らず、精神保健福祉法や障害者雇用促進法とこれらの関連法なども、産業カウンセラーのコンプライアンスとして理解する必要がある。", source:"eラーニング"},
  {id:533, chapter:3, text:"コンプライアンスは、法令、モラルを個人と組織に対する外からの社会的規制であると考えられている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:534, chapter:3, text:"倫理は、個人、組織を問わず内発的であることにその特徴がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:535, chapter:3, text:"倫理は、個人あるいは組織が社会と共生していくために、社会に対して自ら示す規範である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:536, chapter:3, text:"守秘義務は、業務上あるいは職務上知り得た秘密を他に漏らさないようにすることである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:537, chapter:3, text:"労働安全衛生法第105条は、健康診断、ストレスチェック、面接指導の実施事務従事者は、その実施に関して知り得た労働者の秘密を漏らしてはならないと定めている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:538, chapter:3, text:"労働契約や委任契約などを締結した産業カウンセラーであっても、民事上の守秘義務は負わない。", answer:false, correction:"民事上の守秘義務は負わない → 民事上の守秘義務を負う", explanation:"労働契約や委任契約などを締結した産業カウンセラーは、これらの契約にもとづいて負う民事上の守秘義務がある。", source:"eラーニング"},
  {id:539, chapter:3, text:"「産業カウンセラー倫理綱領」は「関係者との信頼関係確立のため、職務上知ることのできた秘密を正当な理由なく漏らしてはならない」と、産業カウンセラーに守秘義務を課している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:540, chapter:3, text:"秘密を漏らすことの正当な理由については、クライエントの自傷・他害や重大な不法行為のおそれがあることなどがあげられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:541, chapter:3, text:"個人情報の管理とは、「自己情報のコントロール権」を守るために必要な行為を明示し、それを実行することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:542, chapter:3, text:"OECDの「プライバシー保護と個人データの国際流通についてのガイドライン」がベースとなり、2003年に「個人情報の保護に関する法律」（個人情報保護法）が制定された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:543, chapter:3, text:"個人情報保護法は、情報の収集・管理・使用に際し本人の同意を得ることを重視しているが、個人情報管理の透明性の確保と管理への各個人の積極的な関与は求めていない。", answer:false, correction:"透明性の確保・各個人の積極的関与は求めていない → 求めている", explanation:"個人情報保護法は、情報の収集・管理・使用に際し、本人の同意を得ることを重視し、個人情報管理の透明性の確保と管理への各個人の積極的な関与を求めている。", source:"eラーニング"},
  {id:544, chapter:3, text:"個人情報保護法に規定されている「要配慮個人情報」には、「健康情報」は含まれていない。", answer:false, correction:"健康情報は含まれていない → 含まれている", explanation:"不当な差別、偏見その他不利益が生じないように取り扱いに特に配慮を要すると定義されている「要配慮個人情報」には、「健康情報」が含まれている。", source:"eラーニング"},
  {id:545, chapter:3, text:"個人情報保護法の具体的な事項の詳細についてはガイドラインによって公表されており、これらのガイドラインは「個人情報保護委員会」にアクセスすれば入手できる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:546, chapter:3, text:"産業カウンセラーは、クライエントに初期もしくは必要な段階において十分な説明をしたうえでの同意を得て、カウンセリングを進めなければならない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:547, chapter:3, text:"具体的な説明事項としては、カウンセリングの役割、時間、期間、終結、料金、守秘義務の意味・目的と限界、カウンセリングの中断・リファーなどがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:548, chapter:3, text:"カウンセリングの中断・リファーについては、クライエント自身の意思を尊重することを確実に伝えなければならない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:549, chapter:3, text:"カウンセリングの特質やカウンセリング関係などについて、クライエントが理解できる平易な言葉で説明して、できるだけクライエントの不安の解消に努める。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:550, chapter:3, text:"カウンセラーとしての自己の背景（ベースとなる理論、スーパーバイザーの存在など）は大切であるので最初に説明する。", answer:false, correction:"最初に説明する → 適切なタイミングをみつけて行う", explanation:"カウンセラーとしての自己の背景について面接の冒頭で話しても、クライエントは理解できないことが多いので、適切なタイミングをみつけて行う。", source:"eラーニング"},
  {id:551, chapter:3, text:"カウンセリングを進めるうえで必須なのは、産業カウンセラーとクライエントとの親密性に基づく関係が深く形成されていることである。", answer:false, correction:"親密性に基づく関係の深い形成 → 契約に基づく基本的な関係の成立", explanation:"カウンセリングを進めるうえで必須なのは、産業カウンセラーとクライエントという、契約に基づく基本的な関係が成立していることである。", source:"eラーニング"},
  {id:552, chapter:3, text:"二重関係とは、産業カウンセラーとクライエントという基本的な関係とは別の関係が存在することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:553, chapter:3, text:"二重関係は産業カウンセラーの正確な判断と決断を阻害し、クライエントの利益を損なうことにつながる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:554, chapter:3, text:"二重関係には、性的親密性、ビジネス関係、職場の上司・同僚・部下の関係などがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:555, chapter:3, text:"職場の上司・同僚・部下、友人、教師と学生などの関係がある場合には、相談を受けることはかまわないが、契約にもとづくカウンセリング関係はもたないようにする。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:556, chapter:3, text:"クライエントの抱える問題がどの程度職場組織に起因しているのかの判断には、職場の管理監督者がどのように認識しているかを知ることが不可欠である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:557, chapter:3, text:"職場組織とかかわる際の産業カウンセラーは、職場の問題解決者となる。", answer:false, correction:"職場の問題解決者となる → 相談担当者であり職場の調整者となる（解決するのは当事者）", explanation:"問題を解決するのはあくまでも当事者であり、産業カウンセラーは相談担当者であると同時に職場の調整者となる。", source:"eラーニング"},
  {id:558, chapter:3, text:"面接で得られたクライエントの情報の提供を事業者から求められた場合、安全配慮義務履行のため、クライエントの同意なしに事業者へ情報を提供してかまわない。", answer:false, correction:"同意なしに提供してかまわない → クライエントの同意は必須", explanation:"クライエントの情報の提供を事業者から求められた場合、その必要性と使途に十分合理性があれば提供できるよう調整するが、クライエントの同意は必須である。", source:"eラーニング"},
  {id:559, chapter:3, text:"産業カウンセラーとしての善管注意義務はカウンセリングを適切に実施することであり、それは倫理綱領で定められた事項が実行できていることが1つの目安となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:560, chapter:3, text:"倫理綱領の遵守が求められるのは有資格者なので、産業カウンセラー養成講座を受講する者は倫理綱領に書かれていることを実践する必要はない。", answer:false, correction:"養成講座受講者は実践する必要はない → 受講者も理解し実践する必要がある", explanation:"産業カウンセラー養成講座を受講する者は、面接の体験学習で個人情報に触れることもあるので、倫理綱領を理解し実践することが必要である。", source:"eラーニング"},
  // ----- eラーニング3章 産業界におけるカウンセリングの歩み → 既存 第1章 -----
  {id:561, chapter:1, text:"職業指導運動においてパーソンズは、個人の能力・興味と職業に対する資質・適性などを統合し、合理的判断をするマッチングをカウンセラーの中心業務とした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:562, chapter:1, text:"ソーンダイクは「すべて存在するものは量的に存在する。量的に存在するものはこれを測定することができる」というスローガンを掲げた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:563, chapter:1, text:"教育測定運動は、職業指導運動と合体して特性因子理論へ発展していった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:564, chapter:1, text:"ビアーズの精神衛生運動は、現在のキャリアコンサルティングへの流れをつくった。", answer:false, correction:"キャリアコンサルティングへの流れ → メンタルヘルス運動への流れ", explanation:"ビアーズの精神衛生運動は、現在のメンタルヘルス運動への流れをつくった。キャリアコンサルティングの源流は、職業指導運動である。", source:"eラーニング"},
  {id:565, chapter:1, text:"戦後の日本産業界では産業相談が普及していったが、人間関係論およびカウンセリング心理学の理論に立脚している点が戦前とは異なっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング4章 カウンセリングとは何か → 既存 第6章 -----
  {id:566, chapter:6, text:"カウンセリングとは一般に、個人がもつ問題や悩みの解決のために、専門的な理論と方法に基づいて行われる相談や支援のことを意味する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:567, chapter:6, text:"カウンセリングには種々の立場や考え方があり、対象とするクライエントや取り上げる問題によって定義される。", answer:false, correction:"対象クライエント・取り上げる問題によって定義される → 人間観・目標・方法などの理論的背景の違いによる", explanation:"カウンセリングのさまざまな定義は、①人間観や哲学的背景、②カウンセリングの目標、③方法などの理論的背景の違いによる。", source:"eラーニング"},
  {id:568, chapter:6, text:"カウンセリングの目的が「クライエントがより成長した人間として、問題を自分で解決できるようになることをめざす」であることは、多くのカウンセラーに共有されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:569, chapter:6, text:"カウンセリングは、専門的には、カウンセリング心理学の知見にのみ基づいた心理学的な援助を意味する。", answer:false, correction:"カウンセリング心理学の知見にのみ → 関連領域の科学的・臨床的知見にも基づく", explanation:"カウンセリング心理学のみではなく、その関連領域の科学的・臨床的な知見に基づいた心理学的な援助である。", source:"eラーニング"},
  {id:570, chapter:6, text:"カウンセリングは社会的環境と密接に関係しているので、カウンセラーは、調和のとれた人間関係、集団や組織、社会の維持や改善など、社会環境の整備に貢献することも求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:571, chapter:6, text:"カウンセリングは、カウンセラーが自己の人生経験や価値観からクライエントに助言を与えるものである。", answer:false, correction:"自己の人生経験や価値観から助言を与える → 一人ひとりを独自の存在として尊重し、深く傾聴・理解することが重視される", explanation:"助言を与えるのではなく、クライエント一人ひとりを独自の存在として尊重し、問題や悩みや葛藤を深く傾聴し理解することが重視される。", source:"eラーニング"},
  {id:572, chapter:6, text:"クライエントに気づきを促すためには、カウンセラーに権威が必要とされる。", answer:false, correction:"カウンセラーに権威が必要 → 対等で安全な関与の仕方が求められる", explanation:"決めつけなどで、さらに悩みが深まることもある。そのため、カウンセリングでは対等で安全な関与の仕方が求められる。", source:"eラーニング"},
  {id:573, chapter:6, text:"カウンセラーは、守秘義務や二重・多重関係禁止など、守るべき倫理を理解し、体現できることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:574, chapter:6, text:"カウンセリングにおける専門的な提案や介入は、クライエントのニーズより、何が問題解決に役立つかというカウンセラーの判断に基づいて行われる。", answer:false, correction:"カウンセラーの判断に基づいて行われる → クライエントにとって何が最も重要かに基づく", explanation:"専門的な提案や介入は、クライエントにとって何が最も重要であるかが大切であり、カウンセラーが問題解決に役立つと考えることとは必ずしも一致しない。", source:"eラーニング"},
  {id:575, chapter:6, text:"カウンセリングでは、時間と場所の明確な設定がなされ、クライエントが全人的に受け止められ、信頼関係が構築されることが重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:576, chapter:6, text:"ガイダンスはカウンセリングの起源であり、行動や生活態度についての教育的な指導に加え、心理的苦悩の軽減や人格の変容への支援を重視する。", answer:false, correction:"ガイダンスが苦悩軽減・人格変容を重視 → ガイダンスは教育的指導が主。苦悩軽減・人格変容はサイコセラピー/カウンセリングで重視", explanation:"ガイダンスは教育的指導を主とし、心理的苦悩の軽減や人格の変容は、サイコセラピーやカウンセリングにおいて重視される。", source:"eラーニング"},
  {id:577, chapter:6, text:"コンサルテーションではコンサルタントの専門的な知識や経験に裏づけられた助言や提案を行う。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:578, chapter:6, text:"ケースワークではクライエントの社会生活の向上や幸福を主な課題としている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:579, chapter:6, text:"教育とカウンセリングの共通点は、人格の成長を目的とする点である。", answer:false, correction:"共通点は人格の成長を目的とする点 → 文化や価値の伝達を重視する点", explanation:"教育とカウンセリングとでは、文化や価値の伝達を重視する点で共通点がある。", source:"eラーニング"},
  {id:580, chapter:6, text:"医療の主な目的は診断と治療であり、カウンセリングの目的には人間的成長や自己実現を含んでいる点で違いがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:581, chapter:6, text:"カウンセリングの効果には、問題解決や目標達成以外にも、症状の軽減、メンタルヘルスの増進、自己効力感の増大、ストレス耐性やレジリエンスの増進などがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:582, chapter:6, text:"カウンセリングは、介入技法の有効性によって効果が決まるので、クライエントのカウンセリングへの関与の程度は関係ない。", answer:false, correction:"関与の程度は関係ない → 関与の程度・関係を活用する能力・カウンセラーのかかわりも効果に影響する", explanation:"介入技法の有効性のほかに、クライエントのカウンセリングへの関与の程度とカウンセリング関係を活用する能力、カウンセラーのクライエントへのかかわりが、効果に影響する。", source:"eラーニング"},
  {id:583, chapter:6, text:"心理的苦悩（軽度の鬱や不安など）で臨床的な状態にあるとされたクライエントが、カウンセリングやサイコセラピー終結時に臨床的な状態にないと判定される割合は約80パーセントである。", answer:false, correction:"約80パーセント → 約60パーセント", explanation:"メタ分析により、カウンセリングやサイコセラピーにより好転しているという結果が約80パーセントであり、心理的苦悩が終結時に臨床的な状態にないと判定される割合は正しくは約60パーセントである。", source:"eラーニング"},
  {id:584, chapter:6, text:"カウンセリングには限界があるので、医学的診断や投薬、行政や利害関係者に申し立てや調停が必要なときは、適切な機関にリファー（委託・紹介）することは大切である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
