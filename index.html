  {id:585, chapter:6, text:"カウンセリングはクライエントの内省力や自身の行動に対する責任能力に関わらず、効果がある。", answer:false, correction:"内省力・責任能力に関わらず効果がある → これらはカウンセリングの限界のひとつ", explanation:"クライエントのコミュニケーション能力・内省力・自身の行動に対する責任能力は、カウンセリングの限界のひとつである。これらの欠如には心身的な疾患や障害が原因となっている場合もあるので、医療へのリファーも重要となる。", source:"eラーニング"},
  {id:586, chapter:6, text:"カウンセリングの効果は、カウンセラーによってかなり違うが、それは年齢や人生経験によるところが大きい。", answer:false, correction:"年齢や人生経験によるところが大きい → 学び実践する中で形成される側面が大きい", explanation:"カウンセラー個人の固有の特性より、カウンセリングを学び実践する中で形成されていくものという側面が大きい。", source:"eラーニング"},
  {id:587, chapter:6, text:"カウンセラーが、学習とトレーニング、必要に応じてスーパービジョンを受けるなどで専門的な成長を遂げていることが、カウンセリングの効果に影響を与える。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:588, chapter:6, text:"パーソナリティ障害や不安定な愛着（アタッチメント）をもつクライエントは、カウンセリングによる支援が難しい指標のひとつである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:589, chapter:6, text:"クライエントの内的な視点からその人を理解しようとするカウンセラーの態度は、理論的立場や流派を超えてカウンセリングに不可欠の要因とみなされている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:590, chapter:6, text:"無条件の肯定的配慮と自己一致／純粋性については、関係要因としての検証は行われていない。", answer:false, correction:"検証は行われていない → 種々の要因のエビデンスが検証されている", explanation:"「目標の合意と協働」「作業同盟」「共感」という重要で基本的な関係要因のほか、無条件の肯定的配慮や自己一致／純粋性等の種々の要因のエビデンスが検証されている。", source:"eラーニング"},
  // ----- eラーニング5章 傾聴の意義と技法 → 既存 第7章 -----
  {id:591, chapter:7, text:"傾聴とは、誠心誠意、集中して相手の語りや表現を聴くことであり、積極的に関わろうとする能動的な行為であることから、積極的傾聴ともいわれる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:592, chapter:7, text:"カウンセリングでは、クライエントの内面的で情意的な側面を傾聴するのであって、社会経済的な状況、健康状態、家庭環境などの客観的な情報に着目する必要はない。", answer:false, correction:"客観的な情報に着目する必要はない → 客観的な情報も有用である", explanation:"カウンセリングにおいても、社会経済的な状況、健康状態、家庭環境などの客観的な情報は有用である。", source:"eラーニング"},
  {id:593, chapter:7, text:"正確に深く傾聴するためには、言語的表現だけでなく、表情、態度、声の調子、身体動作といった非言語表現の意味を汲み取る必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:594, chapter:7, text:"共感的な傾聴とは、カウンセラーがクライエントの語りや表現に対して、カウンセラー自身の枠組みからその人を理解しようとすることである。", answer:false, correction:"カウンセラー自身の枠組みから理解 → 評価や価値判断をいったん脇に置き、クライエントの視点から理解する", explanation:"共感的な傾聴とは、カウンセラーがクライエントの語りや表現に対して評価や価値判断をいったん脇に置き、クライエントの視点からその人を理解しようとすることである。", source:"eラーニング"},
  {id:595, chapter:7, text:"傾聴は、すべてのカウンセラーが身につけておかなければならない必須のスキルであり実践の基礎として位置づけられるので、短時間のトレーニングで身につく。", answer:false, correction:"短時間のトレーニングで身につく → 短時間では身につかない", explanation:"クライエントに対して傾聴を十分な水準で提供できるように、カウンセラーをめざす学習者はトレーニングや実践を積み重ねることが求められるので、短時間では身につかない。", source:"eラーニング"},
  {id:596, chapter:7, text:"個人の違いを尊重し、豊かで充実した生き方を見出すことを支えようとする現在社会の動きから、1人ひとりへの個別的な支援としてのカウンセリングが求められるようになった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:597, chapter:7, text:"自分の訴えや声を聴いてもらえない人の苦悩や孤独が深まる現代には、他者の理解は不可欠である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:598, chapter:7, text:"いじめ、虐待、ハラスメント、また孤独や絶望、自殺などの問題の背景に、心から耳を傾け深く理解してくれる人や場の欠如や不足が関係している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:599, chapter:7, text:"人は語ることや自分を表現することが傾聴され理解されることで、発達し成長するといわれるが、一方で甘やかしになり、自分で解決する力の阻害となると懸念されている。", answer:false, correction:"甘やかしになり自己解決力の阻害となる → 甘やかしではなく自己解決できる力を育む", explanation:"語ること表現することが傾聴され理解されることは人間にとって必要不可欠であり、甘やかしではなく、むしろ逆で自己解決できる力を育むことになる。", source:"eラーニング"},
  {id:600, chapter:7, text:"傾聴がなされ得る関係性に一時的に混乱や対立が生じたときにも、鎮静化させ、安全と信頼を回復し、配慮や熟慮に向かう可能性がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:601, chapter:7, text:"傾聴の前提となる基本的な人間観とは、人間の独自性や個別性を理解し、尊重することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:602, chapter:7, text:"傾聴の前提となる基本的な人間観とは、人間の成長へと向かう潜在力を信頼することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:603, chapter:7, text:"カウンセラーとクライエントとは、それぞれ異なる役割や課題があり、非対称的であるので、対等な関係とはいえない。", answer:false, correction:"非対称的なので対等な関係とはいえない → 役割や課題は異なるが優劣・上下はなく、対等な人として向き合う", explanation:"カウンセラーとクライエントとは、役割や課題は異なるが、人としての優劣や上下があるわけではない。カウンセラーは対等な人として、クライエントに真摯に、誠実に向き合う姿勢が大切である。", source:"eラーニング"},
  {id:604, chapter:7, text:"クライエントの語りや表現をクライエントの視点から理解するには、カウンセラーが自分の固定観念に気づき、できる限りその固定観念から解放されることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:605, chapter:7, text:"傾聴は、問題解決の目標に向かってクライエントを導くものであり、何らかの結論を得る必要がある。", answer:false, correction:"問題解決へ導き結論を得る必要がある → 結論を急がずプロセスを大切に「いま、ここで」に焦点をあてる", explanation:"カウンセラーは結論や結果を出すことを急がず、生起するプロセスを大切にして、「いま、ここで（here and now）」生じていることに焦点をあてて傾聴することが重要である。", source:"eラーニング"},
  {id:606, chapter:7, text:"自己一致とは、カウンセラーが自由にそして深く自分自身でいられることであり、自分が体験し感じていることを、常にクライエントに自己表現できるような態度である。", answer:false, correction:"常にクライエントに自己表現できる態度 → 状況や影響を考慮し、必要なときに表現できる態度", explanation:"カウンセラーが感じたタイミングで伝えるのではなく、カウンセリングの状況を把握し、クライエントへの影響を考慮し、必要なときに表現できる態度のことである。", source:"eラーニング"},
  {id:607, chapter:7, text:"無条件の肯定的配慮とは、クライエントの存在そのもの、体験や表現に対して、条件付きでない温かな関心を示し、受け止めることである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:608, chapter:7, text:"共感的理解とは、クライエントの視点からクライエントが表現していることや感じていることを、正確に感じ取り、理解することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:609, chapter:7, text:"無条件の肯定的配慮とは、カウンセラーが容認できなくても、クライエントのあらゆる行為や要求に対して選択や評価することなく常に受け入れることである。", answer:false, correction:"あらゆる行為・要求を常に受け入れる → 危険な側面や過ちには対峙が必要な場合もある", explanation:"クライエントの危険な側面や過ちには、厳しく立ち向かうことが必要な場合もある。1人の人間として尊重するがゆえ、本心からの対峙が可能になる。", source:"eラーニング"},
  {id:610, chapter:7, text:"共感的理解が提供されるためには、カウンセラーはクライエントの理解に柔軟で、同時に自分を失うことのない安定した自己をもっている必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:611, chapter:7, text:"カウンセリングの場の設定やカウンセリング関係についての話し合いと合意である「場面構成」は初回のセッション冒頭でのみ行われる。", answer:false, correction:"初回のセッション冒頭でのみ → その後もプロセスに応じてその都度柔軟に行われる", explanation:"「場面構成」は、初回のセッションの冒頭で行われることが多いが、その後もプロセスの進行に応じて、その都度柔軟に行われる。", source:"eラーニング"},
  {id:612, chapter:7, text:"クライエントが安心して語り、落ち着いて自分を振り返るためには、カウンセラーからのかかわりは最小限にし、黙ってクライエントの言葉や思いをひたすら聴き続ける。", answer:false, correction:"かかわりは最小限にし黙って聴き続ける → 非言語的メッセージを含めた積極的な関心を向ける", explanation:"クライエントが安心して語り、落ち着いて自分をふり返るためには、カウンセラーからの非言語的メッセージを含めた積極的な関心が向けられることが大切である。", source:"eラーニング"},
  {id:613, chapter:7, text:"「伝え返し」は、クライエントが語る言葉の中で重要なキーワードや独特の言い回しなどを、クライエントが発したとおりに言葉をくり返すことである。", answer:false, correction:"発したとおりに言葉をくり返す → 理解した内容をキーワード・言い回しを中心に伝え返す", explanation:"「伝え返し」では、クライエントが語っていることを正確に理解し、その理解した内容を、キーワードや言い回しを中心にして伝え返すことが大切である。", source:"eラーニング"},
  {id:614, chapter:7, text:"「オープン・クエスチョン」は主体的な語りや自己探求を促進するが、過剰に用いるとクライエントを混乱させたり不安にさせたりする場合があることに留意する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:615, chapter:7, text:"カウンセリングにおいて、その効果に技法的な要因が占める割合は大きいとは言えないが、適切な技法の活用がカウンセリング関係の改善など副次的な効果をもたらすことが明らかになっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:616, chapter:7, text:"感情的・情意的な表出が少ないクライエントには、「どんな気持ちですか」「どう感じていますか」などと積極的に質問し、感情的、情意的な面に触れていくことを促す。", answer:false, correction:"積極的に質問し促す → 安全な形で、かかわり行動・明確化・質問を適切に用い少しずつ触れていく", explanation:"感情的・情意的な表出が少ないクライエントには、安全な形でその表出を勧めることができるようにする。具体的には、かかわり行動や明確化、質問などを適切に用い、感情的な面に少しずつ触れていく。", source:"eラーニング"},
  {id:617, chapter:7, text:"感情への応答は、カウンセリングの中心となる応答であり、「反射」と「明確化」などの応答様式を適切かつ柔軟に用いることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:618, chapter:7, text:"感情の中には、強く一過的に表れることの多い情動、心理的苦悩、安定した状態に感じられる感情などさまざまあり、複雑に絡み合っていることを理解し応答する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:619, chapter:7, text:"「いま、ここで」クライエントの心身全体で表現される意味ある感情に焦点をあて、理解しようとすることが重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:620, chapter:7, text:"「感情の明確化」の内容が、クライエントの感じていることや話したいこととズレてしまった場合は、話題を変えて話を続けることが必要である。", answer:false, correction:"ズレた場合は話題を変えて続ける → 明確化を押しつけず、クライエントの傾聴に戻る", explanation:"話題を変えてしまうのはカウンセラー主導である。ズレてしまった場合には、カウンセラーが明確化した内容を押しつけず、クライエントが何を言おうとしているのかの傾聴に戻ることが重要である。", source:"eラーニング"},
  // ----- eラーニング6章 カウンセリングのプロセスと面接記録 → 既存 第6章 -----
  {id:621, chapter:6, text:"カウンセリング活動は、カウンセラーとクライエントが初めて接触したときに始まり、その目的が達成されたときに終わるプロセスをたどる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:622, chapter:6, text:"クライエントにとってカウンセリングとは、問題を抱えた不自由な存在から内面の変化を経て、自由な存在に自己変容していく成長過程である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:623, chapter:6, text:"カウンセリングは目標達成のため、体系化された計画的な進め方によって、常に先に進むべきである。", answer:false, correction:"常に先に進むべき → 必ずしも先に進むばかりでなく、後戻りすることもある", explanation:"カウンセリング・プロセスは必ずしも先に進むばかりでなく、ある段階から後戻りすることもある。", source:"eラーニング"},
  {id:624, chapter:6, text:"クライエントの成長過程に応じたカウンセラーの的確なかかわりがクライエントへの支援となり、すべてのプロセスを通らないで終結することもある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:625, chapter:6, text:"傾聴の態度・技法を重視する立場では、カウンセリング・プロセスを「リレーションづくり」「問題の把握」「目標の設定」「目標の達成」の4段階で考える。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:626, chapter:6, text:"リレーションが深まりラポールが醸成されると、クライエントが安心して自己を探索し、自己を見つめ自分の問題状況について率直に語れるようになる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:627, chapter:6, text:"問題の把握の段階での「問題」とは、初期に述べられた具体的な主訴そのものである。", answer:false, correction:"主訴そのものである → 主訴そのものというより、主訴の背景や個人的な意味として捉える", explanation:"問題の把握の段階での「問題」とは、初期に述べられた具体的な主訴そのものというより、主訴の背景や主訴をもつところにある個人的な意味として捉える。", source:"eラーニング"},
  {id:628, chapter:6, text:"問題の解決や課題の達成に向けて目標が設定され、クライエントの内面から外部へ向けられる実践のプロセスが、目標の設定の段階である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:629, chapter:6, text:"目標の達成の段階において、カウンセラーのインパクトの強い発言は効果的なので、積極的に活用する。", answer:false, correction:"効果的なので積極的に活用する → 傷つけるおそれもあり、十分配慮して用いる", explanation:"カウンセラーのインパクトの強い発言は効果的な場面もあるが、その表現やクライエントの成熟度によってはクライエントを傷つけるおそれがあるので、十分配慮して用いる。", source:"eラーニング"},
  {id:630, chapter:6, text:"カウンセリングにおける解決では、具体的・現実的な問題解決が重要なので、カウンセラーが問題解決に至っていないと判断した場合、カウンセリングを継続すべきである。", answer:false, correction:"未解決なら継続すべき → 解決は問題解決だけに限らず、クライエントの意思で終結することがある", explanation:"カウンセリングにおける解決は、具体的・現実的な問題解決だけに限らないので、カウンセラーが未解決課題があると思っても、クライエントの意思で終結することがある。", source:"eラーニング"},
  {id:631, chapter:6, text:"クライエントとの信頼関係は特に最初の段階での構築が重要であり、傾聴の基本的態度・技法で対応し、共感的理解を伝え、話しやすい雰囲気や安心して話せる場づくりに努める。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:632, chapter:6, text:"問題の把握の段階では、カウンセラーは常に傾聴を心がけながら、クライエントが内省して早急に問題把握ができるように働きかけをする。", answer:false, correction:"早急に問題把握ができるよう働きかける → 性急に進めず、準備を見極めクライエント自らが問題を把握するよう支援する", explanation:"問題の把握を性急に進めると、クライエントは尻込みしたり戸惑いを覚えたりすることもあるので、取り組みの準備などをよく見極めてクライエント自らが問題を把握するよう支援する。", source:"eラーニング"},
  {id:633, chapter:6, text:"カウンセラーの自己開示は、クライエントの自覚を促し、クライエントの自己開示を進めるのに効果的なので、カウンセリングの全プロセスで積極的に活用する。", answer:false, correction:"全プロセスで積極的に活用 → 信頼関係が十分できたうえで、関係性を壊さないと判断した場合に限り用いる", explanation:"カウンセラーの自己開示は、信頼関係が十分できたうえで、カウンセリングの進展に有効であり、関係性を壊さないと判断した場合に限り用いる。", source:"eラーニング"},
  {id:634, chapter:6, text:"目標の設定の段階では、クライエントが実行可能な現実的な目標を立て、その達成に向けモチベーションが高まるよう支援する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:635, chapter:6, text:"カウンセラーは終結後にケースをふり返り、自己評価をまとめる。またスーパービジョンを受けるなどして、さらに能力向上を図ることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:636, chapter:6, text:"相談の過程・内容が客観的に観察できる面接記録を作成する目的のひとつは、実務・実践記録として残すことにある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:637, chapter:6, text:"危機介入や裁判の証拠資料、クライエントからの開示請求など、面接記録の開示を求められることもあるので、面接記録は名誉棄損などのおそれのある表現を避けるなど、的確かつ具体的に記載する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:638, chapter:6, text:"面接記録を相談室内のケース・カンファレンスの素材として作成し、相談室内の情報共有、共通理解を図るために用いることがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:639, chapter:6, text:"スーパービジョンを受ける際に、スーパーバイザーが求める素材として、面接の経過をまとめた事例報告や逐語的な記録を準備する場合がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:640, chapter:6, text:"面接記録を基にした事例検討の際、参加者全員に守秘義務を課すことが必要である。個人情報はできる限りカットし、内容やプロセスについても脚色を行うことがある。", answer:false, correction:"内容やプロセスの脚色を行うことがある → 脚色は研究データの捏造にあたり行ってはならない", explanation:"個人情報は極力カットするが、内容やプロセスについての脚色は、研究データの捏造にあたるので、行ってはならない。", source:"eラーニング"},
  // ----- eラーニング7章 カウンセリングのトレーニングの意義と実際 → 既存 第6章 -----
  {id:641, chapter:6, text:"体験には直接体験、間接体験、疑似体験の3つがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:642, chapter:6, text:"一般的に体験学習は、体験、ふり返り、一般化、応用という4つの段階を含むサイクルを用いて行われる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:643, chapter:6, text:"面接の際は、言葉の内容に集中しなければならないので、聴覚以外の感覚は意識しないようにする。", answer:false, correction:"聴覚以外の感覚は意識しない → 声の調子・間・表情・しぐさなど多くの情報を受け取る", explanation:"面接の際には、言葉の内容だけでなく、声の調子、間、言いよどみ、表情、しぐさなど、なるべく多くの情報を受け取る。そのためにはさまざまな感覚を同じ対象に向けることが必要になる。", source:"eラーニング"},
  {id:644, chapter:6, text:"日常生活においても、「相手が何を伝えようとしているのか意識する」「相手の視点に立ってみる」「自分の気持ちに注目してみる」など、面接の基本について学ぶことができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:645, chapter:6, text:"練習とはいえ、クライエントのプライバシーの配慮と守秘義務には厳密でなければならない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:646, chapter:6, text:"ライブ法は、カウンセラー役とクライエント役との間にカウンセリング関係をつくって、カウンセリングを体験的に学習する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:647, chapter:6, text:"ライブ法では、クライエント役は、あらかじめ話す内容や構成を考えたり、結論を想定したりして話す。", answer:false, correction:"あらかじめ内容・構成を考え結論を想定して話す → 想定せず、その場で「いま、ここ」の気持ちを語る", explanation:"ライブ法では、クライエント役は、あらかじめ話す内容や構成を考えたり結論を想定したりせず、その場で聴いてほしいこと、感じていることなど「いま、ここ」の気持ちを語る。", source:"eラーニング"},
  {id:648, chapter:6, text:"ライブ法では、観察者役は、自分の気づきをカウンセラー役へフィードバックすることが唯一の役割である。", answer:false, correction:"フィードバックが唯一の役割 → 観察し話の流れを理解して学びに取り入れ、カウンセラー役を支援する役割もある", explanation:"観察者役はやりとりを観察して話の流れを理解し、自分の学びに取り入れるとともに、共感できたことや自分の気づきをカウンセラー役へフィードバックし、カウンセラー役を支援する。", source:"eラーニング"},
  {id:649, chapter:6, text:"ロールプレイ法では、クライエント役は、家族や友人、職場の同僚など、実際に関係のある者を演じることは避けるようにする。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:650, chapter:6, text:"ロールプレイ法では、クライエント役は、家族や友人、職場の同僚など実際に関係のある人物を演じることがよい。", answer:false, correction:"実際に関係のある人物を演じることがよい → 実際に関係のある者を演じることは避ける", explanation:"ロールプレイ法では役を演じるため、カウンセラー役はクライエント役の本来の人格への配慮や警戒心をもたずに対応できる。実際に関係のある者を演じることは避けるようにする。", source:"eラーニング"},

  // ===== eラーニング（養成講座）追加分 第2弾 (651-895) source:"eラーニング" =====
  // ----- eラーニング9章 事例検討とスーパービジョン → 既存 第17章 -----
  {id:651, chapter:17, text:"スーパービジョンとは、カウンセラーとしての態度や技能を向上させるために、スーパーバイザーが、スーパーバイジーが担当した事例において見立てや対応の仕方について気づかない点や誤解している点について、指導・助言を行うことである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:652, chapter:17, text:"スーパービジョンは大別すると、1対1の「個人スーパービジョン」と、数人のスーパーバイジーと1人のスーパーバイザーで行う「グループスーパービジョン」がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:653, chapter:17, text:"スーパービジョンには、スーパーバイジーがどのようなカウンセリングを行っているか見守り評価してカウンセラーとして成長を図る機能がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:654, chapter:17, text:"スーパービジョンには、スーパーバイジーの不足している知識・経験・技術などの課題について共に考え解決しようとする相談機能がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:655, chapter:17, text:"スーパーバイザーは、スーパーバイジーが面接でできていることには触れず、できていないことについて厳格に指示して取り組ませる。", answer:false, correction:"できていることには触れず厳格に指示 → 言動・情緒・態度に共感・理解を示し支持し、課題を共に考え解決しようとする", explanation:"スーパーバイザーは、スーパーバイジーの言動、情緒、態度などに対して共感、理解を示すことで深い関係のレベルで支持、分かち合い、また、スーパーバイジーに生じている課題について共に考え、解決しようとする。", source:"eラーニング"},
  {id:656, chapter:17, text:"スーパービジョンが意味あるものになるためには、まずスーパーバイジーの中でなぜスーパービジョンを受けるのかが明確にされる必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:657, chapter:17, text:"スーパービジョンにおいて、スーパーバイザーとスーパーバイジーは指導される者と指導する者であるから、厳格な師弟関係ともいうべき関係が不可欠と言える。", answer:false, correction:"厳格な師弟関係が不可欠 → オープンで協働的な関係が不可欠", explanation:"よりよいスーパービジョンのためには、オープンで協働的なスーパーバイザーとスーパーバイジーの関係が不可欠である。", source:"eラーニング"},
  {id:658, chapter:17, text:"スーパービジョンを受ける際には、スーパービジョンの目的に応じて、どのような素材を準備したらよいか、スーパーバイザーと話し合うことが大事である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:659, chapter:17, text:"スーパービジョンでは、スーパーバイジーの成長のためにスーパーバイジーが抱える個人的な問題や苦悩などを取り扱う。", answer:false, correction:"個人的な問題や苦悩を取り扱う → 専門的スキル・アイデンティティを高めることをねらいとし、個人的な問題や苦悩は原則として取り扱わない", explanation:"スーパービジョンは、スーパーバイジーの専門的なスキルやアイデンティティを高めることをねらいとしているので、スーパーバイジーが抱える個人的な問題や苦悩などは原則として取り扱わない。", source:"eラーニング"},
  {id:660, chapter:17, text:"「産業カウンセラー倫理綱領」において、産業カウンセラーがスーパービジョンを受けることの必要性が強調されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング10章 カウンセリング理論の源流および主要な理論と方法 → 既存 第8章 -----
  {id:661, chapter:8, text:"パーソンズらによって始められた職業指導の方法は学校教育以外の場にも広がり、第1次世界大戦では兵士への心理テストが実施され、また復員兵への職業復帰プログラムにおいても活用された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:662, chapter:8, text:"産業界において労働者の職場適応のための活動としてガイダンスの方法が用いられるようになり、そこで行われる相談者の適性や能力の査定は不適応の治療に用いられるようになった。", answer:false, correction:"不適応の治療に用いられる → 適応上の問題に対する助言指導活動に用いられた", explanation:"相談者の適性や能力の査定結果は、適応上の問題に対する助言指導活動に用いられた。", source:"eラーニング"},
  {id:663, chapter:8, text:"ウィリアムソンは、ガイダンスとして、心理テストを活用した科学的・実証的な査定による指導助言を実施することによって、大学における学生相談を中心とした新しいモデルを提案した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:664, chapter:8, text:"現代のサイコセラピーのもっとも大きな源流は、フロイトが開発した自由連想法と夢解釈による治療法としての精神分析である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:665, chapter:8, text:"ロジャーズは、カウンセリングとサイコセラピーにおける非指示的アプローチを提案し、そこでウィリアムソンらの方法を指示的アプローチであると批判して論争となった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:666, chapter:8, text:"カウンセリングは多くの人々が遭遇する人生のさまざまな問題への対処を主な目的としている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:667, chapter:8, text:"サイコセラピーは病気の治療法として生まれたが、現在では精神医療の分野では活用されていない。", answer:false, correction:"現在では活用されていない → 現在でも精神医療分野で精神療法として活用されている", explanation:"サイコセラピーは現在でも精神医療分野で精神療法として活用されている。", source:"eラーニング"},
  {id:668, chapter:8, text:"カウンセリングとサイコセラピーは、人間のさまざまな問題へ心理学的な援助を提供するという実践形態は共通点があるが、医療や福祉の分野ではサイコセラピーという言葉が用いられることが多く、教育や産業の分野ではカウンセリングと呼ばれることが多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:669, chapter:8, text:"日本では第2次世界大戦後、米国から派遣された教育使節団によってカウンセリングの実践が推奨されたことから、本格的に始められた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:670, chapter:8, text:"日本ではカウンセリングとサイコセラピーを明確に区別した方がよいとされている。", answer:false, correction:"明確に区別した方がよいとされている → 区別した方がよいという考え方と区別は難しいという考え方が混在している", explanation:"日本ではカウンセリングとサイコセラピーを明確に区別したほうがよいという考え方と、重なり合う部分が大きいので区別は難しいという考え方が混在している。", source:"eラーニング"},
  {id:671, chapter:8, text:"ある受け入れがたい感情、欲求をより受け入れやすい関連のある対象に振り向ける防衛機制を「合理化」という。", answer:false, correction:"「合理化」→「置き換え」", explanation:"ある受け入れがたい感情、欲求をより受け入れやすい関連のある対象に振り向ける防衛機制は「合理化」ではなく「置き換え」である。", source:"eラーニング"},
  {id:672, chapter:8, text:"自我にとって危険な耐えられない衝動や記憶、イメージを意識から追放したり無意識に押しとどめたりする防衛機制を「否認」という。", answer:false, correction:"「否認」→「抑圧」", explanation:"自我にとって危険な耐えられない衝動や記憶、イメージを意識から追放したり、無意識に押しとどめることで思い出さないようにする防衛機制は、「否認」ではなく「抑圧」である。", source:"eラーニング"},
  {id:673, chapter:8, text:"本能的欲求としては禁止されているものを社会的に否定されるものではなく社会的に好ましいものに変えて発散する防衛機制を「昇華」という。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:674, chapter:8, text:"意識すると不安や恐怖、不快が起こるような無意識的な欲動や感情の意識化を防ぐため、それと正反対の態度を強調する防衛機制を「打ち消し」という。", answer:false, correction:"「打ち消し」→「反動形成」", explanation:"それと正反対の態度を強調する防衛機制は、「打消し」ではなく「反動形成」である。", source:"eラーニング"},
  {id:675, chapter:8, text:"自分の中の認めがたい抑圧した感情を外界または他者に属するものとし、そこから自分に向かってくるものと知覚する防衛機制を「投影」という。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:676, chapter:8, text:"エリクソンは自我の心理社会的な側面の発達に着目し、人間の一生涯にわたるライフサイクルの発達の問題を探求した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:677, chapter:8, text:"アンナ・フロイトは自我の防衛規制やその発達についての考えを発展させた自我心理学の先駆者である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:678, chapter:8, text:"メラニー・クラインは、乳幼児の体験や幻想を妄想的―シゾイド的態勢、抑うつ的態勢とよび、対象関係論の発展に影響を与えた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:679, chapter:8, text:"分析心理学はユング心理学とも呼ばれ、人には自我のありようとは独立した普遍的なコンプレックスがあることを見出した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:680, chapter:8, text:"ユングが考えた「個人的無意識」とは、人類の極めて長い時間の経験の蓄積によって構成され民族等に共通する。", answer:false, correction:"「個人的無意識」が民族等に共通 → 民族等に共通するのは「集合的無意識」。「個人的無意識」は個人的な記憶や経験に基づく", explanation:"民族等に共通するのは「集合的無意識」である。「個人的無意識」は個人的な記憶や経験に基づく。", source:"eラーニング"},
  {id:681, chapter:8, text:"レスポンデント条件づけが成立した後に、条件刺激だけによる条件反応の誘発をくり返して条件反応を徐々に生じなくさせる過程をレスポンデント条件づけの消去という。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:682, chapter:8, text:"オペラント条件づけは、反応－結果のつながりを説明する理論で、適応的な行動を強化し、不適応的な行動を弱化する働きかけが目標とされる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:683, chapter:8, text:"バンデューラによる社会的学習理論では、人間がある行動を身につけるうえで、すべて「結果」が重要な役割を果たしているとする。", answer:false, correction:"すべて「結果」が重要 → 「認知」が重要な役割を果たす", explanation:"社会的学習理論で人間がある行動を身につけるうえで重要な役割を果たしているとするのは「認知」である。", source:"eラーニング"},
  {id:684, chapter:8, text:"論理情動行動療法を提唱したエリスは、心の問題は、出来事ではなく、その出来事の捉え方であり、その人の「性格」によって生じると主張した。", answer:false, correction:"「性格」によって生じる → 出来事の捉え方「認知」によって生じる", explanation:"エリスは、心の問題は、出来事ではなく、その出来事の捉え方、「認知」によって生じると主張した。", source:"eラーニング"},
  {id:685, chapter:8, text:"ベックの認知理論では、表層に表れる「自動思考」、深層にある「スキーマ」、スキーマから自動思考を生じさせる「推論の誤り」の3つの認知レベルが想定されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:686, chapter:8, text:"セルフモニタリングによって、クライエント自身が自分の状態を客観的に理解できるようになることが期待される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:687, chapter:8, text:"エクスポージャー法とは、回避行動を誘発する刺激に一定時間自らを曝すという技法である。", answer:false, correction:"回避行動を誘発する刺激 → 不安反応を誘発する刺激", explanation:"エクスポージャー法は、不安反応を誘発する刺激に一定時間自らを晒す技法である。", source:"eラーニング"},
  {id:688, chapter:8, text:"第三世代の認知行動療法の技法は、より体験的で間接的であるのが特徴である。その1つのマインドフルネスは、「いまここの自らの体験に、判断をしないで、意図的に気づきを向けること」である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:689, chapter:8, text:"行動活性化療法は、抑うつ状態にみられる活動抑制や嫌悪体験からの回避行動を減少させ、これまでの自分の価値観を脱却するような稀有な体験が得られる行動を増やすことをめざす。", answer:false, correction:"これまでの価値観を脱却する稀有な体験を増やす → ポジティブで自分の価値に沿った行動を増やす", explanation:"行動活性化療法は、回避行動を減少させ、ポジティブな体験が得られるような自分にとっての価値に沿った行動を増やすことをめざした技法である。", source:"eラーニング"},
  {id:690, chapter:8, text:"自己の意見や感情を社会的に認められる形で表出するために必要な主張行動を訓練する方法をソーシャル・スキル・トレーニングという。", answer:false, correction:"ソーシャル・スキル・トレーニング → アサーション・トレーニング", explanation:"自己の意見や感情を社会的に認められる形で表出するために必要な主張行動を訓練する方法はアサーション・トレーニングである。", source:"eラーニング"},
  {id:691, chapter:8, text:"来談者中心療法は、ロジャーズによって創始された。当初は非指示的セラピーと呼ばれていたが、来談者中心という用語を使うようになり、晩年はエンカウンター・グループという集団的・社会的な活動にも携わった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:692, chapter:8, text:"来談者中心療法はいち早くクライエント尊重の理念を打ち出し、共感的なカウンセリング関係を重視することでカウンセリングやサイコセラピーの発展や世界的な広がりを牽引してきた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:693, chapter:8, text:"ロジャーズは、人間の本性は白紙であり、人間機械論的な見方をとる人間観を示した。", answer:false, correction:"白紙・人間機械論的な見方 → 生命体は基本的な傾向と力をもち自らを実現・維持・増進する人間観", explanation:"ロジャーズは、生命体は、一つの基本的な傾向と力をもち、体験のただ中にある生命体自身を実現し、維持し、増進するという人間観を示した。", source:"eラーニング"},
  {id:694, chapter:8, text:"「実現傾向」とは、生命体が自らをよりよく実現していこうとする力のことで、生命体がこの力をもつかどうかは個人差がある。", answer:false, correction:"この力をもつかどうかは個人差がある → 潜在的な力で、適切な環境条件下では成長していく", explanation:"「実現傾向」とは、生命体が自らをよりよく実現していこうとする潜在的な力のことで、適切な環境の条件下では生命体はこの傾向によって成長していく。", source:"eラーニング"},
  {id:695, chapter:8, text:"カウンセリングやサイコセラピーで適切な関係性が提供されると実現傾向が促進される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:696, chapter:8, text:"ロジャーズの主要理論である「自己理論」では、個人が知覚している世界を、その人自身のもつ内的準拠枠から理解していく。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:697, chapter:8, text:"ロジャーズの主要理論である「パーソナリティ変化の必要十分条件」では、セラピストは、その関係の中で一致しており、統合している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:698, chapter:8, text:"「パーソナリティ変化の必要十分条件」では、セラピストは、クライエントに対して無条件の肯定的配慮を体験している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:699, chapter:8, text:"「パーソナリティ変化の必要十分条件」では、セラピストが、クライエントの内的照合枠を自らと同一のものとして理解しており、この経験をクライエントに伝えようと努めている。", answer:false, correction:"内的照合枠を自らと同一のものとして理解 → 「あたかも〜のように」正確に理解する態度（感情的な同情や同一視とは異なる）", explanation:"共感的理解とは、クライエントの内的照合枠をできる限り正確に理解していこうという態度であり、セラピストはクライエントとの違いや独自性を認識し、感情的な同情や同一視とは異なる。", source:"eラーニング"},
  {id:700, chapter:8, text:"ロジャーズが提示した「十分に機能する人間」の姿の一つは、判断や行動の基準を信頼できる周囲の人間に委ねることができるようになることである。", answer:false, correction:"判断・行動の基準を周囲の人間に委ねる → 自己の生命体を信頼し、自身の感じていることを基準とする", explanation:"来談者中心療法においてクライエントが向かう変化の姿としては、自己の生命体をより信頼し、判断や行動は自身の感じていることを基準とするようになることである。", source:"eラーニング"},
  {id:701, chapter:8, text:"場面構成とは、カウンセリングの場の設定や構造化のことで、カウンセリングが効果的に進むためにカウンセラーは権威的であることを主張する。", answer:false, correction:"カウンセラーは権威的であることを主張 → 温かく応答的な態度、感情の自由な表現の許容、明確な制限の設定、圧力や強制からの解放を重視", explanation:"場面構成についてロジャーズは、カウンセラーによる温かく応答的な態度、感情の自由な表現の許容、明確な制限の設定、圧力や強制から解放されることなどを重視した。", source:"eラーニング"},
  {id:702, chapter:8, text:"シンプルな受容とは、あたかもクライエントの話を聴いているかのようにあいづちを打ちながら、指示や情報提供のタイミングをはかるものである。", answer:false, correction:"あいづちで指示・情報提供のタイミングをはかる → 発言をそのままありのままに受容する非言語的態度", explanation:"シンプルな受容の本来の意味は、クライエントの発言をそのまま、ありのままに受容することであり、うなずきやあいづち、表情や姿勢などの非言語的態度である。", source:"eラーニング"},
  {id:703, chapter:8, text:"表現内容のくり返しは、クライエントが語った言葉の語尾をひろい、ただ無心にくり返すことである。", answer:false, correction:"語尾をひろいただ無心にくり返す → 重要なポイントや言い回しを、判断を脇に置いてそのまま伝え返す", explanation:"表現内容のくり返しは、クライエントが語った言葉の重要なポイントや言い回しについて、こちら側の考えや判断をいったん脇に置いてそのままを伝え返す応答である。", source:"eラーニング"},
  {id:704, chapter:8, text:"感情の反射とは、クライエントの感情や態度を正確に受け取り、それらを共感的に伝え返すことである。そのためにはクライエントの感情について正確で深い共感的な理解が必要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:705, chapter:8, text:"感情の明確化は、感じられている、まだ十分に言葉になっていないクライエントの感情へ焦点化、明確化しようとする応答のことである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング11章 カウンセリングのさまざまな理論と方法および今日的課題 → 既存 第8章 -----
  {id:706, chapter:8, text:"交流分析では自らがどのように他者と交流しながら生きているかの自己理解を深め、他者との交流のねじれを解消し、これからの人生をどのように生きていくのかを再決断することを目指す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:707, chapter:8, text:"交流分析ではその人の自我状態をその人の両親（P）、その人自身（A）、その人の子ども（C）それぞれとの関係性から把握していく。", answer:false, correction:"両親(P)・その人自身(A)・子ども(C)の関係性から把握 → 親(NP・CP)・大人(A)・子ども(FC・AC)の5つに分けて分析", explanation:"交流分析ではその人の自我状態を親（NP・CP）、大人（A）、子ども（FC・AC）の5つに分け、その自我状態からパーソナリティの特徴を図示して分析していく。", source:"eラーニング"},
  {id:708, chapter:8, text:"交差的な交流が起きているとゲームと呼ばれる互いの交流が交差的にぶつかるやりとりがおきるが、そのことに気づくことによって、自らのコミュニケーションのパターンを変えていくことを目指す。", answer:false, correction:"ゲームは交差的な交流によっておこる → ゲーム（ネガティブな感情を経験するやりとり）は裏面的な交流によっておこる", explanation:"ゲームと呼ばれる当事者双方（もしくは一方）がネガティブな感情を経験するやりとりは、交差的な交流ではなく裏面的な交流によっておこる。", source:"eラーニング"},
  {id:709, chapter:8, text:"バーンは、人が子ども時代に両親によってつくられた枠組みに応じ無意識に自分でつくりあげている人生計画を人生脚本と呼び、人は最後はその人生脚本による結末を迎えると述べている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:710, chapter:8, text:"交流分析では「私はOKであり、あなたもOKである」という哲学に基づき、自律的で豊かな人生を送ることを目指す。関係性を分析する枠組みはカウンセラーの視野を広げ効果的な援助の実践に役立つと考えられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:711, chapter:8, text:"ゲシュタルト療法では、断片的で不完全な生き方を、より統合的で全体的な生き方へと変容させるために「いま、ここ」での体験への覚醒を通して、自分自身を取り戻すことを目指す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:712, chapter:8, text:"ゲシュタルト療法では「気づき」の概念を重視し、内層、中間層、外層それぞれの気づきが大事と考える。ここには「頭よりも感覚」「想像よりも観察」を重視するパールズの考えが反映されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:713, chapter:8, text:"ゲシュタルト療法ではクライエントのいまの関心や欲求が向かっている対象を「図」と呼ぶ。不適応状態のときには、失敗の経験などが図として固着しており、別の見方が出来るよう「図と地」の反転を促す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:714, chapter:8, text:"「いま、ここ」を重視するのもゲシュタルト療法の特徴であり、不適応は「いま、ここ」にあることから、その視点を過去や未来の注意へとむけていく。", answer:false, correction:"視点を過去や未来の注意へむける → 過去や未来ではなく「いま、ここ」に起こっている現象に注意を向け観察する", explanation:"「いま、ここ」という現在性を重視するのもゲシュタルト療法の特徴であり、過去や未来に注意をむけるのではなく、「いま、ここ」に起こっている現象に注意を向け観察する。", source:"eラーニング"},
  {id:715, chapter:8, text:"クライエントの前に置かれる空の椅子をエンプティチェアと呼び、そこにセラピストが座り対話をしていく中で、クライエントは夢を語り自己のメッセージへの気づきを促す。", answer:false, correction:"セラピストが座り対話 → イメージした他者などと座らせ、未完結の経験を完結させるために用いる", explanation:"エンプティチェアには、イメージした他者などと座らせ、言えないままに残っている心残りや未完結の経験をセラピーの中で完結させていくために用いる。", source:"eラーニング"},
  {id:716, chapter:8, text:"家族療法とは家族を対象としたカウンセリングの総称である。家族療法では個人の問題は家族間の人間関係から生じるととらえ、家族を互いに影響を与えあっている1つのシステムとしてとらえ、その全体に介入していく。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:717, chapter:8, text:"システム論の概念である円環的因果律は、システムの要素は相互に関連し循環していると考えるので、まずは原因を1つ特定することで循環を断ち切ろうとするものである。", answer:false, correction:"原因を1つ特定して循環を断ち切る → 原因を1つに特定することはできないとする考え方", explanation:"円環的因果律は、システムの要素は相互に関連し、循環しているので原因を1つに特定することは出来ないとする考え方である。", source:"eラーニング"},
  {id:718, chapter:8, text:"家族療法において重要な理論に、ダブルバインド理論がある。ベイトソンは、統合失調症患者とその母親との間には、ダブルバインドが繰り返し生じている可能性を指摘した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:719, chapter:8, text:"家族療法の理論にはさまざまなアプローチがあるが、問題行動よりもそれを持続させている不適切なコミュニケーション・パターンに着目し家族内のコミュニケーションに変化を与える方法もある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:720, chapter:8, text:"家族療法の方法には、家族メンバー全員による面接を行う合同家族面接や、セラピストが家族の文化の中に溶けこみ、家族パターンやコミュニケーションなどを観察し、模倣するリフレーミングなどがある。", answer:false, correction:"模倣する方法＝リフレーミング → ジョイニング", explanation:"セラピストが家族の文化の中に溶けこみ、家族パターンやコミュニケーションなどを観察し、模倣する方法は「ジョイニング」である。", source:"eラーニング"},
  {id:721, chapter:8, text:"問題焦点型アプローチ（MRIモデル）では、クライエントが現在用いている問題に対する解決行動を、カウンセラーが強く支持する。", answer:false, correction:"現在の解決行動を強く支持 → その解決行動が問題を維持・再生産しているととらえ、コミュニケーションパターンを変化させる", explanation:"問題焦点型アプローチ（MRIモデル）では、現在用いられている解決行動が結果的に問題を維持・再生産させていると考え、クライエントのコミュニケーションパターンを変化させることで問題解決を図る。", source:"eラーニング"},
  {id:722, chapter:8, text:"解決焦点型アプローチ（ソリューションフォーカスト・アプローチ）の哲学として、「うまくいっているなら、変えなくていい。それを続けよ」「もし一度やってうまくいったなら、もう一度それをせよ」「うまくいっていないなら、何か違うことをせよ」という3つの考えがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:723, chapter:8, text:"ブリーフセラピーの方法にはリソースの活用とコンプリメントがある。コンプリメントは、クライエントの例外的な解決体験やサバイバル体験に焦点を当てて褒めたり労ったり、非言語を含めて是認のメッセージを伝える。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:724, chapter:8, text:"スケーリングクエスチョンは、クライエントの望ましい状態を「10」としたときに、どうすれば「10」の状態になれるかを考えてもらう方法である。", answer:false, correction:"どうすれば「10」の状態になれるか → スモールステップで、現状が3なら4にするには何が役立つか等を考えてもらう", explanation:"スケーリングクエスチョンは、スモールステップで次に何ができるのかを考えてもらうもので、望ましい状態を10としたときに現状が3であれば、4にするには何が役立つか等を考えてもらう方法である。", source:"eラーニング"},
  {id:725, chapter:8, text:"ミラクルクエスチョンや例外的に問題が生じなかった状況を探す質問など、SFAには質問技法を用いて効果があると思われる解決行動をイメージさせるが、解決を押し付けることにならないよう、注意を払うことが必要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:726, chapter:8, text:"表現芸術療法は、表現的あるいは芸術的な媒体を活用するカウンセリングの総称である。通常のカウンセリングでは表されにくい非言語的で感性的、身体的なさまざまな側面の表現が可能となり、より多面的な心理支援が可能になる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:727, chapter:8, text:"アートセラピーでは、作品を完成すること自体にセラピー的な効果を認めたり、自己の内面を表現することに意義を見出したりとさまざまな立場があり、視覚芸術とその表現手段がカウンセリングのプロセスに用いられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:728, chapter:8, text:"箱庭療法は、言語にとらわれない表現とその共有が可能であり、簡便性、触覚性、視覚性などが特徴である。セラピストが作成者に質問をしながら解釈をしていく心理療法である。", answer:false, correction:"質問をしながら解釈をしていく → 質問をしながら解釈するよりも、ともに味わい寄り添う姿勢が大切", explanation:"箱庭療法では、セラピストは作成者に質問をしながら解釈をしていくよりも、ともに味わい寄り添う姿勢が大切である。", source:"eラーニング"},
  {id:729, chapter:8, text:"音楽の鑑賞や演奏、歌唱などを活用するカウンセリングを音楽療法という。心身の機能の維持改善、生活の質の向上、行動の変容などを目指す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:730, chapter:8, text:"サイコドラマは即興的な演技で行う集団カウンセリングである。1人が主人公となりカウンセラーは監督、グループの他のメンバーは脇役か観客となりさまざまな場面が演じられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:731, chapter:8, text:"個別的な支援を基本とするカウンセリングにおいても、個人と集団との関係や、集団における個人の存在のあり方などは常に留意する必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:732, chapter:8, text:"レヴィンらが開発したTグループは、メンバーとトレーナーが数日間を共に過ごす中で生じる人間関係を題材に他者へのかかわり方に気づき、新たなかかわり方をその場で試していく。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:733, chapter:8, text:"感受性訓練は、グループの中での話し合いを通じて、メンバーの感情をいかに汲み取るかのスキルを身に付ける訓練技法として発展した。", answer:false, correction:"話し合いを通じて感情を汲み取るスキル → やり取りを通じ、自分の感情に気づき、コミュニケーションやリーダーシップのスキルを身に付ける", explanation:"感受性訓練は、グループの中でのやり取りを通じ、自分の感情に気づき、他者への影響や交流の仕方などのコミュニケーションやリーダーシップのスキルを身に付ける教育訓練技法として発展した。", source:"eラーニング"},
  {id:734, chapter:8, text:"エンカウンター・グループは、ロジャーズの来談者中心療法の理論と方法を集団におけるメンバーの心理的成長やコミュニケーションの改善のために適用するものである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:735, chapter:8, text:"エンカウンター・グループで、集中的なグループ・セッションを合宿や通いで行う方法を、ベーシック・エンカウンター・グループとも呼ぶ。また、各種エクササイズを活用しながら行うものを構成的グループ・エンカウンターという。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:736, chapter:8, text:"グループ・サイコセラピーの先駆は20世紀初頭のアメリカで、結核患者の集団での語り合いを実践したことと言われている。その後、カウンセリングやサイコセラピーのさまざまな理論と方法を背景にして発展し、現在に至っている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:737, chapter:8, text:"集団認知行動療法は、精神科の病院やクリニック、各種施設において集団療法やデイケア等のプログラムに取り入れられており、ソーシャル・スキル・トレーニングやアサーション・トレーニング等も、主に医療分野で活用されている。", answer:false, correction:"主に医療分野で活用 → 保健医療・教育・福祉・産業等の分野で広く活用されている", explanation:"ソーシャル・スキル・トレーニングやアサーション・トレーニング等は、保健医療・教育・福祉・産業等の分野で広く活用されている。", source:"eラーニング"},
  {id:738, chapter:8, text:"認知行動療法の第一世代として1950年代から台頭してきたマインドフルネス認知療法の主要な方法であるマインドフルネス瞑想法は、企業等の講座やセミナー等でも活用されている。", answer:false, correction:"第一世代として1950年代から台頭 → 第三世代認知行動療法として2000年ごろから広まっている", explanation:"マインドフルネス認知療法は、第三世代認知行動療法として注目され、2000年ごろから広まっている。", source:"eラーニング"},
  {id:739, chapter:8, text:"何等かの共通する問題や課題を抱える当事者のみの自主的な集まりはセルフヘルプ・グループ（自助グループとも言う）と呼ばれ、その発端はアメリカで発足したアルコール依存症者の会（AA）とされている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:740, chapter:8, text:"日本でもアルコール依存だけではなく、薬物・ギャンブル、心身の病気や疾患、DVの被害者や加害者の会などさまざまなセルフヘルプ・グループが作られ、各地で活動が広がっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:741, chapter:8, text:"動機づけ面接は、当初アルコール依存者への面接手法として開発されたが、現在は健康行動、不安や抑うつといった心理的問題に対しても幅広く適用されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:742, chapter:8, text:"動機づけ面接では、クライエントの中にある矛盾に焦点をあててしまうと抵抗を示されることもあるので、クライエントの外発的な動機づけを活性化し、行動変容を目指す。", answer:false, correction:"矛盾を避け外発的な動機づけを活性化 → 抵抗を理解を深める好機ととらえ、矛盾に焦点をあて、内発的な動機づけを活性化する", explanation:"動機づけ面接では、クライエントが示した抵抗を理解を深める好機ととらえ、矛盾に焦点をあて、内発的な動機づけを活性化し、行動変容を目指す。", source:"eラーニング"},
  {id:743, chapter:8, text:"対人関係療法は、重要な他者との関係性に焦点をあてたカウンセリング・アプローチである。うつ状態、双極性障害、過食症、夫婦カウンセリングなどにも適用範囲を広げている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:744, chapter:8, text:"対人関係療法では感情表現が奨励され、クライエントに感情の表出を促す。対人関係の中で感情を適切に表現できるようになることを目指す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:745, chapter:8, text:"対人関係療法では、過去の対人関係の問題を分析したうえで、「いま、ここ」で起こっている対人関係の問題を改善することをめざし、治療関係において生じる問題を積極的に扱う。", answer:false, correction:"過去を分析したうえで治療関係で生じる問題を積極的に扱う → 過去を分析するのではなく「いま、ここ」の対人関係の問題を改善する", explanation:"対人関係療法では、過去の対人関係の問題を分析するのではなく、「いま、ここ」で起こっている対人関係の問題を改善することをめざしている。", source:"eラーニング"},
  {id:746, chapter:8, text:"森田療法は、森田正馬によって創始された森田神経質と呼ばれる神経症の治療を目的とした日本的な方法である。症状を取り去る治療とともに、自然な「生の欲望」をあるがままに受け入れることを促す。", answer:false, correction:"症状を取り去る治療とともに → 症状を取り去ろうとはせず、自然な「生の欲望」をあるがままに受け入れる", explanation:"森田療法では、症状を取り去ろうとはせずに、自然な「生の欲望」をあるがままに受け入れることを促す。", source:"eラーニング"},
  {id:747, chapter:8, text:"森田療法は、症状や不安を「よりよく生きたい」「周囲から評価されたい」といった生の欲望の裏返しととらえ、「気分本位」ではなく、今やるべきことをやるという「目的本位」の自分らしい生き方を実現することを目指す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:748, chapter:8, text:"内観療法は、浄土真宗の一派の身調べという修養法をもとに吉本伊信が開発した内観法から発展した心理療法であり、1週間一切の外界との接触を断ち非日常に身を置いて行う。", answer:false, correction:"1週間非日常で行う（のみ）→ 集中内観（宿泊型）と日常内観（非宿泊型）がある", explanation:"内観療法は、集中内観と呼ばれる宿泊型の方法と、日常生活の中で一定時間の内観を行う非宿泊型の日常内観という方法もある。", source:"eラーニング"},
  {id:749, chapter:8, text:"内観療法では、両親、兄弟姉妹、身近な人に対し「してもらったこと」「して返したこと」「迷惑をかけたこと」について入念に思い出し自己を見つめ直す。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:750, chapter:8, text:"内観療法では自他への肯定感の高まりや自己中心的な視点からの転換などが期待されるが、自己洞察によって進む要素が大きく、クライエント自身の自発的な意思があることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:751, chapter:8, text:"アサーション・トレーニングは「自分の気持ち・考え・意見・相手への希望などを伝えたい時はなるべく率直に正直にその場に合った適切な方法で伝えられる」ように訓練する方法である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:752, chapter:8, text:"アサーティブな自己表現は、非主張的な自己表現や攻撃的な自己表現もそのままに、自分を優先してありのままを表現していく。", answer:false, correction:"非主張的・攻撃的な表現もそのままに自分を優先 → 非主張的とも攻撃的とも異なり、自他を尊重したやり方", explanation:"アサーティブな自己表現は、非主張的な自己表現とも攻撃的な自己表現とも異なり、自分の考えや意見を率直に言うと同時に、相手の考えや意見を大切に聴くという自他を尊重したやり方である。", source:"eラーニング"},
  {id:753, chapter:8, text:"折衷的アプローチの代表的な方法であるアイビイが提唱したマイクロカウンセリングでは、さまざまなカウンセリングの方法を抽出し、行動レベルで定義し「マイクロ技法の階層表」で構造化した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:754, chapter:8, text:"マイクロカウンセリングの方法は、かかわり行動から基本的な傾聴技法、カウンセラーが能動的にかかわる積極技法、そして技法の統合という階層となっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:755, chapter:8, text:"統合的アプローチはさまざまな理論を統合的に捉えることで単一理論の弱点を補う。多元的アプローチは特定の理論の長所を掘り下げながらも同時に他理論や方法の意義を尊重する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:756, chapter:8, text:"遠隔心理支援のメリットとしては、クライエントがどこからでも相談できる利便性と、対人恐怖等があっても顔を出さずに済む相談のしやすさなどがあげられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:757, chapter:8, text:"遠隔心理支援のデメリットとしては、非言語情報が不足することと、危機介入の対応が難しい点などがあげられるが、相談方法によって違いがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:758, chapter:8, text:"他者の心を理解することが苦手なクライエントに対して、その理解を促進しメンタルヘルスの向上を提供する方法として、メンタライゼーション・ベースト・トリートメントが開発された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:759, chapter:8, text:"社会構成主義を背景としたナラティブ・アプローチは、ナラティブという「語り」を通して、世界の現実を自他に共通のものとしてその理解を深めていくアプローチである。", answer:false, correction:"世界の現実を自他に共通のものとして理解を深める → 自分にとって豊かで満足できるナラティブを見出し、人生の物語を書き直していく支援", explanation:"ナラティブ・アプローチは、生きづらさや苦悩を抱えるクライエントが、自分にとって豊かで満足できるナラティブを見出し、人生という物語をより納得のいく意味ある物語に書き直していくことを支援する。", source:"eラーニング"},
  {id:760, chapter:8, text:"家族療法から発展したコンパッション・フォーカスト・セラピーは、患者やクライエント、家族、グループ全体のコミュニケーションや自他の理解を促進することを目指す。", answer:false, correction:"設問はオープン・ダイアローグの説明 → コンパッション・フォーカスト・セラピーは第三世代認知行動療法で、コンパッション（思いやりの気持ちと行動）に焦点をあてる", explanation:"設問はオープン・ダイアローグの説明である。コンパッション・フォーカスト・セラピーは、第三世代認知行動療法で、コンパッション（思いやりの気持ちと行動）に焦点をあてている。", source:"eラーニング"},
  // ----- eラーニング12章 こころのメカニズム → 既存 第9章 -----
  {id:761, chapter:9, text:"人間を理解するためには、心理的側面から考察することが、特に重要である。", answer:false, correction:"心理的側面から考察することが特に重要 → 生物的・心理的・社会的側面の3つから多角的・統合的に捉えることが重要", explanation:"人間理解には、生物的側面、心理的側面、社会的側面の3つから多角的・統合的に捉えることが重要である。", source:"eラーニング"},
  {id:762, chapter:9, text:"自律神経系を構成する2つの神経系（生体を活発にする交感神経系と鎮静化する副交感神経系）が交互に活性化することにより、生体は活動休息のバランスを保っている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:763, chapter:9, text:"神経系はニューロンによって構成されるが、ニューロン同士がシナプスでつながっているのは、体性神経系である。", answer:false, correction:"体性神経系 → 自律神経系", explanation:"ニューロン同士がシナプスでつながっているのは、「体性神経系」ではなく、「自律神経系」である。", source:"eラーニング"},
  {id:764, chapter:9, text:"人は、大脳新皮質が最も発達し、脳の高次機能が担われる。前頭前野は脳の各分野の情報を統合することがわかってきており、自我・意識の座ともいわれる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:765, chapter:9, text:"大脳辺縁系は、旧・哺乳類の脳と見立てる仮説もあり、感情や欲動に深くかかわっている。人間の五感で最も原始的な感覚の嗅覚もここで処理されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:766, chapter:9, text:"外界の刺激は、神経系を触発し感覚となる。感覚が中枢で処理され、あるまとまりと意味をもった刺激として意識されると知覚となり、知覚は体験や思考などと関連して意味づけられ、推理・判断する認知へと進む。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:767, chapter:9, text:"感情（情動）に類する言葉には、気分がある。気分は一時的なそれほど強くない情緒である。", answer:false, correction:"気分は一時的 → 気分は持続的なそれほど強くない情緒", explanation:"気分は一時的なものではなく、「持続的」なそれほど強くない情緒のことで、感情生活の基底をなす。", source:"eラーニング"},
  {id:768, chapter:9, text:"認知や判断の過程で、知覚されたものが意味づけられ、認知的枠組みとなる。「スキーマ」と「信念」は過去の経験から一般化された構造的な知識である。", answer:false, correction:"「信念」も構造的な知識（スキーマと同じ）→ 信念は対象への確信や意見でありスキーマとは異なる", explanation:"信念も認知的枠組みであるが、対象に対して個人が抱いている確信や意見であり、スキーマとは異なる。", source:"eラーニング"},
  {id:769, chapter:9, text:"葛藤状況を変えようがないとき、自分の認知を変えて、その葛藤を解消しようとする心理的規制は、生物心理社会モデルで説明することができる。", answer:false, correction:"生物心理社会モデル → 認知的不協和の理論", explanation:"葛藤状況を変えようがないとき、自分の認知を変えて葛藤を解消しようとする心理的規制は、認知的不協和の理論で説明することができる。", source:"eラーニング"},
  {id:770, chapter:9, text:"感情は意識にのぼらず、言語化されなくても、精神面や人間関係に影響している。視線や態度、話し方など非言語的な対応が他人へ伝わることも多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:771, chapter:9, text:"ブロンフェンブレンナーは、生態学的システム論を提唱し、環境をマイクロシステム、メゾシステム、エクソシステム、マクロシステムの4つに分類した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:772, chapter:9, text:"集団での行動は、個々人の合理的な思考や態度を歪めてしまうことがある。これを集団心理と呼んでいる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:773, chapter:9, text:"アッシュとシェリフは、集団により判断が影響される「同調行動」の実験を行い、失敗体験がある者や自信が低下している者は同調しにくいことがわかった。", answer:false, correction:"同調しにくい → 同調しやすい", explanation:"アッシュの研究では、失敗体験がある者や自信が低下している者は同調しやすいことがわかった。シェリフの実験では集団規範が個人の知覚にも影響を与えることを示した。", source:"eラーニング"},
  {id:774, chapter:9, text:"ミルグラムによる権威への服従行動実験（通称「アイヒマン実験」）では、権威者である実験者の指令があれば、多くの実験協力者が危険な電気刺激付与も拒否しない結果となった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:775, chapter:9, text:"多数の傍観者が存在することによって援助行動が抑制される「傍観者効果」の原因として、「責任の分散」、「評価懸念」の2つが考えられている。", answer:false, correction:"2つ（責任の分散・評価懸念）→ 3つ（責任の分散・評価懸念・多数の無知）", explanation:"「傍観者効果」の原因は、「責任の分散」、「評価懸念」、「多数の無知」の3つが考えられている。", source:"eラーニング"},
  {id:776, chapter:9, text:"パンデミックの影響で、電子ネットワーク利用が急速に普及し、生活スタイルが大きく変化している。今後メディアの利用により、個々人の行動や習慣がどう変化するか、こころへの影響を含めて見極めていく必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:777, chapter:9, text:"インターネットや携帯電話の爆発的普及により、常に「私」は他者との関連の中にあって、私的空間は拡大している。", answer:false, correction:"私的空間は拡大 → 私的空間は減少し、他者とつながる公共空間が拡大している", explanation:"電子メディアにより、1人で読書や日記を書くなどの私的空間は減少し、他者とつながる公共空間が拡大している。", source:"eラーニング"},
  {id:778, chapter:9, text:"メールやSNS等でいつでもどこでもつながれる状況は、他者から離れた「本当の自分」と他者といる「社会的自己」の区別が明確になってきた。", answer:false, correction:"区別が明確になってきた → 区別が希薄になってきている", explanation:"いつでも他者とつながれる状況では、「私」はいつも他者との関係で定義されやすく、「本当の自分」と「社会的自己」の区別が希薄になってきている。", source:"eラーニング"},
  {id:779, chapter:9, text:"私たちの日常生活は、電子メディアにより時間軸が分断され、さらに空間的にも、身体が存在するリアリティとメディアがもたらすリアリティとの二重性が生じている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:780, chapter:9, text:"現実とメディアの葛藤の中で、何を大切に生きるかの主軸の混乱が避けられない。存在意義の揺らぎや無気力も含めて、人々のメンタルヘルスへの影響は無視できない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:781, chapter:9, text:"ヒトの生体は開放系であり、外界の変化に対して自己の内部環境を一定に保とうとする。この自己の内部環境維持の機能をホメオスターシスと呼ぶ。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:782, chapter:9, text:"セリエは非特異的反応に関心をもち、「汎適応症候群」という仮説を提唱した。非特異的反応の時間的プロセスを「警告反応期」、「抵抗期」、「疲憊期」に分けた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:783, chapter:9, text:"視床下部→下垂体→副腎の反応によって血中に出た副腎皮質ホルモンが長時間作用すると、全身の免疫機能が向上する。", answer:false, correction:"免疫機能が向上 → 血糖値を上昇させリンパ球の活動を抑制し、全身の免疫機能が低下する", explanation:"副腎皮質ホルモンが長時間作用すると、血糖値を上昇させ、リンパ球の活動を抑制するため、全身の免疫機能が低下する。", source:"eラーニング"},
  {id:784, chapter:9, text:"NIOSHの職業ストレスモデルは、「仕事のストレス要因」によって「ストレス反応」が生じ、さらには「疾病」につながる場合、「個人要因」「仕事外の要因」「緩衝要因」はほとんど影響を与えないとしたものである。", answer:false, correction:"これらの要因はほとんど影響を与えない → これらの要因が影響を与えるとしている", explanation:"NIOSHの職業ストレスモデルは、「仕事のストレス要因」から「ストレス反応」「疾病」につながる場合に、「個人要因」「仕事外の要因」「緩衝要因」が影響を与えるとしている。", source:"eラーニング"},
  {id:785, chapter:9, text:"心理的ストレスは、人が現象や状況をどのように認知するかによってストレス反応が異なるため、そのコントロールには各人の「認知のプロセス」を知ることが必要となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:786, chapter:9, text:"ストレス反応は、抑うつ気分などの心理的反応、睡眠障害などの生理的反応、勤怠不良などの行動反応として表現される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:787, chapter:9, text:"「きっとうまくいく」と将来に対してポジティブな幻想をもっている場合、自己効力感が高い場合、やりがいを感じている場合には、ストレスは感じにくい傾向がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:788, chapter:9, text:"レジリエンスにつながる心理的特性には、楽観性、感情の調整能力などいくつかがあげられているが、これらは各々独立して存在する。", answer:false, correction:"各々独立して存在する → 相互に関連して存在している", explanation:"レジリエンスにつながる心理的特性、レジリエンスを構成する諸要因は、相互に関連して存在している。", source:"eラーニング"},
  {id:789, chapter:9, text:"レジリエンスとは、変形された物体がもとの形に戻る復元力を意味し、ストレスを受けても精神的健康を維持し回復に導く、しなやかな心理的特性のことをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:790, chapter:9, text:"ホームズとレイエは、生活上の出来事や経験の「ストレス強度」を算出しているが、成功を収めたりする肯定的出来事はストレス要因にはなりにくいとしている。", answer:false, correction:"肯定的出来事はストレス要因になりにくい → 成功や休暇などの肯定的出来事もストレス要因になりうる", explanation:"成功を収めたり、休暇をとったりする肯定的出来事もストレス要因になりうる。", source:"eラーニング"},
  // ----- eラーニング13章 パーソナリティ心理学と心理アセスメント → 既存 第10章・第11章 -----
  {id:791, chapter:10, text:"「パーソナリティ」が「人となり」全体を表すのに対して、「性格」は表面に現れた他の人と区別されるような特徴に注目した概念である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:792, chapter:10, text:"パーソナリティをモデル化して記述する方法は、「特性論」「類型論」の2つである。", answer:false, correction:"「特性論」「類型論」の2つ → 「特性論」「類型論」「力動論」の3つ", explanation:"パーソナリティをモデル化して記述する代表的な方法は、「特性論」「類型論」「力動論」の3つである。", source:"eラーニング"},
  {id:793, chapter:10, text:"パーソナリティを仮説的な機能のまとまりに分けて、それらの強弱やどのように作用しあっているかをみてパーソナリティを記述する理論を、特性論という。", answer:false, correction:"特性論 → 力動論", explanation:"仮説的な機能のまとまりに分けて、それらの強弱や作用しあいをみてパーソナリティを記述する理論は、「力動論」である。", source:"eラーニング"},
  {id:794, chapter:10, text:"ユングは、外向－内向という生きるエネルギーが向く方向と、4つの心的機能である思考・感情・感覚・直観の組み合せから、8つの性格タイプ類型を提唱した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:795, chapter:10, text:"「ビッグ・ファイブ」について、マックレーとコスタは、神経症的傾向、外向性、経験への開放性、調和性、誠実性の5つの特性因子を提唱した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:796, chapter:10, text:"エリクソンの発達の漸成説では、人生の各段階に危機と発達課題があり、その発達課題は、重要な他者の発達課題と関連しながら展開するとされる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:797, chapter:10, text:"乳幼児期の養育者との情緒的な関係は、パーソナリティ形成に大きな影響を与える。ボウルビィは、この特定の他者や対象との情緒的な結びつきを「愛着」と名づけた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:798, chapter:10, text:"10歳ごろには前思春期となり、記憶や時間感覚が発達し抽象的な概念を操作したり、自分自身を強烈に自覚したりして「内的ワーキングモデル」が生成される。", answer:false, correction:"自分自身を強烈に自覚する体験＝内的ワーキングモデルの生成 → それは「自我体験」。内的ワーキングモデルは乳幼児期に生成される", explanation:"自分自身を強烈に自覚する体験は「自我体験」であり、思春期以降の自己意識の基盤となる。「内的ワーキングモデル」は乳幼児期に生成される。", source:"eラーニング"},
  {id:799, chapter:10, text:"近年、社会の複雑化とともに、通過儀礼によって思春期から一足飛びに大人の仲間入りすることで、「青年期」が喪失しつつある。", answer:false, correction:"通過儀礼で一足飛びに大人になり青年期が喪失 → 通過儀礼は伝統的社会のもの。近年は青年期が延長・希薄化している", explanation:"大人の仲間入りをする通過儀礼は伝統的社会で行われていた。近年は「青年期」が延長・希薄化するとともに、同世代集団の中での自己形成が難しくなってきている。", source:"eラーニング"},
  {id:800, chapter:10, text:"働く人を支援するには、ライフサイクルの心理社会的様相を理解し、被支援者がどのような位置にいるのかを見立てることが重要である。心理的位置と社会的位置は合致する。", answer:false, correction:"心理的位置と社会的位置は合致する → 必ずしも合致しない", explanation:"心理的位置と社会的位置は必ずしも合致しない。例えば愛着のテーマに大きな課題があり、中年期以降も心理的な不適応が生じることもある。", source:"eラーニング"},
  {id:801, chapter:10, text:"長年にわたって習熟した知識や知恵は中年期以降もなお発達しつづける。この知能を、キャッテルは「流動性知能」と提唱した。", answer:false, correction:"流動性知能 → 結晶性知能", explanation:"中年期以降もなお発達しつづける長年にわたって習熟した知識や知恵は「結晶性知能」である。", source:"eラーニング"},
  {id:802, chapter:10, text:"エリクソンのライフサイクル論では、中年期の発達課題は、豊かな業績をあげる「生産性」とされる。また人生後半を意識し、抑圧していたこころの全体性を取り戻そうと、自分自身に限定した補償機能が生じる。", answer:false, correction:"補償機能は自分自身に限定 → 自分自身に限定されず、世代をまたがって生じることがある", explanation:"中年期の補償機能は、自分自身に限定されず、子どもに人生の肩代わりを望む形で、世代をまたがって生じることがある。", source:"eラーニング"},
  {id:803, chapter:10, text:"超高齢化社会となり、老年期がより細分化され、エイジング・パラドックスや老年的超越なども見られる。ライフサイクル上の意味づけや発達課題の定義をし直す必要があるといえる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:804, chapter:10, text:"キュブラー・ロスは、人が迫る死をどのように受け止めるのかについて、否認・怒り・取引き・抑うつ・受容の5段階があるとし、受容の最終段階を「希望」とも呼んだ。", answer:false, correction:"受容の最終段階を「希望」と呼んだ → 最終段階は「デカセクシス」。「希望」は5段階すべてを支えるもの", explanation:"キュブラー・ロスは、受容の最終段階を「デカセクシス」（こだわることから離れるの意）と呼んだ。「希望」は5段階のすべてを支えるものである。", source:"eラーニング"},
  {id:805, chapter:10, text:"生涯発達論を提唱するバルテスは、全生涯において常に獲得（成長）と喪失（衰退）が結びついているとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:806, chapter:10, text:"ルース・ベネディクトは、個々人の行動の型が集団によって共同構築され継承されていく「文化の型」の考え方で、「文化相対主義」を強く打ち出した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:807, chapter:10, text:"パーソナリティの形成への社会・文化的要因を特に強調し明らかにしたのが、構成主義である。ただし「自己」については、パーソナリティの要因が大きいとした。", answer:false, correction:"「自己」はパーソナリティの要因が大きい → 社会構成主義では「自己」も社会的に構成されたものと考える", explanation:"社会構成主義の考え方では、「自己」もそれ自体で存在しているものではなく、社会的に構成されたものとして考える。", source:"eラーニング"},
  {id:808, chapter:10, text:"自分を表象する性（ジェンダー）が生物学的な性（セックス）から生じる当然のものとする考え方は、構成主義と一致している。", answer:false, correction:"構成主義と一致 → それは「本質主義的」な考え方。構成主義はジェンダー形成に社会的・文化的要因を強調", explanation:"ジェンダーがセックスから生じる当然のものとする考え方は「本質主義的」なものである。「構成主義」ではジェンダーの形成に社会的・文化的要因を強調している。", source:"eラーニング"},
  {id:809, chapter:10, text:"ジェンダーの心理学的研究では、サンドラ・ベムが男性性と女性性は、文化的に個人に埋め込まれた情報処理スキーマであるとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:810, chapter:10, text:"今日では、自分を表象する性（ジェンダー）は、人格特性というより、社会的枠組みであると考えられるようになってきている。また性と性的志向の選択の自由が着目されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:811, chapter:11, text:"心理アセスメントは、クライエントの「苦悩や病理を含めた生き方の展開」と、その人が生きる社会における「個人差（個性）」を、クライエント自身で理解するためのものである。", answer:false, correction:"クライエント自身で理解するため → カウンセラーがクライエントを理解するため（自己理解を促す目的で用いることもある）", explanation:"心理アセスメントは、カウンセラーがクライエントを理解するために行うが、クライエントの自己理解を促す目的で心理検査を用いることもある。", source:"eラーニング"},
  {id:812, chapter:11, text:"狭義の見立てで扱われるのは、その人の時間的展開（人生のプロセス）を反映した人物理解であり、周囲との関係性や適応状況の理解は含まれない。", answer:false, correction:"周囲との関係性や適応状況の理解は含まれない → 含まれる", explanation:"周囲との関係性や適応状況の理解も、狭義の見立てに含まれる。", source:"eラーニング"},
  {id:813, chapter:11, text:"アセスメントの基準のうち、適応的基準は所属する社会に適応しているか不適応かの基準である。実生活と密着しており、生態学的な妥当性は比較的高い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:814, chapter:11, text:"平均的基準による心理検査では、個人が母集団の平均からどの程度離れているかをアセスメントするので、母集団によって平均値が変わらないことが望ましい。", answer:false, correction:"母集団によって平均値が変わらないことが望ましい → 母集団の設定によって平均値や標準偏差の意味が変わってかまわない", explanation:"平均的基準は相対性が高いので、母集団の設定によって平均値や標準偏差の意味が変わってきてかまわない。", source:"eラーニング"},
  {id:815, chapter:11, text:"理論的基準によるアセスメントは、カウンセラーが最も熟知した特定のカウンセリング理論により、何らかの病理や異常が個人内にあるかどうかを見立てるのが望ましい。", answer:false, correction:"特定の理論で見立てるのが望ましい → 特定の理論に偏るとリスクを伴うので複数の理論から見立てるのが望ましい", explanation:"特定の理論に偏った理解で対応すると、クライエントに合わずリスクを伴うことがあるので、複数の理論から見立てることが望ましい。", source:"eラーニング"},
  {id:816, chapter:11, text:"心理検査の実施前には、クライエントがその目的と必要性を理解しているかを必ず確認する。検査結果の説明時はカウンセラーが一方的に解釈をせず、クライエントの意見を求める。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:817, chapter:11, text:"質問紙法の心理検査には、抑うつ状態を測定するMPI、ストレス測定のYG、精神的健康を測る日本版GHQ精神健康調査票などがある。", answer:false, correction:"抑うつ測定＝MPI・ストレス測定＝YG → MPI・YGはともに性格検査。抑うつはSDS、ストレスはCMI等", explanation:"MPI、YGはともに性格検査である。抑うつ状態測定にはSDS、ストレス測定にはCMI健康調査表、発達検査ではAQなどが用いられる。", source:"eラーニング"},
  {id:818, chapter:11, text:"投影法や描画法は、他の検査法と同様に専門の訓練を受けていないと、意味ある結果が出せないことが多い。", answer:false, correction:"他の検査法と同様 → 深層心理を探るため、他の検査法以上に熟練を要する", explanation:"投影法や描画法は、主に欲求や葛藤などの深層心理を探るために利用されるので、解釈には他の検査法以上に熟練を要する。", source:"eラーニング"},
  {id:819, chapter:11, text:"科学的要件を満たした心理検査とは、標準化がなされ信頼性・妥当性が信用に足る水準で客観性に優れたものをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:820, chapter:11, text:"信頼性とは、検査の歪みが小さく、同じ受検者なら再検査をしてもほぼ同じ結果がでる要件であり、妥当性とは、測りたいものを測れていることをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング14章 精神医学の基本 → 既存 第12章 -----
  {id:821, chapter:12, text:"相談者に関する情報を職場に知らせる決定権は、医師やカウンセラーにあるのではなく、原則として相談者側にある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:822, chapter:12, text:"相談者のプライバシー保護の原則は、職種や職場によることなく、すべての場合においてあてはまる。", answer:false, correction:"すべての場合においてあてはまる → プライバシー保護より公的利益や安全が優先される場合がある", explanation:"運転業務従事者や高所作業者で脳波異常を呈する場合など、プライバシー保護より公的利益や安全が優先される場合がある。", source:"eラーニング"},
  {id:823, chapter:12, text:"以前から時々精神的に具合が悪くなることを職場でも把握しているような慢性的な経過をたどっている場合は、状態が悪くなったタイミングで本人や家族に働きかけることが有効である。", answer:false, correction:"状態が悪くなったタイミングで働きかける → 比較的安定している時期に本人や家族に働きかける", explanation:"状態が悪くなったタイミングではなく、比較的安定している時期に、本人や家族に働きかけることが有効である。", source:"eラーニング"},
  {id:824, chapter:12, text:"精神科領域では、一般的に病気が重くなるほど「病感」が失われ、よくなるにつれて「病識」がでてくる。", answer:false, correction:"重くなるほど「病感」が失われ、よくなるにつれ「病識」→ 重くなるほど「病識」が失われ、よくなるにつれ「病感」", explanation:"精神科領域では、一般的に病気が重くなるほど「病識」が失われ、よくなるにつれて「病感」が出てくる。", source:"eラーニング"},
  {id:825, chapter:12, text:"職場でメンタルな問題が疑われた際には「事例性」と「疾病性」とに分けて考え、病気の確定（疾病性）以上に、業務上何が問題で困っているか（事例性）を優先する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:826, chapter:12, text:"就業規則の休業に関する規定を、カウンセラーや人事労務担当者から本人・家族に告知・説明する。直接対面し、口頭による詳しい説明が望ましい。", answer:false, correction:"口頭による詳しい説明が望ましい → 口頭だけでなく文書による説明が望ましい", explanation:"本人・家族への告知・説明は、口頭だけではなく文書による説明が望ましい。", source:"eラーニング"},
  {id:827, chapter:12, text:"精神疾患・精神障害者に対する職場での根強い偏見が存在する。したがって、日ごろから障害者（精神障害者にかぎらず）理解のための啓発活動が必要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:828, chapter:12, text:"休業中の治療に関しては精神科主治医に任せるが、職場との定期的な報告（接触）は不可欠である。そこで本人が相談しやすいように、いくつかの窓口があるとよい。", answer:false, correction:"いくつかの窓口があるとよい → 原則的には直属上司など窓口は1つにしぼる", explanation:"職場との定期的な報告（接触）は、原則的には直属上司など窓口は1つにしぼる。", source:"eラーニング"},
  {id:829, chapter:12, text:"職場復帰の条件、復職後の就業場所や就業内容など、細かい内容に関する本人との協議は時間がかかるので、主治医から職場復帰可能の見解が示される前から始めるほうがよい。", answer:false, correction:"見解が示される前から始める → 見解が示された時点で協議を開始する", explanation:"職場復帰が決まりかけた時期は不安定になりやすいので、原則的には精神科主治医から職場復帰可能の見解が示された時点で本人との協議を開始することが望ましい。", source:"eラーニング"},
  {id:830, chapter:12, text:"職場復帰が可能とする判断の目安のひとつは、所定労働時間の勤務に耐えうるかどうかなので、「完治」ないし「治癒」したという医師の判断に基づく。", answer:false, correction:"「完治」「治癒」の判断に基づく → 「完治」「治癒」である必要はない", explanation:"所定労働時間の勤務に耐えうるかどうかは職場復帰可能の判断の目安のひとつだが、「完治」「治癒」である必要はない。", source:"eラーニング"},
  {id:831, chapter:12, text:"精神の異常性の判断基準について、産業カウンセラーは、どういう状況にあれば精神医学的な援助が必要かを判断することが要求される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:832, chapter:12, text:"精神の異常性を判断する重要なポイントのひとつに、状況に即した感情が表出できているかどうかがある。悲しいことがあったのに悲しい感情が湧かないのも問題になる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:833, chapter:12, text:"近年、症状だけで診断と分類をする操作的診断が主流となっているので、産業カウンセラーも心理的な原因・要因の把握は必要ない。", answer:false, correction:"心理的な原因・要因の把握は必要ない → 産業カウンセラーにとっては不可欠である", explanation:"近年、操作的診断が主流となっているが、産業カウンセラーにとっては心理的な原因・要因の把握は不可欠である。", source:"eラーニング"},
  {id:834, chapter:12, text:"精神医学的治療の中心は精神科薬物療法であるが、症状が落ち着いてきた時点でさまざまな精神科リハビリテーションも必要となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:835, chapter:12, text:"精神の異常性については、文化、民族性、歴史、生活習慣、宗教などにかかわらず、人類普遍ともいえる判断基準がある。", answer:false, correction:"人類普遍の判断基準がある → 文化・民族性・歴史・生活習慣・宗教などにより判断基準が微妙に変わる", explanation:"精神の異常性については、文化、民族性、歴史、生活習慣、宗教などにより、判断基準が微妙に変わる。", source:"eラーニング"},
  {id:836, chapter:12, text:"選択的セロトニン再取込み阻害薬（SSRI）などがうつ病の治療に多大な効果をもたらしたことから、セロトニンがうつ病にもっとも関係する生体アミン系神経伝達物質と考えられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:837, chapter:12, text:"うつ病の好発年齢として20～25歳の若年期と50～55歳の初老期・更年期に多いと言われ、働き盛りの30歳代での発症は少ない。", answer:false, correction:"30歳代での発症は少ない → 30歳代のうつ病者が急増しており、どの年代でも注意が必要", explanation:"30歳代のうつ病者が急増しているので、職場ではどの年代でも注意が必要である。", source:"eラーニング"},
  {id:838, chapter:12, text:"抑うつ状態への気づきとは、言葉ではうまく表現できなくても「何かが変わった」と感じる感性である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:839, chapter:12, text:"積極的なカウンセリングや心理面接は、かえって患者の負担になる場合があるので注意を要する。", answer:false, correction:"積極的なカウンセリングは患者の負担になるので注意 → カウンセリングは心理的負担を軽減するので積極的に行うことが大事", explanation:"治療の中心は十分な休養と薬物療法である。さらに、カウンセリングは患者の心理的負担を軽減するので積極的に行うことが大事である。", source:"eラーニング"},
  {id:840, chapter:12, text:"うつ病や双極性障害は回復しても、新たなストレスを契機に再発・再燃をくり返す傾向があるので、産業保健スタッフは連携を密にしながらフォローする必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:841, chapter:12, text:"統合失調症は、一般人口の0.1～0.3％に出現するといわれ、多様で特異な病像を示し、しばしば慢性の経過をたどり、適切な対応がなされないと人格変化を残すことがある。", answer:false, correction:"0.1～0.3％ → 0.7～0.9％（100人に1人弱）", explanation:"統合失調症は一般人口の0.7～0.9％に出現する。100人に1人弱がかかるので、身近な病気といえる。", source:"eラーニング"},
  {id:842, chapter:12, text:"思春期に出現する初期症状は、学校の成績が下がる、外に出たがらない、周囲の目を気にするなど、思春期によく出現する現象と類似しているため、その鑑別は慎重を要する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:843, chapter:12, text:"急性期においては薬物療法が中心ではあるものの、入院治療の必要性は依然高い傾向がある。", answer:false, correction:"入院治療の必要性は依然高い → 非定型抗精神病薬の発達で入院治療の必要性が低下している", explanation:"最近では非定型抗精神病薬の発達がめざましく、入院治療の必要性が低下している。", source:"eラーニング"},
  {id:844, chapter:12, text:"学生時代に発症した場合、治療が進んでいるため、社会人になってから職場において問題となることはほぼない。", answer:false, correction:"学生時代発症なら職場で問題となることはほぼない → 見逃され、入社後の新人研修期間中に顕在化することがある", explanation:"学生時代に発症していたものの、集団性や社会性が求められる場面が少ないことから見逃され、入社後の新人研修期間中に顕在化することがある。", source:"eラーニング"},
  {id:845, chapter:12, text:"カウンセラーの立場では、病識欠如時の対応、治療継続や規則正しい服薬のチェック、副作用に注意を払うこと、職場復帰後のフォローアップなどが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:846, chapter:12, text:"社交不安障害は、社会的な場面で不安や恐怖を過大に感じることにより社会生活への支障が生じてしまう疾患であり、日本人に比較的多いとされる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:847, chapter:12, text:"心的外傷後ストレス障害は、極端な外傷的な出来事（トラウマ）体験後4週間以内に起こり、最大4週間持続する不安や解離など主観的な感覚を特徴とする。", answer:false, correction:"設問は「急性ストレス障害」の説明 → 急性ストレス障害が4週間以上持続する場合、心的外傷後ストレス障害に移行する", explanation:"設問文は「急性ストレス障害」の説明である。急性ストレス障害が4週間以上持続する場合、心的外傷後ストレス障害へ診断が移行される。", source:"eラーニング"},
  {id:848, chapter:12, text:"心身症は、多彩な身体症状を訴え、自分が重篤な病気にかかっているという恐怖やとらわれをもつが、既知の医学的要因は見出されない。", answer:false, correction:"設問は「心気障害（心気症）」の説明 → 心身症は精神的ストレスを基盤に発症する身体疾患（胃潰瘍・過敏性腸症候群等）", explanation:"心身症は精神的ストレスを基盤として発症する身体疾患で、胃潰瘍、過敏性腸症候群、気管支喘息などがあげられる。設問文は「心気障害（心気症）」の説明である。", source:"eラーニング"},
  {id:849, chapter:12, text:"アルコール依存症の診断基準は、飲酒のコントロール喪失と離脱症状があげられる。節酒を促していくことが治療の原則となる。", answer:false, correction:"節酒を促すことが治療の原則 → 節酒ではなく断酒が原則", explanation:"アルコール依存症の治療は、脳にできてしまった依存の回路を回さないよう、節酒ではなく断酒が原則となる。", source:"eラーニング"},
  {id:850, chapter:12, text:"てんかんの発作は、抗てんかん薬の規則的服用によってかなりコントロールできるが、生活指導や職場環境の調整も必要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:851, chapter:12, text:"発達障害とは主に先天性の脳機能障害があり、それによって思春期から生じる発達の遅れである。", answer:false, correction:"思春期から生じる → 発達の遅れは乳幼児期から生じる（DSM-5でも症状は発達早期に存在）", explanation:"発達の遅れは乳幼児期から生じる。DSM－5では、「症状が発達早期に存在している」ことが種々の発達障害の共通点のひとつとしている。", source:"eラーニング"},
  {id:852, chapter:12, text:"労働環境の変化などに伴い、発達障害を抱える人々にとっては不向きな対人スキルなどを要する業務を任される機会が増え、事例化するケースが増えたと考えられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:853, chapter:12, text:"自閉症スペクトラム障害をもつ人は、こだわりがあるので業務に支障を来たすことがあるが、職場でのコミュニケーションについては特に問題はない。", answer:false, correction:"職場でのコミュニケーションは特に問題はない → 社会的コミュニケーションおよび対人的相互反応における持続的な欠陥がある", explanation:"自閉症スペクトラム障害の特徴には、こだわりとともに、「複数の状況で社会的コミュニケーションおよび対人的相互反応における持続的な欠陥」があると定義されている。", source:"eラーニング"},
  {id:854, chapter:12, text:"注意欠如・多動性障害の特徴は、「不注意」と「多動性および衝動性」であるが、「多動性および衝動性」は成長の段階で目立たなくなることもある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:855, chapter:12, text:"発達障害者支援法に基づき、都道府県や指定都市に発達障害者支援センターが設置されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:856, chapter:12, text:"適応障害は、他の精神疾患の基準を満たしておらず、すでに存在している精神疾患の単なる悪化でもなく、通常ストレス要因がなくなると軽快する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:857, chapter:12, text:"IT関連職では心身の疲労が誘因となって、いわゆる「消耗性うつ病」、「疲弊うつ病」になりやすく、20代後半から30代にかけての働き盛りに多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:858, chapter:12, text:"精神保健福祉法において、精神科医療施設への入院制度として、措置入院、医療保護入院、応急入院、任意入院の4種類がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:859, chapter:12, text:"措置入院とは、自傷他害のおそれのある事例に対し、2名以上の指定医の診察結果の一致により成立する。いちばん強制力のあるもので、家族からの通報によるものが多い。", answer:false, correction:"家族からの通報によるものが多い → 警察官通報により措置入院となる事例が多い", explanation:"家族からの通報ではなく、警察官通報により措置入院となる事例が多い。", source:"eラーニング"},
  {id:860, chapter:12, text:"2013年の精神保健福祉法改正によって、精神障害者に適切な治療を受けさせるための保護者制度が規定された。", answer:false, correction:"2013年改正で保護者制度が規定された → 2013年改正で保護者制度は廃止された", explanation:"2013年の精神保健福祉法改正で保護者制度は廃止された。医療保護入院の同意を行う者がいない場合には、市町村長が同意の判断を行う。", source:"eラーニング"},
  // ----- eラーニング15章 産業組織の心理学 → 既存 第4章 -----
  {id:861, chapter:4, text:"産業組織とは、「目的追求のため、部門編成と分業、責任権限の付与または委譲により、もっとも効率的かつ効果的に協働できるよう統制した社会的システム」ということができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:862, chapter:4, text:"産業組織心理学とは、「組織的な産業活動で生じる『人間行動の効率性追求』と『人間性尊重』にかかわる問題を取扱う心理学の一領域」ということができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:863, chapter:4, text:"産業組織には、職務を果たすために必要な権限は負担すべき責任に応じて付与されるべきという「権限委譲の原則」がある。", answer:false, correction:"「権限委譲の原則」→「権限責任の対応原則」（権限委譲の原則は最高権限保有者が権限を各職務へ委譲すること）", explanation:"職務を果たすために必要な権限は責任に応じて付与されるべきというのは「権限責任の対応原則」である。「権限委譲の原則」は最高の権限保有者の権限を必要に応じて各職務へ委譲することである。", source:"eラーニング"},
  {id:864, chapter:4, text:"産業組織には、どの職務にも属さない例外事項の処理権限は上位者が保持するという「例外対処の原則」がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:865, chapter:4, text:"組織の形態には、マトリックス組織やプロジェクト組織などの「静態的組織」と、ライン組織や事業部制組織といった「動態的組織」がある。", answer:false, correction:"マトリックス・プロジェクト＝静態的／ライン・事業部制＝動態的 → 逆（ライン・事業部制が静態的、マトリックス・プロジェクトが動態的）", explanation:"ライン組織や事業部制組織などが「静態的組織」で、マトリックス組織やプロジェクト組織などは「動態的組織」である。", source:"eラーニング"},
  {id:866, chapter:4, text:"テイラーは、効率を追求して生産高を最大限に増やすように作業の仕方を科学的に定め、マニュアル化することを提案した。", answer:false, correction:"マニュアル化を提案 → マニュアル化ではなく、作業を科学的に定め労使が密接に協力する「温かい協力関係」が不可欠とした", explanation:"テイラーはマニュアル化ではなく、作業の仕方を科学的に定め、それが実行されるように労使が密接に協力しあう「温かい協力関係」が不可欠であるとした。", source:"eラーニング"},
  {id:867, chapter:4, text:"ウェーバーは、定められた規則などの合理的・合法的な権威による組織である近代「官僚制組織」が「技術的に考えうるもっとも能率的な組織形態」であるとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:868, chapter:4, text:"ホーソン工場で行われた照明度と生産高の関係の実験では、照明度を変えて明るくした実験群のほうの生産高が上がった。", answer:false, correction:"明るくした実験群のほうの生産高が上がった → 実験群・対象群ともに生産高が上がる結果となった", explanation:"照明度を変えた実験群、変えなかった対象群ともに生産高が上がる結果となった。", source:"eラーニング"},
  {id:869, chapter:4, text:"ホーソン研究で、労働条件を変更しても生産高が下がらなかった結果について、レスリスバーガーは実験対象者に選ばれた従業員たちの満足感や仲間意識、働く意欲などの理由を見出した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:870, chapter:4, text:"メイヨー、レスリスバーガーらは、組織で働く人間は社会的な存在であり、その行動は非公式集団の規範によって規制され、経済的条件以外に感情的側面によって動機づけられるとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:871, chapter:4, text:"ハーズバーグは、人の行動には「外発的動機づけ」と「内発的動機づけ」の2種類があるとした。", answer:false, correction:"ハーズバーグ → マーレイ", explanation:"人の行動には「外発的動機づけ」と「内発的動機づけ」の2種類があるとしたのは、マーレイである。", source:"eラーニング"},
  {id:872, chapter:4, text:"デシとフラストは、内発的動機づけによる行動に外からの報酬が与えられると内発的動機づけが低下する反面、外からの報酬が内発的動機づけを誘発することもあるとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:873, chapter:4, text:"アルダーファは、マズローの理論を3つの欲求にまとめたERG理論を提起したが、2つ以上の階層の欲求が同時に働くことがあるという点において大きな違いがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:874, chapter:4, text:"モチベーションによる行動の生起過程は、行動主義心理学の基礎理論であるハルの「動因低減説」や、スキナーの「オペラント条件づけ」などの学習理論からも説明される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:875, chapter:4, text:"仕事にかかわる欲求として「達成欲求」、「権力欲求」、「親和欲求」に注目したのは、ハックマンである。", answer:false, correction:"ハックマン → マクレランド", explanation:"「達成欲求」、「権力欲求」、「親和欲求」を仕事にかかわる欲求として注目したのはマクレランドである。", source:"eラーニング"},
  {id:876, chapter:4, text:"戦後のわが国企業に特有といわれた「終身雇用」と「年功賃金」の制度も、古くから行われてきた外発的動機づけ策のひとつである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:877, chapter:4, text:"「目標による管理」は、組織の側の要求と従業員個人の要求をマッチングさせ自己管理で遂行させる方策であり、わが国でも1990年代以降多くの企業が導入している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:878, chapter:4, text:"従業員の内発的動機づけについて組織のトップ層はその重要さを認識し、内発的動機づけの方策を管理技法として部分的に取り入れていくことが望まれる。", answer:false, correction:"部分的に取り入れる → 部分的に取り入れるのではなく、同時に組織体制自体を持続的に変えることが必須", explanation:"組織のトップ層が内発的動機づけの重要さを認識し、その方策を部分的に取り入れるのではなく、同時に組織体制自体を持続的に変えることが必須の条件になる。", source:"eラーニング"},
  {id:879, chapter:4, text:"労働者のウェルビーイングは、活力やポジティブ感情などの快楽主義的、人生の意義・目的に対する充実感などの幸福主義的、生活や仕事への満足度などの評価的の3つに整理することができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:880, chapter:4, text:"エンプロイーエンゲージメントを高めるには会社への忠誠を表す「コミットメント」、所属集団に対する「帰属意識」、組織への真摯な関与を表す「ロイヤルティ」などが重要な概念になる。", answer:false, correction:"会社への忠誠＝コミットメント／組織への真摯な関与＝ロイヤルティ → 会社への忠誠＝ロイヤルティ／組織への真摯な関与＝コミットメント", explanation:"会社への忠誠を表すのは「ロイヤルティ」、組織への真摯な関与を表すのは「コミットメント」である。", source:"eラーニング"},
  {id:881, chapter:4, text:"グループ・ダイナミックスは、個人が集団から受ける影響や、集団における人間の行動の特徴やメカニズムを明らかにしようと、レヴィンによって創始された研究である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:882, chapter:4, text:"グループ・ダイナミックスの研究方法のうち、実験室などで集団行動の仮説についての課題解決行動をとらせ、仮説の適否を検証するものを「アクション・リサーチ」という。", answer:false, correction:"「アクション・リサーチ」→「実験室研究」（アクション・リサーチは現場の実践研究）", explanation:"設問は「実験室研究」の説明。「アクション・リサーチ」は、現場が抱える問題解決策の仮説を立て、当事者が実践し検証して現場に役立つ方策を見出す「実践研究」である。", source:"eラーニング"},
  {id:883, chapter:4, text:"集団の凝集性は、メンバーがその集団にどの程度魅力を感じているか、例えば、集団の目的や活動への魅力が測定要素となるが、物的報酬への魅力は含まれない。", answer:false, correction:"物的報酬への魅力は含まれない → 物的報酬が他の集団より高いことも測定要素に含まれる", explanation:"集団の凝集性の測定要素に、「そこで得られる物的報酬が他の集団より高いこと」も含まれる。", source:"eラーニング"},
  {id:884, chapter:4, text:"ジンバルドの疑似刑務所実験やミルグラムのアイヒマン実験などの結果、人は集団の中で役割を与えられると個人的な思いとは別の行動を実行することがあると証明された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:885, chapter:4, text:"集団の中で意思決定を行う際、ひとりで意思決定を行うときよりも極端に保守的なものになりやすい傾向を、コーシャスシフトという。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:886, chapter:4, text:"近年注目されている「サーバント・リーダーシップ論」では、リーダーに求められる10の特性として傾聴、癒し、概念化などをあげている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:887, chapter:4, text:"三隅二不二のPM理論は、集団の「課題遂行」の機能と「集団維持」の機能のどちらかでなく、両方の機能をバランスよく果たすことが有効なリーダーシップを発揮できるとしている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:888, chapter:4, text:"フィードラーやハーシーらは、リーダーのパーソナリティだけでなくリーダーの状況やフォロワーの成熟度によってリーダーシップの有効性が異なるとした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:889, chapter:4, text:"フォロワーのあり方が集団の成果に対する貢献度に影響があるとしたケリーは、フォロワーのタイプを「模範型」、「順応型」、「孤立型」、「消極型」、「実務型」の5つに分けた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:890, chapter:4, text:"「報酬性」、「強制性」、「正当性」、「専門性」、「準拠性」の5つの特性すべてが備わっていると周囲から認識されると、その人はリーダーとして認められる。", answer:false, correction:"5つすべてが備わって認められる → フレンチらは、5つのうちどれか、またはいくつかが備わっていればリーダーとして認識されるとした", explanation:"フレンチらは、5つすべての特性ではなく、このうちのどれか、またはいくつかが備わっているとリーダーとして認識されるとした。", source:"eラーニング"},
  {id:891, chapter:4, text:"協力者に直接面接して話を聞き、質的な分析をすることをアンケート調査という。", answer:false, correction:"アンケート調査 → 質的調査", explanation:"協力者に直接面接して話を聞き、質的な分析をするのは「質的調査」である。", source:"eラーニング"},
  {id:892, chapter:4, text:"より正確に調査を実施するためには、ときには調査の目的や方法を伏せることも仕方がない。", answer:false, correction:"目的や方法を伏せることも仕方がない → 責任の所在を明確にし、個人の回答の秘密保持を調査協力者に明示しなければならない", explanation:"調査の内容や結果について、だれが責任を負うのかを明確にし、調査時に個人の回答の秘密保持などを調査協力者に明示しなければならない。", source:"eラーニング"},
  {id:893, chapter:4, text:"既存データ調査とは、すでに実施して公開されている調査結果を検索し、改めて分析したり自分なりに考察したりする方法である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:894, chapter:4, text:"一般的にアンケート用紙は、「案内部」、「本体部」、「個人情報部」で構成される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:895, chapter:4, text:"面接調査の場合、ある程度の仮説をもとに質問を構成し、仮説が崩されることも想定して対応する質問も用意しておくことが望ましい。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},

  // ===== eラーニング（養成講座）追加分 第3弾 (896-920) source:"eラーニング" =====
  // ----- eラーニング16章 コミュニケーションの基本 → 既存 第13章 -----
  {id:896, chapter:13, text:"対面的コミュニケーションにおいて、コミュニケーション能力とは、話し方全般のルールに関する知識の度合いである。", answer:false, correction:"話し方全般のルールに関する知識の度合い → コミュニケーションを支える知識とスキルからなる", explanation:"コミュニケーション能力は、コミュニケーションを支える知識とスキルからなる。", source:"eラーニング"},
  {id:897, chapter:13, text:"権威主義の受け手が低地位の送り手の言うことを馬鹿にし、軽視するのは意味的ノイズである。", answer:false, correction:"意味的ノイズ → 心理的ノイズ", explanation:"権威主義の受け手が低地位の送り手の言うことを馬鹿にし、軽視するのは、心理的ノイズである。", source:"eラーニング"},
  {id:898, chapter:13, text:"ノイズは主に受け手がメッセージを解釈する段階で発生する。", answer:false, correction:"主に受け手が解釈する段階で発生 → コミュニケーションのあらゆる段階で発生する", explanation:"ノイズはコミュニケーションのあらゆる段階で発生する。", source:"eラーニング"},
  {id:899, chapter:13, text:"非言語的コミュニケーションはコントロールが難しく、無意識に表出してしまうため、相手の内的状態を知る手がかりとして活用できる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:900, chapter:13, text:"言語的コミュニケーションと非言語的コミュニケーションの意味が異なる場合を葛藤という。", answer:false, correction:"葛藤 → 「二重束縛的コミュニケーション」", explanation:"言語的コミュニケーションと非言語的コミュニケーションの意味が異なる場合を「二重束縛的コミュニケーション」という。", source:"eラーニング"},
  {id:901, chapter:13, text:"自己呈示とは、自分の本当の姿を隠して高評価を得ようとする不誠実な行為である。", answer:false, correction:"不誠実な行為 → 他者とうまくつきあっていくためのソーシャル・スキル", explanation:"自己呈示は、他者とうまくつきあっていくためのソーシャル・スキルである。", source:"eラーニング"},
  {id:902, chapter:13, text:"自己開示することによって相手からの信頼は高くなるので、どのような相手に対しても積極的に自己開示することが望ましい。", answer:false, correction:"どのような相手にも積極的に自己開示することが望ましい → 不適切な自己開示は好ましくない結果をもたらす場合がある", explanation:"不適切な自己開示は開示者自身あるいは二者関係に好ましくない結果をもたらす場合がある。", source:"eラーニング"},
  {id:903, chapter:13, text:"自己呈示には、否定的印象を回避しようとする防衛的自己呈示と、相手からの報酬や特定の印象を与えようとする主張的自己呈示とがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:904, chapter:13, text:"自己開示の個人的機能には、感情浄化機能、自己明確化機能、社会的妥当化機能がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:905, chapter:13, text:"自分と否定的な結果との関係性を弱めて、責任を回避する自己呈示を、正当化という。", answer:false, correction:"正当化 → 弁解", explanation:"自分と否定的な結果との関係性を弱めて責任を回避する自己呈示は「弁解」である。", source:"eラーニング"},
  {id:906, chapter:13, text:"ジョハリの窓におけるクライエントの開放領域の拡大を支援することが、産業カウンセラーの重要な役割のひとつである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:907, chapter:13, text:"自分も他者も知らない未知領域の発見は、自己他者同時発見と自己発見の2通りがある。", answer:false, correction:"2通り（自己他者同時発見・自己発見）→ 3通り（自己他者同時発見・自己発見・他者発見）", explanation:"未知領域の発見には、「自己他者同時発見」、「自己発見」、「他者発見」の3通りがある。", source:"eラーニング"},
  {id:908, chapter:13, text:"クライエントが開放領域が大きく表面的なパーソナリティをもつ場合は、カウンセリングが効率的に展開できないことを承知しておく必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:909, chapter:13, text:"人間関係の発展段階におけるコミュニケーションの特徴で「統合の段階」は、「結束の段階」の次のステップである。", answer:false, correction:"「結束の段階」の次のステップ → 前のステップ", explanation:"人間関係の発展段階におけるコミュニケーションの特徴で「統合の段階」は、「結束の段階」の前のステップである。", source:"eラーニング"},
  {id:910, chapter:13, text:"人間関係の段階に関する情報を聴くこともクライエントの支援に効果的である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:911, chapter:13, text:"説得は、「主に言語的コミュニケーションによって、納得させながら他者の態度や行動を特定の方向へと変化させる行為」である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:912, chapter:13, text:"説得する相手の特徴を分析し、その特徴に適したメッセージを工夫して使用すれば、送り手の説得力は高まる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:913, chapter:13, text:"送り手が使用するうそには、隠蔽、偽装、その中間型がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:914, chapter:13, text:"互いにわかり合えるとの前提のもとに行われるコミュニケーションを、低コンテクスト・コミュニケーションという。", answer:false, correction:"低コンテクスト・コミュニケーション → 高コンテクスト・コミュニケーション", explanation:"同質性の高い文化に依存し、互いにわかり合えるとの前提のもとに行われるコミュニケーションは、高コンテクスト・コミュニケーションである。", source:"eラーニング"},
  {id:915, chapter:13, text:"価値観や役割意識の違いが、世代間のコミュニケーションの大きな壁になっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:916, chapter:13, text:"主にインターネットを介して行われるオンラインコミュニケーションは、新型コロナウィルスの感染予防策が求められるようになって以降、不可欠なコミュニケーションの形態となった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:917, chapter:13, text:"非対面のコミュニケーションは伝達情報の種類から「テキストコミュニケーション」「ボイスコミュニケーション」「ビデオコミュニケーション」の3つに分類される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:918, chapter:13, text:"CMC（Computer Mediated Communication）の普及は「時間の解放」や「社会的制約からの解放」「自己開示の解放」など制約の解放をもたらした。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:919, chapter:13, text:"対面的コミュニケーションと違ってCMCは互いの空間の中でコミュニケーションが行われることによってタイムラグが起きるなどの「フレームの二重化」、「視線の不一致」などの問題点もある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:920, chapter:13, text:"時間や空間的な制約から解放されたテレワークでは、雑談や面倒な報告が減り、業務の効率化だけでなくメンタル不調の予防も予測されている。", answer:false, correction:"雑談が減りメンタル不調の予防も予測 → インフォーマルコミュニケーション（あいさつ・何気ない会話）は実際には大きな役割を担っている", explanation:"対面でのちょっとしたあいさつや何気ない会話などのインフォーマルコミュニケーションの果たす役割は、実際には大きな役割を担っていると指摘されている。", source:"eラーニング"},

  // ===== eラーニング（養成講座）追加分 第4弾 (921-970) source:"eラーニング" =====
  // ----- eラーニング17章 コミュニティ心理学の基本 → 既存 第8章 -----
  {id:921, chapter:8, text:"ボストン会議では、「コミュニティ心理学は、個人が生活し参加している社会システムに焦点を当て、治療よりも予防を強調する全く新しいメンタルヘルスへのアプローチを目指す」という合意を得た。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:922, chapter:8, text:"コミュニティ心理学誕生の背景には、地域精神医療に関する立法などとともに、人種差別撤廃をめざす公民権運動により「公民権法」が成立し、精神障害者に対する態度・処遇などにも影響を与え始めたことがあげられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:923, chapter:8, text:"コミュニティ心理学を「異なる身体的・心理的・社会的・文化的条件をもつ人々が、だれも切り捨てられることなく、共に生きることを模索するなかで、人と環境の適合性を最大にするための基礎知識と方略に関しての研究」と定義したのは、ベネットらである。", answer:false, correction:"ベネットら → 山本和郎", explanation:"設問は山本和郎の定義である。", source:"eラーニング"},
  {id:924, chapter:8, text:"コミュニティ心理学は、精神障害者を「地域社会の生活者」として支援する学問としてスタートし、個人、多様なコミュニティや社会全体などの関係に焦点をあて、QOLの向上を目的とする実践的学問へと進化してきた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:925, chapter:8, text:"コミュニティ心理学の発展において、一般システム論の考え方はコミュニティ心理学に影響を与えることはなかった。", answer:false, correction:"影響を与えることはなかった → 一般システム論の考え方が社会科学にも導入され、コミュニティ心理学も影響を受けた", explanation:"自然科学における一般システム論の考え方が社会科学にも導入され、コミュニティ心理学も影響を受けた。", source:"eラーニング"},
  {id:926, chapter:8, text:"コミュニティ心理学では、コミュニティは個人と環境からなるシステムであると考え、個人と集団、個人と組織、個人と地域社会などが本質的に対立的関係にあると考える。", answer:false, correction:"本質的に対立的関係 → 本質的に対立的ではなく、包含的で可変的な関係", explanation:"個人と集団、個人と組織、個人と地域社会なども本質的に対立的関係にあるわけではなく、包含的で可変的な関係であると考える。", source:"eラーニング"},
  {id:927, chapter:8, text:"コミュニティ心理学では、人間を生物心理社会的存在として、個人それ自身がシステムであると考える。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:928, chapter:8, text:"コミュニティ心理学では、「問題」を「個人と環境の相互作用の結果として不適合を起こしている状態」であるととらえる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:929, chapter:8, text:"ブロンフェンブレンナーは、コミュニティが4つの入れ籠状のシステムから成り立っており、それぞれが影響し合うが、独立したものであるとした。", answer:false, correction:"4つのシステムは独立している → 独立したものではなく、マイクロ・メゾ・エクソはマクロシステムの中で機能している", explanation:"4つのシステムは独立したものではなく、それぞれが影響し合うと同時に、マイクロ、メゾ、エクソのシステムはマクロシステムの中で機能している。", source:"eラーニング"},
  {id:930, chapter:8, text:"コミュニティ心理学では、解決を要する「コミュニティの心理社会的諸課題」を幅広く扱い、コミュニティの変化とともに扱う範囲や対象は変化する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:931, chapter:8, text:"コミュニティ心理学では、個人の改善と環境の改善のどちらが大切かという考え方ではなく、個人と環境の適合性を高めることによりウェルビーイングを得ることが大切と考える。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:932, chapter:8, text:"コミュニティ心理学では、支援、サービス提供の場を相談室・密室状況から転換して生活の場へと拡大し、症状や弱点を抱えた生活者としての人間を支援することを重視する。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:933, chapter:8, text:"コミュニティ心理学は、「治療を止めてもっぱら予防にエネルギーを注ぐべきである」と考える。", answer:false, correction:"治療を止めてもっぱら予防に注ぐ → 必要な治療的介入は行うが予防的介入にもっとエネルギーを注ぐ「治療も予防も」大切にする", explanation:"必要な治療的介入は当然行うが、予防的介入にもっとエネルギーを注ぐべきと考え、「治療も予防も」大切にする。", source:"eラーニング"},
  {id:934, chapter:8, text:"キャプランの1次予防、2次予防、3次予防の考え方は画期的であったが、その後アメリカでは「予防」と「治療」との区別を明確にするため予防と言えるのはやはり1次予防だけであるとの考え方も提示された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:935, chapter:8, text:"コミュニティ心理学では、「治療モデル」だけでなく、「発達・成長モデル」に基づく支援を行う。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:936, chapter:8, text:"多様な存在と多様で複雑な問題に対しては、それにふさわしい最も効果的な特定のサービスを専門家が提供することが大切である。", answer:false, correction:"最も効果的な特定のサービスを専門家が提供 → 多様な支援サービスを提供し、当事者が自分にふさわしい方法を選び自己決定できるよう支援する", explanation:"多様な支援サービスが提供され、相談当事者が自分にふさわしい方法を選べるようになることが大切である。専門家は、当事者が納得して自己決定することを支援する。", source:"eラーニング"},
  {id:937, chapter:8, text:"当事者が自らの行動でエンパワーすることを、専門家としてアドボカシー（代弁と権利擁護）などにより支援することは重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:938, chapter:8, text:"コミュニティ心理学的支援では、多職種の専門家との連携、非専門家との協力を重視し、この混合チームが有効に機能できるようにコーディネーションすることが必要となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:939, chapter:8, text:"コミュニティ感覚とは、コミュニティへの所属を肯定的に感じていて、メンバー同士の相互監視的関係をもち、コミュニティに対する厳しい責任感を抱いている感覚である。", answer:false, correction:"相互監視的関係・厳しい責任感 → 自然に依存的・援助的関係をもち、要請に応えてもらえると信じられる感覚", explanation:"コミュニティ感覚とは、所属を肯定的に感じ、メンバーとは自然に依存的・援助的関係をもつことができ、要請に応えてもらえると信じられる感覚である。", source:"eラーニング"},
  {id:940, chapter:8, text:"コミュニティ心理学の代表的な研究方法として、研究者と実務家および課題を抱えている当事者などが連携して協同作業を行う「4ステップ・モデル」がある。", answer:false, correction:"「4ステップ・モデル」→ 設問は「アクション・リサーチ」の説明", explanation:"設問は「アクション・リサーチ」の説明である。", source:"eラーニング"},
  {id:941, chapter:8, text:"コミュニティ心理学における介入は、個人にも環境にもまた両者の関係にも、すべてに対して同時に介入すべきと考えられている。", answer:false, correction:"すべてに対して同時に介入すべき → 同時ではなく、アセスメント結果に応じて優先順位・組み合わせを考慮する", explanation:"個人、環境、両者の関係のいずれにも介入するが、「同時にすべて」ではなく、アセスメントの結果に応じて介入の優先順位、組み合わせ等を考慮する。", source:"eラーニング"},
  {id:942, chapter:8, text:"個人へのBPSモデルに基づく介入は、クライエントとの信頼関係を築くことのできた専門家が単独で行うことが望ましい。", answer:false, correction:"専門家が単独で行うことが望ましい → 1人で担うのは困難で、複数の専門家や非専門家が役割を分担して協働する", explanation:"BPSモデルに基づく介入を1人の専門家が担うことは困難なので、複数の専門家や非専門家が役割を分担して協働することが期待される。", source:"eラーニング"},
  {id:943, chapter:8, text:"マレルが提唱した6レベルの介入では、レベル1「個人の再配置」からレベル6「ネットワーク介入」まで、レベルが上がるにつれて規模の大きな介入となっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:944, chapter:8, text:"介入の対象と介入の仕方を4つの側面に分類して把握する場合、クライエントへの直接的介入としてコンサルテーション、自助グループ支援、アドボカシー活動などが挙げられる。", answer:false, correction:"直接的介入＝コンサルテーション・自助グループ支援・アドボカシー → 直接的介入はカウンセリング・アウトリーチ・危機介入など", explanation:"クライエントへの直接的介入は、カウンセリング、アウトリーチ、危機介入などである。", source:"eラーニング"},
  {id:945, chapter:8, text:"いずれの介入を行う際にも、適切なアセスメントに基づいて介入のプランを立てること、介入を実施した後の結果の客観的評価をきちんと行って次の介入の立案に活かすことが重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:946, chapter:8, text:"コミュニティ心理学的介入においても、時間をかけて深い洞察と人格変化をめざすカウンセリングが行われるので、コミュニティ心理学と精神力動的セラピーとは親和性がある。", answer:false, correction:"精神力動的セラピーと親和性 → 深い洞察・人格変化をめざすカウンセリングは行わず、親和性があるのは認知行動的アプローチやシステムズアプローチ", explanation:"コミュニティ心理学的介入では時間をかけて深い洞察と人格変化をめざすカウンセリングは行わず、親和性があるのは認知行動的アプローチやシステムズアプローチである。", source:"eラーニング"},
  {id:947, chapter:8, text:"コンサルテーションにより、能力アップ、スキルアップした専門家が増え、コミュニティ全体の理解力・支援力を高めることが可能となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:948, chapter:8, text:"コミュニティ心理学における危機介入は、ラザルスの危機理論に基づく、危機状態にある人に対する集中的で多面的な心理的支援の方法である。", answer:false, correction:"ラザルスの危機理論 → 危機理論を提唱したのはキャプラン（ラザルスは心理学的ストレス理論）", explanation:"危機理論を提唱したのはキャプランで、ラザルスが提唱したのは心理学的ストレス理論である。", source:"eラーニング"},
  {id:949, chapter:8, text:"複数のソーシャルサポートをつないで、相乗効果が発揮されるように効果的なネットワークをつくり上げていくことは、重要な専門的支援となる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:950, chapter:8, text:"心理教育とは、コミュニケーション能力やストレスマネジメント力など、おもに心理的な諸能力を計画的・体系的に学ぶことを言う。", answer:false, correction:"心理的諸能力を体系的に学ぶ（のみ）→ 心理教育には2つの流れがあり、これはその1つ。もう1つは疾患・問題に関する知識と対処を学ぶもの", explanation:"心理教育には2つの流れがあり、1つは特定の疾患や障害・直面する問題に関する知識と対処を学ぶもの、もう1つは設問のとおり心理的な諸能力を計画的・体系的に学ぶものである。", source:"eラーニング"},
  // ----- eラーニング18章 産業社会の動向と働く意識の変化 → 既存 第4章 -----
  {id:951, chapter:4, text:"1990年代初頭のいわゆる「バブル崩壊」以降も経済に変動があり、それにより雇用失業情勢が変化している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:952, chapter:4, text:"完全失業率は、労働力人口に占める完全失業者の割合を示しており、リーマンショックのあった2008年を境に上昇し、その後、低下傾向にある。", answer:false, correction:"その後低下傾向にある → その後低下傾向だったが、コロナ禍により2020年・2021年は上昇している", explanation:"完全失業率はリーマンショックのあった2008年を境に上昇し2009年に高くなり、その後は低下傾向であったが、コロナ禍により2020年、2021年は上昇している。", source:"eラーニング"},
  {id:953, chapter:4, text:"完全失業者とは、就業者でない者、就業可能な者、調査期間中に仕事を探す活動や事業を始める準備をしていた者をいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:954, chapter:4, text:"労働力調査の職業大分類でみると、「保安職業、サービス職業従事者」、「販売従事者」が増加している反面、「専門的・技術的職業従事者」、「生産工程従事者（製造・制作・機会運転及び建設作業者）」が減少している。", answer:false, correction:"「販売」増加・「専門的技術的」減少 → 増加は「専門的・技術的」「保安・サービス」、減少は「販売」「生産工程」", explanation:"増加しているのは「専門的・技術的職業従事者」「保安職業、サービス職業従事者」であり、「販売従事者」「生産工程従事者」が減少している（図18-4）。", source:"eラーニング"},
  {id:955, chapter:4, text:"主要国の労働組合組織率をみると、ほとんどの国で低下している。非正規雇用の増加、組織率の高い製造業から組織率の低いサービス業への産業構造の変化などが理由である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:956, chapter:4, text:"国勢調査によると、生産年齢人口の総人口に占める割合はピークを過ぎ、減少している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:957, chapter:4, text:"15歳未満の人口は減少傾向にあるが、65歳以上の人口の割合より下回ったのは、国勢調査によれば平成22（2010）年からである。", answer:false, correction:"平成22（2010）年から下回った → 平成12（2000）年から下回っている（平成7年ではわずかに15歳未満が上回っていた）", explanation:"国勢調査によれば、平成7（1995）年ではわずかに15歳未満の人口が上回っており、平成12（2000）年から65歳以上の人口の割合より下回っている（図18-9）。", source:"eラーニング"},
  {id:958, chapter:4, text:"高齢者の増加により、医療、介護に関係する産業が活性化して、経済活動を上昇させている。", answer:false, correction:"医療・介護産業が活性化し経済活動を上昇 → 生産年齢人口の減少は経済活動を低下させ、高齢者増加は医療・介護の社会的負担を増加させる", explanation:"生産年齢人口の減少は経済活動を低下させ、高齢者の増加により、医療、介護の社会的な負担を増加させている。", source:"eラーニング"},
  {id:959, chapter:4, text:"非正規労働者の賃金は正規労働者の6割程度である。", answer:false, correction:"6割程度 → 8割程度", explanation:"厚生労働省の「賃金構造基本統計調査」によると、非正規労働者は賃金が少なく、正規労働者の8割程度となっている。", source:"eラーニング"},
  {id:960, chapter:4, text:"2000年代以降、非正規労働者は増加傾向にあり、役員を除く雇用者全体の3割から4割近くを占めるまでになっている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:961, chapter:4, text:"労働力確保の方策のひとつとして高齢者の雇用促進があり、一律に定年制を廃止することが企業に義務づけられている。", answer:false, correction:"一律に定年制を廃止することが義務 → 定年制廃止・定年年齢引き上げ・継続雇用制度導入の3つのうちいずれかの実施が義務", explanation:"定年制廃止、定年年齢の引き上げ、継続雇用制度導入の3つの65歳までの雇用確保措置のうち、いずれかの実施が企業に義務づけられている。", source:"eラーニング"},
  {id:962, chapter:4, text:"高年齢者雇用安定法の改正により、2021年から75歳までの就業確保が事業主の努力義務となった。", answer:false, correction:"75歳まで → 70歳まで", explanation:"2021年から70歳までの就業確保が事業主の努力義務となった。", source:"eラーニング"},
  {id:963, chapter:4, text:"女性の労働力人口が結婚・出産の年代に一時低下する「M字カーブ」は改善され、男性と同程度の割合となっている。", answer:false, correction:"男性と同程度の割合となっている → 改善されつつあるが、女性の労働参加が男性より低い状況は続いている", explanation:"「M字カーブ」の結婚・出産の年代の低下は近年改善されつつあるが、女性の労働参加が男性より低い状況は続いている。", source:"eラーニング"},
  {id:964, chapter:4, text:"法改定により、2019年から新たな在留資格を設け、単純労働での外国人の就労が認められることとなった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:965, chapter:4, text:"労働力不足を補うものとしてロボットの研究開発が進められ、施設警備や入所者を見守るロボット、体に装着し作業の負担を軽減するロボットなどが注目されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:966, chapter:4, text:"ESGとはEnvironment（環境）、Social（社会）、Governance（企業統治）の頭文字であり、企業が長期的に成長するために、企業活動において環境問題や人権など社会課題に対する認識、法令遵守の体制整備などが重要であるという考え方である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:967, chapter:4, text:"統計数理研究所の「日本人の国民性調査」結果によれば、「2つの会社のうちどちらにつとめたいか」との問いに対し、「家族的な雰囲気のある会社」は増加、「給料が多い会社」は減少して、2018年には逆転している。", answer:false, correction:"「家族的」増加・「給料が多い」減少 → 「家族的な雰囲気のある会社」減少・「給料が多い会社」増加（2018年に逆転）", explanation:"1970年代に非常に多かった「家族的な雰囲気のある会社」は減少、「給料が多い会社」は増加して、2018年に逆転している。", source:"eラーニング"},
  {id:968, chapter:4, text:"仕事と家庭や地域での生活との調和を図ることで、女性の労働参加が高まり、また、少子化の歯止めとなることが期待されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:969, chapter:4, text:"ワークライフバランスの課題としては、まず男性の意識と働き方を変え、男性が家事、育児、地域社会に参加できるようにすることがある。", answer:false, correction:"まず男性の意識と働き方を変える → まず、出産後も働き続けたいという女性の意欲を高めることが重要", explanation:"ワークライフバランスの課題として、まず、出産後も働き続けたいという女性の意欲を高めることが重要である。", source:"eラーニング"},
  {id:970, chapter:4, text:"「仕事と生活の調和推進のための行動指針」では、週労働時間60時間以上の雇用者の割合の半減など、具体的数値目標を示している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング19章 人事労務管理の基礎知識と人材マネジメントの現状 → 既存 第4章 -----
  {id:971, chapter:4, text:"経営理念は企業理念とも呼ばれるが、経営にあたっての企業の理想や信念であり、その企業の行動指針となる経営についての基本的な考え方である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:972, chapter:4, text:"経営戦略は、「長期目標を達成するために作成される、経営環境との間の交互作用のための、企業や組織の行動計画」と定義することができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:973, chapter:4, text:"企業組織形態のうち、製造、営業、研究開発等に分かれているものを事業部組織といい、製品別、顧客別、地域別等々に分かれているものを機能別組織という。", answer:false, correction:"製造・営業・研究開発等＝事業部組織／製品別・顧客別・地域別等＝機能別組織 → 前者が「機能別組織」、後者が「事業部組織」", explanation:"製造、営業、研究開発等に分かれているものは「機能別組織」であり、製品別、顧客別、地域別等々に分かれているものは「事業部組織」である。", source:"eラーニング"},
