  {id:974, chapter:4, text:"従業員の能力、業績、勤務態度などの評価を人事評価といい、評価結果は賃金や報酬、昇進や昇格に反映されるが、評価結果が本人に伝えられることはない。", answer:false, correction:"評価結果が本人に伝えられることはない → 本人にフィードバックされ、意欲向上・能力開発を促す機能がある", explanation:"人事評価の結果が本人にフィードバックされることにより、意欲を高め、能力開発を促す。また評価が公平で適切か納得を得たり、会社側には評価の制度と運営に問題がないかチェックする機能がある。", source:"eラーニング"},
  {id:975, chapter:4, text:"評価者研修は、評価者間での差や評価の偏りや誤りが生じることなく、適切で公平な評価が行われるために実施される。また、被評価者本人へフィードバックする方法を学ぶことを考課者訓練と言う。", answer:false, correction:"「評価者研修」と「考課者訓練」を明確に使い分ける → 両者に明確な使い分けはない", explanation:"「評価者研修」と「考課者訓練」に明確な使い分けはなく、適切で公平な評価が行われるために実施される。また、被評価者本人へフィードバックする方法の研修を含めて行われる場合もある。", source:"eラーニング"},
  {id:976, chapter:4, text:"賃金には、毎月支払われる月例給与と賞与があり、月例給与には、基本給と各種手当の所定内給与と、時間外勤務、休日勤務等に対して支払われる所定外給与がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:977, chapter:4, text:"基本給は、一般的に「職務給」であり、従業員の職務遂行能力を基準として決められるが、職務遂行能力の高さは、客観的な判断は難しいとされている。", answer:false, correction:"基本給は「職務給」（＝担当する職務を基準） → 一般的には職務遂行能力を基準とする「職能給」", explanation:"基本給は一般的には、従業員が担当する職務を基準とする「職務給」ではなく、職務遂行能力を基準とする「職能給」であるが、職務遂行能力の客観的な判断は難しいとされる。", source:"eラーニング"},
  {id:978, chapter:4, text:"職能資格制度とは、従業員の職務遂行能力によってランク分けし、それに応じて処遇を決める制度だが、日本では年功的な運営がされる場合も多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:979, chapter:4, text:"人事異動とは組織内で従業員の配置を変えることであり、職務や役職、部署・勤務地の変更を伴うかどうかによってさまざまなものがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:980, chapter:4, text:"人事異動やジョブローテーションにより頻繁に職務が変わることで、適材適所に人員を配置したり、本人もさまざまな職務がこなせるようになったり、人脈が広がるといったプラスの面がある。", answer:false, correction:"プラス面のみを述べる → 頻繁に職務が変わると1つの職務での高度な専門性を伸ばせないという面もある", explanation:"人事異動やジョブローテーションのプラス面は設問のとおりだが、頻繁に職務が変わるようでは１つの職務での高度な専門性を伸ばせない。", source:"eラーニング"},
  {id:981, chapter:4, text:"人材育成のうち、OJTとは一時的に通常の仕事を離れて集中的に行う訓練のことをいう。", answer:false, correction:"OJT＝一時的に仕事を離れて集中的に行う訓練 → OJTは日常の業務を行いながらそのなかで行う教育訓練", explanation:"OJT（On the Job Training）は日常の業務を行いながら、そのなかで教育訓練を行うものである。", source:"eラーニング"},
  {id:982, chapter:4, text:"人材育成は、研修や訓練だけでなく、人事異動やジョブローテーションを通じても実施される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:983, chapter:4, text:"コーポレートガバナンスは「企業統治」と訳され、経営陣や株主が、会社が法令を遵守し、効率的に運営されるようにコントロールし、モニタリングするしくみをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:984, chapter:4, text:"「内部統制」とはマネジメント（運営）の状況を管理・監督することであり、「監査」は法令をはじめ各種の規則に沿って企業が運営されているかを審査することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:985, chapter:4, text:"企業の社会的責任（CSR）は、コーポレートガバナンスの基本原理のひとつであり、企業が法律や内規など基本的なルールに従って活動することを示す。", answer:false, correction:"CSR＝法律や内規など基本的ルールに従って活動すること（＝コンプライアンスの説明） → CSRは利益追求だけでなく社会への影響に責任をもち適切に行動すること", explanation:"企業の社会的責任（CSR）は、利益追求だけでなく社会への影響に責任をもち、影響を及ぼす人々や自然環境などに対して、適切に行動することである。設問文は企業コンプライアンスの説明である。", source:"eラーニング"},
  {id:986, chapter:4, text:"日本の全労働者の年間総労働時間は減少傾向にあるが、これは労働時間短縮の施策が効果をあげ、長時間労働者が激減したことによるとみられている。", answer:false, correction:"労働時間短縮の施策で長時間労働者が激減した → 非正規雇用者の増加が影響しており、長時間労働者の割合はさほど減少していない", explanation:"日本の全労働者の年間総労働時間は減少傾向にあるが、これは非正規雇用者の増加が影響しており、長時間労働者の割合はさほど減少していない。", source:"eラーニング"},
  {id:987, chapter:4, text:"使用者は労働者の労働日ごとに始業時刻や終業時刻を確認・記録し、これを基に労働時間の実態を把握することで、1日の労働時間と労働日数を管理する必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:988, chapter:4, text:"柔軟な労働時間の制度として、「変形労働時間制」「フレックスタイム制」「みなし労働時間制」がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:989, chapter:4, text:"働き方改革関連法により、年10日以上の年次有給休暇が付与される労働者（管理監督者を含む）に対して、年次有給休暇の日数のうち年10日について、使用者が時季を指定して取得させることが義務づけられた。", answer:false, correction:"使用者の時季指定義務は年10日 → 年5日", explanation:"使用者に課せられる年休の付与義務日数は、10日ではなく、5日である。", source:"eラーニング"},
  {id:990, chapter:4, text:"使用者が労働者に提供する、賃金以外の現金給付やサービス等の提供を「福利厚生」と呼び、福利厚生には「法定福利厚生」と「法定外福利厚生」がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:991, chapter:4, text:"1995年、当時の日本経営者団体連盟（日経連）は、労働者を3つのグループに分けることによって、労働力の弾力化・流動化と総人件費の抑制をねらう『新時代の「日本的経営」』を公表した。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:992, chapter:4, text:"仕事に人を当てはめる「ジョブ型」雇用と、人を中心に管理し、人と仕事の結びつきが柔軟な「メンバーシップ型」雇用のうち、「ジョブ型」が日本の正規雇用労働者の特徴である。", answer:false, correction:"「ジョブ型」が日本の正規雇用労働者の特徴 → 「メンバーシップ型」が日本の正規雇用労働者の特徴", explanation:"「メンバーシップ型」が日本の正規雇用労働者の特徴とされている。", source:"eラーニング"},
  {id:993, chapter:4, text:"業績評価制度の問題点として「評価によって勤労意欲の低下を招く」、「評価結果に対する本人の納得が得られない」が多く、評価側の課題としては「部門間の評価基準調整が難しい」、「評価者の研修・教育が不十分」などが多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:994, chapter:4, text:"インクルージョンとは「含有、包含、一体性」などを意味し、ダイバーシティ＆インクルージョンとは、多様性を受容し、さまざまな意見やアイデアを取り入れ、組織の力を高める取り組みといえる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:995, chapter:4, text:"心理的安全性とは、組織やチームの中で自分の考えや気持ちを安心して発言できることであり、「チームの中では対人関係におけるリスクをとっても、大丈夫だとメンバーに共有されている信念」とされている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング20章 産業カウンセラーの支援活動に関わる法 → 既存 第5章 -----
  {id:996, chapter:5, text:"労働者と使用者の間の法的関係は、労働者が使用者に使用されて労働し、使用者がこれに対して賃金を支払うことを約束する労働契約（雇用契約）に基づく。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:997, chapter:5, text:"就業規則を作成または変更する際は、事業場の労働者の過半数代表からの意見聴取、所轄の労働基準監督署長への届け出という2つの手続きを踏まなければならない。", answer:false, correction:"意見聴取・届け出の2つの手続きで足りる → それに加えて「労働者への周知」も必須（計3つ）", explanation:"設問文の2つに加えて、「作業場の見やすい場所への掲示や電子機器による公開などによる労働者への周知」が必須の手続きとなっている。", source:"eラーニング"},
  {id:998, chapter:5, text:"働く人と会社の間の労働をめぐる関係については、労働契約を基礎としつつ、それに規制を加える法律、労働協約、就業規則という、４つの法源の中のどれかによって根拠づけられ権利・義務となることで、労働者が使用者に、または使用者が労働者に法的な請求をすることが可能になる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:999, chapter:5, text:"労働基準法上の労働者性を判断するうえでの重要なポイントは、「使用」性（使用者の指揮命令を受けて働いていること）と「賃金」性（労働の対償として報酬を得ていること）の2つである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1000, chapter:5, text:"労働法上のさまざまな義務や責任を負う主体である「使用者」の概念は、①労働契約上の義務を負う労働契約上の「使用者」、②労働基準法上の義務や責任を負う労働基準法上の「使用者」の2つがある。", answer:false, correction:"「使用者」の概念は2つ → 労働組合法上の「使用者」を加えた3つ", explanation:"「使用者」の概念は、①労働契約上の義務を負う労働契約上の「使用者」、②労働基準法上の義務や責任を負う労働基準法上の「使用者」、③労働組合法上の義務を負う労働組合法上の「使用者」の３つがある。", source:"eラーニング"},
  {id:1001, chapter:5, text:"日本では、使用者に幅広い採用の自由が認められており、募集に際して性別、年齢などの制限を設けることも原則として認められている。", answer:false, correction:"性別・年齢などの制限も原則認められる → 女性や障害者への募集・採用差別など法律上禁止される場合は採用の自由が制限される", explanation:"日本では、使用者による幅広い採用の自由が認められているが、女性や障害者であることでの募集・採用差別など法律上明文で禁止されている場合には、採用の自由は制限される。", source:"eラーニング"},
  {id:1002, chapter:5, text:"いったん労働契約が成立すると、その後の使用者による一方的な解約の意思表示（＝解雇）には、解雇権濫用法理が適用されることになる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1003, chapter:5, text:"出向とは、出向元企業に従業員としての地位（籍）を残しながら出向先企業で働くことで、転籍とは、移籍元企業との労働契約関係を終了させ、移籍先企業と新たな労働契約関係に入ることをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1004, chapter:5, text:"使用者は、客観的に合理的で社会通念上相当といえる理由があれば、30日前に予告するか、または30日分以上の予告手当を支払って、いつでも労働者を解雇できる。", answer:false, correction:"いつでも解雇できる → 労災休業や産前産後の休業期間とその後30日間は解雇できない（一部例外あり）", explanation:"「いつでも」が誤り。労災での休業、産前産後の休業期間とその後の30日間は解雇できない（一部例外あり）。", source:"eラーニング"},
  {id:1005, chapter:5, text:"有期契約労働者の保護のため、解雇権濫用法理が類推適用されるとする「雇止め法理」が2012年労働契約法改正によって法律上明文化された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1006, chapter:5, text:"労働基準法では、使用者に対し、労働者が女性であることを理由とした採用、配置、昇進、教育訓練、賃金について差別をすることを禁止している。", answer:false, correction:"労基法が採用・配置・昇進・教育訓練・賃金の差別を禁止 → 労基法は賃金差別のみ禁止、それ以外は男女雇用機会均等法違反", explanation:"労働基準法では労働者が女性であることを理由とした賃金差別のみを禁止しており、賃金以外の採用、配置、昇進、教育訓練の差別は男女雇用機会均等法の違反となる。", source:"eラーニング"},
  {id:1007, chapter:5, text:"パートタイム・有期雇用労働法は、１週間の所定労働時間がその事業所の正社員にくらべ短い労働者（パートタイム労働者）と、事業主と期間の定めのある労働契約を締結している労働者（有期雇用労働者）を、その適用対象としている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1008, chapter:5, text:"労働基準法3条は、労働者の国籍、信条、社会的身分を理由とした労働条件の差別的取り扱いを禁止しているが、「社会的身分」には、孤児、受刑者など後発的理由による地位は含まれないものと考えられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1009, chapter:5, text:"セクハラ、パワハラなどのいじめ・嫌がらせ行為の発生については、それによって退職の強要や解雇がなされたときに限り、被害者は会社に対して損害賠償を請求できる。", answer:false, correction:"退職強要や解雇がなされたときに限り損害賠償請求できる → 解雇・退職強要に限られず、職場環境配慮義務違反などでも請求できる", explanation:"設問文にあるような解雇や退職強要には限られず、働きやすい職場環境で働く利益侵害の不法行為や職場環境配慮義務違反の債務不履行で、損害賠償を請求できる。", source:"eラーニング"},
  {id:1010, chapter:5, text:"会社が従業員の電子メールの監視を行うことについては、業務上の必要性が労働者側の不利益を上回るので、どのような手段をとっても違法とはならない。", answer:false, correction:"どのような手段をとっても違法とならない → 社会通念上相当な範囲を逸脱していない場合にプライバシー侵害とならない", explanation:"私的利用の程度、監視の目的・手段・態様などを総合的に考慮して社会通念上相当な範囲を逸脱していない場合には、プライバシーの侵害とならない。", source:"eラーニング"},
  {id:1011, chapter:5, text:"賃金は契約によって決められるものなので、たとえば賃金を引き下げようとするときは、就業規則の合理的変更とその周知など契約上の根拠を整えることが必要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1012, chapter:5, text:"最低賃金法や労働基準法などによって保護の対象とされる賃金とは、その名称を問わず、労働の対償として使用者が労働者に支払うすべてのものをいう。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1013, chapter:5, text:"最低賃金には、都道府県ごとの地域別最低賃金と、特定の産業ごとに全国一律の最低賃金を定める特定産業別最低賃金がある。", answer:false, correction:"特定産業別最低賃金は全国一律 → 特定産業ごとに地域別最低賃金を上回る最低賃金を定める", explanation:"特定産業別最低賃金は、特定産業ごとに地域別最低賃金を上回る最低賃金を定めている。", source:"eラーニング"},
  {id:1014, chapter:5, text:"労働基準法は、賃金の支払い方法について、通貨で、全額を、毎月1回以上一定の期日を定めて、労働者に直接支払うと規定し、これらに例外は認められていない。", answer:false, correction:"例外は認められていない → 法令の定めや労使協定がある場合は賃金の一部控除の例外がある", explanation:"全額払いの原則については、法令に別段の定めがある場合や、事業場の過半数代表との労使協定がある場合には、賃金の一部を控除して支払うことのできる例外がある。", source:"eラーニング"},
  {id:1015, chapter:5, text:"企業倒産などで事業主に支払い能力がないことが認定されると、政府が労働者の請求に基づき未払い賃金の一定部分を立替払いする制度が、労働基準法に定められている。", answer:false, correction:"労働基準法に定められている → 賃金支払確保法に定められている", explanation:"事業主に支払い能力がない場合に政府が未払い賃金の一定部分を立替払いする制度は、賃金支払確保法に定められている。", source:"eラーニング"},
  {id:1016, chapter:5, text:"「労働基準法上の労働時間」は「労働者の行為が使用者の指揮命令下に置かれたものと客観的に評価できる時間」であり、持ち帰り残業も会社の黙認があれば労働時間に該当しうる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1017, chapter:5, text:"法定労働時間・休憩・休日の原則が適用されない労働者のうち、管理監督者については、それぞれの企業で役職の肩書きをもつ者と判断される。", answer:false, correction:"役職の肩書きをもつ者と判断される → 肩書きなど形式ではなく個々の具体的な実態に基づき客観的に判断される", explanation:"法定労働時間・休憩・休日の原則が適用されない管理監督者について、裁判所の判例では、肩書きなど形式的な事情ではなく、個々の具体的な実態に基づいて客観的に判断されるべきとしている。", source:"eラーニング"},
  {id:1018, chapter:5, text:"労働時間の延長の限度については厚生労働大臣が基準を定めているが、法的な強制力・拘束力はない。", answer:false, correction:"法的な強制力・拘束力はない → 労働基準法第36条3～6項で定めており法的な強制力・拘束力をもつ", explanation:"労働時間の延長の限度については、労働基準法第36条３～６項で定めており、法的な強制力・拘束力をもつ。", source:"eラーニング"},
  {id:1019, chapter:5, text:"労働者が会社に雇われて、6か月以上継続勤務し、全労働日の8割以上出勤した場合に、所定労働日数に関わらず、10労働日の年次有給休暇の権利が発生する。", answer:false, correction:"所定労働日数に関わらず10労働日 → 週3日勤務など所定労働日数が少ない場合はその日数に比例した年休が付与される", explanation:"週３日勤務など所定労働日数が少ない労働者については、その日数に比例して算定された日数の年休が付与される。", source:"eラーニング"},
  {id:1020, chapter:5, text:"育児介護休業法は、育児休業・介護休業などの取得を理由に労働者に対し不利益取扱いをしてはならないとし、企業に一定の賃金保障を義務づけている。", answer:false, correction:"企業に一定の賃金保障を義務づけている → 育児・介護休業や産前産後休業などは法律上有給とすることは義務づけられていない", explanation:"育児休業・介護休業や産前産後休業などについては、法律上有給とすることは義務づけられていない。", source:"eラーニング"},
  {id:1021, chapter:5, text:"労働者の安全や健康の確保のための法政策として、労働災害を事前防止する「労働安全衛生」と、生じてしまった労働災害への事後的救済の「労災補償」が重要な柱である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1022, chapter:5, text:"労働者災害補償保険法（労災保険法）に基づく労災保険制度は、会社側の過失の有無を問わずに、また会社に十分な資力がなくても、労働災害を被った労働者を救済できるようにするためにつくられた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1023, chapter:5, text:"職場におけるいじめが原因で労働者が精神疾患を発症し自殺するなど生命・身体に危険を及ぼした場合は、「安全配慮義務違反」が認められている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1024, chapter:5, text:"安全配慮義務は、直接労働契約関係がある当事者間にのみ発生する義務とされている。", answer:false, correction:"直接労働契約関係がある当事者間にのみ発生 → 派遣先と派遣労働者など直接契約関係がなくても、生命・健康にかかわる指示・監督があれば問われうる", explanation:"派遣先企業と派遣労働者など直接労働契約関係がなくても、労働者の生命・健康にかかわる指示や監督が行われている場合には、安全配慮義務違反が問われうる。", source:"eラーニング"},
  {id:1025, chapter:5, text:"労働者災害補償保険法（労災保険法）に基づく労災補償制度と民法上の損害賠償制度とが併存しており、労災保険の給付対象とされなくても、民法上の損害賠償請求が認められることもある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1026, chapter:5, text:"憲法は労働者に、労働組合をつくる権利「団結権」、労働組合を通じて使用者と交渉する権利「団体交渉権」、集団で行動する権利「団体行動権」を保障している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1027, chapter:5, text:"労働組合法は使用者に対して、組合員であることや組合活動を理由とした労働者の不利益取扱いや、正当な理由なく団交を拒否することなどを、「不当労働行為」として禁止している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1028, chapter:5, text:"2015年の労働者派遣法改正により、すべての労働者派遣事業が届出制となった。", answer:false, correction:"届出制となった → 許可制となった", explanation:"「届出制」が誤り。2015年の労働者派遣法改正により、すべての労働者派遣事業が許可制となった。", source:"eラーニング"},
  {id:1029, chapter:5, text:"より積極的な雇用の創出と維持のための政策（積極的労働市場政策）には、雇用保険二事業、職業能力開発の援助、高齢者や障害者などの雇用促進、雇用保険による職業訓練給付・雇用継続給付がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1030, chapter:5, text:"労働紛争を解決するためには、最初に行政機関による相談・あっせん・救済などを活用することが望ましい。", answer:false, correction:"最初に行政機関による相談・あっせん・救済を活用 → まず労使で話し合って解決することが望ましい", explanation:"労働紛争は、まず、労使で話し合って解決することが望ましい。会社と労働組合等との間で、問題解決や予防を図る制度を集団的につくり上げていくことが求められる。", source:"eラーニング"},
  {id:1031, chapter:5, text:"社会保障制度は、社会保険、国家扶助、公衆衛生および医療、社会福祉の4部門に分類できる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1032, chapter:5, text:"社会保障の目的には、所得の再分配を通じて国民の生活保障を図ることと、個人が自らの人生を主体的に追求できる条件整備を図ることがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1033, chapter:5, text:"社会保障の機能には、所得再分配機能、リスク分散機能、景気変動を微調整する機能がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1034, chapter:5, text:"日本の社会保障制度のうち社会保険には、年金保険、医療保険、介護保険、雇用保険、労働者災害補償保険の5つがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1035, chapter:5, text:"社会保障の目的達成の方法である社会扶助とは、リスク分散のための保険の技術を用いて保険料などを財源として給付を行うしくみである。", answer:false, correction:"社会扶助＝保険の技術を用いる（＝社会保険の説明） → 社会扶助は保険の技術によらず租税中心の公費で給付する制度", explanation:"社会扶助は、保険の技術や原理に基づかずに租税を中心とする公費によって給付する制度である。設問文は社会保障の目的達成のもう一つの方法である「社会保険」の説明である。", source:"eラーニング"},
  {id:1036, chapter:5, text:"日本の公的年金制度は、職種を問わず25歳以上のすべての者が、いずれかの年金保険に加入する方式を採用している。", answer:false, correction:"25歳以上のすべての者が加入 → 20歳以上のすべての者が加入", explanation:"日本の公的年金制度は、25歳以上ではなく20歳以上のすべての者が加入する方式を採用している。", source:"eラーニング"},
  {id:1037, chapter:5, text:"公的年金には国民年金、厚生年金の２つの種類があり、老齢、障害、死亡を保険事故として、一定の要件を満たす場合に保険料の拠出に応じた年金給付が行われる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1038, chapter:5, text:"公的医療保険は、健康保険等の被用者保険と、自営業者等が加入する国民健康保険と、75歳以上の高齢者等が加入する後期高齢者医療制度からなる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1039, chapter:5, text:"介護保険制度では、サービス内容や費用負担など多くの課題を抱えた公的負担の措置制度に代わるものとして、社会保険の方式が採用された。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1040, chapter:5, text:"公的扶助の重要な制度で、他の社会保障制度を補完する「最後のセーフティネット」と呼ばれる生活保護は、「生活困窮者自立支援法」に定められている。", answer:false, correction:"生活保護は「生活困窮者自立支援法」に定められている → 生活保護は「生活保護法」（1950年制定）による", explanation:"生活保護の制度は「生活保護法」（1950年制定）による。「生活困窮者自立支援法」は生活保護に至る前の自立支援策の強化を目的として制定され、2015年より施行されている。", source:"eラーニング"},
  {id:1041, chapter:5, text:"障害者福祉施策は、身体障害、知的障害、精神障害の種別ごとに、「施設」での福祉を中心に法整備が進められてきたが、1993年制定の障害者基本法等により「地域福祉重視」の施策へ転換が図られた。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1042, chapter:5, text:"障害者基本法では、個人の心身の機能障害にのみ着目して障害者を定義している。", answer:false, correction:"機能障害にのみ着目して定義 → 機能障害に加え、障害および社会的障壁により継続的に相当な制限を受ける状態にある者を障害者と定義", explanation:"障害者基本法では、個人の心身の機能障害がある者であって、障害および社会的障壁により継続的に日常生活や社会生活に相当な制限を受ける状態にある者を障害者と定義している。", source:"eラーニング"},
  {id:1043, chapter:5, text:"障害者総合支援法により、従来の障害者福祉各法の給付および事業が一元化され、同法に基づく自立支援給付には、相談支援給付、介護給付、訓練等給付等がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1044, chapter:5, text:"障害者総合支援法に定められている就労移行支援は、企業などへの就職を希望する障害者が就職をするまで期間の定めなく支援を継続する。", answer:false, correction:"就職をするまで期間の定めなく支援を継続 → 就労移行支援の利用期間は原則2年", explanation:"障害者総合支援法に定められている就労移行支援の利用期間は、原則２年とされている。", source:"eラーニング"},
  {id:1045, chapter:5, text:"一般企業で働いていた人が、メンタルヘルス不調により一時的に離職した場合には、障害者総合支援法に基づく就労移行・継続支援事業を利用することはできない。", answer:false, correction:"利用することはできない → 利用することができる", explanation:"一般企業で働いていた人が、メンタルヘルス不調により一時的に離職した場合にも、障害者総合支援法に基づく就労移行・継続支援事業を利用することができる。", source:"eラーニング"},
  {id:1046, chapter:5, text:"法改正により新たに導入された、障害者雇用差別の禁止と合理的配慮の提供義務は、雇用の「質」にも着目するもので、障害者雇用施策の転換をもたらすものと期待されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1047, chapter:5, text:"障害者雇用促進法に基づく雇用義務制度は、「障害者雇用率制度」と「障害者雇用納付金制度」から構成される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1048, chapter:5, text:"障害者雇用差別の禁止と合理的配慮の対象については、障害の原因と種類に一定の要件が示され、限定されている。", answer:false, correction:"障害の原因と種類に要件が示され限定されている → 手帳の所持や障害の原因・種類にかかわらず「長期にわたり職業生活に相当の制限を受け、又は営むことが著しく困難な者」が対象", explanation:"障害者雇用差別の禁止と合理的配慮の対象は、手帳の所持および障害の原因や種類にかかわらず、「長期にわたり、職業生活に相当の制限を受け、又は職業生活を営むことが著しく困難な者」である。", source:"eラーニング"},
  {id:1049, chapter:5, text:"法改正により、症状が安定し就労が可能である者で「精神障害者保健福祉手帳」の交付を受けた者も雇用義務の対象に含まれることとなった。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1050, chapter:5, text:"募集・採用時の障害者雇用差別については禁止規定であり、採用後の処遇等については「差別の解消に努める」努力義務とされている。", answer:false, correction:"採用後の処遇等は「差別の解消に努める」努力義務 → 募集・採用時、採用後それぞれに差別禁止が規定されている", explanation:"募集・採用時、採用後それぞれに差別禁止が規定されている。", source:"eラーニング"},
  // ----- eラーニング21章 職場における人間関係開発・職場環境改善への支援 → 既存 第14章 -----
  {id:1051, chapter:14, text:"人間関係は仕事上の役割関係（権限、職務）だけでなく、私的な関係も入るため、複雑な様相を示す。職場の人間関係を形成・維持・発展したり崩壊させたりするのにもっとも重要な働きをするのが対人コミュニケーションである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1052, chapter:14, text:"働く人が日々影響を受ける人間関係をよりオープンで相互理解的なものにしていくことは、産業カウンセラーに貢献が期待される支援活動の重要な領域の１つである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1053, chapter:14, text:"産業カウンセラーに期待される人間関係開発の支援活動は、働く人個人を対象とした教育訓練の支援に代表される個人向けのアプローチと、組織の関係性へのかかわりとしての組織開発の支援を行う組織向けのアプローチとがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1054, chapter:14, text:"産業カウンセラーが教育訓練プログラムを作成した場合、その実施結果の評価は依頼者である組織が行う必要があり、産業カウンセラーが関与するべきでない。", answer:false, correction:"実施結果の評価は依頼者組織が行い産業カウンセラーは関与すべきでない → 実施結果の評価も産業カウンセラーの役割に含まれる", explanation:"教育訓練プログラムの実施結果を評価することも産業カウンセラーの役割に含まれる。", source:"eラーニング"},
  {id:1055, chapter:14, text:"組織が継続的に教育施策を展開できるよう、産業カウンセラーはコーディネーターとして、常に教育訓練の運営全体のマネジメントを引き受けることが大切である。", answer:false, correction:"産業カウンセラーが常に運営全体のマネジメントを引き受ける → すべてを引き受けるのではなく、組織側が主体的に取り組む姿勢を促進するよう働きかける", explanation:"組織が継続的に施策を展開できるように、産業カウンセラーがすべてを引き受けるのではなく、組織の側が主体的に判断し取り組む姿勢を促進するよう働きかける必要がある。", source:"eラーニング"},
  {id:1056, chapter:14, text:"人間関係やコミュニケーションの教育訓練の場合、単に関係する知識を教授するだけでなく、それを現実場面に応用できる技能や態度、その根底に必要な人間尊重の価値意識などの教育が不可欠である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1057, chapter:14, text:"受講者の動機づけのための事前学習と、学んだことの実践を保証する事後のフォローアップがセットになっていないと、研修会の効果はその場限りのものになりやすい。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1058, chapter:14, text:"近年は遠隔技術を用いて、対面での研修と同等以上の効果を上げることが可能となっている。", answer:false, correction:"対面と同等以上の効果を上げることが可能 → 相互交流にかかわる情報量が限られ、研修効果は今後の検証を待つ必要がある", explanation:"遠隔技術を用いる場合、アクセスの良さなどの利点は多いが、対面とくらべると相互交流にかかわる情報量が限られるため、研修効果がどの程度あるかについては今後の検証を待つ必要がある。", source:"eラーニング"},
  {id:1059, chapter:14, text:"教材として図版などが必要であれば、参考書などから自由に転載して使うことができるので、準備しておくことが大切である。", answer:false, correction:"参考書などから自由に転載して使うことができる → 書籍などからの転載は著作物利用許諾が必要な場合があり注意を要する", explanation:"書籍などからの転載は、著作物利用許諾が必要な場合があるので、注意を要する。", source:"eラーニング"},
  {id:1060, chapter:14, text:"教育訓練の評価は、プロセス評価（教育訓練が想定どおりに実施できたか）と、アウトカム評価（目標とした効果が得られたか）を、教育訓練実施後ただちに行うとよい。", answer:false, correction:"プロセス評価もアウトカム評価も実施後ただちに行う → アウトカム評価はある程度時間を置くことが必要", explanation:"プロセス評価とアウトカム評価の視点が求められるが、アウトカム評価はある程度時間を置くことが必要である。", source:"eラーニング"},
  {id:1061, chapter:14, text:"職場における人間関係開発の分野の教育訓練の主要なテーマとして、「人間関係」「対人コミュニケーション」「自己理解」「リーダーシップ」「ワーク・モチベーション」が挙げられる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1062, chapter:14, text:"講義法はもっともよく使われる方法で、一度に大勢の受講者に多量の知識・情報を手軽に伝達でき、また、講師が伝えたとおりに受講者が理解できる。", answer:false, correction:"講師が伝えたとおりに受講者が理解できる → 受講者が受動的になりやすく、具体的な解説やグループ討議・質問技法などで咀嚼を支援する必要がある", explanation:"講義法はもっともよく使われる方法だが、受講者が受動的になりやすいため、講師はできるだけ具体的で理解しやすい解説をする必要があり、グループ討議や質問技法などを挿入して講義内容の咀嚼を支援する。", source:"eラーニング"},
  {id:1063, chapter:14, text:"サーベイ・フィードバック法の基本は、客観的な調査データに基づいて課題を解決することである。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1064, chapter:14, text:"ロール・プレイング法では、その組織では起こりえない状況を設定し、それに対応する訓練をすることが望ましい。", answer:false, correction:"その組織では起こりえない状況を設定 → その組織で起こりうる状況・シナリオを設定しないと違和感があり取り組みにくい", explanation:"ロール・プレイング法は、教育訓練の目的・目標に適した状況やシナリオを設定し、その組織で起こりうるものにしないと違和感があり、受講者が取り組みにくくなる。", source:"eラーニング"},
  {id:1065, chapter:14, text:"心理教育的グループ・ワーク法は、課題解決エクササイズ後のふり返りで、フィードバックを通じて、自分の思考、価値、言動の傾向とそれらが他者に与える影響に気づくことをねらいとする。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1066, chapter:14, text:"組織開発は、人間尊重、民主的、クライエント中心という規範的価値観を基盤とし、その手法は、アクションリサーチの考え方と進め方をベースとした診断型と、社会構成主義を土台とした対話型に分けることができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1067, chapter:14, text:"ハラスメントは、他者の人格や尊厳を傷つけ、精神的・身体的苦痛を与えたりする言動やいじめ、嫌がらせ行為を指す用語であり、職場環境を害する行為は含まれない。", answer:false, correction:"職場環境を害する行為は含まれない → 職場環境を害する言動も含む人権侵害行為であり法的・倫理的対応が求められる", explanation:"ハラスメントは、他者の人格や尊厳を傷つけ、精神的・身体的苦痛を与えたり、職場環境を害したりする言動やいじめ、嫌がらせ行為を指す用語であり、人権侵害行為として法的・倫理的に対応が求められる。", source:"eラーニング"},
  {id:1068, chapter:14, text:"ハラスメントを行ってはならない旨の会社方針を、就業規則などに記載するとともに、経営者自らの言葉で表明し、ハラスメントの問題に経営者自身がコミットすることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1069, chapter:14, text:"ハラスメント相談窓口の役割は、相談者の気持ちを真摯に受け止め、事実関係を正確に聞き取って、できるだけ窓口担当者が単独で解決までを担う。", answer:false, correction:"窓口担当者が単独で解決までを担う → ハラスメント対策委員会などを設置し組織的に対応する体制をつくることが重要", explanation:"窓口担当者に解決までを期待するのではなく、ハラスメント対策委員会などを設置し、組織的に対応する体制をつくることが重要である。", source:"eラーニング"},
  {id:1070, chapter:14, text:"ハラスメント対応では、相談者だけでなく行為者も含めてプライバシー保護を徹底すること、相談したことを理由とした不利益取り扱いを行わないことのルール化も重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1071, chapter:14, text:"産業構造の変化や新型コロナウイルス感染症の世界的流行により、テレワークやオンライン会議、時差通勤などが進められた結果、すべての職場で各人の事情や価値観に合わせた多様な働き方が実現し、業務効率の向上や扱える情報量の拡大などの望ましい変化がもたらされた。", answer:false, correction:"すべての職場で望ましい変化がもたらされた → 望ましい変化の一方で、人間関係の希薄化や仕事の過密化・増加などの影響が加速した職場もみられる", explanation:"設問にあるような望ましい変化がもたらされた一方で、人間関係の希薄化、仕事の質の過密化や仕事量の増加などの影響が加速した職場もみられる。", source:"eラーニング"},
  {id:1072, chapter:14, text:"職場環境の改善は、労働安全衛生法の「快適な職場環境の形成」（71条の2）、およびストレスチェック制度（66条の10）の事後対応としての「職場環境の評価と改善」において、それぞれ事業主の義務とされている。", answer:false, correction:"事業主の義務とされている → 義務ではなく努力義務である", explanation:"義務ではなく、努力義務である。", source:"eラーニング"},
  {id:1073, chapter:14, text:"快適職場のソフト面は、キャリア形成・人材育成、人間関係、仕事の裁量性、処遇、社会とのつながり、休暇・福利厚生、労働負荷の7領域で構成される。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1074, chapter:14, text:"職場環境等の評価と改善は、2000年に国内初めてのメンタルヘルス指針により広く知られるようになり、メンタルヘルスの予防活動の中でも重要な施策として、多くの手引きやツールが開発、紹介されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1075, chapter:14, text:"職場環境改善における産業カウンセラーの役割は、組織のトップなどへのコンサルテーション、関係者間のコーディネーション、グループ討議のファシリテーションといった、組織の要請に応じた側面的な支援である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1076, chapter:14, text:"職場環境改善の支援は一般的に、「職場環境改善実施の合意形成」「職場環境の評価とフィードバック」「対策の検討と実施」「フォローアップ」のステップで進められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1077, chapter:14, text:"職場環境改善は、その継続に資源が必要で、改善策の多くは価値判断がかかわるものなので、組織や職場のトップあるいはトップ層の決意とコミットが必須である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1078, chapter:14, text:"トップ層で決定がなされたら、職場環境改善活動の推進体制の整備が行われるが、その際、産業カウンセラーは推進チームの責任者となることが望ましい。", answer:false, correction:"産業カウンセラーは推進チームの責任者となることが望ましい → 役割は側面的支援なので推進チームではアドバイザーとして位置づけてもらう", explanation:"産業カウンセラーの役割は組織や職場の要請に応じた側面的な支援なので、推進チームではアドバイザーとして位置づけてもらう。", source:"eラーニング"},
  {id:1079, chapter:14, text:"職場環境調査においては、「職業性ストレス簡易調査票」「新・職業性ストレス簡易調査票」「快適職場調査（ソフト面）」が用いられることが多い。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1080, chapter:14, text:"推進チームが調査結果をわかりやすく表やグラフにしてまとめた報告書を作成する際、従業員の動揺を招かないように、場合によっては悪い結果を削除することも必要である。", answer:false, correction:"悪い結果を削除することも必要 → 都合の悪い結果を歪めたり削除したことが明らかになれば活動は信頼されず形骸化する", explanation:"組織上層部の思惑で都合の悪い調査結果を歪めたり、削除したことが明らかになれば、快適職場づくり活動は構成員から信頼されなくなり、形骸化してしまう。", source:"eラーニング"},
  {id:1081, chapter:14, text:"職場環境改善策の作成と実行のために開催される職場ミーティングは、そのねらいを、具体的な問題点・課題の抽出と、改善策の立案と実行体制を当事者である職場の管理者、従業員全員が参加する場で決めることに絞るとよい。", answer:false, correction:"ねらいを問題点抽出・改善策立案・実行体制決めに絞るとよい → 事柄的情報だけでなく各人のものの見方や考え方なども共有することもねらいとする", explanation:"ある問題状況に関する事柄的情報だけでなく、職場の全構成員が、各人のものの見方や考え方などの個人のパーソナリティ的情報も含めて、職場についてどのように思っているかを共有することもねらいである。", source:"eラーニング"},
  {id:1082, chapter:14, text:"職場ミーティングでのグループ編成は１人あたりの話せる時間を保証するために、固定された少人数で時間いっぱい話し合うことが望ましい。", answer:false, correction:"固定された少人数で時間いっぱい話し合う → 10人より多い場合は小グループに分け（顔ぶれは都度抽選）、各グループの結果を報告し合い統合する", explanation:"職場の構成員が10人より多い場合は、いくつかの小グループに分け（グループの顔ぶれはその都度抽選などで決める）、後で各グループの話し合いの結果を報告し合い、それを統合する。", source:"eラーニング"},
  {id:1083, chapter:14, text:"職場ミーティングにおけるグループ討議は、①問題点・課題を抽出する段階、②取り組み課題の改善策の立案の段階、③改善策の実行体制を考える段階の３つに大きく分かれる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1084, chapter:14, text:"職場環境改善の対策がうまく進んでいない場合は、それはなぜなのかを全員で冷静に分析し、対策をスモールステップに組み直す、担当者を増やすなど、追加の改善策を立てることが必要になる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1085, chapter:14, text:"グループ討議を肯定的で話しやすい雰囲気とするためには、第三者的中立的な立場からファシリテーションをする人が必要になるので、産業カウンセラーがファシリテーターの役割を担えるようにすることが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  // ----- eラーニング22章 職場におけるメンタルヘルス対策への支援 → 既存 第14章 -----
  {id:1086, chapter:14, text:"一般企業の職場のメンタルヘルス対策は、産業保健活動の一環という位置づけであり、労働安全衛生法を中心に労働基準法、労働者災害補償保険法、労働契約法を主な法的背景としている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1087, chapter:14, text:"労災補償は、過失の有無を問うことなく事業主の責任とされるが、労災保険の保険料は労使双方の負担となっている。", answer:false, correction:"労災保険の保険料は労使双方の負担 → 全額事業主負担", explanation:"労災保険の保険料は、全額事業主負担である。", source:"eラーニング"},
  {id:1088, chapter:14, text:"労災補償の要件として、業務起因性の成立と、その前提条件として、業務遂行性（労働者が労働契約に基づいて事業主の支配下にある状態）が認められる必要がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1089, chapter:14, text:"労災判断指針では、ストレス－脆弱性理論に基づき、環境に起因するストレスと個人の反応性との関係で精神的破綻が生じるかどうかが決まると考えている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1090, chapter:14, text:"労災認定基準では、発病直前の1か月におおむね160時間を超えるような時間外労働を行った場合が、心理的負荷の「特別な出来事」のひとつに挙げられている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1091, chapter:14, text:"常時50人以上の労働者を使用する事業場では、衛生管理者、産業医等の選任と、これらを構成員とする衛生委員会の設置が義務づけられている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1092, chapter:14, text:"事業者は、雇用形態に関わらず全労働者に対して、その健康状態を把握するため、毎年健康診断を行わなければならない。", answer:false, correction:"雇用形態に関わらず全労働者 → 常時雇用する労働者に対して", explanation:"事業者が健康診断の実施義務を負うのは、「雇用形態に関わらず全労働者」ではなく、「常時雇用する労働者」に対してである。", source:"eラーニング"},
  {id:1093, chapter:14, text:"ストレスチェック制度は、高ストレス労働者のメンタル不調の防止だけでなく、特定の精神障害を有する労働者を発見し、治療を勧奨することが第一のねらいである。", answer:false, correction:"特定の精神障害の発見・治療勧奨が第一のねらい → メンタルヘルス不調の1次予防が第一義的な目的", explanation:"ストレスチェック制度は、特定の精神障害を有する労働者を発見し、治療を勧奨するためではなく、メンタルヘルス不調の１次予防が第一義的な目的である。", source:"eラーニング"},
  {id:1094, chapter:14, text:"ストレスチェックの受検は労働者個人の意志に委ねられており、個人別の結果は本人の了承がない限り、事業者に通知されない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1095, chapter:14, text:"労働安全衛生法69条は、事業者の義務として労働者の心身の健康の保持増進を図るために必要な取り組みを継続的かつ計画的に実施することを定めており、これに基づく健康保持増進措置をトータル・ヘルスプロモーション・プランという。", answer:false, correction:"事業者の義務 → 努力義務", explanation:"事業者の義務ではなく、努力義務である。", source:"eラーニング"},
  {id:1096, chapter:14, text:"「労働者の心の健康の保持増進のための指針」では、メンタルヘルス不調を、精神障害のみならず、ストレスや強い悩みや不安などを含む幅広いものと定義している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1097, chapter:14, text:"「労働者の心の健康の保持増進のための指針」では、「セルフケア」「ラインによるケア」「管理監督者によるケア」「事業場外資源によるケア」の４つのケアを明示している。", answer:false, correction:"「管理監督者によるケア」 → 「事業場内産業保健スタッフ等によるケア」（4つのケア）", explanation:"４つのケアは、「セルフケア」「ラインによるケア」「事業場内産業保健スタッフ等によるケア」「事業場外資源によるケア」である。", source:"eラーニング"},
  {id:1098, chapter:14, text:"職場のメンタルヘルス対策においては、労働安全衛生マネジメントシステムの考え方を導入することが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1099, chapter:14, text:"職場のメンタルヘルス対策において、産業カウンセラーは「心の健康づくり専門スタッフ」の一員と考え、自らの役割を認識し労働者や管理監督者、他のスタッフと連携を保ち活動を推進することが求められる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1100, chapter:14, text:"「労働者の心の健康の保持増進のための指針」では、教育研修・情報提供が重視されているが、それはもっぱら労働者のセルフケアに関するものである。", answer:false, correction:"もっぱら労働者のセルフケアに関するもの → 労働者（一般）・管理監督者・事業場内産業保健スタッフ等への教育研修・情報提供が列挙されている", explanation:"「労働者の心の健康の保持増進のための指針」では、労働者（一般）、管理監督者、事業場内産業保健スタッフ等への教育研修・情報提供の項目が列挙されている。", source:"eラーニング"},
  {id:1101, chapter:14, text:"厚生労働省の「心の健康問題により休業した労働者の職場復帰支援の手引き」（職場復帰支援の手引き）に、職場復帰支援のあり方が包括的に示されている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1102, chapter:14, text:"職場復帰支援の手引きでは、職場復帰支援を、当該労働者が休業を開始してから職場復帰を果たし職場に再適応するまでの期間の活動とし、5つのステップに整理している。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1103, chapter:14, text:"休業中は、主治医に対して職場の実情を伝えて復職に関して意見をきくために、会社から直接かつ積極的に連絡をとる。", answer:false, correction:"会社から直接かつ積極的に連絡をとる → 主治医への連絡は休業する労働者本人を通して行う", explanation:"主治医への連絡は休業する労働者本人を通して行う。", source:"eラーニング"},
  {id:1104, chapter:14, text:"職場復帰の可否判断を行い、復職プランを策定する段階では、主治医からの復職に関する意見書の内容を確認し、必ず直属の上司が本人と面接を行う。", answer:false, correction:"必ず直属の上司が本人と面接を行う → 第3ステップでの面接は通常産業医が行う", explanation:"第3ステップでの面接は通常産業医が行う。", source:"eラーニング"},
  {id:1105, chapter:14, text:"試し出勤制度のひとつとして、事業場外資源による「リワークプログラム」の活用が注目を集めている。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1106, chapter:14, text:"過重労働対策の基本は、長時間労働を行っている労働者に対する面接指導であり、そのうえで時間外・休日労働の削減や年休取得の促進に取り組む。", answer:false, correction:"基本は面接指導、そのうえで削減・年休促進 → 基本は時間外・休日労働の削減や年休取得の促進、そのうえで面接指導を実施（順序が逆）", explanation:"過重労働対策の基本は、時間外・休日労働の削減や年休取得の促進であり、そのうえで長時間労働を行っている労働者に対する面接指導などを実施する。", source:"eラーニング"},
  {id:1107, chapter:14, text:"職場環境の改善は、現場の労働者の意見をきいたうえで、トップダウンで行うことが主流になりつつある。", answer:false, correction:"トップダウンで行うことが主流 → 労働者が自らの問題として主体的に取り組む現場解決型の活動が主流", explanation:"職場環境の改善は、労働者の意見を重視し、労働者が自らの問題として主体的に取り組む現場解決型の活動が主流になりつつある。", source:"eラーニング"},
  {id:1108, chapter:14, text:"労働安全衛生法で、事業主は、国や地方自治体の自殺対策に協力し、労働者の心の健康の保持に必要な措置を講ずるよう努めることが規定された。", answer:false, correction:"労働安全衛生法で規定 → 自殺対策基本法で規定（事業主の自殺対策への努力義務）", explanation:"事業主の自殺対策への努力義務が定められているのは、労働安全衛生法ではなく、「自殺対策基本法」である。", source:"eラーニング"},
  {id:1109, chapter:14, text:"自殺対策には、自殺のリスクが高いと考えられる集団を対象としての働きかけや、自殺問題の啓発活動、仕事のやりがいや職場関係者の相互支援を高める働きかけがある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1110, chapter:14, text:"自殺対策には、産業保健スタッフおよび管理監督者による、自殺の危険が迫っている人への個別対応や自殺者の周囲に遺された人々への支援がある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1111, chapter:14, text:"災害時の精神保健問題としては、PTSD（心的外傷後ストレス障害）のみに注意を払うべきである。", answer:false, correction:"PTSDのみに注意を払うべき → PTSD以外にも気分障害・適応障害・アルコール使用障害などさまざまなメンタルヘルス不調に注意が必要", explanation:"災害時には、PTSD以外にも、気分障害、適応障害、アルコール使用障害などさまざまなメンタルヘルス不調が生じる可能性に注意を払う必要がある。", source:"eラーニング"},
  {id:1112, chapter:14, text:"被災者の心理状態は、「茫然自失期」「ハネムーン期」「幻滅期」「再建期」の4段階を踏んで経過していくとされる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1113, chapter:14, text:"災害時の緊急時に備えて事業場に合った対応マニュアルを作成することが望ましい。特に、初期対応については緻密なマニュアルが必要である。", answer:false, correction:"初期対応には緻密なマニュアルが必要 → 初期対応はマニュアルがなくても最低限対応できるよう職場全体で定期的に確認し合う機会を設ける", explanation:"初期対応については、マニュアルがなくても最低限の対応ができるように、職場全体で定期的に確認し合う機会を設ける。", source:"eラーニング"},
  {id:1114, chapter:14, text:"災害対策本部の一員となる産業保健スタッフは、健康管理に関する本部方針の決定、被災労働者の健康状態の把握、援助者への助言と健康管理の支援の役割を担う。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1115, chapter:14, text:"災害からの回復過程で生じる不安、不注意で事故や二次災害が発生することもあるので、心理的な変化と回復の見通しについて、早期の情報提供が重要である。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1116, chapter:14, text:"事業場外の専門家として、特定の職場との契約をせず労働者からの相談に直接対価を得て対応する場合は、産業保健活動とはみなされない。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1117, chapter:14, text:"非常勤で他の産業保健活動とは切り離された形での個別相談対応のみを担当する場合は、自ら積極的に産業保健スタッフとかかわるよう求められる。", answer:false, correction:"自ら積極的に産業保健スタッフとかかわるよう求められる → 主に人事労務管理スタッフを介した連携となる", explanation:"非常勤で他の産業保健活動とは切り離された形での個別相談対応のみを担当する場合は、産業保健スタッフとは、主に人事労務管理スタッフを介した連携となる。", source:"eラーニング"},
  {id:1118, chapter:14, text:"常勤あるいはそれに準じる契約によって、産業医、看護職、衛生管理者などとともに、産業保健活動としてのメンタルヘルス対策にかかわる場合もある。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1119, chapter:14, text:"産業カウンセラーは、ストレスチェック制度において、高ストレス者と評価されたが医師による面接指導を希望しない労働者等が気軽に相談できる窓口となることができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1120, chapter:14, text:"産業カウンセラーは、個別相談などの活動を通して、多くの労働者の情報を入手するが、守秘義務は絶対であるから、個人情報はいかなる場合でも洩らしてはならない。", answer:false, correction:"守秘義務は絶対で個人情報はいかなる場合でも洩らしてはならない → 守秘義務は絶対ではなく、希死念慮など本人保護のため上司や産業医に伝える必要に迫られることもある", explanation:"守秘義務は絶対ではなく、例えば来談者から希死念慮を告げられた場合など、本人の保護のため、その情報を上司や産業医に伝える必要に迫られることもある。", source:"eラーニング"},
  // ----- eラーニング23章 キャリア形成への支援 → 既存 第15章 -----
  {id:1121, chapter:15, text:"キャリアとは「生涯発達において変化する多様な役割の統合とその連鎖」と表現することができる。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},
  {id:1122, chapter:15, text:"職業以外の役割を含めて生涯発達の視点を強調したキャリアを「ライフキャリア」、職業生活を中心としたキャリアを「ワークキャリア」という。", answer:true, explanation:"適切な記述である。", source:"eラーニング"},

const DATA = INITIAL_DATA.map(q => Object.assign({}, q, { source: q.source || "\u554f\u984c\u96c6" }));
const byId = {}; DATA.forEach(q => byId[q.id] = q);

/* ============ persistence ============ */
const LS_KEY = "sc_quiz_progress_v1";
function loadProgress(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return {results:{}, allTimeWrong:{}};
    const o = JSON.parse(raw);
    const results = {}, allTimeWrong = {};
    // keep only ids that still exist
    for(const k in (o.results||{})){ if(byId[k]!==undefined) results[k]=o.results[k]; }
    for(const k in (o.allTimeWrong||{})){ if(byId[k]!==undefined && o.allTimeWrong[k]) allTimeWrong[k]=true; }
    return {results, allTimeWrong};
  }catch(e){ return {results:{}, allTimeWrong:{}}; }
}
function saveProgress(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({results:state.results, allTimeWrong:state.allTimeWrong})); }catch(e){}
}

/* ============ state ============ */
const _p = loadProgress();
const state = {
  view:"home", activeChapter:null, queue:[], idx:0,
  chosen:null, revealed:false,
  results:_p.results, sessionWrong:[], allTimeWrong:_p.allTimeWrong,
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ============ actions ============ */
function startChapter(chId){
  state.queue = shuffle(DATA.filter(q=>q.chapter===chId));
  state.activeChapter = chId; resetRun(); state.view="quiz"; render();
}
function startMockTest(){
  state.queue = shuffle(DATA).slice(0,30);
  state.activeChapter="mock"; resetRun(); state.view="quiz"; render();
}
function startWrongReview(){
  const ids = Object.keys(state.allTimeWrong).filter(id=>state.allTimeWrong[id]);
  const list = ids.map(id=>byId[id]).filter(Boolean);
  if(list.length===0) return;
  state.queue = list; state.activeChapter="wrong"; resetRun(); state.view="quiz"; render();
}
function resetRun(){ state.idx=0; state.chosen=null; state.revealed=false; state.sessionWrong=[]; }
function answer(val){
  if(state.revealed) return;
  const q = state.queue[state.idx];
  const correct = (val===q.answer);
  state.chosen = val; state.revealed = true;
  state.results[q.id] = correct;
  if(!correct){ state.sessionWrong.push(q.id); state.allTimeWrong[q.id]=true; }
  saveProgress(); render();
}
function next(){
  if(state.idx+1 < state.queue.length){ state.idx++; state.chosen=null; state.revealed=false; render(); }
  else { state.view="summary"; render(); }
}
function goHome(){ state.view="home"; state.activeChapter=null; render(); }
function resetAll(){
  if(!confirm("\u89e3\u7b54\u8a18\u9332\u3068\u8aa4\u7b54\u30ea\u30b9\u30c8\u3092\u3059\u3079\u3066\u6d88\u53bb\u3057\u307e\u3059\u3002\u3088\u308d\u3057\u3044\u3067\u3059\u304b\uff1f")) return;
  state.results={}; state.allTimeWrong={}; saveProgress(); goHome();
}

/* ============ render ============ */
const root = document.getElementById("root");

function chapterStats(){
  return CHAPTERS.map(c=>{
    const list = DATA.filter(q=>q.chapter===c.id);
    const answered = list.filter(q=>state.results[q.id]!==undefined).length;
    const correct = list.filter(q=>state.results[q.id]===true).length;
    return {id:c.id, title:c.title, total:list.length, answeredCount:answered, correctCount:correct};
  });
}

function renderHome(){
  const totalAnswered = Object.keys(state.results).length;
  const totalCorrect = Object.values(state.results).filter(Boolean).length;
  const wrongCount = Object.keys(state.allTimeWrong).filter(id=>state.allTimeWrong[id]).length;
  const rate = totalAnswered ? Math.round((totalCorrect/totalAnswered)*100) : 0;

  let h = '<div class="content">';
  h += '<div class="hero">';
  h += '<div class="heroTitle">\u4e00\u554f\u4e00\u554f\u3001<br>\u4e01\u5be7\u306b\u3002</div>';
  h += '<p class="heroText">\u5168'+DATA.length+'\u554f\u30fb\u516817\u7ae0\u3002\u3007\u00d7\u3067\u7b54\u3048\u3001\u516c\u5f0f\u89e3\u8aac\u3067\u305d\u306e\u5834\u3067\u78ba\u8a8d\u3057\u307e\u3059\u3002\u8aa4\u7b54\u306f\u81ea\u52d5\u3067\u300c\u5fa9\u7fd2\u300d\u306b\u96c6\u307e\u308a\u307e\u3059\u3002</p>';
  h += '<div class="statsRow">';
  h += '<div class="statChip"><div class="statNum">'+totalAnswered+'/'+DATA.length+'</div><div class="statLbl">\u89e3\u7b54\u6e08\u307f</div></div>';
  h += '<div class="statChip"><div class="statNum">'+rate+'%</div><div class="statLbl">\u6b63\u7b54\u7387</div></div>';
  h += '<div class="statChip"><div class="statNum">'+wrongCount+'</div><div class="statLbl">\u8981\u5fa9\u7fd2</div></div>';
  h += '</div></div>';

  h += '<button class="mockCard" data-act="mock">'
     + '<div class="chapterNum" style="color:var(--washi)">\u8a66</div>'
     + '<div style="flex:1"><div class="chapterTitle" style="color:var(--washi)">\u78ba\u8a8d\u30c6\u30b9\u30c8\uff08\u5168\u7ae0\u30e9\u30f3\u30c0\u30e030\u554f\uff09</div>'
     + '<div class="chapterSub" style="color:#f0d9c9">\u672c\u756a\u5f62\u5f0f\u3067\u529b\u3060\u3081\u3057</div></div>'
     + '<div style="color:var(--washi)">\u2192</div></button>';

  chapterStats().forEach(c=>{
    const sub = '\u5168'+c.total+'\u554f' + (c.answeredCount>0 ? ' \u30fb \u6b63\u7b54 '+c.correctCount+'/'+c.answeredCount : '');
    h += '<button class="chapterCard" data-act="chapter" data-ch="'+c.id+'">'
       + '<div class="chapterNum">'+String(c.id).padStart(2,"0")+'</div>'
       + '<div style="flex:1;min-width:0"><div class="chapterTitle">'+esc(c.title)+'</div>'
       + '<div class="chapterSub">'+sub+'</div></div>'
       + '<div style="color:var(--indigo);font-weight:700">\u2192</div></button>';
  });

  if(wrongCount>0){
    h += '<button class="reviewCard" data-act="wrong">'
       + '<div class="chapterNum" style="color:var(--gold)">\u00d7</div>'
       + '<div style="flex:1"><div class="chapterTitle" style="color:var(--washi)">\u8aa4\u7b54\u3060\u3051\u5fa9\u7fd2\u3059\u308b</div>'
       + '<div class="chapterSub" style="color:#c9d3e0">'+wrongCount+'\u554f\u304c\u5bfe\u8c61\u3067\u3059</div></div>'
       + '<div style="color:var(--gold)">\u2192</div></button>';
  }

  h += '<div class="footerNote"><span class="ver">DATA_VERSION '+DATA_VERSION+' \u30fb \u5168'+DATA.length+'\u554f\u30fb\u7b2c1\u301c17\u7ae0 \u53ce\u9332</span><br>'
     + '<button class="resetLink" data-act="reset">\u8a18\u9332\u3092\u30ea\u30bb\u30c3\u30c8</button></div>';
  h += '</div>';
  return h;
}

function renderQuiz(){
  const q = state.queue[state.idx];
  const idxLabel = state.activeChapter==="wrong" ? "\u5fa9\u7fd2" : state.activeChapter==="mock" ? "\u78ba\u8a8d" : String(q.id).padStart(2,"0");
  const badge = q.source==="e\u30e9\u30fc\u30cb\u30f3\u30b0";
  let h = '<div class="content">';
  h += '<div class="qtop"><button class="backBtn" data-act="home">\u2190 \u4e00\u89a7\u3078</button>'
     + '<div class="qcount">'+(state.idx+1)+' / '+state.queue.length+'</div></div>';
  h += '<div class="progressTrack"><div class="progressFill" style="width:'+((state.idx/state.queue.length)*100)+'%"></div></div>';
  h += '<div class="qHead"><div class="qIndex">\u554f '+idxLabel+'</div>'
     + '<span class="'+(badge?'srcBadgeEL':'srcBadgeQB')+'">'+(badge?'e\u30e9\u30fc\u30cb\u30f3\u30b0':'\u554f\u984c\u96c6')+'</span></div>';
  h += '<div class="qCard"><div class="qText">'+esc(q.text)+'</div></div>';

  h += '<div class="answerRow">';
  h += '<button class="stampBase stamp-o'+(state.chosen===true?' chosen':'')+'" data-act="ans" data-val="1"'+(state.revealed?' disabled':'')+'>\u3007</button>';
  h += '<button class="stampBase stamp-x'+(state.chosen===false?' chosen':'')+'" data-act="ans" data-val="0"'+(state.revealed?' disabled':'')+'>\u00d7</button>';
  h += '</div>';

  if(state.revealed){
    const ok = (state.chosen===q.answer);
    const bannerTxt = ok ? "\u25ce \u6b63\u89e3\u3067\u3059" : ("\u25b3 \u4e0d\u6b63\u89e3 \u30fc \u6b63\u89e3\u306f\u300c"+(q.answer?"\u3007":"\u00d7")+"\u300d");
    h += '<div class="resultBanner '+(ok?'rb-ok':'rb-ng')+'">'+bannerTxt+'</div>';
    h += '<div class="explainBox"><div class="explainLabel">\u89e3\u8aac</div>'
       + '<div class="explainText">'+esc(q.explanation)+'</div>'
       + (q.correction ? '<div class="correction">\u8a02\u6b63: '+esc(q.correction)+'</div>' : '')
       + '</div>';
    h += '<button class="nextBtn" data-act="next">'+((state.idx+1<state.queue.length)?"\u6b21\u306e\u554f\u984c\u3078":"\u7d50\u679c\u3092\u898b\u308b")+'</button>';
  }
  h += '</div>';
  return h;
}

function renderSummary(){
  const total = state.queue.length;
  const wrong = state.sessionWrong.length;
  let h = '<div class="content"><div class="summaryWrap">';
  h += '<div class="summaryBig">'+(total-wrong)+'<small> / '+total+'</small></div>';
  h += '<div class="summarySub">'+(wrong===0?"\u5168\u554f\u6b63\u89e3\u3067\u3059\u3002\u304a\u898b\u4e8b\u3002":(wrong+"\u554f\u3001\u8aa4\u7b54\u304c\u3042\u308a\u307e\u3057\u305f\u3002"))+'</div>';
  if(wrong>0){
    state.sessionWrong.forEach(id=>{
      const t = byId[id].text.slice(0,34);
      h += '<div class="wrongItem"><div class="wid">\u554f'+id+'</div><div class="wtx">'+esc(t)+'\u2026</div></div>';
    });
  }
  h += '</div><div style="padding:20px 4px"><button class="nextBtn" data-act="home">\u4e00\u89a7\u306b\u623b\u308b</button></div></div>';
  return h;
}

function render(){
  let html;
  if(state.view==="home") html = renderHome();
  else if(state.view==="quiz" && state.queue.length>0) html = renderQuiz();
  else if(state.view==="summary") html = renderSummary();
  else html = renderHome();
  root.innerHTML = html;
  window.scrollTo(0,0);
}

/* event delegation */
root.addEventListener("click", function(e){
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act = el.getAttribute("data-act");
  if(act==="mock") startMockTest();
  else if(act==="chapter") startChapter(parseInt(el.getAttribute("data-ch"),10));
  else if(act==="wrong") startWrongReview();
  else if(act==="ans") answer(el.getAttribute("data-val")==="1");
  else if(act==="next") next();
  else if(act==="home") goHome();
  else if(act==="reset") resetAll();
});

render();
</script>
</body>
</html>
