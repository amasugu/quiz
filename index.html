    { id: "17-10", chapter: "17章", section: "コミュニティ心理学の「理解」", text: "コミュニティ心理学では、解決を要する「コミュニティの心理社会的諸課題」を幅広く扱い、コミュニティの変化とともに扱う範囲や対象は変化する。", answer: true, explanation: "コミュニティ心理学の対象範囲は変化する。" },
    { id: "17-11", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学では、個人の改善と環境の改善のどちらが大切かという考え方ではなく、個人と環境の適合性を高めることによりウェルビーイングを得ることが大切と考える。", answer: true, explanation: "個人と環境の適合性を高める＝ウェルビーイング。" },
    { id: "17-12", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学では、支援、サービス提供の場を相談室・密室状況から転換して生活の場へと拡大し、症状や弱点を抱えた生活者としての人間を支援することを重視する。", answer: true, explanation: "生活の場での支援＝コミュニティ心理学の特徴。" },
    { id: "17-13", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学は、「治療を止めてもっぱら予防にエネルギーを注ぐべきである」と考える。", answer: false, explanation: "×：必要な治療的介入は当然行うが、予防的介入にもっとエネルギーを注ぐべきと考え、「治療も予防も」大切にする。治療を止めるわけではない。" },
    { id: "17-14", chapter: "17章", section: "主要な概念", text: "キャプランの１次予防、２次予防、３次予防の考え方は画期的であったが、その後アメリカでは「予防」と「治療」との区別を明確にするため予防と言えるのはやはり１次予防だけであるとの考え方も提示された。", answer: true, explanation: "キャプランの3段階予防と、後の「予防＝1次予防のみ」説。" },
    { id: "17-15", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学では、「治療モデル」だけでなく、「発達・成長モデル」に基づく支援を行う。", answer: true, explanation: "治療モデル＋発達・成長モデル。" },
    { id: "17-16", chapter: "17章", section: "主要な概念", text: "コミュニティ感覚とは、コミュニティへの所属を肯定的に感じていて、メンバー同士の相互監視的関係をもち、コミュニティに対する厳しい責任感を抱いている感覚である。", answer: false, explanation: "×：コミュニティ感覚は、所属を肯定的に感じ、自然に依存的・援助的関係をもつことができ、要請に応えてもらえると信じられる感覚。相互監視的関係ではない。" },
    { id: "17-17", chapter: "17章", section: "主要な概念", text: "当事者が自らの行動でエンパワーすることを、専門家としてアドボカシー（代弁と権利擁護）などにより支援することは重要である。", answer: true, explanation: "アドボカシー＝代弁と権利擁護。エンパワメント支援。" },
    { id: "17-18", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学的支援では、多職種の専門家との連携、非専門家との協力を重視し、この混合チームが有効に機能できるようにコーディネーションすることが必要となる。", answer: true, explanation: "多職種連携＋非専門家協力＋コーディネーション。" },
    { id: "17-19", chapter: "17章", section: "主要な概念", text: "多様な存在と多様で複雑な問題に対しては、それにふさわしい最も効果的な特定のサービスを専門家が提供することが大切である。", answer: false, explanation: "×：多様な支援サービスが提供され、相談当事者が自分にふさわしい方法を選べるようになることが大切。専門家は、当事者が納得して自己決定することを支援する。特定のサービスを専門家が決めるのではない。" },
    { id: "17-20", chapter: "17章", section: "主要な概念", text: "コミュニティ心理学の代表的な研究方法として、研究者と実務家および課題を抱えている当事者などが連携して協同作業を行う「4ステップ・モデル」がある。", answer: false, explanation: "×：設問は「アクション・リサーチ」の説明。4ステップ・モデルではない。" },
    { id: "17-21", chapter: "17章", section: "介入の考え方", text: "コミュニティ心理学における介入は、個人にも環境にもまた両者の関係にも、すべてに対して同時に介入すべきと考えられている。", answer: false, explanation: "×：個人・環境・両者の関係のいずれにも介入するが、「同時にすべて」ではなく、アセスメントの結果に応じて、介入の優先順位・組み合わせ等を考慮する。" },
    { id: "17-22", chapter: "17章", section: "介入の考え方", text: "個人へのBPSモデルに基づく介入は、クライエントとの信頼関係を築くことのできた専門家が単独で行うことが望ましい。", answer: false, explanation: "×：BPSモデルに基づく介入を1人の専門家が担うことは困難。複数の専門家や非専門家が役割を分担して協働することが期待される。" },
    { id: "17-23", chapter: "17章", section: "介入の考え方", text: "マレルが提唱した6レベルの介入では、レベル１「個人の再配置」からレベル６「ネットワーク介入」まで、レベルが上がるにつれて規模の大きな介入となっている。", answer: true, explanation: "マレルの6レベル介入：レベル1（個人の再配置）→レベル6（ネットワーク介入）。" },
    { id: "17-24", chapter: "17章", section: "介入の考え方", text: "介入の対象と介入の仕方を4つの側面に分類して把握する場合、クライエントへの直接的介入としてコンサルテーション、自助グループ支援、アドボカシー活動などが挙げられる。", answer: false, explanation: "×：クライエントへの直接的介入はカウンセリング、アウトリーチ、危機介入など。コンサルテーション・自助グループ支援・アドボカシー活動は別の区分。" },
    { id: "17-25", chapter: "17章", section: "介入の考え方", text: "いずれの介入を行う際にも、適切なアセスメントに基づいて介入のプランを立てること、介入を実施した後の結果の客観的評価をきちんと行って次の介入の立案に活かすことが重要である。", answer: true, explanation: "アセスメント→介入→評価→次の立案のサイクル。" },
    { id: "17-26", chapter: "17章", section: "介入方略と方法", text: "コミュニティ心理学的介入においても、時間をかけて深い洞察と人格変化をめざすカウンセリングが行われるので、コミュニティ心理学と精神力動的セラピーとは親和性がある。", answer: false, explanation: "×：コミュニティ心理学的介入では時間をかけて深い洞察と人格変化をめざすカウンセリングは行わず、コミュニティ心理学と親和性があるのは認知行動的アプローチやシステムズアプローチ。" },
    { id: "17-27", chapter: "17章", section: "介入方略と方法", text: "コンサルテーションにより、能力アップ、スキルアップした専門家が増え、コミュニティ全体の理解力・支援力を高めることが可能となる。", answer: true, explanation: "コンサルテーションによる間接的コミュニティ強化。" },
    { id: "17-28", chapter: "17章", section: "介入方略と方法", text: "コミュニティ心理学における危機介入は、ラザルスの危機理論に基づく、危機状態にある人に対する集中的で多面的な心理的支援の方法である。", answer: false, explanation: "×：危機理論を提唱したのは「キャプラン」。ラザルスが提唱したのは心理学的ストレス理論。" },
    { id: "17-29", chapter: "17章", section: "介入方略と方法", text: "心理教育とは、コミュニケーション能力やストレスマネジメント力など、おもに心理的な諸能力を計画的・体系的に学ぶことを言う。", answer: true, explanation: "心理教育の定義のひとつ：心理的諸能力の体系的学習。" },
    { id: "17-30", chapter: "17章", section: "介入方略と方法", text: "複数のソーシャルサポートをつないで、相乗効果が発揮されるように効果的なネットワークをつくり上げていくことは、重要な専門的支援となる。", answer: true, explanation: "ソーシャルサポートのネットワーキングは重要な専門的支援。" },
  ],
  "18章": [
    { id: "18-1", chapter: "18章", section: "雇用情勢・職業と産業の変化", text: "1990年代初頭のいわゆる「バブル崩壊」以降も経済に変動があり、それにより雇用失業情勢が変化している。", answer: true, explanation: "バブル崩壊以降の経済変動と雇用失業情勢の変化。" },
    { id: "18-2", chapter: "18章", section: "雇用情勢・職業と産業の変化", text: "完全失業率は、労働力人口に占める完全失業者の割合を示しており、リーマンショックのあった2008年を境に上昇し、その後、低下傾向にある。", answer: false, explanation: "×：完全失業率はリーマンショック以降低下傾向であったが、コロナ禍により2020年・2021年は上昇している。" },
    { id: "18-3", chapter: "18章", section: "雇用情勢・職業と産業の変化", text: "完全失業者とは、就業者でない者、就業可能な者、調査期間中に仕事を探す活動や事業を始める準備をしていた者をいう。", answer: true, explanation: "完全失業者の定義として正しい。" },
    { id: "18-4", chapter: "18章", section: "雇用情勢・職業と産業の変化", text: "労働力調査の職業大分類でみると、「保安職業、サービス職業従事者」、「販売従事者」が増加している反面、「専門的・技術的職業従事者」、「生産工程従事者（製造・制作・機会運転及び建設作業者）」が減少している。", answer: false, explanation: "×：増加しているのは「専門的・技術的職業従事者」「保安職業、サービス職業従事者」。減少しているのは「販売従事者」「生産工程従事者」。（販売と専門的の位置が逆）" },
    { id: "18-5", chapter: "18章", section: "雇用情勢・職業と産業の変化", text: "主要国の労働組合組織率をみると、ほとんどの国で低下している。非正規雇用の増加、組織率の高い製造業から組織率の低いサービス業への産業構造の変化などが理由である。", answer: true, explanation: "労働組合組織率の低下理由：非正規雇用増・産業構造変化。" },
    { id: "18-6", chapter: "18章", section: "少子高齢化・非正規労働者の増加", text: "国勢調査によると、生産年齢人口の総人口に占める割合はピークを過ぎ、減少している。", answer: true, explanation: "生産年齢人口はピーク過ぎ減少傾向。" },
    { id: "18-7", chapter: "18章", section: "少子高齢化・非正規労働者の増加", text: "15歳未満の人口は減少傾向にあるが、65歳以上の人口の割合より下回ったのは、国勢調査によれば平成22（2010）年からである。", answer: false, explanation: "×：国勢調査によれば、平成7（1995）年ではわずかに15歳未満の人口が上回っており、平成12（2000）年から65歳以上の人口の割合より下回っている。（2000年から）" },
    { id: "18-8", chapter: "18章", section: "少子高齢化・非正規労働者の増加", text: "高齢者の増加により、医療、介護に関係する産業が活性化して、経済活動を上昇させている。", answer: false, explanation: "×：生産年齢人口の減少は経済活動を低下させ、高齢者の増加により、医療・介護の社会的な負担を増加させている。" },
    { id: "18-9", chapter: "18章", section: "少子高齢化・非正規労働者の増加", text: "厚生労働省の「賃金構造基本統計調査」によると、非正規労働者は賃金が少なく、正規労働者の8割程度となっている。", answer: false, explanation: "×：非正規労働者の賃金は正規労働者の「6割程度」。" },
    { id: "18-10", chapter: "18章", section: "少子高齢化・非正規労働者の増加", text: "2000年代以降、非正規労働者は増加傾向にあり、役員を除く雇用者全体の3割から4割近くを占めるまでになっている。", answer: true, explanation: "非正規労働者は雇用者全体の3〜4割近く。" },
    { id: "18-11", chapter: "18章", section: "人手不足と労働力確保", text: "労働力確保の方策のひとつとして高齢者の雇用促進があり、一律に定年制を廃止することが企業に義務づけられている。", answer: false, explanation: "×：定年制廃止、定年年齢の引き上げ、継続雇用制度導入の「3つの65歳までの雇用確保措置」のうち、「いずれかの実施」が企業に義務づけられている。定年制廃止一律ではない。" },
    { id: "18-12", chapter: "18章", section: "人手不足と労働力確保", text: "高年齢者雇用安定法の改正により、2021年から75歳までの就業確保が事業主の努力義務となった。", answer: false, explanation: "×：「75歳まで」が誤り。「70歳まで」の就業確保が事業主の努力義務となった。" },
    { id: "18-13", chapter: "18章", section: "人手不足と労働力確保", text: "女性の労働力人口が結婚・出産の年代に一時低下する「M字カーブ」は改善され、男性と同程度の割合となっている。", answer: false, explanation: "×：M字カーブは改善されつつあるが、女性の労働参加が男性より低い状況は続いている。同程度ではない。" },
    { id: "18-14", chapter: "18章", section: "人手不足と労働力確保", text: "法改定により、2019年から新たな在留資格を設け、単純労働での外国人の就労が認められることとなった。", answer: true, explanation: "2019年の在留資格新設と外国人単純労働の解禁。" },
    { id: "18-15", chapter: "18章", section: "人手不足と労働力確保", text: "労働力不足を補うものとしてロボットの研究開発が進められ、施設警備や入所者を見守るロボット、体に装着し作業の負担を軽減するロボットなどが注目されている。", answer: true, explanation: "労働力不足対策としてのロボット研究開発。" },
    { id: "18-16", chapter: "18章", section: "産業社会と働く人々の意識の変化", text: "ESGとはEnvironment（環境）、Social（社会）、Governance（企業統治）の頭文字であり、企業が長期的に成長するために、企業活動において環境問題や人権など社会課題に対する認識、法令遵守の体制整備などが重要であるという考え方である。", answer: true, explanation: "ESG＝Environment・Social・Governance。" },
    { id: "18-17", chapter: "18章", section: "産業社会と働く人々の意識の変化", text: "統計数理研究所の「日本人の国民性調査」結果によれば、「2つの会社のうちどちらにつとめたいか」との問いに対し、「家族的な雰囲気のある会社」は増加、「給料が多い会社」は減少して，2018年には逆転している。", answer: false, explanation: "×：1970年代に非常に多かった「家族的な雰囲気のある会社」は減少、「給料が多い会社」は増加して、2018年に逆転している。（増減が逆）" },
    { id: "18-18", chapter: "18章", section: "産業社会と働く人々の意識の変化", text: "仕事と家庭や地域での生活との調和を図ることで、女性の労働参加が高まり、また、少子化の歯止めとなることが期待されている。", answer: true, explanation: "ワークライフバランスは女性の労働参加・少子化対策に寄与。" },
    { id: "18-19", chapter: "18章", section: "産業社会と働く人々の意識の変化", text: "ワークライフバランスの課題として、まず、出産後も働き続けたいという女性の意欲を高めることが重要である。", answer: false, explanation: "×：ワークライフバランスの課題としては、まず男性の意識と働き方を変え、男性が家事・育児・地域社会に参加できるようにすることがある。" },
    { id: "18-20", chapter: "18章", section: "産業社会と働く人々の意識の変化", text: "「仕事と生活の調和推進のための行動指針」では、週労働時間60時間以上の雇用者の割合の半減など、具体的数値目標を示している。", answer: true, explanation: "行動指針で週60時間以上雇用者の半減などの具体的数値目標。" },
  ],
  "19章": [
    { id: "19-1", chapter: "19章", section: "人事管理の基礎知識", text: "経営理念は企業理念とも呼ばれるが、経営にあたっての企業の理想や信念であり、その企業の行動指針となる経営についての基本的な考え方である。", answer: true, explanation: "経営理念の定義として正しい。" },
    { id: "19-2", chapter: "19章", section: "人事管理の基礎知識", text: "経営戦略は、「長期目標を達成するために作成される、経営環境との間の交互作用のための、企業や組織の行動計画」と定義することができる。", answer: true, explanation: "経営戦略の定義として正しい。" },
    { id: "19-3", chapter: "19章", section: "人事管理の基礎知識", text: "企業組織形態のうち、製造、営業、研究開発等に分かれているものを事業部組織といい、製品別、顧客別、地域別等々に分かれているものを機能別組織という。", answer: false, explanation: "×：製造・営業・研究開発等に分かれているものは「機能別組織」、製品別・顧客別・地域別等に分かれているものは「事業部組織」。（逆）" },
    { id: "19-4", chapter: "19章", section: "人事管理の基礎知識", text: "従業員の能力、業績、勤務態度などの評価を人事評価といい、評価結果は賃金や報酬、昇進や昇格に反映されるが、評価結果が本人に伝えられることはない。", answer: false, explanation: "×：人事評価の結果は本人にフィードバックされ、意欲向上・能力開発の促進、評価制度の適正チェックの機能がある。" },
    { id: "19-5", chapter: "19章", section: "人事管理の基礎知識", text: "評価者研修は、評価者間での差や評価の偏りや誤りが生じることなく、適切で公平な評価が行われるために実施される。また、被評価者本人へフィードバックする方法を学ぶことを考課者訓練と言う。", answer: false, explanation: "×：「評価者研修」と「考課者訓練」に明確な使い分けはない。フィードバック方法の研修を含めて行われることもある。" },
    { id: "19-6", chapter: "19章", section: "賃金・人事異動", text: "賃金には、毎月支払われる月例給与と賞与があり、月例給与には、基本給と各種手当の所定内給与と、時間外勤務、休日勤務等に対して支払われる所定外給与がある。", answer: true, explanation: "賃金の構造として正しい。月例給与＝所定内給与＋所定外給与。" },
    { id: "19-7", chapter: "19章", section: "賃金・人事異動", text: "基本給は、一般的に「職務給」であり、従業員の職務遂行能力を基準として決められるが、職務遂行能力の高さは、客観的な判断は難しいとされている。", answer: false, explanation: "×：基本給は一般的に「職務給」ではなく「職能給」。職務遂行能力を基準とするのが職能給。" },
    { id: "19-8", chapter: "19章", section: "賃金・人事異動", text: "職能資格制度とは、従業員の職務遂行能力によってランク分けし、それに応じて処遇を決める制度だが、日本では年功的な運営がされる場合も多い。", answer: true, explanation: "職能資格制度の説明として正しい。日本では年功的運営の傾向。" },
    { id: "19-9", chapter: "19章", section: "賃金・人事異動", text: "人事異動とは組織内で従業員の配置を変えることであり、職務や役職、部署・勤務地の変更を伴うかどうかによってさまざまなものがある。", answer: true, explanation: "人事異動の定義として正しい。" },
    { id: "19-10", chapter: "19章", section: "賃金・人事異動", text: "人事異動やジョブローテーションにより頻繁に職務が変わることで、適材適所に人員を配置したり、本人もさまざまな職務がこなせるようになったり、人脈が広がるといったプラスの面がある。", answer: false, explanation: "×：プラス面は設問のとおりだが、頻繁に職務が変わると1つの職務での高度な専門性を伸ばせないというマイナス面もある。" },
    { id: "19-11", chapter: "19章", section: "人材育成・ガバナンス", text: "人材育成のうち、OJTとは一時的に通常の仕事を離れて集中的に行う訓練のことをいう。", answer: false, explanation: "×：OJT（On the Job Training）は日常の業務を行いながら、そのなかで教育訓練を行うもの。設問はOff-JTの説明。" },
    { id: "19-12", chapter: "19章", section: "人材育成・ガバナンス", text: "人材育成は、研修や訓練だけでなく、人事異動やジョブローテーションを通じても実施される。", answer: true, explanation: "人材育成は多様な方法で実施される。" },
    { id: "19-13", chapter: "19章", section: "人材育成・ガバナンス", text: "コーポレートガバナンスは「企業統治」と訳され、経営陣や株主が、会社が法令を遵守し、効率的に運営されるようにコントロールし、モニタリングするしくみをいう。", answer: true, explanation: "コーポレートガバナンスの定義として正しい。" },
    { id: "19-14", chapter: "19章", section: "人材育成・ガバナンス", text: "「内部統制」とはマネジメント（運営）の状況を管理・監督することであり、「監査」は法令をはじめ各種の規則に沿って企業が運営されているかを審査することである。", answer: true, explanation: "内部統制と監査の定義として正しい。" },
    { id: "19-15", chapter: "19章", section: "人材育成・ガバナンス", text: "企業の社会的責任(CSR)は、コーポレートガバナンスの基本原理のひとつであり、企業が法律や内規など基本的なルールに従って活動することを示す。", answer: false, explanation: "×：CSRは利益追求だけでなく社会への影響に責任をもち、人々や自然環境に適切に行動すること。設問文は企業コンプライアンスの説明。" },
    { id: "19-16", chapter: "19章", section: "労務管理", text: "日本の全労働者の年間総労働時間は減少傾向にあるが、これは労働時間短縮の施策が効果をあげ、長時間労働者が激減したことによるとみられている。", answer: false, explanation: "×：年間総労働時間の減少は非正規雇用者の増加が影響しており、長時間労働者の割合はさほど減少していない。" },
    { id: "19-17", chapter: "19章", section: "労務管理", text: "使用者は労働者の労働日ごとに始業時刻や終業時刻を確認・記録し、これを基に労働時間の実態を把握することで、1日の労働時間と労働日数を管理する必要がある。", answer: true, explanation: "労働時間管理の基本として正しい。" },
    { id: "19-18", chapter: "19章", section: "労務管理", text: "柔軟な労働時間の制度として、「変形労働時間制」「フレックスタイム制」「みなし労働時間制」がある。", answer: true, explanation: "柔軟な労働時間制度の3分類。" },
    { id: "19-19", chapter: "19章", section: "労務管理", text: "働き方改革関連法により、年10日以上の年次有給休暇が付与される労働者(管理監督者を含む)に対して、年次有給休暇の日数のうち年10日について、使用者が時季を指定して取得させることが義務づけられた。", answer: false, explanation: "×：使用者に課せられる年休の付与義務日数は10日ではなく5日。" },
    { id: "19-20", chapter: "19章", section: "労務管理", text: "使用者が労働者に提供する、賃金以外の現金給付やサービス等の提供を「福利厚生」と呼び、福利厚生には「法定福利厚生」と「法定外福利厚生」がある。", answer: true, explanation: "福利厚生の定義と分類として正しい。" },
    { id: "19-21", chapter: "19章", section: "人材マネジメント", text: "1995年、当時の日本経営者団体連盟(日経連)は、労働者を3つのグループに分けることによって、労働力の弾力化・流動化と総人件費の抑制をねらう『新時代の「日本的経営」』を公表した。", answer: true, explanation: "『新時代の「日本的経営」』1995年公表。" },
    { id: "19-22", chapter: "19章", section: "人材マネジメント", text: "仕事に人を当てはめる「ジョブ型」雇用と、人を中心に管理し、人と仕事の結びつきが柔軟な「メンバーシップ型」雇用のうち、「ジョブ型」が日本の正規雇用労働者の特徴である。", answer: false, explanation: "×：日本の正規雇用労働者の特徴とされているのは「メンバーシップ型」。" },
    { id: "19-23", chapter: "19章", section: "人材マネジメント", text: "業績評価制度の問題点として「評価によって勤労意欲の低下を招く」、「評価結果に対する本人の納得が得られない」が多く、評価側の課題としては「部門間の評価基準調整が難しい」、「評価者の研修・教育が不十分」などが多い。", answer: true, explanation: "業績評価制度の典型的な問題点と課題。" },
    { id: "19-24", chapter: "19章", section: "人材マネジメント", text: "インクルージョンとは「含有、包含、一体性」などを意味し、ダイバーシティ＆インクルージョンとは、多様性を受容し、さまざまな意見やアイデアを取り入れ、組織の力を高める取り組みといえる。", answer: true, explanation: "D&Iの定義として正しい。" },
    { id: "19-25", chapter: "19章", section: "人材マネジメント", text: "心理的安全性とは、組織やチームの中で自分の考えや気持ちを安心して発言できることであり、「チームの中では対人関係におけるリスクをとっても、大丈夫だとメンバーに共有されている信念」とされている。", answer: true, explanation: "心理的安全性の定義として正しい。エドモンドソンの定義。" },
  ],
  "20章": [
    { id: "20-1", chapter: "20章", section: "労働法の枠組み・当事者", text: "労働者と使用者の間の法的関係は、労働者が使用者に使用されて労働し、使用者がこれに対して賃金を支払うことを約束する労働契約(雇用契約)に基づく。", answer: true, explanation: "労働契約の定義として正しい。" },
    { id: "20-2", chapter: "20章", section: "労働法の枠組み・当事者", text: "就業規則を作成または変更する際は、事業場の労働者の過半数代表からの意見聴取、所轄の労働基準監督署長への届け出という2つの手続きを踏まなければならない。", answer: false, explanation: "×：この2つに加えて、「作業場の見やすい場所への掲示や電子機器による公開などによる労働者への周知」が必須の手続きとなっている。" },
    { id: "20-3", chapter: "20章", section: "労働法の枠組み・当事者", text: "働く人と会社の間の労働をめぐる関係については、労働契約を基礎としつつ、それに規制を加える法律、労働協約、就業規則という、4つの法源の中のどれかによって根拠づけられ権利・義務となることで、労働者が使用者に、または使用者が労働者に法的な請求をすることが可能になる。", answer: true, explanation: "4つの法源（労働契約・法律・労働協約・就業規則）による権利義務。" },
    { id: "20-4", chapter: "20章", section: "労働法の枠組み・当事者", text: "労働基準法上の労働者性を判断するうえでの重要なポイントは、「使用」性(使用者の指揮命令を受けて働いていること)と「賃金」性(労働の対償として報酬を得ていること)の2つである。", answer: true, explanation: "労働者性の判断ポイント：使用性と賃金性。" },
    { id: "20-5", chapter: "20章", section: "労働法の枠組み・当事者", text: "労働法上のさまざまな義務や責任を負う主体である「使用者」の概念は、①労働契約上の義務を負う労働契約上の「使用者」、②労働基準法上の義務や責任を負う労働基準法上の「使用者」の2つがある。", answer: false, explanation: "×：「使用者」の概念は、①労働契約上、②労働基準法上、③労働組合法上の「使用者」の3つがある。" },
    { id: "20-6", chapter: "20章", section: "雇用関係の展開と法", text: "日本では、使用者に幅広い採用の自由が認められており、募集に際して性別、年齢などの制限を設けることも原則として認められている。", answer: false, explanation: "×：日本では採用の自由が認められているが、女性や障害者であることでの募集・採用差別など法律上明文で禁止されている場合には、採用の自由は制限される。" },
    { id: "20-7", chapter: "20章", section: "雇用関係の展開と法", text: "いったん労働契約が成立すると、その後の使用者による一方的な解約の意思表示（＝解雇）には、解雇権濫用法理が適用されることになる。", answer: true, explanation: "解雇権濫用法理が適用される。" },
    { id: "20-8", chapter: "20章", section: "雇用関係の展開と法", text: "出向とは、出向元企業に従業員としての地位（籍）を残しながら出向先企業で働くことで、転籍とは、移籍元企業との労働契約関係を終了させ、移籍先企業と新たな労働契約関係に入ることをいう。", answer: true, explanation: "出向と転籍の定義として正しい。" },
    { id: "20-9", chapter: "20章", section: "雇用関係の展開と法", text: "使用者は、客観的に合理的で社会通念上相当といえる理由があれば、30日前に予告するか、または30日分以上の予告手当を支払って、いつでも労働者を解雇できる。", answer: false, explanation: "×：「いつでも」が誤り。労災での休業、産前産後の休業期間とその後の30日間は解雇できない（一部例外あり）。" },
    { id: "20-10", chapter: "20章", section: "雇用関係の展開と法", text: "有期契約労働者の保護のため、解雇権濫用法理が類推適用されるとする「雇止め法理」が2012年労働契約法改正によって法律上明文化された。", answer: true, explanation: "2012年労働契約法改正で雇止め法理が明文化。" },
    { id: "20-11", chapter: "20章", section: "労働者の人権と法", text: "労働基準法では、使用者に対し、労働者が女性であることを理由とした採用、配置、昇進、教育訓練、賃金について差別をすることを禁止している。", answer: false, explanation: "×：労働基準法では女性であることを理由とした「賃金」差別のみを禁止。賃金以外の採用・配置・昇進・教育訓練の差別は男女雇用機会均等法の違反となる。" },
    { id: "20-12", chapter: "20章", section: "労働者の人権と法", text: "パートタイム・有期雇用労働法は、1週間の所定労働時間がその事業所の正社員にくらべ短い労働者（パートタイム労働者）と、事業主と期間の定めのある労働契約を締結している労働者（有期雇用労働者）を、その適用対象としている。", answer: true, explanation: "パートタイム・有期雇用労働法の適用対象として正しい。" },
    { id: "20-13", chapter: "20章", section: "労働者の人権と法", text: "労働基準法3条は、労働者の国籍、信条、社会的身分を理由とした労働条件の差別的取り扱いを禁止しているが、「社会的身分」には、孤児、受刑者など後発的理由による地位は含まれないものと考えられる。", answer: true, explanation: "労基法3条の「社会的身分」には後発的理由は含まれない。" },
    { id: "20-14", chapter: "20章", section: "労働者の人権と法", text: "セクハラ、パワハラなどのいじめ・嫌がらせ行為の発生については、それによって退職の強要や解雇がなされたときに限り、被害者は会社に対して損害賠償を請求できる。", answer: false, explanation: "×：解雇や退職強要に限られず、働きやすい職場環境で働く利益侵害の不法行為や職場環境配慮義務違反の債務不履行で、損害賠償を請求できる。" },
    { id: "20-15", chapter: "20章", section: "労働者の人権と法", text: "会社が従業員の電子メールの監視を行うことについては、業務上の必要性が労働者側の不利益を上回るので、どのような手段をとっても違法とはならない。", answer: false, explanation: "×：私的利用の程度、監視の目的・手段・態様などを総合的に考慮して社会通念上相当な範囲を逸脱していない場合には、プライバシーの侵害とならない（逸脱する場合は違法となる）。" },
    { id: "20-16", chapter: "20章", section: "労働条件と法（賃金）", text: "賃金は契約によって決められるものなので、たとえば賃金を引き下げようとするときは、就業規則の合理的変更とその周知など契約上の根拠を整えることが必要である。", answer: true, explanation: "賃金引き下げには契約上の根拠が必要。" },
    { id: "20-17", chapter: "20章", section: "労働条件と法（賃金）", text: "最低賃金法や労働基準法などによって保護の対象とされる賃金とは、その名称を問わず、労働の対償として使用者が労働者に支払うすべてのものをいう。", answer: true, explanation: "賃金の定義として正しい。" },
    { id: "20-18", chapter: "20章", section: "労働条件と法（賃金）", text: "最低賃金には、都道府県ごとの地域別最低賃金と、特定の産業ごとに全国一律の最低賃金を定める特定産業別最低賃金がある。", answer: false, explanation: "×：特定産業別最低賃金は、特定産業ごとに地域別最低賃金を上回る最低賃金を定めている（全国一律ではない）。" },
    { id: "20-19", chapter: "20章", section: "労働条件と法（賃金）", text: "労働基準法は、賃金の支払い方法について、通貨で、全額を、毎月1回以上一定の期日を定めて、労働者に直接支払うと規定し、これらに例外は認められていない。", answer: false, explanation: "×：全額払いの原則については、法令に別段の定めがある場合や、事業場の過半数代表との労使協定がある場合には、賃金の一部を控除して支払うことのできる例外がある。" },
    { id: "20-20", chapter: "20章", section: "労働条件と法（賃金）", text: "企業倒産などで事業主に支払い能力がないことが認定されると、政府が労働者の請求に基づき未払い賃金の一定部分を立替払いする制度が、労働基準法に定められている。", answer: false, explanation: "×：事業主に支払い能力がない場合に政府が未払い賃金の一定部分を立替払いする制度は、賃金支払確保法に定められている（労基法ではない）。" },
    { id: "20-21", chapter: "20章", section: "労働条件と法（労働時間・休暇）", text: "「労働基準法上の労働時間」は「労働者の行為が使用者の指揮命令下に置かれたものと客観的に評価できる時間」であり、持ち帰り残業も会社の黙認があれば労働時間に該当しうる。", answer: true, explanation: "労働時間の定義として正しい。黙認があれば持ち帰り残業も該当しうる。" },
    { id: "20-22", chapter: "20章", section: "労働条件と法（労働時間・休暇）", text: "法定労働時間・休憩・休日の原則が適用されない労働者のうち、管理監督者については、それぞれの企業で役職の肩書きをもつ者と判断される。", answer: false, explanation: "×：管理監督者について判例では、肩書きなど形式的な事情ではなく、個々の具体的な実態に基づいて客観的に判断されるべきとしている。" },
    { id: "20-23", chapter: "20章", section: "労働条件と法（労働時間・休暇）", text: "労働時間の延長の限度については厚生労働大臣が基準を定めているが、法的な強制力・拘束力はない。", answer: false, explanation: "×：労働時間の延長の限度については、労働基準法第36条3～6項で定めており、法的な強制力・拘束力をもつ。" },
    { id: "20-24", chapter: "20章", section: "労働条件と法（労働時間・休暇）", text: "労働者が会社に雇われて、6か月以上継続勤務し、全労働日の8割以上出勤した場合に、所定労働日数に関わらず、10労働日の年次有給休暇の権利が発生する。", answer: false, explanation: "×：週3日勤務など所定労働日数が少ない労働者については、その日数に比例して算定された日数の年休が付与される（比例付与）。" },
    { id: "20-25", chapter: "20章", section: "労働条件と法（労働時間・休暇）", text: "育児介護休業法は、育児休業・介護休業などの取得を理由に労働者に対し不利益取扱いをしてはならないとし、企業に一定の賃金保障を義務づけている。", answer: false, explanation: "×：育児休業・介護休業や産前産後休業などについては、法律上有給とすることは義務づけられていない。" },
    { id: "20-26", chapter: "20章", section: "労働者の安全・健康の確保", text: "労働者の安全や健康の確保のための法政策として、労働災害を事前防止する「労働安全衛生」と、生じてしまった労働災害への事後的救済の「労災補償」が重要な柱である。", answer: true, explanation: "労働安全衛生と労災補償が2つの柱。" },
    { id: "20-27", chapter: "20章", section: "労働者の安全・健康の確保", text: "労働者災害補償保険法（労災保険法）に基づく労災保険制度は、会社側の過失の有無を問わずに、また会社に十分な資力がなくても、労働災害を被った労働者を救済できるようにするためにつくられた。", answer: true, explanation: "労災保険制度の目的として正しい。無過失責任主義。" },
    { id: "20-28", chapter: "20章", section: "労働者の安全・健康の確保", text: "職場におけるいじめが原因で労働者が精神疾患を発症し自殺するなど生命・身体に危険を及ぼした場合は、「安全配慮義務違反」が認められている。", answer: true, explanation: "いじめによる精神疾患・自殺は安全配慮義務違反となりうる。" },
    { id: "20-29", chapter: "20章", section: "労働者の安全・健康の確保", text: "安全配慮義務は、直接労働契約関係がある当事者間にのみ発生する義務とされている。", answer: false, explanation: "×：派遣先企業と派遣労働者など直接労働契約関係がなくても、労働者の生命・健康にかかわる指示や監督が行われている場合には、安全配慮義務違反が問われうる。" },
    { id: "20-30", chapter: "20章", section: "労働者の安全・健康の確保", text: "労災保険法に基づく労災補償制度と民法上の損害賠償制度とが併存しており、労災保険の給付対象とされなくても、民法上の損害賠償請求が認められることもある。", answer: true, explanation: "労災補償と民法上の損害賠償は併存する。" },
    { id: "20-31", chapter: "20章", section: "労使関係・労働市場・労働紛争", text: "憲法は労働者に、労働組合をつくる権利「団結権」、労働組合を通じて使用者と交渉する権利「団体交渉権」、集団で行動する権利「団体行動権」を保障している。", answer: true, explanation: "労働三権：団結権・団体交渉権・団体行動権。" },
    { id: "20-32", chapter: "20章", section: "労使関係・労働市場・労働紛争", text: "労働組合法は使用者に対して、組合員であることや組合活動を理由とした労働者の不利益取扱いや、正当な理由なく団交を拒否することなどを、「不当労働行為」として禁止している。", answer: true, explanation: "労働組合法による不当労働行為の禁止。" },
    { id: "20-33", chapter: "20章", section: "労使関係・労働市場・労働紛争", text: "2015年の労働者派遣法改正により、すべての労働者派遣事業が届出制となった。", answer: false, explanation: "×：「届出制」が誤り。2015年の労働者派遣法改正により、すべての労働者派遣事業が許可制となった。" },
    { id: "20-34", chapter: "20章", section: "労使関係・労働市場・労働紛争", text: "より積極的な雇用の創出と維持のための政策（積極的労働市場政策）には、雇用保険二事業、職業能力開発の援助、高齢者や障害者などの雇用促進、雇用保険による職業訓練給付・雇用継続給付がある。", answer: true, explanation: "積極的労働市場政策の内容として正しい。" },
    { id: "20-35", chapter: "20章", section: "労使関係・労働市場・労働紛争", text: "労働紛争を解決するためには、最初に行政機関による相談・あっせん・救済などを活用することが望ましい。", answer: false, explanation: "×：労働紛争は、まず、労使で話し合って解決することが望ましい。会社と労働組合等との間で、問題解決や予防を図る制度を集団的につくり上げていくことが求められる。" },
    { id: "20-36", chapter: "20章", section: "社会保障制度の歴史と枠組み", text: "社会保障制度は、社会保険、国家扶助、公衆衛生および医療、社会福祉の4部門に分類できる。", answer: true, explanation: "社会保障の4部門。" },
    { id: "20-37", chapter: "20章", section: "社会保障制度の歴史と枠組み", text: "社会保障の目的には、所得の再分配を通じて国民の生活保障を図ることと、個人が自らの人生を主体的に追求できる条件整備を図ることがある。", answer: true, explanation: "社会保障の目的。" },
    { id: "20-38", chapter: "20章", section: "社会保障制度の歴史と枠組み", text: "社会保障の機能には、所得再分配機能、リスク分散機能、景気変動を微調整する機能がある。", answer: true, explanation: "社会保障の3機能。" },
    { id: "20-39", chapter: "20章", section: "社会保障制度の歴史と枠組み", text: "日本の社会保障制度のうち社会保険には、年金保険、医療保険、介護保険、雇用保険、労働者災害補償保険の5つがある。", answer: true, explanation: "社会保険5種：年金・医療・介護・雇用・労災。" },
    { id: "20-40", chapter: "20章", section: "社会保障制度の歴史と枠組み", text: "社会保障の目的達成の方法である社会扶助とは、リスク分散のための保険の技術を用いて保険料などを財源として給付を行うしくみである。", answer: false, explanation: "×：社会扶助は、保険の技術や原理に基づかずに租税を中心とする公費によって給付する制度。設問文はもう一つの方法「社会保険」の説明。" },
    { id: "20-41", chapter: "20章", section: "日本における社会保障制度", text: "日本の公的年金制度は、職種を問わず25歳以上のすべての者が、いずれかの年金保険に加入する方式を採用している。", answer: false, explanation: "×：日本の公的年金制度は、25歳以上ではなく20歳以上のすべての者が加入する方式を採用している。" },
    { id: "20-42", chapter: "20章", section: "日本における社会保障制度", text: "公的年金には国民年金、厚生年金の2つの種類があり、老齢、障害、死亡を保険事故として、一定の要件を満たす場合に保険料の拠出に応じた年金給付が行われる。", answer: true, explanation: "公的年金2種と保険事故（老齢・障害・死亡）。" },
    { id: "20-43", chapter: "20章", section: "日本における社会保障制度", text: "公的医療保険は、健康保険等の被用者保険と、自営業者等が加入する国民健康保険と、75歳以上の高齢者等が加入する後期高齢者医療制度からなる。", answer: true, explanation: "公的医療保険の3区分。" },
    { id: "20-44", chapter: "20章", section: "日本における社会保障制度", text: "介護保険制度では、サービス内容や費用負担など多くの課題を抱えた公的負担の措置制度に代わるものとして、社会保険の方式が採用された。", answer: true, explanation: "介護保険は社会保険方式を採用。" },
    { id: "20-45", chapter: "20章", section: "日本における社会保障制度", text: "公的扶助の重要な制度で、他の社会保障制度を補完する「最後のセーフティネット」と呼ばれる生活保護は、「生活困窮者自立支援法」に定められている。", answer: false, explanation: "×：生活保護の制度は「生活保護法」（1950年制定）による。「生活困窮者自立支援法」は生活保護に至る前の自立支援策の強化を目的として制定され、2015年より施行。" },
    { id: "20-46", chapter: "20章", section: "障害者福祉にかかわる法制度", text: "障害者福祉施策は、身体障害、知的障害、精神障害の種別ごとに、「施設」での福祉を中心に法整備が進められてきたが、1993年制定の障害者基本法等により「地域福祉重視」の施策へ転換が図られた。", answer: true, explanation: "1993年障害者基本法により地域福祉重視へ転換。" },
    { id: "20-47", chapter: "20章", section: "障害者福祉にかかわる法制度", text: "障害者基本法では、個人の心身の機能障害にのみ着目して障害者を定義している。", answer: false, explanation: "×：障害者基本法では、個人の心身の機能障害がある者であって、障害および社会的障壁により継続的に日常生活や社会生活に相当な制限を受ける状態にある者を障害者と定義している。" },
    { id: "20-48", chapter: "20章", section: "障害者福祉にかかわる法制度", text: "障害者総合支援法により、従来の障害者福祉各法の給付および事業が一元化され、同法に基づく自立支援給付には、相談支援給付、介護給付、訓練等給付等がある。", answer: true, explanation: "障害者総合支援法による一元化と自立支援給付。" },
    { id: "20-49", chapter: "20章", section: "障害者福祉にかかわる法制度", text: "障害者総合支援法に定められている就労移行支援は、企業などへの就職を希望する障害者が就職をするまで期間の定めなく支援を継続する。", answer: false, explanation: "×：障害者総合支援法に定められている就労移行支援の利用期間は、原則2年とされている。" },
    { id: "20-50", chapter: "20章", section: "障害者福祉にかかわる法制度", text: "一般企業で働いていた人が、メンタルヘルス不調により一時的に離職した場合には、障害者総合支援法に基づく就労移行・継続支援事業を利用することはできない。", answer: false, explanation: "×：一般企業で働いていた人が、メンタルヘルス不調により一時的に離職した場合にも、障害者総合支援法に基づく就労移行・継続支援事業を利用することができる。" },
    { id: "20-51", chapter: "20章", section: "障害者雇用促進法", text: "法改正により新たに導入された、障害者雇用差別の禁止と合理的配慮の提供義務は、雇用の「質」にも着目するもので、障害者雇用施策の転換をもたらすものと期待されている。", answer: true, explanation: "障害者雇用差別禁止・合理的配慮は雇用の質に着目。" },
    { id: "20-52", chapter: "20章", section: "障害者雇用促進法", text: "障害者雇用促進法に基づく雇用義務制度は、「障害者雇用率制度」と「障害者雇用納付金制度」から構成される。", answer: true, explanation: "雇用義務制度＝雇用率制度＋納付金制度。" },
    { id: "20-53", chapter: "20章", section: "障害者雇用促進法", text: "障害者雇用差別の禁止と合理的配慮の対象については、障害の原因と種類に一定の要件が示され、限定されている。", answer: false, explanation: "×：障害者雇用差別の禁止と合理的配慮の対象は、手帳の所持および障害の原因や種類にかかわらず、「長期にわたり、職業生活に相当の制限を受け、又は職業生活を営むことが著しく困難な者」である。" },
    { id: "20-54", chapter: "20章", section: "障害者雇用促進法", text: "法改正により、症状が安定し就労が可能である者で「精神障害者保健福祉手帳」の交付を受けた者も雇用義務の対象に含まれることとなった。", answer: true, explanation: "精神障害者も雇用義務の対象に。" },
    { id: "20-55", chapter: "20章", section: "障害者雇用促進法", text: "募集・採用時の障害者雇用差別については禁止規定であり、採用後の処遇等については「差別の解消に努める」努力義務とされている。", answer: false, explanation: "×：募集・採用時、採用後それぞれに差別禁止が規定されている（採用後も禁止規定）。" },
  ],
  "21章": [
    { id: "21-1", chapter: "21章", section: "人間関係開発の支援", text: "人間関係は仕事上の役割関係（権限、職務）だけでなく、私的な関係も入るため、複雑な様相を示す。職場の人間関係を形成・維持・発展したり崩壊させたりするのにもっとも重要な働きをするのが対人コミュニケーションである。", answer: true, explanation: "職場の人間関係の形成・維持・発展の鍵は対人コミュニケーション。" },
    { id: "21-2", chapter: "21章", section: "人間関係開発の支援", text: "働く人が日々影響を受ける人間関係をよりオープンで相互理解的なものにしていくことは、産業カウンセラーに貢献が期待される支援活動の重要な領域の１つである。", answer: true, explanation: "人間関係開発は産業カウンセラーの重要支援領域。" },
    { id: "21-3", chapter: "21章", section: "人間関係開発の支援", text: "産業カウンセラーに期待される人間関係開発の支援活動は、働く人個人を対象とした教育訓練の支援に代表される個人向けのアプローチと、組織の関係性へのかかわりとしての組織開発の支援を行う組織向けのアプローチとがある。", answer: true, explanation: "個人向けアプローチ＋組織向けアプローチの2本立て。" },
    { id: "21-4", chapter: "21章", section: "人間関係開発の支援", text: "産業カウンセラーが教育訓練プログラムを作成した場合、その実施結果の評価は依頼者である組織が行う必要があり、産業カウンセラーが関与するべきでない。", answer: false, explanation: "×：教育訓練プログラムの実施結果を評価することも産業カウンセラーの役割に含まれる。" },
    { id: "21-5", chapter: "21章", section: "人間関係開発の支援", text: "組織が継続的に教育施策を展開できるよう、産業カウンセラーはコーディネーターとして、常に教育訓練の運営全体のマネジメントを引き受けることが大切である。", answer: false, explanation: "×：組織が継続的に施策を展開できるように、産業カウンセラーがすべてを引き受けるのではなく、組織の側が主体的に判断し取り組む姿勢を促進するよう働きかける必要がある。" },
    { id: "21-6", chapter: "21章", section: "教育訓練プログラムづくり", text: "人間関係やコミュニケーションの教育訓練の場合、単に関係する知識を教授するだけでなく、それを現実場面に応用できる技能や態度、その根底に必要な人間尊重の価値意識などの教育が不可欠である。", answer: true, explanation: "知識・技能・態度・価値意識の全方位的な教育が必要。" },
    { id: "21-7", chapter: "21章", section: "教育訓練プログラムづくり", text: "受講者の動機づけのための事前学習と、学んだことの実践を保証する事後のフォローアップがセットになっていないと、研修会の効果はその場限りのものになりやすい。", answer: true, explanation: "事前学習＋事後フォローアップがセットで効果持続。" },
    { id: "21-8", chapter: "21章", section: "教育訓練プログラムづくり", text: "近年は遠隔技術を用いて、対面での研修と同等以上の効果を上げることが可能となっている。", answer: false, explanation: "×：遠隔技術はアクセスの良さなどの利点は多いが、対面とくらべると相互交流にかかわる情報量が限られるため、研修効果がどの程度あるかについては今後の検証を待つ必要がある。" },
    { id: "21-9", chapter: "21章", section: "教育訓練プログラムづくり", text: "教材として図版などが必要であれば、参考書などから自由に転載して使うことができるので、準備しておくことが大切である。", answer: false, explanation: "×：書籍などからの転載は、著作物利用許諾が必要な場合があるので、注意を要する。" },
    { id: "21-10", chapter: "21章", section: "教育訓練プログラムづくり", text: "教育訓練の評価は、プロセス評価（教育訓練が想定どおりに実施できたか）と、アウトカム評価（目標とした効果が得られたか）を、教育訓練実施後ただちに行うとよい。", answer: false, explanation: "×：プロセス評価とアウトカム評価の視点が求められるが、アウトカム評価はある程度時間を置くことが必要である。" },
    { id: "21-11", chapter: "21章", section: "教育訓練のテーマと方法", text: "主要なテーマとして、「人間関係」「対人コミュニケーション」「自己理解」「リーダーシップ」「ワーク・モチベーション」が挙げられる。", answer: true, explanation: "教育訓練の5つの主要テーマ。" },
    { id: "21-12", chapter: "21章", section: "教育訓練のテーマと方法", text: "講義法はもっともよく使われる方法で、一度に大勢の受講者に多量の知識・情報を手軽に伝達でき、また、講師が伝えたとおりに受講者が理解できる。", answer: false, explanation: "×：講義法は受講者が受動的になりやすいため、講師はできるだけ具体的で理解しやすい解説をする必要があり、グループ討議や質問技法などを挿入して講義内容の咀嚼を支援する。" },
    { id: "21-13", chapter: "21章", section: "教育訓練のテーマと方法", text: "サーベイ・フィードバック法の基本は、客観的な調査データに基づいて課題を解決することである。", answer: true, explanation: "サーベイ・フィードバック法＝客観データに基づく課題解決。" },
    { id: "21-14", chapter: "21章", section: "教育訓練のテーマと方法", text: "ロール・プレイング法では、その組織では起こりえない状況を設定し、それに対応する訓練をすることが望ましい。", answer: false, explanation: "×：ロール・プレイング法は、教育訓練の目的・目標に適した状況やシナリオを設定し、その組織で起こりうるものにしないと違和感があり、受講者が取り組みにくくなる。" },
    { id: "21-15", chapter: "21章", section: "教育訓練のテーマと方法", text: "心理教育的グループ・ワーク法は、課題解決エクササイズ後のふり返りで、フィードバックを通じて、自分の思考、価値、言動の傾向とそれらが他者に与える影響に気づくことをねらいとする。", answer: true, explanation: "心理教育的グループ・ワーク法のねらい：自己と他者への影響への気づき。" },
    { id: "21-16", chapter: "21章", section: "組織開発・ハラスメント対策", text: "組織開発は、人間尊重、民主的、クライエント中心という規範的価値観を基盤とし、その手法は、アクションリサーチの考え方と進め方をベースとした診断型と、社会構成主義を土台とした対話型に分けることができる。", answer: true, explanation: "組織開発＝診断型（アクションリサーチ）＋対話型（社会構成主義）。" },
    { id: "21-17", chapter: "21章", section: "組織開発・ハラスメント対策", text: "ハラスメントは、他者の人格や尊厳を傷つけ、精神的・身体的苦痛を与えたりする言動やいじめ、嫌がらせ行為を指す用語であり、職場環境を害する行為は含まれない。", answer: false, explanation: "×：ハラスメントには職場環境を害する行為も含まれる。人権侵害行為として法的・倫理的に対応が求められる。" },
    { id: "21-18", chapter: "21章", section: "組織開発・ハラスメント対策", text: "ハラスメントを行ってはならない旨の会社方針を、就業規則などに記載するとともに、経営者自らの言葉で表明し、ハラスメントの問題に経営者自身がコミットすることが求められる。", answer: true, explanation: "経営者の明確なコミットメントがハラスメント対策の要。" },
    { id: "21-19", chapter: "21章", section: "組織開発・ハラスメント対策", text: "相談窓口の役割は、相談者の気持ちを真摯に受け止め、事実関係を正確に聞き取って、できるだけ窓口担当者が単独で解決までを担う。", answer: false, explanation: "×：窓口担当者に解決までを期待するのではなく、ハラスメント対策委員会などを設置し、組織的に対応する体制をつくることが重要である。" },
    { id: "21-20", chapter: "21章", section: "組織開発・ハラスメント対策", text: "相談者だけでなく行為者も含めてプライバシー保護を徹底すること、相談したことを理由とした不利益取り扱いを行わないことのルール化も重要である。", answer: true, explanation: "双方のプライバシー保護と不利益取扱い禁止のルール化。" },
    { id: "21-21", chapter: "21章", section: "職場環境改善と産業カウンセラーの役割", text: "産業構造の変化や新型コロナウイルス感染症の世界的流行により、テレワークやオンライン会議、時差通勤などが進められた結果、すべての職場で各人の事情や価値観に合わせた多様な働き方が実現し、業務効率の向上や扱える情報量の拡大などの望ましい変化がもたらされた。", answer: false, explanation: "×：望ましい変化がもたらされた一方で、人間関係の希薄化、仕事の質の過密化や仕事量の増加などの影響が加速した職場もみられる。" },
    { id: "21-22", chapter: "21章", section: "職場環境改善と産業カウンセラーの役割", text: "職場環境の改善は、労働安全衛生法の「快適な職場環境の形成」（71条の2）、およびストレスチェック制度（66条の10）の事後対応としての「職場環境の評価と改善」において、それぞれ事業主の義務とされている。", answer: false, explanation: "×：義務ではなく、努力義務である。" },
    { id: "21-23", chapter: "21章", section: "職場環境改善と産業カウンセラーの役割", text: "快適職場のソフト面は、キャリア形成・人材育成、人間関係、仕事の裁量性、処遇、社会とのつながり、休暇・福利厚生、労働負荷の7領域で構成される。", answer: true, explanation: "快適職場ソフト面の7領域。" },
    { id: "21-24", chapter: "21章", section: "職場環境改善と産業カウンセラーの役割", text: "職場環境等の評価と改善は、2000年に国内初めてのメンタルヘルス指針により広く知られるようになり、メンタルヘルスの予防活動の中でも重要な施策として、多くの手引きやツールが開発、紹介されている。", answer: true, explanation: "2000年のメンタルヘルス指針以降、重要施策として定着。" },
    { id: "21-25", chapter: "21章", section: "職場環境改善と産業カウンセラーの役割", text: "職場環境改善における産業カウンセラーの役割は、組織のトップなどへのコンサルテーション、関係者間のコーディネーション、グループ討議のファシリテーションといった、組織の要請に応じた側面的な支援である。", answer: true, explanation: "コンサル・コーディネート・ファシリの3つが産業カウンセラーの役割。" },
    { id: "21-26", chapter: "21章", section: "職場環境改善の実施", text: "職場環境改善の支援は一般的に、「職場環境改善実施の合意形成」「職場環境の評価とフィードバック」「対策の検討と実施」「フォローアップ」のステップで進められる。", answer: true, explanation: "職場環境改善の4ステップ。" },
    { id: "21-27", chapter: "21章", section: "職場環境改善の実施", text: "職場環境改善は、その継続に資源が必要で、改善策の多くは価値判断がかかわるものなので、組織や職場のトップあるいはトップ層の決意とコミットが必須である。", answer: true, explanation: "トップ層の決意とコミットが職場環境改善の前提。" },
    { id: "21-28", chapter: "21章", section: "職場環境改善の実施", text: "トップ層で決定がなされたら、職場環境改善活動の推進体制の整備が行われるが、その際、産業カウンセラーは推進チームの責任者となることが望ましい。", answer: false, explanation: "×：産業カウンセラーの役割は組織や職場の要請に応じた側面的な支援なので、推進チームではアドバイザーとして位置づけてもらう。" },
    { id: "21-29", chapter: "21章", section: "職場環境改善の実施", text: "職場環境調査においては、「職業性ストレス簡易調査票」「新・職業性ストレス簡易調査票」「快適職場調査（ソフト面）」が用いられることが多い。", answer: true, explanation: "職場環境調査で用いられる主要な調査票。" },
    { id: "21-30", chapter: "21章", section: "職場環境改善の実施", text: "推進チームが調査結果をわかりやすく表やグラフにしてまとめた報告書を作成する際、従業員の動揺を招かないように、場合によっては悪い結果を削除することも必要である。", answer: false, explanation: "×：組織上層部の思惑で都合の悪い調査結果を歪めたり、削除したことが明らかになれば、快適職場づくり活動は構成員から信頼されなくなり、形骸化してしまう。" },
    { id: "21-31", chapter: "21章", section: "改善策の検討・実施・フォロー", text: "職場環境改善策の作成と実行のために開催される職場ミーティングは、そのねらいを、具体的な問題点・課題の抽出と、改善策の立案と実行体制を当事者である職場の管理者、従業員全員が参加する場で決めることに絞るとよい。", answer: false, explanation: "×：ある問題状況に関する事柄的情報だけでなく、職場の全構成員が、各人のものの見方や考え方などの個人のパーソナリティ的情報も含めて、職場についてどのように思っているかを共有することもねらいである。" },
    { id: "21-32", chapter: "21章", section: "改善策の検討・実施・フォロー", text: "職場ミーティングでのグループ編成は１人あたりの話せる時間を保証するために、固定された少人数で時間いっぱい話し合うことが望ましい。", answer: false, explanation: "×：職場の構成員が10人より多い場合は、いくつかの小グループに分け（グループの顔ぶれはその都度抽選などで決める）、後で各グループの話し合いの結果を報告し合い、それを統合する。" },
    { id: "21-33", chapter: "21章", section: "改善策の検討・実施・フォロー", text: "職場ミーティングにおけるグループ討議は、①問題点・課題を抽出する段階、②取り組み課題の改善策の立案の段階、③改善策の実行体制を考える段階の３つに大きく分かれる。", answer: true, explanation: "グループ討議の3段階：抽出→立案→実行体制。" },
    { id: "21-34", chapter: "21章", section: "改善策の検討・実施・フォロー", text: "グループ討議を肯定的で話しやすい雰囲気とするためには、第三者的中立的な立場からファシリテーションをする人が必要になるので、産業カウンセラーがファシリテーターの役割を担えるようにすることが求められる。", answer: true, explanation: "産業カウンセラーは第三者的中立的ファシリテーターとして機能。" },
    { id: "21-35", chapter: "21章", section: "改善策の検討・実施・フォロー", text: "対策がうまく進んでいない場合は、それはなぜなのかを全員で冷静に分析し、対策をスモールステップに組み直す、担当者を増やすなど、追加の改善策を立てることが必要になる。", answer: true, explanation: "フォローアップで分析→スモールステップ化や追加策。" },
  ],
  "22章": [
    { id: "22-1", chapter: "22章", section: "労災対策と補償・事業者の法的責任", text: "一般企業の職場のメンタルヘルス対策は、産業保健活動の一環という位置づけであり、労働安全衛生法を中心に労働基準法、労働者災害補償保険法、労働契約法を主な法的背景としている。", answer: true, explanation: "職場のメンタルヘルス対策の法的背景：労安法中心＋労基法・労災保険法・労契法。" },
    { id: "22-2", chapter: "22章", section: "労災対策と補償・事業者の法的責任", text: "労災補償は、過失の有無を問うことなく事業主の責任とされるが、労災保険の保険料は労使双方の負担となっている。", answer: false, explanation: "×：労災保険の保険料は、全額事業主負担である。労使双方ではない。" },
    { id: "22-3", chapter: "22章", section: "労災対策と補償・事業者の法的責任", text: "労災補償の要件として、業務起因性の成立と、その前提条件として、業務遂行性（労働者が労働契約に基づいて事業主の支配下にある状態）が認められる必要がある。", answer: true, explanation: "労災要件：業務起因性＋業務遂行性。" },
    { id: "22-4", chapter: "22章", section: "労災対策と補償・事業者の法的責任", text: "労災判断指針では、ストレス－脆弱性理論に基づき、環境に起因するストレスと個人の反応性との関係で精神的破綻が生じるかどうかが決まると考えている。", answer: true, explanation: "労災判断はストレス－脆弱性理論に基づく。" },
    { id: "22-5", chapter: "22章", section: "労災対策と補償・事業者の法的責任", text: "労災認定基準では、発病直前の1か月におおむね160時間を超えるような時間外労働を行った場合が、心理的負荷の「特別な出来事」のひとつに挙げられている。", answer: true, explanation: "発病前1か月で160時間超の時間外労働は「特別な出来事」。" },
    { id: "22-6", chapter: "22章", section: "労働安全衛生法", text: "常時50人以上の労働者を使用する事業場では、衛生管理者、産業医等の選任と、これらを構成員とする衛生委員会の設置が義務づけられている。", answer: true, explanation: "常時50人以上で衛生管理者・産業医・衛生委員会が義務。" },
    { id: "22-7", chapter: "22章", section: "労働安全衛生法", text: "事業者は、雇用形態に関わらず全労働者に対して、その健康状態を把握するため、毎年健康診断を行わなければならない。", answer: false, explanation: "×：事業者が健康診断の実施義務を負うのは、「雇用形態に関わらず全労働者」ではなく、「常時雇用する労働者」に対してである。" },
    { id: "22-8", chapter: "22章", section: "労働安全衛生法", text: "ストレスチェック制度は、高ストレス労働者のメンタル不調の防止だけでなく、特定の精神障害を有する労働者を発見し、治療を勧奨することが第一のねらいである。", answer: false, explanation: "×：ストレスチェック制度は、特定の精神障害を有する労働者を発見し治療を勧奨するためではなく、メンタルヘルス不調の1次予防が第一義的な目的である。" },
    { id: "22-9", chapter: "22章", section: "労働安全衛生法", text: "ストレスチェックの受検は労働者個人の意志に委ねられており、個人別の結果は本人の了承がない限り、事業者に通知されない。", answer: true, explanation: "ストレスチェックは任意受検、結果は本人同意なしに事業者通知不可。" },
    { id: "22-10", chapter: "22章", section: "労働安全衛生法", text: "労働安全衛生法69条は、事業者の義務として労働者の心身の健康の保持増進を図るために必要な取り組みを継続的かつ計画的に実施することを定めており、これに基づく健康保持増進措置をトータル・ヘルスプロモーション・プランという。", answer: false, explanation: "×：事業者の義務ではなく、努力義務である。（THPは努力義務）" },
    { id: "22-11", chapter: "22章", section: "職場のメンタルヘルス対策", text: "「労働者の心の健康の保持増進のための指針」では、メンタルヘルス不調を、精神障害のみならず、ストレスや強い悩みや不安などを含む幅広いものと定義している。", answer: true, explanation: "メンタルヘルス不調の定義は幅広く、精神障害以外も含む。" },
    { id: "22-12", chapter: "22章", section: "職場のメンタルヘルス対策", text: "「労働者の心の健康の保持増進のための指針」では、「セルフケア」「ラインによるケア」「管理監督者によるケア」「事業場外資源によるケア」の４つのケアを明示している。", answer: false, explanation: "×：4つのケアは、「セルフケア」「ラインによるケア」「事業場内産業保健スタッフ等によるケア」「事業場外資源によるケア」。「管理監督者によるケア」は誤り。" },
    { id: "22-13", chapter: "22章", section: "職場のメンタルヘルス対策", text: "職場のメンタルヘルス対策においては、労働安全衛生マネジメントシステムの考え方を導入することが求められる。", answer: true, explanation: "労働安全衛生マネジメントシステムの考え方を導入。" },
    { id: "22-14", chapter: "22章", section: "職場のメンタルヘルス対策", text: "職場のメンタルヘルス対策において、産業カウンセラーは「心の健康づくり専門スタッフ」の一員と考え、自らの役割を認識し労働者や管理監督者、他のスタッフと連携を保ち活動を推進することが求められる。", answer: true, explanation: "産業カウンセラーは心の健康づくり専門スタッフの一員。" },
    { id: "22-15", chapter: "22章", section: "職場のメンタルヘルス対策", text: "「労働者の心の健康の保持増進のための指針」では、教育研修・情報提供が重視されているが、それはもっぱら労働者のセルフケアに関するものである。", answer: false, explanation: "×：指針では、労働者（一般）、管理監督者、事業場内産業保健スタッフ等への教育研修・情報提供の項目が列挙されている。セルフケアのみではない。" },
    { id: "22-16", chapter: "22章", section: "職場復帰支援", text: "厚生労働省の「心の健康問題により休業した労働者の職場復帰支援の手引き」（職場復帰支援の手引き）に、職場復帰支援のあり方が包括的に示されている。", answer: true, explanation: "職場復帰支援の手引き＝厚労省の包括的ガイド。" },
    { id: "22-17", chapter: "22章", section: "職場復帰支援", text: "職場復帰支援の手引きでは、職場復帰支援を、当該労働者が休業を開始してから職場復帰を果たし職場に再適応するまでの期間の活動とし、5つのステップに整理している。", answer: true, explanation: "職場復帰支援は5つのステップで整理。" },
    { id: "22-18", chapter: "22章", section: "職場復帰支援", text: "休業中は、主治医に対して職場の実情を伝えて復職に関して意見をきくために、会社から直接かつ積極的に連絡をとる。", answer: false, explanation: "×：主治医への連絡は休業する労働者本人を通して行う。会社から直接ではない。" },
    { id: "22-19", chapter: "22章", section: "職場復帰支援", text: "職場復帰の可否判断を行い、復職プランを策定する段階では、主治医からの復職に関する意見書の内容を確認し、必ず直属の上司が本人と面接を行う。", answer: false, explanation: "×：第3ステップでの面接は通常産業医が行う。直属の上司ではない。" },
    { id: "22-20", chapter: "22章", section: "職場復帰支援", text: "試し出勤制度のひとつとして、事業場外資源による「リワークプログラム」の活用が注目を集めている。", answer: true, explanation: "リワークプログラム＝事業場外資源による試し出勤制度。" },
    { id: "22-21", chapter: "22章", section: "過重労働・職場環境改善・自殺対策", text: "過重労働対策の基本は、長時間労働を行っている労働者に対する面接指導であり、そのうえで時間外・休日労働の削減や年休取得の促進に取り組む。", answer: false, explanation: "×：過重労働対策の基本は、時間外・休日労働の削減や年休取得の促進であり、そのうえで長時間労働を行っている労働者に対する面接指導などを実施する。（順序が逆）" },
    { id: "22-22", chapter: "22章", section: "過重労働・職場環境改善・自殺対策", text: "職場環境の改善は、現場の労働者の意見をきいたうえで、トップダウンで行うことが主流になりつつある。", answer: false, explanation: "×：職場環境の改善は、労働者の意見を重視し、労働者が自らの問題として主体的に取り組む現場解決型の活動が主流になりつつある。トップダウンではない。" },
    { id: "22-23", chapter: "22章", section: "過重労働・職場環境改善・自殺対策", text: "労働安全衛生法で、事業主は、国や地方自治体の自殺対策に協力し、労働者の心の健康の保持に必要な措置を講ずるよう努めることが規定された。", answer: false, explanation: "×：事業主の自殺対策への努力義務が定められているのは、労働安全衛生法ではなく、「自殺対策基本法」である。" },
    { id: "22-24", chapter: "22章", section: "過重労働・職場環境改善・自殺対策", text: "自殺対策には、自殺のリスクが高いと考えられる集団を対象としての働きかけや、自殺問題の啓発活動、仕事のやりがいや職場関係者の相互支援を高める働きかけがある。", answer: true, explanation: "自殺対策の集団的・啓発的・関係的アプローチ。" },
    { id: "22-25", chapter: "22章", section: "過重労働・職場環境改善・自殺対策", text: "自殺対策には、産業保健スタッフおよび管理監督者による、自殺の危険が迫っている人への個別対応や自殺者の周囲に遺された人々への支援がある。", answer: true, explanation: "自殺対策の個別対応と遺された人への支援。" },
    { id: "22-26", chapter: "22章", section: "災害時の対応", text: "災害時の精神保健問題としては、PTSD（心的外傷後ストレス障害）のみに注意を払うべきである。", answer: false, explanation: "×：災害時には、PTSD以外にも、気分障害、適応障害、アルコール使用障害などさまざまなメンタルヘルス不調が生じる可能性に注意を払う必要がある。" },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 日時を「MM/DD HH:mm」形式で表示
function formatDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    return `${mm}/${dd} ${hh}:${mi}`;
  } catch (e) {
    return "";
  }
}

// CSVフィールドをエスケープ（カンマ・改行・引用符を含む場合ダブルクォートで囲む）
function csvEscape(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

// wrongListをCSV文字列に変換
function wrongListToCSV(wrongList) {
  const header = ["章", "セクション", "問題ID", "問題文", "正答", "解説", "誤答回数", "初回誤答", "最終誤答"];
  const rows = wrongList.map(q => [
    q.chapter,
    q.section,
    q.id,
    q.text,
    q.answer ? "○" : "×",
    q.explanation,
    q.wrongCount || 1,
    formatDate(q.firstWrongAt),
    formatDate(q.lastWrongAt),
  ].map(csvEscape).join(","));
  return "\ufeff" + [header.join(","), ...rows].join("\n"); // BOM付き（Excel対策）
}

// wrongListをテキスト形式に変換
function wrongListToText(wrongList) {
  return wrongList.map((q, i) => {
    return `【${i + 1}】${q.chapter} · ${q.section}\n` +
      `問: ${q.text}\n` +
      `正答: ${q.answer ? "○" : "×"}\n` +
      `解説: ${q.explanation}\n` +
      `誤答回数: ${q.wrongCount || 1}回` +
      (q.lastWrongAt ? ` (最終: ${formatDate(q.lastWrongAt)})` : "") +
      "\n";
  }).join("\n" + "-".repeat(40) + "\n\n");
}

// ダウンロードトリガー
function triggerDownload(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// クリップボードにコピー
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    // フォールバック
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    return false;
  }
}

      if (!hasStorage) {
        // フォールバック：INITIAL_DATAをそのまま使う（進捗は保存されないが動作はする）
        console.warn("window.storage not available, using in-memory data");
        const chList = Object.keys(INITIAL_DATA);
        setAllQuestions(INITIAL_DATA);
        setChapters(chList);
        setSelectedChapters(chList);
        setLoaded(true);
        return;
      }

      try {
        // バージョンチェック（存在しないキーはエラーを投げるのでtry-catch）
        let currentVersion = 0;
        try {
          const vR = await window.storage.get("meta:version");
          if (vR && vR.value) currentVersion = parseInt(vR.value) || 0;
        } catch (e) {
          // キー未存在 → 初回起動
          currentVersion = 0;
        }

        // 初回 or バージョン古い → 全章データを書き込み
        if (currentVersion < DATA_VERSION) {
          for (const [ch, qs] of Object.entries(INITIAL_DATA)) {
            try {
              await window.storage.set(`questions:${ch}`, JSON.stringify(qs));
            } catch (e) {
              console.warn(`Failed to write ${ch}:`, e);
            }
          }
          try {
            await window.storage.set("meta:chapters", JSON.stringify(Object.keys(INITIAL_DATA)));
            await window.storage.set("meta:version", String(DATA_VERSION));
          } catch (e) {
            console.warn("Failed to write meta:", e);
          }
        }

        // 章リスト読み込み（失敗したらINITIAL_DATAから）
        let chList;
        try {
          const chR = await window.storage.get("meta:chapters");
          chList = chR && chR.value ? JSON.parse(chR.value) : Object.keys(INITIAL_DATA);
        } catch (e) {
          chList = Object.keys(INITIAL_DATA);
        }

        // 全章の問題を読み込み（失敗した章はINITIAL_DATAにフォールバック）
        const allQ = {};
        for (const ch of chList) {
          try {
            const r = await window.storage.get(`questions:${ch}`);
            if (r && r.value) {
              allQ[ch] = JSON.parse(r.value);
            } else if (INITIAL_DATA[ch]) {
              allQ[ch] = INITIAL_DATA[ch];
            }
          } catch (e) {
            if (INITIAL_DATA[ch]) allQ[ch] = INITIAL_DATA[ch];
          }
        }

        setAllQuestions(allQ);
        setChapters(chList);
        setSelectedChapters(chList);
        setStorageAvailable(true);

        // 進捗読み込み
        try {
          const sR = await window.storage.get("progress:stats");
          if (sR && sR.value) setStats(JSON.parse(sR.value));
        } catch (e) {}

        try {
          const wR = await window.storage.get("progress:wrongList");
          if (wR && wR.value) setWrongList(JSON.parse(wR.value));
        } catch (e) {}

        setLoaded(true);
      } catch (e) {
        console.error("Init error:", e);
        // 致命的エラーでもINITIAL_DATAで動かす
        const chList = Object.keys(INITIAL_DATA);
        setAllQuestions(INITIAL_DATA);
        setChapters(chList);
        setSelectedChapters(chList);
        setLoaded(true);
      }
    }
    init();
  }, []);

  // 進捗保存（ストレージが使える時のみ）
  useEffect(() => {
    if (!loaded || !storageAvailable) return;
    try {
      window.storage.set("progress:stats", JSON.stringify(stats)).catch(e => console.warn(e));
    } catch (e) { console.warn(e); }
  }, [stats, loaded, storageAvailable]);

  useEffect(() => {
    if (!loaded || !storageAvailable) return;
    try {
      window.storage.set("progress:wrongList", JSON.stringify(wrongList)).catch(e => console.warn(e));
    } catch (e) { console.warn(e); }
  }, [wrongList, loaded, storageAvailable]);

  const buildQueue = useCallback((chs, wrongOnly = false) => {
    let pool = chs.flatMap(c => allQuestions[c] || []);
    if (wrongOnly && wrongList.length > 0) {
      const wrongIds = new Set(wrongList.map(q => q.id));
      pool = pool.filter(q => wrongIds.has(q.id));
    }
    return shuffle(pool);
  }, [allQuestions, wrongList]);

  useEffect(() => {
    if (!loaded) return;
    const q = buildQueue(selectedChapters, wrongOnlyMode);
    setQueue(q);
    setCurrent(q[0] || null);
    setAnswered(null);
  }, [selectedChapters, wrongOnlyMode, loaded, allQuestions]);

  const handleAnswer = (ans) => {
    if (answered) return;
    const correct = ans === current.answer;
    setAnswered(correct ? "correct" : "wrong");
    setStats(st => ({ correct: st.correct + (correct ? 1 : 0), wrong: st.wrong + (correct ? 0 : 1), total: st.total + 1 }));
    if (!correct) {
      setWrongList(prev => {
        const now = new Date().toISOString();
        const existing = prev.find(q => q.id === current.id);
        if (existing) {
          // 既存：カウント+1、最終誤答日時を更新
          return prev.map(q => q.id === current.id
            ? { ...q, wrongCount: (q.wrongCount || 1) + 1, lastWrongAt: now }
            : q
          );
        }
        // 新規追加
        return [...prev, { ...current, wrongCount: 1, firstWrongAt: now, lastWrongAt: now }];
      });
    }
  };

  const nextQuestion = () => {
    const newQ = queue.length > 1 ? queue.slice(1) : buildQueue(selectedChapters, wrongOnlyMode);
    setQueue(newQ);
    setCurrent(newQ[0] || null);
    setAnswered(null);
  };

  const resetStats = () => {
    setStats({ correct: 0, wrong: 0, total: 0 });
    setWrongList([]);
    setWrongOnlyMode(false);
    const q = buildQueue(selectedChapters, false);
    setQueue(q);
    setCurrent(q[0] || null);
    setAnswered(null);
  };

  const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;

  if (!loaded) {
    return <div style={s.container}><div style={s.empty}>データを読み込み中...</div></div>;
  }

  if (mode === "review") {
    // ソート済みリスト
    const sorted = [...wrongList].sort((a, b) => {
      if (reviewSort === "recent") return (b.lastWrongAt || "").localeCompare(a.lastWrongAt || "");
      if (reviewSort === "count") return (b.wrongCount || 1) - (a.wrongCount || 1);
      if (reviewSort === "chapter") {
        // 章番号でソート
        const chNum = (ch) => parseInt(ch) || 0;
        return chNum(a.chapter) - chNum(b.chapter) || (a.id || "").localeCompare(b.id || "");
      }
      return 0;
    });

    const handleExportCSV = () => {
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
      triggerDownload(wrongListToCSV(sorted), `wrong-questions-${stamp}.csv`, "text/csv;charset=utf-8");
    };
    const handleExportText = () => {
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
      triggerDownload(wrongListToText(sorted), `wrong-questions-${stamp}.txt`, "text/plain;charset=utf-8");
    };
    const handleCopyText = async () => {
      const ok = await copyToClipboard(wrongListToText(sorted));
      alert(ok ? "テキストをクリップボードにコピーしました" : "コピーに失敗しました");
    };
    const handleRemove = (id) => {
      if (!confirm("この問題を×リストから削除しますか？")) return;
      setWrongList(prev => prev.filter(q => q.id !== id));
      if (expandedId === id) setExpandedId(null);
    };

    return (
      <div style={s.container}>
        <div style={s.header}>
          <button onClick={() => setMode("quiz")} style={s.backBtn}>← 戻る</button>
          <span style={s.headerTitle}>×問題一覧</span>
          <span style={s.counter}>{wrongList.length}件</span>
        </div>

        {wrongList.length === 0 ? (
          <div style={s.empty}>×問題はまだありません</div>
        ) : (
          <>
            {/* ソート切替 */}
            <div style={s.sortRow}>
              <span style={{ fontSize: 12, color: "#64748b", marginRight: 4 }}>並び：</span>
              {[
                { k: "recent", label: "最近" },
                { k: "count", label: "回数" },
                { k: "chapter", label: "章順" },
              ].map(({ k, label }) => (
                <button key={k} onClick={() => setReviewSort(k)}
                  style={{ ...s.sortBtn, background: reviewSort === k ? "#1e3a5f" : "#e2e8f0", color: reviewSort === k ? "#fff" : "#64748b" }}>
                  {label}
                </button>
              ))}
            </div>

            {/* エクスポートボタン群 */}
            <div style={s.exportRow}>
              <button onClick={handleExportCSV} style={s.exportBtn}>📊 CSV</button>
              <button onClick={handleExportText} style={s.exportBtn}>📄 テキスト</button>
              <button onClick={handleCopyText} style={s.exportBtn}>📋 コピー</button>
            </div>

            {/* 一覧 */}
            <div>
              {sorted.map((item, idx) => {
                const isExpanded = expandedId === item.id;
                return (
                  <div key={item.id} style={s.wrongItem}>
                    <div onClick={() => setExpandedId(isExpanded ? null : item.id)} style={s.wrongItemHeader}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={s.wrongItemMeta}>
                          <span style={s.wrongItemChip}>{item.chapter}</span>
                          <span style={s.wrongItemSection}>{item.section}</span>
                        </div>
                        <div style={s.wrongItemText}>
                          {item.text.length > 60 ? item.text.slice(0, 60) + "…" : item.text}
                        </div>
                        <div style={s.wrongItemFoot}>
                          <span style={s.wrongCountBadge}>×{item.wrongCount || 1}</span>
                          <span style={s.wrongDate}>{formatDate(item.lastWrongAt)}</span>
                        </div>
                      </div>
                      <span style={s.wrongItemToggle}>{isExpanded ? "▲" : "▼"}</span>
                    </div>
                    {isExpanded && (
                      <div style={s.wrongItemDetail}>
                        <p style={s.wrongDetailText}>{item.text}</p>
                        <div style={{ marginBottom: 10 }}>
                          <span style={{ color: item.answer ? "#22c55e" : "#ef4444", fontWeight: 800, fontSize: 18 }}>
                            正答：{item.answer ? "○" : "×"}
                          </span>
                        </div>
                        <p style={s.wrongDetailExp}>{item.explanation}</p>
                        <div style={s.wrongDetailMeta}>
                          <span>誤答 {item.wrongCount || 1} 回</span>
                          {item.firstWrongAt && <span>初回 {formatDate(item.firstWrongAt)}</span>}
                          {item.lastWrongAt && <span>最終 {formatDate(item.lastWrongAt)}</span>}
                        </div>
                        <button onClick={() => handleRemove(item.id)} style={s.removeBtn}>この問題をリストから削除</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    );
  }

  return (
    <div style={s.container}>
      <div style={s.header}>
        <div style={s.headerTitle}>産業カウンセラー<br />模擬試験</div>
        <div style={s.statsRow}>
          <span style={s.badge}>✓ {stats.correct}</span>
          <span style={{ ...s.badge, background: "#fee2e2", color: "#dc2626" }}>✗ {stats.wrong}</span>
          <span style={{ ...s.badge, background: "#f1f5f9", color: "#64748b" }}>{accuracy}%</span>
        </div>
      </div>

      <div style={s.chapterRow}>
        {chapters.map(ch => (
          <button key={ch} onClick={() => setSelectedChapters(prev => prev.includes(ch) ? prev.filter(c => c !== ch) : [...prev, ch])}
            style={{ ...s.chBtn, background: selectedChapters.includes(ch) ? "#1e3a5f" : "#e2e8f0", color: selectedChapters.includes(ch) ? "#fff" : "#64748b" }}>
            {ch}
          </button>
        ))}
        {wrongList.length > 0 && (
          <button onClick={() => setWrongOnlyMode(v => !v)}
            style={{ ...s.chBtn, background: wrongOnlyMode ? "#dc2626" : "#fee2e2", color: wrongOnlyMode ? "#fff" : "#dc2626" }}>
            ×のみ ({wrongList.length})
          </button>
        )}
      </div>

      {current ? (
        <div style={s.card}>
          <div style={s.tag}>{current.chapter} · {current.section}</div>
          <p style={s.qText}>{current.text}</p>
          {!answered && (
            <div style={s.answerBtns}>
              <button onClick={() => handleAnswer(true)} style={s.btnO}>○</button>
              <button onClick={() => handleAnswer(false)} style={s.btnX}>×</button>
            </div>
          )}
          {answered && (
            <div style={{ ...s.feedback, background: answered === "correct" ? "#f0fdf4" : "#fff1f2", borderColor: answered === "correct" ? "#86efac" : "#fca5a5" }}>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 24, fontWeight: 900, color: answered === "correct" ? "#16a34a" : "#dc2626" }}>{answered === "correct" ? "正解!" : "不正解"}</span>
                <span style={{ fontSize: 13, color: "#64748b", marginLeft: 10 }}>正答：{current.answer ? "○" : "×"}</span>
              </div>
              <p style={s.expText}>{current.explanation}</p>
              <button onClick={nextQuestion} style={s.nextBtn}>次の問題 →</button>
            </div>
          )}
        </div>
      ) : <div style={s.empty}>{selectedChapters.length === 0 ? "章を選択してください" : "問題がありません"}</div>}

      <div style={s.footerRow}>
        {wrongList.length > 0 && <button onClick={() => { setMode("review"); setReviewIndex(0); }} style={s.footerBtn}>×問題一覧 ({wrongList.length})</button>}
        <button onClick={resetStats} style={{ ...s.footerBtn, background: "#f1f5f9", color: "#64748b" }}>リセット</button>
      </div>

      {stats.total > 0 && <div style={s.progressBar}><div style={{ ...s.progressFill, width: `${accuracy}%` }} /></div>}
    </div>
  );
}

const s = {
  container: { fontFamily: "'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif", maxWidth: 640, margin: "0 auto", padding: 16, minHeight: "100vh", background: "#f8fafc", color: "#1e293b" },
  header: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, padding: "12px 16px", background: "#1e3a5f", borderRadius: 12, color: "#fff" },
  headerTitle: { fontWeight: 800, fontSize: 15, lineHeight: 1.3 },
  backBtn: { background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", padding: "6px 12px", borderRadius: 8, cursor: "pointer", fontSize: 13 },
  statsRow: { display: "flex", gap: 6, alignItems: "center" },
  badge: { background: "#dcfce7", color: "#16a34a", borderRadius: 8, padding: "4px 8px", fontSize: 13, fontWeight: 700 },
  counter: { fontSize: 13, color: "rgba(255,255,255,0.8)" },
  chapterRow: { display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 },
  chBtn: { border: "none", borderRadius: 20, padding: "6px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer" },
  card: { background: "#fff", borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.08)", marginBottom: 16 },
  tag: { fontSize: 11, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 12 },
  qText: { fontSize: 15, lineHeight: 1.8, color: "#1e293b", marginBottom: 24, fontWeight: 500 },
  answerBtns: { display: "flex", gap: 16, justifyContent: "center" },
  btnO: { width: 80, height: 80, borderRadius: "50%", border: "3px solid #22c55e", background: "#f0fdf4", color: "#16a34a", fontSize: 32, fontWeight: 900, cursor: "pointer" },
  btnX: { width: 80, height: 80, borderRadius: "50%", border: "3px solid #ef4444", background: "#fff1f2", color: "#dc2626", fontSize: 32, fontWeight: 900, cursor: "pointer" },
  feedback: { borderRadius: 12, padding: 16, border: "2px solid", marginTop: 8 },
  expText: { fontSize: 14, lineHeight: 1.7, color: "#475569", margin: "0 0 14px 0" },
  nextBtn: { width: "100%", padding: 12, background: "#1e3a5f", color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer" },
  navRow: { display: "flex", justifyContent: "space-between", marginTop: 16 },
  navBtn: { padding: "10px 20px", background: "#1e3a5f", color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: "pointer" },
  footerRow: { display: "flex", gap: 10, marginBottom: 12 },
  footerBtn: { flex: 1, padding: 10, background: "#1e3a5f", color: "#fff", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: "pointer" },
  empty: { textAlign: "center", padding: 40, color: "#94a3b8", fontSize: 15 },
  progressBar: { height: 4, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" },
  progressFill: { height: "100%", background: "#22c55e", transition: "width 0.5s ease" },
  sortRow: { display: "flex", gap: 6, alignItems: "center", marginBottom: 10, flexWrap: "wrap" },
  sortBtn: { border: "none", borderRadius: 14, padding: "5px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" },
  exportRow: { display: "flex", gap: 8, marginBottom: 14 },
  exportBtn: { flex: 1, padding: "8px 10px", background: "#fff", color: "#1e3a5f", border: "1.5px solid #1e3a5f", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer" },
  wrongItem: { background: "#fff", borderRadius: 12, marginBottom: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.05)", overflow: "hidden" },
  wrongItemHeader: { padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 },
  wrongItemMeta: { display: "flex", gap: 6, alignItems: "center", marginBottom: 6 },
  wrongItemChip: { background: "#1e3a5f", color: "#fff", fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 10 },
  wrongItemSection: { fontSize: 10, color: "#94a3b8", fontWeight: 600 },
  wrongItemText: { fontSize: 13, color: "#334155", lineHeight: 1.5, marginBottom: 6 },
  wrongItemFoot: { display: "flex", gap: 10, alignItems: "center" },
  wrongCountBadge: { background: "#fee2e2", color: "#dc2626", fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 10 },
  wrongDate: { fontSize: 11, color: "#94a3b8" },
  wrongItemToggle: { fontSize: 12, color: "#94a3b8", flexShrink: 0 },
  wrongItemDetail: { padding: "12px 14px", borderTop: "1px solid #e2e8f0", background: "#f8fafc" },
  wrongDetailText: { fontSize: 14, lineHeight: 1.7, color: "#1e293b", margin: "0 0 10px 0" },
  wrongDetailExp: { fontSize: 13, lineHeight: 1.6, color: "#475569", margin: "0 0 12px 0" },
  wrongDetailMeta: { display: "flex", gap: 12, flexWrap: "wrap", fontSize: 11, color: "#94a3b8", marginBottom: 12 },
  removeBtn: { width: "100%", padding: 8, background: "#fff1f2", color: "#dc2626", border: "1px solid #fca5a5", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer" },
};


ReactDOM.createRoot(document.getElementById('root')).render(<QuizApp />);

    </script>
  </body>
</html>
